N 서브쿼리(결재 정보 있는 문서만 필터) - UNION ALL(문서 종류가 다른 결과를 하나의 목록으로) ★ 경험 서술: \"여러 문서 유형을 하나의 결재함으로 보여줘야 해서, 각 유형을 조인·서브쿼리로 만든 뒤 UNION ALL로 합쳤다. 코드값은 스칼라 서브쿼리로 이름으로 변환했다.\" 4. 대표 쿼리 B — 프로젝트 현황 통계 (집계+외부조인+카티전) 상태×주거분류의 모든 조합에 프로젝트 수를 매핑(0건도 표시): 여기서 다룬 기법: - 카티전 곱(A,B)으로 \"모든 상태×분류 조합\" 먼저 생성 → 데이터 없는 조합도 0으로 표시(통계표의 빈칸 채우기). - 집계 서브쿼리(COUNT+GROUP BY)를 LEFT OUTER JOIN으로 붙임. - COALESCE로 NULL→0. ★ 경험 서술: \"통계표에서 '건수 0인 항목도 행으로 나와야' 해서, 먼저 모든 조합을 카티전 곱으로 만들고 실제 집계를 LEFT OUTER JOIN해서 COALESCE로 0을 채웠다. 그냥 GROUP BY만 하면 0건 행이 사라지는 문제를 이렇게 풀었다.\" 5. 대표 패턴 C — 권한(RBAC)별 동적 쿼리 로그인 유저의 권한 코드에 따라 데이터 범위(서브쿼리)를 바꿈: ★ 핵심: 같은 화면이라도 권한에 따라 \"내 것만 / 우리 회사 것 / 담당 프로젝트 것\"으로 데이터 범위가 달라짐 → 서브쿼리를 조립해 해결. (도메인편의 RBAC가 SQL 레벨에서 구현된 실제 사례) 경험 서술: \"감리사·건설사·관리자가 같은 목록을 봐도 보이는 범위가 달라야 해서, 권한 코드로 WHERE 서브쿼리를 갈아끼우는 방식으로 처리했다.\" 6. 보안 — 파라미터 바인딩 - dbManage.execute(query, params): csor.execute(query, params)로 %s 바인딩. - ★ 사용자 입력은 문자열 포매팅이 아니라 %s 파라미터로 → SQL 인젝션 방지. - format()으로 조립하는 건 서브쿼리 \"구조\"(하드코딩된 조건문)뿐, 값은 항상 params. 7. 이 프로젝트의 정직한 평가 (면접에서) \"더러운 코드\"임을 인지하고 개선점을 말할 수 있는 게 오히려 강점: - SQL이 문자열 상수로 흩어져 있고 매우 긺(감리 2,914줄) → 유지보수 어려움. - WHERE 1=1 패턴(동적 조건 조립 편의용)은 흔하지만 지저분. - 개선 방향: 쿼리 빌더/ORM 도입, 반복되는 코드→이름 변환 서브쿼리를 조인이나 뷰로, 긴 UNION을 정리. ★ \"복잡한 걸 다뤄봤다\"보다 \"다뤄봤고, 무엇이 문제인지 알고, 어떻게 개선할지 안다\"가 진짜 실력. (DB 실전편 \"복잡한 걸 단순하게 만들 줄 안다\"와 연결) 다뤄본 SQL 범위 체크리스트 (이 프로젝트 근거) - [O] 다중 조인(LEFT OUTER JOIN 여러 개 체이닝) - [O] 스칼라 서브쿼리(SELECT절 안의 SELECT — 코드→이름 변환) - [O] IN 서브쿼리(WHERE ... IN (SELECT ...)) - [O] 상관 서브쿼리(외부 행 참조) - [O] UNION ALL(이질적 결과 합치기) - [O] 집계(COUNT/SUM/MAX/MIN + GROUP BY) - [O] COALESCE(NULL 처리) - [O] GROUP_CONCAT(다중 값 한 컬럼으로) - [O] 카티전 곱(모든 조합 생성 후 외부조인 — 통계 빈칸 채우기) - [O] 권한별 동적 쿼리(서브쿼리 조립) - [O] 페이지네이션(LIMIT) - [O] 파라미터 바인딩(인젝션 방지) 핵심 요약 Flask+생 SQL 감리 시스템. 다중 조인·서브쿼리(스칼라/IN/상관)·UNION ALL·집계·GROUP_CONCAT·카티전 곱+외부조인(통계 빈칸)·권한별 동적 쿼리를 실무 작성. 파라미터 바인딩으로 인젝션 방지. \"복잡한 쿼리를 다뤄봤고, 코드가 지저분한 것도 인지하며 개선 방향(빌더/뷰/정리)을 말할 수 있다\"가 면접 포인트."}, {"title": "프로젝트: 인증 서버", "kind": "인증 구현", "url": "doc_36_authsrv_authimpl.html", "text": "[문서36] 프로젝트: 인증 서버 — 실제 구현 정리 NestJS 기반 인증+리포트 API. 앞서 문서(26~28 인증·프론트, NestJS 흐름)의 개념이 거의 다 실제 코드로. 스택: NestJS + TypeORM(SQLite) + Redis(ioredis) + JWT + 카카오 OAuth + Swagger + Throttler. ★ 이 프로젝트 하나로 \"JWT/리프레시/OAuth/가드/인터셉터/DTO/rate limit\"을 실제 코드로 답할 수 있음. --- 핵심 한 줄 \"NestJS로 액세스/리프레시 토큰 분리 인증 서버를 구현. 리프레시는 Redis에 jti로 저장해 기기별 로그아웃과 로테이션을 지원하고, tokenVersion으로 전체 무효화를 처리. 카카오 OAuth(code→토큰 교환), 가드(JWT 검증), 인터셉터(응답 DTO 직렬화), Throttler(rate limit)까지 NestJS 요청 흐름 전체를 구현했다.\" 1. 액세스 vs 리프레시 토큰 (문서28 개념의 실제) - 액세스 토큰: 15분(JWT_ACCESS_EXPIRES=15m), HS256 서명, payload에 sub/email/role/v(tokenVersion)/typ. - 리프레시 토큰: 7일, jti(UUID) 포함 → Redis에 저장해 서버가 추적. ★ 왜 jti: \"전체 로그아웃 말고 기기별 로그아웃 할 때 유저 ID만으론 토큰 식별 불가\"(코드 주석). 기기마다 다른 jti라 특정 기기만 로그아웃 가능. 2. 리프레시 토큰을 Redis에 (해시로 저장) ★ 평문이 아니라 HMAC 해시로 저장 — 5년차 보안 감각: ★ 두 보안 기법: - 토큰을 해시해서 저장 → Redis 유출돼도 원본 토큰 복원 불가(비밀번호 해싱과 같은 원리). - crypto.timingSafeEqual(safeEqualsHex) → 문자열 비교 시간으로 값을 추측하는 타이밍 공격 방어. 3. 리프레시 로테이션 (재사용 방지) ★ 문서28의 \"리프레시 회전\"의 실제 구현(rotateRefreshToken): ★ 두 층의 무효화: - 로테이션: 리프레시 쓸 때마다 옛 jti 삭제+새로 발급. 탈취된 옛 토큰 재사용 차단. - tokenVersion: 유저 단위 버전. 전체/강제 로그아웃 시 증가시키면 그 이전 발급 리프레시가 전부 무효(v 불일치로 거부). 4. 카카오 OAuth (문서: OAuth 흐름의 실제) ★ 정확히 OAuth Authorization Code 흐름: code를 서버에서 토큰으로 교환(시크릿은 서버에), 그 토큰으로 유저 정보, 우리 유저와 연결. README에 \"state 검증 포함\" → CSRF 방어. (앞서 정리한 OAuth 흐름과 일치) 5. 가드 (JWT 검증) — NestJS 요청 흐름의 가드 단계 ★ 정직한 자기 인지(코드 주석): \"강제/전체 로그아웃 시 access 토큰에서도 버전 검사 필요, 이 로직 추가돼야 함. 지금은 access의 짧은 지속시간에만 기대는 상황(보안상 치명적일 수 있음).\" = 액세스 토큰은 무효화가 어렵다는 JWT의 근본 한계(문서26)를 알고, 현재 구현의 미비점을 정확히 인지. 면접에서 이런 걸 말하면 신뢰↑. 6. 인터셉터 (응답 직렬화) — 요청 흐름의 인터셉터 단계 ★ 응답 후처리로 민감정보 제외: user 엔티티를 UserDto로 변환해 password 등 내부 필드를 응답에서 제거. (문서28의 \"인터셉터는 응답 변형\" + \"DTO로 엔티티 노출 안 함\"의 실제) 7. DTO + class-validator (파이프 검증) - dtos/ 폴더에 create-user, signin, refresh, update-user 등 요청 DTO + auth-response, token-response 등 응답 DTO. - class-validator로 검증, class-transformer(@Expose)로 직렬화 제어. ★ 문서28의 DTO+ValidationPipe가 그대로. 요청은 DTO로 검증, 응답은 DTO로 필터. 8. Throttler (rate limiting) — 남용 방지 ★ 시스템 디자인편의 rate limiting이 인증 서버에. 로그인 무차별 대입(brute force) 완화. 9. NestJS 요청 흐름 전체가 이 프로젝트에 (문서28 5번의 실제) 미들웨어 → 가드(AuthGuard: JWT 검증) → 인터셉터(current-user, serialize) → 파이프(DTO 검증) → 컨트롤러 → 서비스(auth/users/token) → TypeORM(엔티티) → 응답은 인터셉터(serialize)로 후처리. ★ 앞서 개념으로 정리한 흐름이 파일로 다 존재: guards/, interceptors/, dtos/, .controller, .service, .entity. 면접 포인트 (이 프로젝트로 답할 수 있는 것) - \"JWT 인증 구현해봤나?\" → 액세스/리프레시 분리, HS256, payload 설계. - \"리프레시 토큰 어떻게 관리?\" → Redis에 jti로 저장(해시+타이밍 세이프 비교), 로테이션, tokenVersion으로 전체 무효화. - \"기기별 로그아웃?\" → jti로 특정 기기 토큰만 삭제. 전체는 tokenVersion 증가. - \"OAuth 해봤나?\" → 카카오. code→토큰 교환(서버), 유저 정보, upsert, state로 CSRF 방어. - \"JWT의 한계는?\" → 액세스 토큰 즉시 무효화 어려움. 코드 주석으로 이 미비점을 인지(짧은 만료에 의존). 개선안: 액세스에도 버전 검사 or 블랙리스트. - \"NestJS 구조?\" → 가드/인터셉터/파이프/DTO를 용도대로. 응답 직렬화로 민감정보 제외. - \"rate limit?\" → Throttler 60초 20회. 핵심 요약 NestJS 인증 서버. 액세스(15m)/리프레시(7d, Redis jti) 분리, 해시 저장+타이밍 세이프 비교, 로테이션+tokenVersion 이중 무효화, 기기별 로그아웃. 카카오 OAuth(code 교환+state). 가드(JWT)·인터셉터(직렬화)·DTO·Throttler로 NestJS 흐름 전체 구현. ★ 액세스 토큰 무효화 한계를 코드에 정직히 명시한 게 성숙함의 증거."}, {"title": "코드잇 알고리즘 실습 ① 탐색·정렬·재귀", "kind": "실전편", "url": "doc_37_codeit_practical.html", "text": "[문서37] 코드잇 알고리즘 실습 ① 탐색·정렬·재귀 — 구현 손코딩 코드잇 「하나의 문제, 여러 가지 알고리즘」 실습 문제와 정답 코드 모음. 각 코드에 논리 흐름(for문·인덱스·임시변수·내부 함수의 이유)을 함께 정리했습니다. 파이썬 기준. --- 1. 선형 탐색 (Linear Search) 문제: 리스트를 처음부터 하나씩 확인해 element 의 인덱스를 리턴. 없으면 None . 논리 흐름 - 인덱스 제어: range(len(some_list)) 로 0→끝까지. 위치를 리턴해야 하니 i 가 반드시 필요하다. - return None 의 위치: for문 바깥 . 루프 안에서 못 찾고 빠져나온 뒤에야 \"없음\"이 확정되기 때문. 루프 안에 두면 첫 원소만 보고 성급히 None을 낸다. 2. 이진 탐색 (Binary Search) 문제: 정렬된 리스트에서 탐색 범위를 절반씩 좁혀 element 를 찾음. 논리 흐름 - 인덱스 제어: start / end 두 포인터가 탐색 범위의 경계. midpoint ± 1 로 이미 확인한 가운데를 범위에서 확실히 제외해야 무한 루프가 안 난다. - 종료 조건 start <= end : 두 포인터가 교차하면(범위가 비면) 없는 것. - for가 아닌 while인 이유: 반복 횟수가 데이터에 따라 달라지고, 인덱스가 +1/-1이 아니라 절반씩 점프하기 때문. 3. 선택 정렬 (Selection Sort) 문제: 남은 구간에서 최솟값을 찾아 맨 앞부터 채운다. 논리 흐름 - 내부 함수를 왜 나눴나: find_min_index (찾기)와 swap_elements (바꾸기)로 역할을 쪼개면 selection_sort 본문이 \"찾아서 → 맨 앞에 놓는다\"로 읽힌다. 한 함수에 다 넣으면 로직이 뒤엉킨다. - find_min_index 가 위치를 리턴하는 이유: swap에는 인덱스가 필요하다. 최솟'값'만 알면 어디 있는지 몰라 못 바꾼다. - 인덱스 제어: 바깥 i 는 \"여기까지 정렬 끝\"의 경계. 안쪽은 i+1 부터 비교(이미 i는 후보로 잡았으니 그 다음부터). 4. 삽입 정렬 (Insertion Sort) 문제: 현재 원소를 앞쪽 정렬된 부분의 알맞은 자리에 끼워 넣는다. 논리 흐름 - 임시변수 temp 가 필수인 이유: 값을 오른쪽으로 밀면 my_list[i] 자리가 앞 값으로 덮인다. 미리 temp 에 빼두지 않으면 꽂을 값을 잃어버린다. - 인덱스 제어: prev 가 왼쪽으로 내려가며 자리를 만든다. 루프 종료 후 prev+1 이 정확한 삽입 위치(마지막으로 -1 된 걸 되돌림). - prev = 0 조건: 리스트 맨 앞을 넘어가지 않게 막는 경계 검사. 5. 재귀 — 피보나치 논리 흐름 - for가 아니라 재귀인 이유: \"n번째 = 앞 두 개의 합\"이라는 정의 자체가 자기 참조. base case( n<3 )가 없으면 무한히 파고들어 멈추지 않는다. - 단점: 같은 fib(k) 를 여러 번 다시 계산 → 지수 시간. 문서39의 메모이제이션이 이 낭비를 없앤다. 6. 재귀 — 숫자 합 / 자릿수 합 논리 흐름 - % 와 // 의 역할 분담: n % 10 은 지금 처리할 '맨 뒤 한 자리', n // 10 은 '아직 안 본 나머지 자리들'. 이 둘로 문제를 한 자리씩 줄인다. - base case가 두 함수의 안전장치: 각각 n==1 , n<10 에서 멈춰야 무한 재귀를 피한다. 7. 재귀 — 리스트 뒤집기 논리 흐름 - 문제 축소 방식: some_list[1:] (맨 앞 뺀 나머지)로 매번 크기가 1 줄어 base case로 수렴한다. - 순서가 뒤집히는 원리: 맨 앞 원소를 항상 '맨 뒤'에 붙이므로, 재귀가 풀리며 첫 원소들이 차례로 끝쪽에 쌓인다. 8. 재귀 — 하노이의 탑 문제: 원판 n개를 시작 기둥에서 목표 기둥으로 옮기는 과정 출력. 논리 흐름 - 6 - start - end 트릭: 기둥 번호가 1,2,3이라 합이 항상 6. 시작·목표를 빼면 나머지 보조 기둥이 나온다. if-else로 경우를 나눌 필요가 없다. - 내부 함수 move_disk 를 분리한 이유: \"원판 하나 옮기기\"라는 최소 동작을 이름으로 고정하면, hanoi 본문이 ①보조로 치우고 ②큰 거 옮기고 ③다시 얹는 3단계로 명확히 읽힌다. - 세 줄의 순서가 곧 알고리즘: 큰 원판을 옮기려면 그 위를 먼저 비워야(①) 하고, 옮긴 뒤 다시 덮어야(③) 한다."}, {"title": "코드잇 알고리즘 실습 ② Brute Force·분할 정복", "kind": "실전편", "url": "doc_38_codeit_practical.html", "text": "[문서38] 코드잇 알고리즘 실습 ② Brute Force·분할 정복 — 구현 손코딩 완전 탐색으로 정답 로직을 확정한 뒤, 분할 정복으로 효율을 끌어올리는 흐름. 각 코드에 for문·인덱스·임시변수·내부 함수의 이유를 함께 정리했습니다. --- 1. Brute Force — 가까운 매장 찾기 (Closest Pair) 문제: 좌표 리스트에서 직선 거리가 가장 가까운 두 점. 모든 쌍을 이중 반복문으로 비교. 논리 흐름 - 인덱스 제어의 핵심 j = i + 1 : (A,B) 와 (B,A) 는 같은 쌍이고 (A,A) 는 무의미. j를 i보다 뒤에서 시작해 각 쌍을 딱 한 번만 본다. - 임시변수 pair : \"지금까지 본 최단쌍\"을 계속 들고 다니는 기억 장치. 없으면 비교 결과를 저장할 곳이 없다. - 내부 함수 distance : 같은 식을 조건문에서 두 번 쓰는데, 함수로 빼면 본문이 \"더 가까우면 갱신\"으로 읽힌다. 2. Brute Force — 빗물 채우기 (Trapping Rain) 문제: 각 칸의 왼쪽/오른쪽 최고 높이 중 작은 값에서 자기 높이를 뺀 만큼 물이 고인다. 논리 흐름 - 인덱스 제어: 끝 두 칸을 제외( 1 부터 len-1 )하는 게 핵심. 담는 통은 양쪽에 벽이 있어야 성립한다. - min(왼쪽최고, 오른쪽최고) : 낮은 쪽 벽으로 물이 넘치므로 둘 중 작은 값이 수위 상한. - max(0, ...) : 현재 건물이 양쪽 벽보다 높으면 물이 안 고임 → 음수 방지. - 한계: 칸마다 max() 를 매번 다시 계산 → O(n²). 문서41에서 왼/오른쪽 최고값을 미리 배열에 저장해 O(n)으로 최적화. 3. 분할 정복 — merge (정렬된 두 리스트 합치기) 논리 흐름 - 포인터 2개 이유: 두 리스트에서 각각 \"다음에 비교할 위치\"가 독립적으로 움직인다. 작은 값을 담은 쪽만 +1 전진. - 남은 항목 처리: 한쪽이 끝나도 다른 쪽엔 값이 남는다. 그 남은 부분은 이미 정렬돼 있으므로 슬라이스로 붙이면 끝. 4. 분할 정복 — 합병 정렬 (Merge Sort) 문제: 반씩 나눠 각각 정렬한 뒤 merge로 합친다. 논리 흐름 - 재귀인 이유: \"리스트 정렬 = 반쪽 정렬 두 번 + 합치기\"라는 자기 참조 구조. base case(1개 이하)에서 쪼개기가 멈춘다. - for가 없는 이유: 반복 대신 '분할'이 일을 한다. 실제 비교/정렬 작업은 전부 내부 함수 merge 가 담당 → 역할 분리가 명확. 5. 분할 정복 — Partition (퀵 정렬의 분할) 문제: 마지막 원소를 pivot으로, 작은 값은 왼쪽·큰 값은 오른쪽으로 나누고 pivot 최종 위치 리턴. 논리 흐름 - 인덱스 2개 i , b 의 역할 분담: i 는 모든 원소를 훑는 '스캐너', b 는 '작은 값 구역의 끝' 경계. 작은 값을 만날 때만 b가 전진하므로, b 왼쪽은 항상 pivot보다 작은 값들로 유지된다. - 마지막 swap: 루프가 끝나면 b는 \"작은 값 구역 바로 다음\". 그 자리에 pivot을 넣으면 왼쪽=작은 값, 오른쪽=큰 값으로 딱 갈린다. - 내부 함수 swap_elements : 퀵 정렬 전 과정에서 반복되는 동작이라 빼두면 재사용·가독성 둘 다 좋다. 6. 분할 정복 — 퀵 정렬 (Quicksort) 논리 흐름 - pivot ± 1 로 재귀 범위 제어: pivot은 이미 제 위치라 다시 건드리지 않는다. 그 양옆만 각각 정렬. - 래퍼 함수 quicksort_wrapper 가 있는 이유: 실제 재귀는 start , end 인덱스가 필요한데 사용자가 매번 0, len-1 을 넘기는 건 번거롭고 실수하기 쉽다. 래퍼가 그 초기값을 감춰준다. - merge_sort와 대비: 퀵은 추가 리스트 없이 제자리(in-place) 교환으로 정렬 → 메모리 이득. 대신 나쁜 피벗이면 최악 O(n²)."}, {"title": "코드잇 알고리즘 실습 ③ Dynamic Programming", "kind": "실전편", "url": "doc_39_codeit_practical.html", "text": "[문서39] 코드잇 알고리즘 실습 ③ Dynamic Programming — 구현 손코딩 중복되는 부분 문제 + 최적 부분 구조 → 계산 결과를 저장해 재사용. Memoization(하향식·재귀+캐시)과 Tabulation(상향식·반복문+테이블)의 흐름 차이를 주석으로. --- 1. 피보나치 — Memoization (하향식) 이미 계산한 값은 사전(cache)에 저장해 재사용. 논리 흐름 - 임시변수 cache (사전)의 역할: 같은 fib(k) 가 재귀 트리에서 수없이 반복 호출된다. 한 번 구하면 저장해두고 다음엔 꺼내 쓴다 → 지수 시간이 O(n)으로. - 래퍼 fib(n) 가 필요한 이유: 재귀 함수는 캐시를 인자로 받아야 하는데, 사용자가 매번 빈 사전을 만들어 넘기는 건 번거롭다. 래퍼가 초기 캐시를 대신 만든다. - if n in cache 의 위치: base case 다음, 계산 전. \"이미 있으면 계산 자체를 건너뛴다\"가 메모이제이션의 전부. 2. 피보나치 — Tabulation (상향식) 작은 값부터 테이블을 채워 올라간다. 공간 최적화 (변수 2개만): 논리 흐름 - 하향식 vs 상향식: 메모이제이션은 \"큰 문제에서 시작해 필요할 때 내려간다\", 테이뷸레이션은 \"작은 것부터 쌓아 올린다\". for가 자연스러운 건 후자. - 동시 대입 a, b = b, a+b 가 임시변수를 대체: 파이썬은 우변을 먼저 다 계산한 뒤 좌변에 넣으므로, 별도 temp 없이 두 값을 안전하게 교체한다. (다른 언어라면 temp가 필요) 3. 새콤달콤 장사 — Memoization 문제: price_list[i] = i개 묶음의 가격. count개를 자유롭게 쪼개 팔 때 최대 수익. 논리 흐름 - range(1, count//2 + 1) 로 절반까지만 도는 이유: (i, count-i) 와 (count-i, i) 는 같은 분할. 절반만 봐도 모든 조합을 커버 → 낭비 제거. - 임시변수 profit : 여러 분할 후보 중 '지금까지의 최대'를 들고 다니는 누적자. max() 로 계속 갱신. - 캐시가 결정적인 이유: 큰 count는 작은 count들의 조합으로 쪼개지는데, 같은 작은 문제가 수없이 겹친다. 저장 안 하면 재계산 폭발. 4. 새콤달콤 장사 — Tabulation 논리 흐름 - 이중 for의 의미: 바깥은 \"몇 개짜리 답을 만들 차례인가\", 안쪽은 \"그 개수를 어떻게 쪼갤까\". 안쪽이 참조하는 profit_table[j] 는 이미 채워진 작은 답이라 재귀가 필요 없다. - 메모이제이션과 결과는 같고 방식만 다름: 재귀로 내려가며 채우느냐(위→아래), 반복으로 쌓아 올리느냐(아래→위)의 차이. 5. Memoization vs Tabulation 구분 Memoization Tabulation ------ ------------- ------------ 방향 하향식(재귀) 상향식(반복문) 저장소 사전(dict) 리스트(테이블) 계산 범위 필요한 부분 문제만 작은 것부터 전부 장점 불필요한 계산 스킵 재귀 오버헤드 없음·공간 최적화 쉬움 포인트(면접): \"DP는 분할 정복과 달리 부분 문제가 겹칠 때 쓴다. 겹치니까 저장해서 재사용하는 것.\""}, {"title": "코드잇 알고리즘 실습 ④ Greedy", "kind": "실전편", "url": "doc_40_codeit_practical.html", "text": "[문서40] 코드잇 알고리즘 실습 ④ Greedy — 구현 손코딩 매 순간 가장 좋아 보이는 선택. 조건: 최적 부분 구조 + 탐욕적 선택 속성. for문·정렬·임시변수의 이유를 흐름과 함께 정리했습니다. --- 1. 최소 개수로 거스름돈 주기 문제: 큰 단위부터 최대한 사용해 거스름돈을 최소 개수로. 논리 흐름 - 정렬(내림차순)이 그리디의 핵심: \"가장 큰 단위부터\"라는 탐욕적 선택을 위해 먼저 큰 값이 오게 정렬한다. - // 와 % 의 역할 분담: value // coin 은 '이 단위를 몇 장 쓸까'(선택), value %= coin 은 '쓰고 남은 금액'(다음 단계로 넘길 상태). 이 둘로 금액이 단계마다 줄어든다. - 임시변수 num_coins : 단계별로 쓴 장수를 모으는 누적자. - 한계: 배수 관계 단위(한국 화폐)라서 그리디가 최적. [1,3,4] 처럼 임의 단위면 틀릴 수 있어 그땐 DP. 2. 카드 게임 최대 곱 (Max Product) 문제: 플레이어별 3장 중 하나씩 뽑아 곱했을 때 최대. (양수 카드 기준 각자 최댓값 선택) 논리 흐름 - result = 1 로 시작하는 이유: 곱셈의 항등원은 1. 0으로 시작하면 어떤 값을 곱해도 0. - 각 플레이어에서 max 만 보면 되는 이유: 플레이어 선택이 서로 독립적이고 카드가 양수라, 각자 최댓값을 고르면 전체 곱도 최대(국소 최적 → 전역 최적). 3. 수업 선택 (Activity Selection) 문제: (시작, 종료) 수업들 중 겹치지 않게 최대 개수를 듣는다. 논리 흐름 - 정렬 기준이 x[1] (종료 시간)인 이유: 빨리 끝날수록 뒤에 남는 시간이 많다 → 더 많은 수업을 넣을 여지. 이게 이 문제의 정답 전략. - 임시변수 my_selection 이자 상태: 마지막 원소 [-1] 가 \"직전에 고른 수업\". 그 종료시간과만 비교하면 겹침 판정이 끝난다(정렬돼 있어 그 이전과는 자동으로 안 겹침). - course[0] my_selection[-1][1] : 새 수업 시작 직전 수업 종료 → 겹치지 않음. 그리디 함정 정리 (면접 대비) - 그리디는 국소 최적 → 전역 최적 이 보장될 때만 정답. 증명(교환 논법)이나 반례 탐색으로 확인. - 안 통하면 DP(문서39)로. \"거스름돈도 단위가 이상하면 DP\"가 대표 예시. - 전략 후보를 세우고 반례를 먼저 던져보는 습관 이 그리디 문제의 핵심. (수업 선택도 \"가장 짧은 것부터\"는 반례 존재 → \"먼저 끝나는 것부터\"가 정답)"}, {"title": "코드잇 알고리즘 실습 ⑤ 종합 문제(Level 1~3)", "kind": "실전편", "url": "doc_41_codeit_practical.html", "text": "[문서41] 코드잇 알고리즘 실습 ⑤ 종합 문제(Level 1~3) — 구현 손코딩 패러다임을 스스로 골라 푸는 종합 실습. 인덱스 제어·임시변수·전처리 배열의 이유를 흐름과 함께. --- 1. [Lv1] 빠르게 산 오르기 (Greedy) 문제: 약수터 위치 water_stops 와 용량 capacity (km). 물 안 떨어지게 최소 약수터만 들르기. 논리 흐름 - 임시변수 prev_stop 이 상태를 든다: \"마지막으로 물 채운 곳\". 현재 약수터와의 거리를 재는 기준이라 없으면 사정거리를 못 잰다. - 인덱스 제어 i-1 : 지금 약수터(i)에 못 가면, 갈 수 있었던 마지막 곳은 바로 직전(i-1). 그리디하게 \"갈 수 있는 데까지 갔다가 막히기 직전에 채운다\". - 루프 밖 append(water_stops[-1]) : 목적지는 조건과 무관하게 항상 들러야 하므로 마지막에 따로 추가. 2. [Lv2] 투자 귀재 규식이 (Kadane's Algorithm) 문제: 일별 수익 리스트에서 연속 구간 최대합 . 논리 흐름 - 임시변수가 2개인 이유가 이 문제의 전부: - max_check 는 \"지금 이 칸에서 끝나는 최선의 구간합\" (지역 상태). - max_profit_so_far 는 \"전체를 통틀어 본 최선\" (전역 정답). - 지역 최선을 매 칸 갱신하고, 그중 역대 최고를 따로 기록한다. - max(max_check + profits[i], profits[i]) : 앞까지의 합이 마이너스면 버리고 새로 시작하는 게 이득. 이 한 줄이 Kadane의 심장. 3. [Lv2] 삼송전자 주식 분석 (One-pass) 문제: 한 번 사고 한 번 팔 때 최대 수익. (사는 날 팔 수는 없음) 논리 흐름 - 인덱스가 2부터인 이유: 초기값을 0·1일로 이미 잡았으니 중복 없이 2일차부터 순회. - 두 갱신의 순서가 중요: 먼저 \"오늘 판 수익\"을 평가(매수는 반드시 과거여야 하므로), 그 다음 최저가를 갱신. 순서를 바꾸면 같은 날 사고파는 게 껴서 틀린다. - 임시변수 min_price_so_far : \"지금까지의 최저 매수가\"만 들고 있으면 매번 과거 전체를 다시 안 봐도 된다 → O(n). 4. [Lv2] 출근하는 방법 (계단 오르기 = 피보나치) 문제: 1칸 또는 2칸씩 올라 n계단 오르는 경우의 수. 논리 흐름 - 왜 피보나치인가: n번째 칸에 도달하는 방법 = (n-1에서 1칸) + (n-2에서 2칸). 즉 \"앞 두 경우의 수의 합\". - 변수 2개면 되는 이유: 바로 앞 두 개만 있으면 다음이 나온다. 전체 배열을 저장할 필요가 없어 공간 O(1). - a, b = b, a+b : 파이썬 동시 대입이 임시변수를 대신한다. 5. [Lv3] 강남역 폭우 II (빗물 O(n) 최적화) 문제: 문서38의 빗물 채우기를 O(n)으로. 왼쪽/오른쪽 최고 높이를 미리 배열에 저장. 논리 흐름 - 전처리 배열 2개가 최적화의 핵심: Brute Force(문서38)는 칸마다 max(왼쪽) , max(오른쪽) 을 매번 다시 계산해 O(n²). 여기선 그 값을 미리 한 번씩 누적 계산 해 배열에 저장 → 본 계산에서 조회만. - 오른쪽 배열의 역방향 for( n-2 → 0 ): 오른쪽 최고값은 뒤에서부터 쌓아야 \"직전(오른쪽) 최고 vs 지금\"을 비교할 수 있다. 방향이 반대인 이유. - 트레이드오프: 공간 O(n)을 더 써서 시간을 O(n²)→O(n)으로. 전형적인 '메모리로 속도 사기'. 6. [Lv3] 중복되는 항목 찾기 I (정렬) 문제: 길이 N+1 리스트에 1~N이 들어 있어 하나는 중복. 중복 수 찾기. 논리 흐름 - 정렬이 문제를 단순화: 흩어진 중복을 찾으려면 모든 쌍을 봐야 하지만, 정렬하면 같은 값이 붙어 이웃 비교만으로 끝. - 인덱스 len-1 까지: some_list[i+1] 을 참조하므로 마지막 칸에서 범위를 넘지 않게 하나 덜 돈다. 7. [Lv3] 중복되는 항목 찾기 II (이진 탐색 + 비둘기집 원리) 제약: 추가 공간 O(1), 원본 리스트 변형 금지. 논리 흐름 - 이진 탐색의 대상이 '값의 범위'인 게 핵심: 보통 이진 탐색은 인덱스를 좁히지만, 여기선 답이 될 수 있는 숫자 범위 1~N 을 좁힌다. - 비둘기집 원리( count mid - low + 1 ): 1~mid 사이 '칸'은 mid-low+1 개인데 원소가 그보다 많으면, 비둘기집 원리로 그 범위 안에 반드시 중복이 있다. 그쪽 절반만 남기고 버린다. - 공간 O(1)인 이유: 사전·리스트를 새로 안 만들고 low / high 두 정수만 움직인다. \"사전을 못 쓸 때\"의 정석 풀이."}, {"title": "자료구조 구현 ① 링크드 리스트", "kind": "실전편", "url": "doc_42_dsimpl_practical.html", "text": "[문서42] 자료구조 구현 ① 링크드 리스트 — 직접 구현 코드잇 자료구조 강의에서 '직접 코드로 구현한' 부분만 추출한 정리. 파이썬 내장 리스트로 끝나는 개념 설명이 아니라, Node/LinkedList 클래스를 손으로 짜는 파트입니다. --- 0. 무엇을 '구현'했나 (설명 vs 구현 구분) - 설명만 : 동적 배열, 파이썬 리스트/딕셔너리/셋의 내부 특성, 시간복잡도 비교 — 내장 자료형을 '쓰는' 관점. - 직접 구현 : Node 클래스와 이를 엮은 LinkedList (싱글리·더블리), 해시 테이블, 힙, 이진 탐색 트리, 그래프. 이 문서부터는 구현 파트만 다룹니다. --- 1. Node — 링크드 리스트의 기본 단위 논리 흐름 - 배열과 다른 점: 배열은 '메모리에 연속 배치'라 인덱스 접근이 O(1)이지만, 링크드 리스트는 각 노드가 next (와 prev ) 참조로 흩어져 이어진다. - prev / next 를 둘 다 두는 이유: 더블리는 양방향 이동이 가능해 특정 노드 삭제 시 이전 노드를 O(1)에 찾을 수 있다. 싱글리라면 next 만 둔다. 2. 더블리 링크드 리스트 논리 흐름 - find_node_at 에 for가 필요한 이유: 링크드 리스트는 인덱스로 바로 못 간다. head부터 next 를 index번 따라가는 순회가 유일한 접근법 → 접근이 O(n). - 삽입/삭제에서 임시변수( next_node 등)가 필수인 이유: 링크를 다시 걸기 전에 원래 연결을 변수에 붙잡아 두지 않으면, 한쪽을 바꾸는 순간 반대쪽 노드로 가는 길을 잃는다. - head/tail 특수 처리: 삭제·삽입 시 끝단은 prev 나 next 가 없어 일반 로직이 None 참조 에러를 낸다. 그래서 경우를 나눈다. - 장단점: 삽입·삭제는 O(1)(노드 참조만 있으면), 대신 인덱스 접근은 O(n). 배열과 정반대의 트레이드오프. 3. 삽입/삭제 시간복잡도 요약 연산 배열(동적) 링크드 리스트 ------ ----------- -------------- 인덱스 접근 O(1) O(n) 맨 끝 삽입 분할상환 O(1) O(1) 중간 삽입/삭제 O(n) (밀기) O(1) (노드 참조 시) 포인트(면접): \"링크드 리스트는 접근을 포기하고 삽입/삭제를 얻는 자료구조. 노드 참조만 있으면 O(1)에 끊고 잇는다.\""}, {"title": "자료구조 구현 ② 해시 테이블", "kind": "실전편", "url": "doc_43_dsimpl_practical.html", "text": "[문서43] 자료구조 구현 ② 해시 테이블 — 직접 구현 파이썬 딕셔너리의 '속' 구현. 해시 함수 + 충돌 처리(체이닝 / 오픈 어드레싱)를 손으로 짭니다. --- 1. 해시 테이블의 뼈대 핵심 아이디어: key를 해시 함수로 정수(인덱스)로 바꿔, 배열의 그 자리에 값을 저장. 접근이 평균 O(1). 논리 흐름 - % array_size 가 핵심: 해시값이 아무리 커도 나머지 연산으로 배열 범위 안 인덱스로 접혀 들어온다. - 충돌(collision): 서로 다른 key가 같은 인덱스로 가는 문제. 아래 두 방식으로 해결한다. 2. 충돌 처리 A — 체이닝 (Chaining) 각 배열 칸에 링크드 리스트를 매달아, 충돌하면 그 리스트에 이어 붙인다. 논리 흐름 - [LinkedList() for _ in range(capacity)] 로 미리 채우는 이유: 나중에 어떤 칸이든 바로 체인에 매달 수 있게 빈 리스트를 깔아 둔다. (리스트 컴프리헨션으로 각 칸에 독립된 객체 생성 — [LinkedList()] n 은 같은 객체가 복제돼 버그) - 삽입 전 find_node_with_key : 같은 key면 새로 넣지 않고 값만 덮어야 딕셔너리처럼 동작한다. - 시간복잡도: 해시가 고르면 평균 O(1). 최악(다 한 칸에 몰림)엔 O(n). 3. 충돌 처리 B — 오픈 어드레싱 (Open Addressing) 충돌하면 다음 빈 칸을 찾아 들어간다(선형 탐사). 논리 흐름 - (start + i) % capacity 가 핵심: 충돌 시 +1 씩 이동하되, 배열 끝을 넘으면 나머지 연산으로 맨 앞으로 돌아온다(원형 순회). - look_up이 None 칸에서 멈추는 이유: 삽입은 항상 앞에서부터 채우므로, 빈 칸을 만났다는 건 그 뒤엔 이 key가 없다는 뜻. - 체이닝 vs 오픈 어드레싱: 체이닝은 추가 메모리(링크드 리스트)를 쓰고 삭제가 쉽다. 오픈 어드레싱은 배열만 써 캐시 효율이 좋지만 삭제가 까다롭고 적재율이 높아지면 급격히 느려진다. 포인트(면접): \"파이썬 dict는 오픈 어드레싱 기반 해시 테이블. 평균 O(1) 조회의 대가로, 최악엔 O(n)이고 해시 충돌·적재율 관리가 성능을 좌우한다.\""}, {"title": "자료구조 구현 ③ 힙 · 이진 탐색 트리", "kind": "실전편", "url": "doc_44_dsimpl_practical.html", "text": "[문서44] 자료구조 구현 ③ 힙 · 이진 탐색 트리 — 직접 구현 완전 이진 트리를 배열로 표현한 힙(heapify)과, 노드 참조로 엮은 이진 탐색 트리(BST) 구현. --- 1. 힙 (Heap) — 배열로 표현하는 완전 이진 트리 핵심: 완전 이진 트리라 배열로 빈틈없이 담을 수 있다. 부모/자식 위치를 인덱스 계산으로 O(1)에 찾는다. (여기선 인덱스 1부터 사용) 논리 흐름 - 배열로 트리를 표현하는 이유: 완전 이진 트리는 빈 자리가 없어 배열에 순서대로 담으면 부모·자식 관계가 i 2 , i//2 산술로 즉시 나온다 → 포인터 불필요. - 임시변수 largest : 자기·왼쪽·오른쪽 세 후보 중 최대 위치를 추적. 세 번 비교한 결과를 담아 한 번만 swap한다. - 재귀 heapify : 값을 아래로 한 칸 내렸으면 그 아래에서 힙 속성이 또 깨질 수 있어, 내려간 자리에서 반복. 최대 트리 높이만큼 → O(log n). 2. 힙 삽입 / 추출 논리 흐름 - 삽입은 '끝에 넣고 위로', 추출은 'root를 끝과 바꿔 빼고 아래로': 완전 이진 트리 모양(빈틈 없음)을 항상 유지하기 위한 정해진 절차다. - 삽입/추출 모두 트리 높이만큼만 이동 → O(log n) . 이게 우선순위 큐로 힙을 쓰는 이유. 3. 이진 탐색 트리 (BST) 규칙: 각 노드에서 왼쪽 서브트리는 더 작은 값, 오른쪽은 더 큰 값. → 탐색이 평균 O(log n). 논리 흐름 - while로 좌/우를 고르는 게 탐색의 본질: 매 노드에서 값 비교 후 한쪽 서브트리만 남기고 반대쪽은 통째로 버린다 → 균형 잡히면 O(log n), 한쪽으로 쏠리면(정렬 입력) 최악 O(n). - parent 참조를 두는 이유: 삭제 시 부모 링크를 다시 걸어야 해서. (삭제는 leaf / 자식 1개 / 자식 2개 세 경우로 나뉘는데, 자식 2개면 오른쪽 서브트리의 최솟값으로 대체) - in-order 순회의 특성: 왼→자기→오른 순서라, BST를 in-order로 돌면 자동으로 오름차순 이 된다. 면접 단골 포인트. 힙 vs BST (면접 대비) 힙 이진 탐색 트리 -- ---- ------------- 목적 최대/최소 빠르게 꺼내기 정렬·탐색·범위 질의 구조 완전 이진 트리(배열) 노드 참조 트리 root 항상 최대(또는 최소) 중앙값 아님, 정렬 기준점 탐색 임의 값 탐색은 O(n) 평균 O(log n)"}, {"title": "자료구조 구현 ④ 그래프 · DFS · BFS", "kind": "실전편", "url": "doc_45_dsimpl_practical.html", "text": "[문서45] 자료구조 구현 ④ 그래프 · DFS · BFS — 직접 구현 그래프 표현(인접 행렬 / 인접 리스트)과 두 가지 순회(깊이 우선·너비 우선) 구현. 코드잇 '지하철 노선도' 예제 맥락으로 노드 클래스를 직접 짭니다. --- 0. 그래프 표현 두 가지 - 인접 행렬 : V×V 2차원 배열. 두 노드 연결 여부를 O(1)에 확인. 공간 O(V²). - 인접 리스트 : 각 노드가 '연결된 노드들의 리스트'를 가짐. 공간 O(V+E). 희소 그래프에 유리. 1. 그래프 노드 (인접 리스트 방식) 논리 흐름 - adjacent_stations 리스트가 곧 인접 리스트: 이 노드에 직접 연결된 이웃만 담는다. 안 연결된 노드는 아예 리스트에 없어 공간이 절약된다. - add_connection 이 양쪽에 append하는 이유: 무방향 그래프에선 A-B 연결이 곧 B-A 연결. 한쪽만 넣으면 반대 방향 탐색이 안 된다. (방향 그래프면 한쪽만 넣는다.) 2. 인접 행렬 만들기 논리 흐름 - [[0] n for _ in range(n)] 가 아니라 이중 컴프리헨션을 쓰는 이유: [[0] n] n 은 같은 리스트가 n번 복제돼 한 행을 바꾸면 전 행이 바뀐다. 각 행을 독립 객체로 만들어야 한다. - 이중 for: 모든 (i, j) 쌍의 연결 여부를 채워야 하므로 행렬 전체를 훑는다 → 만드는 데 O(V²). 3. DFS (깊이 우선 탐색) 한 방향으로 갈 수 있는 데까지 파고든 뒤 되돌아온다. 스택(또는 재귀)으로 구현. 논리 흐름 - visited 집합이 필수인 이유: 그래프는 사이클이 있어 표시 없이 돌면 같은 노드를 무한히 재방문한다. set을 쓰는 건 '방문했나' 확인이 O(1)이라서. - 스택(pop)이 깊이 우선을 만든다: 가장 최근에 발견한 이웃을 먼저 꺼내니, 한 갈래로 계속 파고들게 된다. 재귀는 호출 스택이 이 역할을 대신한다. 4. BFS (너비 우선 탐색) 가까운 노드부터 층층이 넓게 퍼진다. 큐로 구현. 최단 경로(간선 수 기준)에 유리. 논리 흐름 - 큐(FIFO)가 너비 우선을 만든다: 먼저 발견한(=더 가까운) 노드를 먼저 처리하니, 시작점에서 거리 1인 노드들 → 거리 2 → ... 순으로 층층이 퍼진다. - deque 를 쓰는 이유: 파이썬 리스트의 pop(0) 은 O(n)(앞을 빼면 전체가 밀림). deque.popleft() 는 O(1)이라 큐로 적합. - 방문 표시를 '큐에 넣을 때' 하는 이유(DFS와 차이): 꺼낼 때 표시하면 같은 노드가 큐에 여러 번 들어갈 수 있다. 넣는 순간 표시해 중복 삽입을 막는다. DFS vs BFS 요약 (면접 대비) DFS BFS -- ----- ----- 보조 자료구조 스택 / 재귀 큐(deque) 순회 방식 깊이 먼저(한 갈래 끝까지) 너비 먼저(가까운 층부터) 최단 경로 보장 안 됨 무가중치 그래프에서 보장 시간복잡도 O(V+E) O(V+E) 포인트: \"무가중치 그래프의 최단 경로는 BFS. 가중치가 있으면 다익스트라. 단순 완전 탐색·경로 존재 여부는 DFS가 간결.\""}, {"title": "프로젝트 Butter", "kind": "프로젝트 개요", "url": "doc_42_butter_overview.html", "text": "[문서42] 프로젝트 Butter — 설명 자료 (개요) \"무엇을 만들었나\"보다 \"왜 그렇게 설계했나 / 어떤 문제를 어떻게 풀었나\". 면접관이 좋아하는 건 기능 나열이 아니라 판단의 근거. 각 항목 \"문제→선택→이유→결과\". --- 1. 한 문장 소개 Butter = 읽은 책을 잊지 않기 위한 독서 저널 & 아카이브 플랫폼. \"읽은 것을 기억하는 공간.\" - 책을 선택하면 GPT가 자동으로 맥락·인용·배경을 enrich하고, 6단계 가이드 질문으로 감상을 기록. - 기록된 감상은 감정 지도·워드 클라우드·아크 다이어그램 등 5종 시각화로 독서 패턴을 탐색. - AI가 누적 저널을 분석해 다음 책에 맞는 개인화된 질문을 생성. 엘리베이터 피치(30초): \"책을 읽은 경험은 대부분 사라진다. Butter는 독서 경험을 6단계 인터뷰 구조로 잡고, GPT로 개인화된 질문을 던져 '이 책이 나에게 무엇이었나'를 기억 가능한 형태로 아카이브하는 앱. 감상이 쌓일수록 개인화 품질이 올라가는 플라이휠 구조.\" 2. 기술 스택 (왜 골랐나까지) - 프론트 React + TypeScript + Tailwind CSS v4 + Vite : 타입 안전성, Tailwind의 CSS 변수 연동으로 6개 테마 토큰 관리. - 라우터 React Router v6 , 애니메이션 Framer Motion : 페이지 전환, 패널 진입 모션. - 백엔드 Express + TypeScript + Prisma ORM : Node 생태계 통일(GPT SDK, 카카오/Google Books API). Prisma로 스키마 타입 자동 생성, 마이그레이션 추적. - DB PostgreSQL (Neon) : Serverless PostgreSQL. Railway 배포와 분리해 DB 레이어 독립. DATABASE_URL + DIRECT_URL 이중 연결로 커넥션 풀 분리. - OpenAI GPT-4o-mini : 책 enrich(quote·historicalContext), 유저 프로파일 추출, 개인화 질문 생성. mini 모델을 쓴 이유 — latency와 비용. 깊은 추론보다 구조적 JSON 출력이 목적이라 mini로 충분. - 카카오 도서 API + Google Books API : 카카오 1순위(한국어 도서 메타 품질), Google Books 2순위(영어권). 백엔드 프록시를 통해 API 키 노출 방지 + enrichment 병합. - 배포 Vercel(프론트) + Railway(백엔드) : 프론트는 정적 빌드라 Vercel 자동 배포. 백엔드는 Railway git push → 즉시 반영. - 인증 : JWT — 로그인 응답에 token body 포함 + localStorage + Authorization: Bearer 헤더. 쿠키 방식은 Vercel↔Railway 크로스 도메인에서 sameSite 이슈(→7번). 3. 아키텍처 — 핵심 데이터 흐름 강조할 설계 결정: - Book soft link (FK 없음) : JournalEntry에 bookId/bookTitle/bookAuthor/bookCover를 스냅샷으로 비정규화 저장. 외부 API(카카오/Google Books) 데이터는 영속 보장이 없어서, 삭제·변경돼도 저널이 깨지지 않음. - 시각화는 클라이언트 전담 : d3.js 계산을 서버가 아닌 프론트에서. 이유 — 시각화 파라미터(정렬·필터)가 인터랙션마다 바뀌고, 저널 데이터는 이미 앱에 로드된 상태라 추가 왕복 불필요. - UserProfile upsert : GPT 결과를 DB에 저장( @@unique userId )해 매 요청마다 GPT 재호출하지 않음. promptVersion 필드로 프롬프트 교체 시 재생성 트리거 추적. 4. 디자인 레퍼런스 확정 — Stitch 활용 문제: \"세련된 독서 앱\"이라는 비전이 있지만 구체적 방향성 없이 코딩하면 UI 결정 하나하나가 흔들림. 해결 — Stitch(AI 디자인 레퍼런스 도구)로 레퍼런스 수집 후 방향 고정: 먼저 \"THE ARCHIVIST\", \"Botanical Archive\", \"Oceanic\", \"Brutalist\", \"Blueprint\", \"Emerald Editorial\" 6가지 아카이브 무드를 레퍼런스로 확정. 각 무드를 Butter의 테마로 1:1 매핑(Classic/Botanical/Oceanic/Brutalist/Blueprint/Emerald). CSS 변수 8종 토큰( --color-butter-bg , --color-butter-text , --color-butter-primary 등)을 테마별로 정의하고 useTheme 훅 하나로 런타임 교체. 세부 교정 과정: - 레퍼런스에서 \"대형 타이포그래피 + 메타 정보 우측 배치\" 패턴을 확인 → 모든 페이지 헤더를 clamp(2.6rem, 6vw, 4.5rem) 대형 제목 + REF. XXX-YYY 코드 우측 배치로 통일. - \"잡지 편집 레이아웃\" 레퍼런스 → 감정 지도의 \"잡지\" 탭 구현 (10종 카드 스펙 시퀀스, 각기 다른 너비와 표지 배치로 flex-wrap 자연 배치). - 카드 간격·border 수 최소화, borderRadius 제거(직각 카드)로 아카이브/편집물 느낌 적용. ★ 인사이트: \"디자인 방향을 레퍼런스로 먼저 고정하면 이후 모든 컴포넌트 결정의 기준이 생긴다. 결정 피로가 줄고 일관성이 올라감.\" 5. GPT 프롬프트 구조화 — 개인화 질문 생성 \"AI 연동은 했는데 왜 그렇게 프롬프트를 짰나\"를 설명할 수 있어야 함. A. 두 단계 분리 설계 한 번에 \"저널 보고 질문 내줘\"가 아니라 추출 → 생성 두 단계로 분리: 1. extractProfile (저널 → UserProfile): 누적 저널에서 독서 패턴을 구조화된 JSON으로 추출. 결과를 DB에 저장(캐시 역할). 2. generateQuestions (책 + UserProfile → 질문 3개): 저장된 프로파일을 참조해 현재 책에 맞는 질문 생성. 분리 이유: - 프로파일은 \"자주 바뀌지 않는 패턴\"이라 매 요청마다 재계산 불필요 → DB 캐시. - 질문은 \"책마다 달라야\" 하므로 매번 생성 → 단, 유저 문맥(프로파일)은 재사용. - 관심사 분리: 프로파일 추출 프롬프트와 질문 생성 프롬프트가 독립적으로 개선 가능. B. 프롬프트 철학 — \"분석 앱이 아님\"을 명시 질문 생성 시스템 프롬프트의 핵심 규칙: 이 규칙 없이 프롬프트를 짜면 GPT가 \"당신은 내성적인 성향이 있어서...\" 식의 심리 분석 투 질문을 생성함. Butter는 독서 기록 앱이므로 이 경계를 시스템 프롬프트 레벨에서 명확히 차단. 볼륨 레벨별 개인화 강도 조절: - readingVolumeLevel === \"low\" : 책 자체 중심, 개인화 최소. - \"mid\" : 최근 독서 패턴과 가볍게 연결. - \"high\" : 장기 패턴과 연결하되 과도한 개인화 금지. → 데이터가 없을 때 억지 개인화하지 않는 안전장치. C. 타입 안전 파싱 GPT 응답은 항상 JSON.parse 후 필드별 타입 검증: GPT 응답이 스키마를 벗어나도 앱이 깨지지 않도록. 마크다운 코드블록( \\ \\ \\ json ) 자동 제거도 포함. 6. 유저 성향 관리 — UserProfile 스키마 설계 ★ 설계 포인트 3가지: (a) 성격이 아니라 독서 경험 패턴만 추출 : recentEmotions 는 책 읽을 때 느낀 감정, dominantThemes 는 독서 주제. \"내성적\", \"예민한\" 같은 성격 판단은 추출 금지 — 시스템 프롬프트에서 명시적으로 막음. (b) promptVersion 추적 : 프롬프트를 개선하면 버전을 올리고, 서버에서 profile.promptVersion !== PROMPT_VERSION 이면 재생성. \"코드 배포\"와 \"데이터 갱신\"을 연결하는 버전 관리. (c) upsert 패턴 : 엔트리 5개 이상일 때만 프로파일 생성/갱신. 데이터 부족한 초기 유저에게 억지 개인화하지 않음. notableFragments 는 유저가 자주 쓰는 표현 단편(\"딱히 없었다\", \"먹먹했다\")을 저장. 질문 생성 시 이 표현 톤과 비슷한 언어로 질문을 생성하도록 GPT에 힌트 제공. 7. 데이터 시각화 — 5종 탭 구현 \"어떻게 다양하게 구현했나\"를 구체적으로. 전부 d3.js + 클라이언트 계산. 서재(Shelf) 탭 책 목록을 테이블로 정렬(최신/가나다/작가/분류). useMemo 로 entries → bookFreq Map 집계. 잡지(Magazine) 탭 각 저널 감상을 10종 카드 스펙 시퀀스( CARD_SPECS )로 flex-wrap 배치. 카드마다 고유한 너비(280~680px), 표지 크기(XS~XL), 표지 위치(left/right/top/none)가 달라 \"패션 잡지 편집 레이아웃\" 효과. justify-content: center 로 카드들이 가운데로 모임. 워드클라우드(WordCloud) 탭 d3-cloud 라이브러리로 감상 텍스트에서 단어 빈도 추출 → 나선형 배치. 한국어 조사·불용어 필터링 ( STOP_KO 집합). ResizeObserver 로 컨테이너 크기 변경 시 재렌더. 악보(Score) 탭 X축 = 날짜, Y축 = 감정 축(emotion × 도서). 날짜별로 도트를 놓고 선으로 연결. 감정이 여러 날짜에 걸쳐 연속되면 선이 이어지고, 끊기면 단절됨. 독서 감정의 시간적 흐름을 악보처럼 표현. 아크(Arc) 탭 책과 감정을 노드로, 연결 빈도를 아크 두께로 표현하는 바이파타이트 그래프. - 모바일 : 노드를 Y축(세로)에 배치, 아크가 좌우로 뻗는 반타원. - PC : 노드를 X축(가로)에 배치, 아크가 위로 솟는 반타원. isMobile 감지로 분기. - 감정별 고유 색상 : 10색 팔레트로 각 감정을 구분 (이전엔 진하기로만 구분 → 색상 추가). - 호버 인터랙션 : 특정 노드에 마우스 올리면 연결된 아크만 강조, 나머지 희미하게. data-base-opacity 속성으로 원래 opacity 저장 후 복원. ★ 공통 구현 패턴: - ResizeObserver + useState(dims) → 컨테이너 크기 변경 시 SVG 재계산. - useMemo 로 entries 집계 분리 — 렌더마다 재계산 방지. - useEffect deps에 dims 포함 → 크기 변경 시 d3 효과 재실행. 8. 구현상 난점 — 실제로 막혔던 것들 (1) 크로스도메인 인증 — 쿠키 vs Bearer 토큰 Vercel(프론트)↔Railway(백엔드)는 도메인이 달라서 httpOnly 쿠키가 크로스사이트에서 전송 안 됨. 처음엔 쿠키만 발급했는데 프로덕션에서 모든 인증 요청이 401. 해결: 로그인 응답 body에 token 필드 추가 → 프론트가 localStorage 에 저장 → 이후 모든 요청에 Authorization: Bearer 헤더. 쿠키도 유지(로컬 개발 호환). getToken() 은 localStorage → 쿠키(httpOnly: false 전환 후) 순으로 fallback. (2) RouterProvider와 Context 차단 React Router v7의 RouterProvider 는 외부 Context.Provider 에서 값을 받지 못하는 문제. <LocaleContext.Provider <RouterProvider / </LocaleContext.Provider 구조로 감쌌는데 locale 전환이 반영 안 됨. 해결: LocaleContext.Provider 를 RouterProvider 안에 넣어야 함. RootLayout 컴포넌트 안에 useState(locale) 을 이동시켜 라우터 트리 내부에서 Context 제공. Login 페이지도 별도로 로컬 Provider 적용. (3) Neon DB idle 연결 끊김 Neon Serverless PostgreSQL은 일정 시간 사용 없으면 연결을 끊음. 이후 첫 요청에서 Prisma가 P1017(Connection closed) 에러를 던지고 500 반환. 해결: Prisma $extends 로 전역 쿼리 미들웨어 추가. P1001/P1002/P1017 및 \"Connection\"/\"closed\" 메시지 감지 시 최대 3회, 600ms 간격으로 $connect() 재시도 후 쿼리 재실행. (4) 모바일 반응형 — 책 상세 페이지 PC에서 12컬럼 그리드(좌 4 / 우 8)가 모바일에서 찌그러지는 문제. 단순히 col-span 수정으론 해결 안 됨 — 레이아웃 자체가 달라야 함. 해결: md 브레이크포인트로 두 개의 완전히 다른 JSX 를 렌더. 모바일은 \"커버 상단 → 제목 → 버튼 → 같은 작가 → 본문 → 카드 → 같은 장르\"의 세로 단일 컬럼. 데스크탑은 기존 2단 그리드. hidden md:block / block md:hidden 으로 분기. (5) 저널 기록물 단순 텍스트 문제 6단계 구조로 작성했는데 보관함에서 볼 때는 평문으로 나열되어 \"작성 경험\"과 \"보기 경험\"의 괴리가 큼. 해결: content 저장 포맷을 [시작]\\n내용\\n\\n[구절]\\n내용 구조로 정의. 보관함 뷰에서 parseSections(content) 로 파싱 → 단계별 Q&A 인터뷰 형식으로 렌더. 각 단계에 01/02/03 인덱스와 원래 질문 텍스트를 희미하게 표시해 \"작성 당시의 감성\"을 재현. 9. 면접 포인트 요약 1. AI 연동 두 단계 분리 : extractProfile(캐시) + generateQuestions(매번). \"매번 GPT 부르지 않고 프로파일을 캐시\"하는 구조. 2. 프롬프트 가드레일 : \"분석 앱이 아님\"을 시스템 프롬프트 레벨에서 강제. AI 응답 품질을 프롬프트 구조로 제어. 3. Book soft link : 외부 API 데이터를 신뢰하지 않고 스냅샷 비정규화. \"DB 직접 참조 vs 비정규화 스냅샷\"의 트레이드오프 선택 근거. 4. 시각화 5종 클라이언트 전담 : 서버 계산 vs 클라이언트 계산의 경계 판단. 5. 크로스도메인 인증 삽질 : 쿠키가 안 되는 이유와 Bearer 전환 이유. 6. RouterProvider Context 차단 버그 : 프레임워크 내부 동작을 이해하고 구조로 우회. 7. UserProfile promptVersion : 프롬프트 개선과 데이터 재생성을 버전으로 연결하는 엔지니어링 감각. 10. 핵심 요약 독서 저널 + AI 개인화 + 5종 데이터 시각화. 책 연결은 외부 API soft link + 스냅샷 비정규화. GPT는 extractProfile(캐시) → generateQuestions(책별 생성) 두 단계. 프롬프트는 \"독서 경험 패턴만, 심리 분석 금지\"를 명시적으로 제한. 시각화 5종은 전부 d3.js 클라이언트 처리. 크로스도메인 인증은 Bearer 헤더로 해결. RouterProvider Context 차단은 RootLayout 내부 이동으로 해결."}];
</script>
