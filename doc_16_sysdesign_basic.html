통합) - 읽기 병목 → 복제+캐싱 - 쓰기 병목 → 샤딩 - 관계 복잡·정합성 → RDB 유지 - 유연·초대용량·단순 조회 → NoSQL - 분석/집계 → OLAP/DW ★ 순서: 캐싱→읽기 복제→인덱스 최적화→그래도 안 되면 샤딩. 샤딩은 조인·트랜잭션 잃어 최후 수단. 12. 마이크로서비스 vs 모놀리스 - 모놀리스: 단일 코드베이스. 초기 간단·네트워크 호출 적음. 부분 확장 어렵고 커지면 관리↑. - 마이크로서비스: 독립 배포 서비스들. 확장·장애 격리·독립 배포. 복잡도·네트워크 오버헤드↑. ★ 선택: 크고 빠르게 진화=마이크로서비스, 작은 팀·초기=모놀리스. \"항상 마이크로서비스\"는 착각. 분산 복잡성(네트워크 실패·정합성·분산 트랜잭션) 감당 가능할 때만."}, {"title": "시스템 디자인 부가 설명", "kind": "부가 설명", "url": "doc_17_sysdesign_supplement.html", "text": "[문서17] 시스템 디자인 부가 설명 — 난이도 있는 개념 보충 문서16에서 한 번 더 파고들 가치가 있는 것들. --- ① CAP를 넘어 — PACELC - CAP: 분할(P) 시 C vs A. - PACELC: 분할(P) 시 A vs C, 아니면(Else) 지연(L) vs 일관성(C)까지 확장. - 즉 분할 없는 평상시에도 \"빠르게(낮은 지연) vs 정확하게(강한 일관성)\" 트레이드오프가 있다. - 예: DynamoDB=PA/EL(가용·저지연 우선), 전통 RDB=PC/EC(일관성 우선). ② 최종 일관성의 실제 (충돌 해결) - 여러 노드에 동시 쓰기 → 충돌. 해결법: - Last-Write-Wins(타임스탬프 최신 우선, 단순하나 유실 위험) - 벡터 클록(인과관계 추적) - CRDT(수학적으로 병합 가능한 자료구조, 협업 편집) - read-your-writes: 방금 쓴 걸 못 읽는 문제 → 쓴 직후엔 마스터로 라우팅. ③ 일관된 해싱 심화 - 가상 노드가 없으면 서버 3대일 때 부하가 33%씩 안 나뉘고 치우침 → 각 서버를 링에 100~200번 배치해 균등화. - 서버 추가 시 이동하는 키 = 전체/서버수 (예: 3→4대면 약 1/4만 이동). ④ 큐 vs 스트림 - 메시지 큐(RabbitMQ): 작업 분배, 소비되면 사라짐. - 이벤트 스트림(Kafka): 로그 보존, 여러 컨슈머가 각자 오프셋으로 재생 가능. 이벤트 소싱·재처리에 유리. - 선택: 단순 작업 분배=큐, 이벤트 기록·재생·여러 소비자=스트림. ⑤ 캐싱 전략 4종 - Cache-aside(lazy): 앱이 캐시 확인→없으면 DB→캐시 채움. 가장 흔함. - Write-through: 쓸 때 캐시+DB 동시. 읽기 빠름, 쓰기 느림. - Write-back: 캐시에만 쓰고 나중에 DB. 빠르지만 유실 위험. - Write-around: DB에만 쓰고 캐시는 읽을 때. 쓰고 안 읽는 데이터. ⑥ 데이터베이스 종류별 용도 - RDB(PostgreSQL/MySQL): 정합성·관계·트랜잭션. - 문서(MongoDB): 유연 스키마, 중첩 데이터. - 키-값(Redis/DynamoDB): 초고속 조회, 캐시·세션. - 컬럼(Cassandra): 대용량 쓰기, 시계열. - 그래프(Neo4j): 관계 탐색(친구의 친구). - 검색(Elasticsearch): 전문 검색, 역색인. - 시계열(InfluxDB): 메트릭·로그. ⑦ 낙관적 UI & 비동기 패턴 - 낙관적 업데이트: 서버 응답 전에 UI 먼저 반영(좋아요 즉시 표시)→실패 시 롤백. 체감 속도↑. - 폴링 vs 롱폴링 vs WebSocket vs SSE: 실시간성 요구에 따라(채팅=WebSocket, 알림=SSE). ⑧ 관측성(Observability) 3축 - 로그(무슨 일이): 구조화 로깅+요청 ID. - 메트릭(얼마나): QPS, 지연 p50/p99, 에러율. - 트레이싱(어디서): 분산 추적(요청이 서비스들을 어떻게 통과). - ★ p99가 평균보다 중요: 평균은 좋아도 상위 1% 사용자가 느리면 문제. ⑨ 이벤트 드리븐 & 메시지 큐 영속성 (NATS/Kafka) \"서비스가 꺼졌다 켜지면 이벤트가 자동으로 채워짐\"의 원리: - durable subscription(영속 구독)+offset 추적: 각 컨슈머가 \"어디까지 처리했나\"를 offset(시퀀스 번호)으로 기록. - 브로커가 메시지 영속화(persistence)→서비스 죽어도 유실 안 됨. - 재시작 시 \"마지막 offset 다음부터\" 다시 받음→꺼진 동안 쌓인 이벤트 순서대로 전달=자동으로 채워짐. - = at-least-once 전달 보장의 실체. 이벤트 소싱/이벤트 드리븐 아키텍처. - 각 MSA가 이벤트를 자기 DB에 저장+다른 서비스도 같은 이벤트 받아 갱신→최종 일관성(eventual). ⑩ 이벤트 순서 보장 & 넘버링 - 각 이벤트에 단조 증가 시퀀스 번호(NATS=sequence, Kafka=offset). WAL/LSN과 같은 원리. - 컨슈머는 번호 순서대로 처리+\"여기까지 처리\" commit. - 순서 범위: 파티션/스트림 내에서는 순서 보장, 여러 파티션 걸치면 전역 순서 미보장→순서 중요하면 같은 키를 같은 파티션(같은 주문 ID→같은 파티션). ★ 순서 vs 확장 트레이드오프: 전역 순서 원하면 파티션 1개(병렬 불가, 느림), 확장하려면 여러 개(파티션 내 순서만). 실무: 순서 중요한 단위(주문/사용자 ID)를 파티션 키로→\"단위 내 순서+단위 간 병렬\". - 멱등성 결합: at-least-once라 중복 전달 가능→컨슈머가 이벤트 번호로 \"이미 처리?\" 확인해 중복 무시. 순서 보장+멱등성이 이벤트 처리 안정성 핵심. 경험 서술: \"NATS Streaming으로 이벤트 드리븐 구성. durable subscription으로 offset 추적해 서비스 재시작 시 놓친 이벤트 순서대로 재생받아 자동 복구. 시퀀스 번호로 순서 보장, at-least-once라 멱등성으로 중복 처리.\""}, {"title": "시스템 디자인 완전 기초", "kind": "완전 기초", "url": "doc_18_sysdesign_essentials.html", "text": "[문서18] 시스템 디자인 완전 기초 — 모르면 안 되는 상식 강의에서 당연시하고 넘어간 기본기. --- 규모 추정 감각 (back-of-envelope) - QPS = DAU × 인당 요청수 / 86400(초). 피크는 평균의 2~3배. - 저장: 레코드 크기 × 개수. 1KB × 10억 = 1TB. - 읽기:쓰기 비율 대개 100:1 이상(SNS) → 캐싱·복제가 답. - 1일=86400초, 백만 QPS면 초당 백만 요청. 지연 숫자 감각 (아는 게 힘) - 메모리 접근: ~100ns - SSD 읽기: ~100μs - 네트워크 같은 지역 왕복: ~0.5ms - 디스크 탐색: ~10ms - 대륙 간 왕복: ~150ms - ★ 메모리는 디스크보다 ~10만 배 빠름 → 캐싱의 근거. 가용성 (nines) - 99% = 연 3.65일 다운 / 99.9% = 8.7시간 / 99.99% = 52분 / 99.999% = 5분. - SLA에서 \"몇 개의 9\"인지가 이중화 수준을 정함. 핵심 컴포넌트 역할 - 로드밸런서: 트래픽 분산. - 리버스 프록시: 서버 앞단(TLS 종료, 캐싱, 라우팅). - CDN: 정적 자원을 엣지에서. - 캐시(Redis): 빠른 조회, 세션. - 메시지 큐: 비동기·완충. - DB: 영속 저장. - 오브젝트 스토리지(S3): 파일·이미지·백업. 수평 확장의 전제 - 무상태(stateless) 서버: 상태를 서버에 두지 말고 외부화(세션→Redis). - 그래야 아무 서버나 요청 처리 가능→LB로 분산. API 스타일 - REST: 자원 중심, 범용. - gRPC: 서비스 간, 고성능. - GraphQL: 클라가 필요한 것만. - WebSocket: 양방향 실시간. 데이터 처리 방식 - 동기 vs 비동기: 즉시 응답 필요 vs 나중에 처리. - 배치 vs 스트림: 모아서 처리 vs 실시간 흐름. - OLTP(트랜잭션) vs OLAP(분석). 기본 보안 - 인증(누구냐) vs 인가(권한). JWT/세션. - HTTPS/TLS(네트워크편). rate limiting. - 최소 권한 원칙(IAM, 네트워크편)."}, {"title": "시스템 디자인 확인 질문", "kind": "확인 질문", "url": "doc_19_sysdesign_checkquestions.html", "text": "[문서19] 시스템 디자인 확인 질문 — 핵심 점검용 이해했다면 1~2문장으로 바로 답할 수 있어야 함. --- 1. 접근 & 기본 - 시스템 디자인 문제를 받으면 첫 단계는? (요구사항 명확화) - 규모 추정에서 무엇을 계산? 왜 읽기:쓰기 비율이 중요? - 수직 확장과 수평 확장 차이? 수평의 전제 조건은? (무상태) - 왜 상태를 외부화해야 하나? 2. 분산 핵심 - CAP 정리를 한 문장으로? 분할 시 무엇을 선택? - CP와 AP 시스템의 예와 용도? - 최종 일관성이란? 어떤 데이터에 허용 가능? - 강한 일관성이 꼭 필요한 데이터 예시? - SPOF를 어떻게 찾고 제거하나? - 일관된 해싱이 왜 필요? 단순 hash%N의 문제는? - 가상 노드는 왜 두나? 3. 패턴 - 메시지 큐가 주는 3가지 이점? - at-least-once와 멱등성의 관계? - 멱등성 키는 어디에 쓰나? - Rate Limiting 대표 알고리즘? - DB 확장 순서? 왜 샤딩이 최후인가? - 마이크로서비스가 항상 옳지 않은 이유? 4. 심화 - CAP와 PACELC 차이? - 캐싱 전략 4종과 각 특징? - 큐와 스트림(Kafka) 차이? - 관측성 3축? 왜 p99가 평균보다 중요? - read-your-writes 문제와 해결? 4-B. 대량 트래픽 핸들링 - 트래픽 대응의 핵심 원칙? (은탄환 없음, 계층별 방어선) - 방어선을 바깥→안으로 나열하면? - 왜 바깥에서 막는 게 유리한가? - 캐시 무효화를 안 하면? Cache Stampede란? 대응은? - Hot Key 문제와 대응? - 수평 확장의 전제 조건? (무상태) - 오토스케일 두 층? (HPA / 노드) - 스케일 아웃/인의 속도는 왜 다르게? 예측 이벤트 대응은? (예열) - 읽기는 캐싱으로 막는데 쓰기는 무엇으로? (큐) - DB 확장 순서? 왜 샤딩이 최후? - 모니터링 3축? 왜 p99가 평균보다 중요? - 반드시 보는 지표 3~4개? - Circuit Breaker/Graceful Degradation/Bulkhead 각각? 종합 (설계 문제) - \"URL 단축기를 설계해보라.\" (해싱, 캐싱, 리다이렉트, 규모) - \"실시간 채팅을 설계해보라.\" (WebSocket, Pub/Sub, 순서, presence) - \"뉴스 피드를 설계해보라.\" (fan-out, 캐싱, 랭킹) - \"결제 시스템을 설계해보라.\" (멱등성, 큐, 정합성, 웹훅) - 각 설계에서 트레이드오프를 소리 내어 설명할 수 있는가? - \"트래픽이 평소의 100배로 급증했다. 계층별로 어떻게 대응하나?\""}, {"title": "시스템 디자인 실전편", "kind": "실전편", "url": "doc_20_sysdesign_practical.html", "text": "[문서20] 시스템 디자인 실전편 — 대표 설계 문제 자주 나오는 문제를 프레임워크(요구사항→규모→API→저장→HLD→병목)로. --- 1. URL 단축기 (TinyURL) 요구: 긴 URL→짧은 코드, 리다이렉트. 읽기 압도적(100:1+). 핵심: - 코드 생성: 해시(충돌 처리) 또는 카운터+base62 인코딩(7자면 62^7≈3.5조). - 저장: 키-값(단축코드→원본). 읽기 많으니 캐싱(Redis) 필수. - 리다이렉트: 301(영구)vs302(임시). 클릭 추적 원하면 302. - 규모: 읽기 폭발→CDN·캐시. 쓰기 적음→샤딩 거의 불필요. 트레이드오프: 해시(단순, 충돌) vs 카운터(충돌 없음, 분산 시 조율 필요→범위 분배). 2. 실시간 채팅 요구: 1:1/그룹, 실시간, 순서, presence, 오프라인 메시지. 핵심: - 연결: WebSocket(양방향). 서버 여러 대→Redis Pub/Sub로 인스턴스 간 전파. - 순서: 서버 시퀀스/타임스탬프. - 전달: DB 저장, 재접속 시 커서로 놓친 것 복구(at-least-once). - presence: Redis TTL+하트비트. - 확장: 연결을 여러 서버 분산+상태 외부화. (네트워크 문서5와 연결) 트레이드오프: 강한 순서 보장 vs 지연. 그룹 대규모면 fan-out 비용. 3. 뉴스 피드 (SNS) 요구: 팔로우 기반 피드, 최신순/랭킹. 핵심 - fan-out 전략: - Fan-out on write(push): 글 쓸 때 팔로워 피드에 미리 뿌림. 읽기 빠름, 셀럽(수백만 팔로워)이면 쓰기 폭발. - Fan-out on read(pull): 읽을 때 팔로우 목록의 글을 모음. 쓰기 싸고 읽기 느림. - ★ 하이브리드: 일반은 push, 셀럽은 pull(읽을 때 합침). 실무 정답. - 캐싱: 피드를 Redis에. 랭킹은 점수 기반 정렬(힙/Sorted Set). 트레이드오프: 저장 공간(push 중복) vs 읽기 지연(pull). 4. 결제 시스템 요구: 정확성 최우선, 중복 방지, 외부 PG 연동. 핵심: - 멱등성 키: 재시도로 이중 결제 방지(필수). - 상태 머신: pending→paid→failed. 각 전이 기록. - 큐: 결제 요청 완충, 순서 처리. - PG 웹훅: 비동기 결제 결과 수신으로 최종 확정. - 정합성: 강한 일관성(잔액·재고는 틀리면 사고). 트랜잭션. 트레이드오프: 정합성 위해 가용성·속도 일부 희생(CP 성향). (연상사전 결제와 연결) 5. 대용량 읽기 서비스 (일반 패턴) - CDN(정적)→LB→무상태 서버(오토스케일)→캐시(Redis)→읽기 레플리카→마스터. - 각 계층에서 걸러 원본 DB 부하 최소화. - 쓰기는 마스터, 읽기는 레플리카. 캐시 무효화 주의. 6. 면접 팁 (경험 서술) - 요구사항 질문부터: \"동시 사용자? 읽기/쓰기 비율? 일관성 요구?\" - 규모를 숫자로: \"DAU 100만, 읽기 100:1이면 캐싱이 핵심.\" - 트레이드오프를 말로: \"여기선 가용성을 위해 최종 일관성을 택하겠습니다.\" - 병목을 스스로 짚기: \"이 LB가 SPOF라 이중화하겠습니다.\" - 과도한 설계 경계: \"지금 규모엔 샤딩 불필요, 캐싱으로 충분.\" --- 7. 대량 트래픽 핸들링 — 계층별 방어 (종합) 핵심 원칙: 은탄환 없음. 요청이 DB(최고 비용)에 닿기 전 각 계층에서 걸러냄. 바깥일수록 싸고 안쪽일수록 비쌈. 방어선: [사용자]→①CDN→②LB→③Rate Limit→④앱서버(오토스케일)→⑤Redis 캐시→⑥메시지 큐→[DB 복제/샤딩] ① 캐싱 (가장 효과 큰 첫 방어선) 인과: 읽기 압도적(100:1)에서 같은 데이터 매번 DB 읽기는 낭비→캐시 반환으로 DB 부하 급감. - CDN: 정적 자원 엣지에서. Redis: 동적·세션·집계. 앱 캐시: 메모리 값. Redis 전략: - cache-aside: 캐시 확인→없으면 DB→채움. 가장 흔함. - ★ 무효화: 변경 시 캐시 삭제(안 하면 옛 데이터). 최다 실수. - ★ Cache Stampede: 인기 키 동시 만료→수천 요청 DB로. 대응 TTL 지터/잠금(하나만 조회, 나머지 대기). - Hot Key: 특정 키 집중→노드 과부하. 로컬 캐시/키 분산. 추가 활용: 세션 외부화(수평확장 전제), rate limit 카운터, 분산 락, Pub/Sub. ② 로드밸런싱 & 오토스케일링 LB: 여러 서버 분산. L4/L7, RR/least_conn/IP해시. ★ 수평 확장 전제=무상태(stateless): 상태(세션)를 서버에 두면 확장 막힘→외부화(Redis)해야 아무 서버나 처리. 오토스케일 두 층: - HPA: CPU/메트릭 기준 Pod/인스턴스 수. - Cluster Autoscaler/Karpenter: 노드 자체. AWS ASG: EC2 대수. ★ 실무: - 예측형 vs 반응형: 반응형은 급증에 늦음(인스턴스 뜨는 시간)→예측 이벤트는 미리 예열(pre-warming). - 스케일 아웃 빠르게, 인 천천히(다시 몰릴 수 있음). - 콜드 스타트: 준비 전엔 트래픽 안 보냄(readiness probe). ③ Rate Limiting 인과: 어뷰징·봇·DDoS·폭주가 시스템 죽임→단위 시간당 제한. - 토큰 버킷(버스트 허용, 가장 흔함)/누출 버킷/슬라이딩 윈도우. - 분산은 Redis 카운터 공유. 초과 시 429+Retry-After. ④ 메시지 큐 (쓰기 완충) 인과: 읽기는 캐싱, 쓰기는 캐싱 불가(DB 반영 필요)→큐가 흡수해 DB 감당 속도로. - 완충(backpressure), 비동기 분리(무거운 작업), 디커플링. Kafka/RabbitMQ. ⑤ DB 확장 (최후) - 읽기 병목→읽기 복제+캐싱. 쓰기 병목→샤딩(조인·트랜잭션 잃어 최후). - ★ 순서: 캐싱→읽기 복제→인덱스 최적화→샤딩. ⑥ 자원 모니터링 & 관측성 (대응의 눈) 인과: 안 보이면 대응 못 함. 병목 위치·스케일 시점 판단. 오토스케일도 이 메트릭 기반. 3축: - 메트릭: QPS/지연/에러율/CPU·메모리/커넥션 풀. Prometheus+Grafana(HPA가 이걸로 스케일). - 로그: 구조화+요청 ID. CloudWatch/Loki/ELK. - 트레이싱: 분산 추적(요청 경로). Jaeger. ★ 반드시 보는 지표: - p99 지연(평균보다 중요, 상위 1% 느리면 문제). p50/p95/p99 함께. - 에러율(5xx 급증=위험), 포화도(saturation), 커넥션 풀 사용률(고갈→대기·타임아웃). - 알림: 임계 넘으면 자동 알림→선제 대응. ⑦ 장애 격리 & 우아한 저하 - Circuit Breaker: 뒤 서비스 죽으면 빠르게 실패→연쇄 장애 방지. - Graceful Degradation: 과부하 시 핵심만 유지(추천 끄고 주문만). - Bulkhead: 자원 격벽으로 나눠 번짐 방지. - Backpressure: 감당 못 하면 받는 속도 늦춤(큐/rate limit). 종합 시나리오 (\"100배 급증 대응\") \"계층별 방어선을 겹친다: CDN으로 정적 걷어내고, Redis로 읽기 부하 분리, 무상태 서버를 HPA·Karpenter로 오토스케일, 쓰기 폭주는 큐로 완충, 남용은 rate limit(429), DB 병목은 읽기 복제. Prometheus/Grafana로 p99·에러율 보며 대응, 뒤 장애는 circuit breaker로 격리, 예측 이벤트는 미리 예열.\" 한문장: \"은탄환 없음. CDN·캐시·오토스케일·큐·rate limit·복제를 계층별로 겹치고, 모니터링으로 병목 보며 대응. 바깥일수록 싸고 DB가 최후.\""}, {"title": "CI/CD·쿠버네티스 기본", "kind": "기본 설명", "url": "doc_21_devops_basic.html", "text": "[문서21] CI/CD·쿠버네티스 기본 — 면접 실전용 스택: Git → GitHub Actions(CI) → Docker/ECR → Terraform(IaC) → EKS → ArgoCD(CD) 참고: EKS = Elastic Kubernetes Service(AWS 관리형 K8s). \"EKG\" 아님. --- 용어 정리 - Docker: 컨테이너를 만들고 실행. 앱을 이미지로 패키징. - Kubernetes(K8s): 컨테이너를 여러 서버에 걸쳐 운영·확장·복구하는 오케스트레이터. - EKS: AWS 관리형 K8s(컨트롤 플레인을 AWS가 관리). - ECR: AWS Docker 이미지 저장소. - Terraform: 인프라를 코드로(IaC) 정의·생성. - GitHub Actions: GitHub 내장 CI/CD. - ArgoCD: GitOps 배포 도구(Git을 진실의 원천으로 클러스터 동기화). 전체 그림 (Push CI + Pull CD) 개발자 push → GitHub Actions(빌드·테스트·이미지→ECR) → 매니페스트 레포 태그 업데이트 커밋 → ArgoCD 감지 → EKS에 pull 동기화. EKS는 Terraform으로 미리 구축. ★ 핵심: \"CI는 push, CD는 pull\". 1. CI/CD 개념 - CI(지속적 통합): 자주 병합+자동 빌드·테스트로 문제 조기 발견. - CD(지속적 배포/전달): 검증된 빌드 자동 배포. Delivery(승인 후)/Deployment(완전 자동). 인과: 수동 배포는 느리고 실수 잦음 → 자동화로 속도·안정·반복성. ★ CI 게이트: 테스트·보안 스캔 통과 못 하면 배포 차단. \"빠르되 안전하게\"의 근간. 2. Git 브랜치 전략 - Git Flow: main/develop/feature/release/hotfix. 엄격, 정기 릴리즈. - GitHub Flow: main+feature→PR→머지하면 배포. 단순, 지속 배포. - Trunk-based: 짧은 브랜치 자주 main 병합. CI/CD 최적, 대규모. ★ GitHub Flow/Trunk가 CI/CD와 맞음. main은 항상 배포 가능 상태 유지. 3. GitHub Actions (CI) - .github/workflows/ .yml, push/PR 이벤트에 반응. - 흐름: checkout→테스트→Docker 빌드→ECR push→매니페스트 태그 업데이트. ★ 포인트: - OIDC로 AWS 인증: 액세스 키 박지 말고 OIDC 페더레이션으로 임시 자격증명(IAM Role 원리, 키 유출 제거). - 캐싱(의존성·Docker 레이어), 매트릭스 빌드(병렬), 시크릿(GitHub Secrets/Secrets Manager). 4. Docker & ECR - Dockerfile로 빌드→ECR 저장→EKS가 pull. ★ 실무: - 멀티스테이지 빌드: 빌드/실행 환경 분리→최종 이미지 작게(빌드 도구 제외). - 태그: latest 금지→커밋 SHA/시맨틱 버전(롤백·추적). - 이미지 스캔(Trivy): 취약점 심각하면 차단. - 레이어 최소화: 안 바뀌는 것(의존성) 앞 레이어→캐시. 5. Terraform (IaC) 정의: 인프라를 코드로. VPC·EKS·IAM·RDS를 .tf로 정의, terraform apply로 생성. 인과: 콘솔 클릭은 재현·추적 불가. 코드는 버전관리·리뷰·재현·롤백 가능. (AWS \"최소에서 쌓기\"를 코드로) ★ 포인트: - 상태 파일(state): \"지금 뭐가 있나\" 기록. S3 원격 저장+DynamoDB 잠금(동시 수정 방지). 로컬 state는 협업 재앙. - 모듈화(VPC/EKS 모듈 재사용). - plan→apply: plan으로 변경 미리보기 후 apply. - 드리프트: 콘솔 수동 변경 시 코드와 어긋남→Terraform 감지. 6. 쿠버네티스 핵심 오브젝트 정의: 원하는 상태 선언→실제 상태를 맞춤(reconcile). - Pod: 컨테이너 감싼 최소 단위(보통 컨테이너 1개). - Deployment: Pod를 원하는 개수 유지·롤링 업데이트·롤백. 죽으면 자동 재생성. - Service: Pod들에 안정적 접근점(IP/DNS). Pod IP 바뀌어도 앞에서 로드밸런싱. - Ingress: 외부 HTTP(S)를 Service로 라우팅(도메인·경로). AWS는 ALB Ingress Controller. - ConfigMap/Secret: 설정·민감정보를 코드와 분리해 주입. - Namespace: 논리 격리(dev/staging/prod). ★ 자동 확장: - HPA(Horizontal Pod Autoscaler): 메트릭 기준 Pod 수 조절. - Cluster Autoscaler/Karpenter: 노드(서버) 자체 증감. 7. ArgoCD & GitOps (CD) 정의: Git을 인프라·앱 상태의 유일한 진실의 원천으로. ArgoCD가 Git과 클러스터 실제 상태를 지속 비교·동기화. 4원칙: 선언적 정의/버전관리된 불변 상태/자동 pull/지속 감시. ★ 왜 GitOps(전통 대비): - 전통: CI가 클러스터에 push(kubectl apply). CI가 클러스터 권한 가져야 해 보안 부담. - GitOps: 클러스터가 Git에서 pull. 감사성(모든 변경 커밋)/드리프트 감지/간단 롤백(커밋 되돌리기). 동작: 매니페스트에 \"이미지 v2\" 커밋→ArgoCD 감지→EKS 적용→헬스체크→실패 시 롤백. 8. 배포 전략 (무중단) - 롤링 업데이트(K8s 기본): 하나씩 교체. 무중단, 잠시 구/신 공존. - 블루-그린: 새 버전 완전히 띄우고 트래픽 한 번에 전환. 롤백 즉시. - 카나리: 트래픽 일부(5%)만 새 버전→문제없으면 확대. 위험 최소. ★ 선택: 안전 최우선=카나리, 빠른 전환·롤백=블루-그린, 일반=롤링. 전체 흐름 한 문장 \"Terraform으로 VPC·EKS·IAM을 코드로 프로비저닝, push하면 GitHub Actions가 빌드·테스트·이미지 스캔 후 ECR에 올리고 매니페스트 태그 갱신. ArgoCD가 감지해 EKS에 pull 동기화, HPA로 Pod·Karpenter로 노드 오토스케일. 배포는 카나리로 점진 검증, 실패 시 Git 롤백.\""}, {"title": "CI/CD·쿠버네티스 부가 설명", "kind": "부가 설명", "url": "doc_22_devops_supplement.html", "text": "[문서22] CI/CD·쿠버네티스 부가 설명 — 난이도 있는 개념 보충 --- ① K8s는 어떻게 \"원하는 상태\"를 유지하나 (Reconciliation Loop) - 선언적: \"Pod 3개 원함\"을 선언 → 컨트롤러가 실제와 비교 → 다르면 조치(하나 죽으면 생성). - etcd: 클러스터의 모든 상태를 저장하는 키-값 저장소(진실의 원천). - 컨트롤 플레인: API Server(관문)+Scheduler(Pod를 노드에 배치)+Controller Manager(reconcile)+etcd. - 워커 노드: kubelet(Pod 실행)+kube-proxy(네트워킹)+컨테이너 런타임. ② EKS에서 AWS가 관리하는 것 vs 내가 하는 것 - AWS 관리: 컨트롤 플레인(API Server, etcd, Scheduler) — 이중화·업그레이드. - 내 몫: 워커 노드(EC2/Fargate), 앱 배포, 네트워킹 설정, 오토스케일 구성. - Fargate: 노드 관리도 서버리스로 위임(노드 신경 안 씀). vs 관리형 노드그룹(EC2 직접). ③ IRSA (IAM Roles for Service Accounts) - Pod가 AWS 서비스(S3 등) 접근 시 키 대신 IAM Role을 ServiceAccount에 연결. - OIDC 페더레이션으로 Pod에 임시 자격증명 자동 주입(EC2 Instance Profile의 Pod 버전). - 키 하드코딩 없이 최소 권한. (AWS편 IAM Role 원리와 동일) ④ Terraform state 심화 - state = 코드와 실제 인프라의 매핑. 없으면 Terraform이 뭘 만들었는지 모름. - 원격 백엔드(S3)+잠금(DynamoDB): 팀이 동시에 apply해도 충돌 방지. - terraform import: 콘솔로 만든 기존 리소스를 코드 관리로 편입. - 민감정보: state에 평문 저장될 수 있어 암호화·접근 제한 필수. ⑤ 헬름(Helm) & Kustomize - Helm: K8s 매니페스트의 패키지 매니저. 템플릿+values로 환경별 설정 주입. 차트로 재사용. - Kustomize: 베이스 매니페스트에 환경별 오버레이(패치). 템플릿 없이 순수 YAML. - 선택: 복잡한 파라미터화=Helm, 단순 환경 차이=Kustomize. ⑥ 시크릿 관리 (GitOps의 난제) - Git에 평문 시크릿 금지. 해결: - Sealed Secrets: 암호화해 Git에 저장, 클러스터에서만 복호화. - External Secrets Operator: AWS Secrets Manager에서 실시간 주입. - SOPS: 파일 단위 암호화. - ★ GitOps에서 \"모든 걸 Git에\"와 \"시크릿은 Git에 넣으면 안 됨\"의 충돌을 이렇게 푼다. ⑦ 배포 전략 상세 - 롤링: maxSurge(추가 생성 수)/maxUnavailable(동시 중단 수)로 속도·안정 조절. - 카나리: 트래픽 가중치를 서비스 메시(Istio)나 인그레스로 조절. 메트릭 보고 자동 승격/롤백(Argo Rollouts, Flagger). - 블루-그린: 트래픽 스위치가 순간이라 롤백 즉시. 단 두 배 리소스 필요. ⑧ 파이프라인 보안 (DevSecOps) - SAST(SonarQube): 코드 정적 분석. - SCA(Snyk): 의존성 취약점. - 이미지 스캔(Trivy): 컨테이너 취약점. - IaC 스캔(tfsec/Checkov): Terraform 보안. - 이미지 서명(cosign): 공급망 무결성. - OPA/Gatekeeper: 클러스터 정책 강제(예: 권한 있는 컨테이너 금지). - ★ 각 단계가 게이트: 심각 취약점이면 파이프라인 중단. ⑨ 관측성 (운영) - 로그: EKS→CloudWatch/Loki. 요청 ID로 추적. - 메트릭: Prometheus+Grafana. HPA도 이 메트릭 기반. - 트레이싱: 분산 추적(Jaeger). - ★ Pod가 죽고 사는 환경이라 개별 서버가 아닌 집계·라벨 기반 관측 필수."}, {"title": "CI/CD·쿠버네티스 완전 기초", "kind": "완전 기초", "url": "doc_23_devops_essentials.html", "text": "[문서23] CI/CD·쿠버네티스 완전 기초 — 모르면 안 되는 상식 --- 컨테이너 vs VM - VM: 하드웨어 가상화, 게스트 OS 포함(무겁다). - 컨테이너: OS 커널 공유, 프로세스 격리(가볍다, 빠른 시작). - Docker는 컨테이너, 이미지는 그 실행 템플릿. Docker 기본 - Dockerfile: 이미지 빌드 레시피. - 이미지: 불변 패키지(앱+환경). 컨테이너: 이미지의 실행 인스턴스. - FROM(베이스)/RUN(명령)/COPY(파일)/CMD(실행)/EXPOSE(포트). - docker build/run/push/pull. K8s 기본 명령 - kubectl get/describe/logs/exec/apply/delete. - kubectl apply -f manifest.yaml (선언적 적용). - kubectl rollout undo (롤백). K8s 오브젝트 요약 - Pod(최소 단위)/Deployment(Pod 관리)/Service(접근점)/Ingress(외부 라우팅)/ConfigMap·Secret(설정)/Namespace(격리). - ReplicaSet(Pod 복제)/StatefulSet(상태 있는 앱, DB)/DaemonSet(모든 노드에 하나씩). CI/CD 용어 - 파이프라인/스테이지/잡/스텝/러너(실행 환경). - 아티팩트: 빌드 결과물(이미지·바이너리). - 트리거: 파이프라인 시작 이벤트(push/PR/스케줄). IaC 개념 - 인프라를 코드로. 선언형(Terraform: 원하는 상태)/명령형(스크립트: 단계). - 멱등성: 여러 번 apply해도 같은 결과. - 상태 관리, plan/apply. 환경 분리 - dev/staging/prod. 설정은 환경변수·ConfigMap으로 분리. - 12-Factor App: 설정을 코드와 분리, 상태 외부화 등. AWS 컨테이너 서비스 비교 - EKS: 관리형 쿠버네티스(표준 K8s). - ECS: AWS 고유 오케스트레이터(단순, AWS 종속). - Fargate: 서버리스 컨테이너(노드 관리 없음). EKS/ECS와 결합. 롤백 개념 - 배포 실패 시 이전 버전으로. K8s는 rollout undo, GitOps는 커밋 revert. - 이미지 태그를 버전으로 관리해야 롤백 가능(latest 금지 이유)."}, {"title": "CI/CD·쿠버네티스 확인 질문", "kind": "확인 질문", "url": "doc_24_devops_checkquestions.html", "text": "[문서24] CI/CD·쿠버네티스 확인 질문 — 핵심 점검용 --- 1. CI/CD & Git - CI와 CD 차이? Delivery와 Deployment 차이? - CI 게이트란? 왜 중요? - GitHub Flow가 CI/CD와 잘 맞는 이유? - GitHub Actions에서 AWS 인증을 키 대신 뭘로? (OIDC) 2. Docker & 이미지 - 컨테이너와 VM 차이? - 멀티스테이지 빌드를 왜 쓰나? - 이미지 태그에 latest를 쓰면 안 되는 이유? - 이미지 취약점은 어떻게 검사? 3. Terraform - IaC가 콘솔 클릭보다 나은 점? - Terraform state가 뭐고 왜 S3+DynamoDB에 두나? - plan과 apply 차이? - 드리프트란? 4. 쿠버네티스 - Pod/Deployment/Service/Ingress 각 역할? - Deployment는 Pod가 죽으면 어떻게? - Service가 필요한 이유? (Pod IP 변동) - HPA와 Cluster Autoscaler(Karpenter) 차이? - EKS에서 AWS가 관리하는 것 vs 내 몫? - IRSA란? (Pod의 AWS 권한) - K8s의 reconciliation loop를 한 문장으로? 5. GitOps & 배포 - GitOps를 한 문장으로? 진실의 원천은? - 전통 CI/CD(push)와 GitOps(pull)의 차이와 장점? - ArgoCD는 무엇을 지속적으로 하나? - 롤링/블루-그린/카나리 각각 언제? - GitOps에서 시크릿을 어떻게 다루나? 종합 - \"코드 커밋부터 EKS 배포까지 전체 파이프라인을 설명해보라.\" - \"배포 후 장애가 났다. 어떻게 롤백하나?\" - \"Terraform으로 인프라를, GitHub Actions로 CI를, ArgoCD로 CD를 어떻게 엮나?\""}, {"title": "CI/CD·쿠버네티스 실전편", "kind": "실전편", "url": "doc_25_devops_practical.html", "text": "[문서25] CI/CD·쿠버네티스 실전편 — 구축·운영·트러블슈팅 --- 1. 파이프라인 구축 순서 (실전) 1) Terraform으로 VPC·EKS·ECR·IAM 프로비저닝(state는 S3+DynamoDB). 2) EKS에 필수 애드온: ALB Ingress Controller, Cluster Autoscaler/Karpenter, metrics-server(HPA용), External Secrets. 3) ArgoCD 설치, 매니페스트 레포 연결. 4) 앱 레포에 GitHub Actions: 빌드→테스트→스캔→ECR push→매니페스트 태그 커밋. 5) ArgoCD가 감지해 배포. 헬스체크·롤백 구성. 경험: \"앱 레포(코드)와 매니페스트 레포(배포 설정)를 분리해 관심사를 나눴고, CI가 이미지 태그만 매니페스트에 커밋하면 ArgoCD가 배포했다.\" 2. 두 레포 분리 패턴 (GitOps 정석) - 앱 레포: 소스 코드 + Dockerfile + CI(Jenkinsfile/workflow). - 매니페스트 레포: k8s YAML/Helm/Kustomize. ArgoCD가 감시. - 이유: 코드 변경과 배포 설정 변경의 관심사 분리. 배포 이력이 매니페스트 레포 커밋으로 남음. 3. 자주 겪는 트러블슈팅 - Pod가 안 뜸: kubectl describe pod로 이벤트 확인. - ImagePullBackOff → 이미지 태그/ECR 권한 문제. - CrashLoopBackOff → 앱이 시작 직후 죽음(로그 kubectl logs 확인). 설정·환경변수·의존 서비스. - Pending → 노드 자원 부족(오토스케일 확인) or 스케줄 제약. - OOMKilled: 메모리 limit 초과 → limit 조정 or 앱 메모리 누수. - Service 접속 안 됨: selector 라벨 불일치, 포트 매핑, Ingress 설정. - 배포됐는데 트래픽 안 옴: readiness probe 실패로 트래픽 제외됨. 4. probe (헬스체크 3종) - liveness: 죽었나? 실패 시 Pod 재시작. - readiness: 트래픽 받을 준비됐나? 실패 시 Service에서 제외(재시작 X). - startup: 느린 시작 앱용, 시작 완료까지 다른 probe 유예. ★ readiness 잘못 설정하면 \"배포됐는데 트래픽 안 옴\". liveness 너무 민감하면 재시작 루프. 5. 리소스 관리 - requests: 스케줄링 기준(이만큼 보장). limits: 상한(넘으면 throttle/OOMKill). - request 없으면 스케줄러가 자원 판단 못 함. limit 없으면 한 Pod가 노드 자원 독점. - HPA는 request 대비 사용률로 스케일. 6. 비용·운영 최적화 - Karpenter: 필요한 만큼만 노드 프로비저닝(빠르고 저렴). - Spot 인스턴스: 무상태 워크로드에 비용 절감. - 이미지 작게(멀티스테이지)→pull 빠름·비용↓. - 네임스페이스별 리소스 쿼터로 폭주 방지. 7. 롤백 실전 - GitOps: 매니페스트 레포에서 이전 커밋으로 revert→ArgoCD가 자동 동기화. - K8s 직접: kubectl rollout undo deployment/앱. - Argo Rollouts: 카나리 중 메트릭 나쁘면 자동 롤백. 경험: \"배포 후 에러율 급증 알람 → 매니페스트 레포 revert 한 번으로 이전 버전 복구, 5분 내 정상화.\" 8. 면접 경험 서술 - \"Terraform 모듈로 멀티 환경(dev/staging/prod) EKS를 코드로 관리했다.\" - \"GitHub Actions에서 OIDC로 키 없이 ECR에 push하고, Trivy 스캔을 게이트로 걸었다.\" - \"ArgoCD로 GitOps를 구성해 배포 이력을 Git에 남기고 커밋 revert로 롤백했다.\" - \"HPA로 Pod, Karpenter로 노드를 오토스케일해 트래픽 급증에 대응했다.\" - \"readiness probe 오설정으로 트래픽이 안 붙던 걸 진단해 고쳤다.\" --- 9. Helm (쿠버네티스 패키지 매니저) 정의: 앱 배포에 필요한 여러 YAML(Deployment/Service/ConfigMap)을 하나의 패키지(차트)로 묶어 관리. \"K8s의 apt/npm\". 인과: 앱 하나에 YAML 10개+환경별 값 차이→복붙 지옥. Helm은 템플릿+values로 해결(템플릿 하나+환경별 values.yaml 주입). 차트 구조: Chart.yaml(메타)/values.yaml(기본값)/templates/(YAML 템플릿, {{ .Values.image }}). 명령: helm install/upgrade/rollback. helm install myapp bitnami/redis(공개 차트 한 줄). ★ 가치: Redis/PG/모니터링을 검증된 공개 차트로 한 줄 설치+우리 앱도 차트로 환경별 배포·롤백. (Kustomize와 대안: 복잡 파라미터화=Helm, 단순 환경차이=Kustomize) 10. Docker & kubectl 필수 명령어 Docker: - docker build -t app:v1 . / run -p 8080:80 app:v1 / ps / logs <id / exec -it <id sh / push / images / stop·rm kubectl: - get pods(-A 전체) / describe pod(이벤트, 트러블슈팅 1순위) / logs(-f 실시간, --previous 이전 컨테이너) - exec -it <pod -- sh / apply -f / delete -f - rollout status·undo deploy/app / scale --replicas=5 / get svc·ingress / top pods(리소스) ★ 트러블슈팅 3종: get(뭐가 있나)→describe(왜 이상, 이벤트)→logs(앱이 뭐라). Pod 안 뜨면 이 순서. 11. 쿠버네티스 스토리지 핵심 문제: Pod는 일시적(ephemeral)→죽으면 데이터 소실. DB·파일은 영속 필요→이 간극을 메움. 계층: - Volume: Pod에 붙는 공간. emptyDir(임시)/hostPath(노드 디스크). - PV(PersistentVolume): 클러스터 레벨 실제 저장소(EBS/EFS/NFS). - PVC(PersistentVolumeClaim): Pod가 \"이만큼 주세요\" 요청. PV와 바인딩. - StorageClass: PV를 동적 자동 생성 템플릿(EBS gp3). PVC 오면 자동 생성. 흐름: Pod→PVC(요청)→PV(실제)←StorageClass(자동 생성). ★ StatefulSet: 일반 Deployment는 Pod 이름·저장소 뒤죽박죽→DB 부적합. StatefulSet은 안정적 이름(app-0,1)+각자 영속 볼륨. DB/Kafka/Redis 클러스터처럼 정체성·데이터 유지 필요한 앱. ★ 실무: StatefulSet+PVC로 DB 올릴 수 있지만 관리형(RDS)이 대개 나음(백업·복제·복구를 AWS에). K8s는 무상태 앱만. \"넣을 수 있지만 넣어야 하나?\"의 판단. EBS(블록,한 노드) vs EFS(파일,여러 노드 공유). 12. 헬스체크 주기 설정 (probe 튜닝) livenessProbe: initialDelaySeconds(첫 체크까지 대기, 앱 부팅시간)/periodSeconds(주기)/timeoutSeconds/failureThreshold(몇 번 실패하면 조치). ★ 튜닝: - initialDelay 너무 짧으면 부팅 중 앱을 죽었다 오판→재시작 루프. 시작시간보다 넉넉히. - period 짧으면 빠른 감지+부하↑. liveness 여유롭게, readiness 촘촘히(트래픽 결정). - failureThreshold 민감하면 일시 지연에도 재시작, 둔하면 늦게 감지. - ★ liveness 너무 민감=정상인데 계속 재시작 재앙. readiness=트래픽 받을지, liveness=재시작할지."}, {"title": "인증·프론트엔드 기본", "kind": "기본 설명", "url": "doc_26_frontend_basic.html", "text": "[문서26] 인증·프론트엔드 기본 — 면접 실전용 인증 저장소(JWT/쿠키/localStorage) + 상태관리(React Query/Redux/Hooks) + NestJS DI. --- 1. JWT / 쿠키 / localStorage (세션 관리) 개념 구분: JWT=토큰의 \"형식\"(무엇 저장), 쿠키/localStorage/메모리=저장 \"위치\"(어디에). 다른 축. \"JWT vs 쿠키\"는 잘못된 대비(JWT를 쿠키에도 localStorage에도 담을 수 있음). JWT 본질(세션 vs 토큰): - 전통 세션: 서버가 상태 보관(stateful), 클라는 세션 ID만. 확장 시 세션 공유 필요. - JWT: 서버 서명만 검증, 상태 안 가짐(stateless) → 수평 확장 쉬움. 단 즉시 무효화 어려움(만료까지 유효)→블랙리스트/짧은 만료로 보완. 저장 위치별 장단점: - localStorage: 간단·JS 접근 쉬움·5MB·CSRF 면역 / ★ XSS 취약(JS 탈취)·수동 헤더 주입·만료 수동. - 쿠키(HttpOnly): ★ XSS 방어(JS 접근 불가)·자동 전송·SSR 친화 / CSRF 취약(대응 필요)·4KB·매 요청 오버헤드. - 메모리(JS 변수): 가장 안전(새로고침 시 소멸) / 새로고침하면 사라짐→리프레시 토큰 필요. 두 공격: - XSS: 악성 JS 주입→localStorage 탈취. HttpOnly 쿠키는 JS 접근 불가라 방어. - CSRF: 요청 위조. 쿠키 자동 전송돼 취약→SameSite=Strict/Lax+CSRF 토큰 방어. ★ 실무 정답(하이브리드): - 액세스 토큰(짧은 수명 15분) → 메모리(React state) - 리프레시 토큰(긴 수명) → HttpOnly+Secure+SameSite 쿠키 - 두 공격 동시 최소화. XSS로도 지속 탈취 어렵고, 리프레시는 JS가 못 읽음. 상황별: - REST+모바일/서드파티: localStorage/헤더(쿠키 못 쓰는 환경), CSP로 XSS 방어. - 웹+SSR(Next): HttpOnly 쿠키(서버가 읽어 인증, Next 궁합). - 보안 최우선(금융): 하이브리드+짧은 만료+리프레시 회전. - ★ 원칙: \"편하면 localStorage, 민감하면 HttpOnly 쿠키, 최고 보안은 하이브리드. XSS 막는 게 근본(뚫리면 어디 저장하든 위험).\" 2. React Hooks - useState: 로컬 상태. useEffect: 사이드이펙트(fetch/구독/타이머), 의존성 배열+클린업. - useContext: 전역값(prop drilling 회피), 저빈도 변경(테마/인증). - useMemo/useCallback: 비싼 계산·함수 재생성 방지(리렌더 최적화), 남용 금지. - useRef: 리렌더 없이 값 유지·DOM 접근. 커스텀 훅: 로직 재사용. ★ Next(서버 컴포넌트 시대): App Router는 서버 컴포넌트 기본. 훅은 클라이언트 컴포넌트에서만('use client' 명시). 데이터 페칭=서버 컴포넌트(async), 인터랙션·브라우저 API=클라이언트 훅. 이 경계 나누기가 핵심. 3. React Query (TanStack Query) 정의: 서버 상태(API 데이터)를 관리. 캐싱·동기화·백그라운드 갱신 자동화. 인과: 전통은 useEffect fetch+useState+로딩/에러/캐싱 전부 수동(보일러플레이트 폭발). RQ는 자동화. \"서버 상태는 클라 상태와 다르다\"(원본은 서버, 캐시는 사본). 장점: - 캐싱: 캐시에서 즉시 반환, 중복 요청 제거(dedup) - stale-while-revalidate: 캐시 즉시 표시+백그라운드 갱신→체감 속도↑ - 자동 refetch: 창 포커스·재연결 시 - isLoading/isError 자동 - 낙관적 업데이트: 응답 전 UI 먼저, 실패 시 롤백 - 무한 스크롤·페이지네이션 내장 ★ 비동기: 경쟁 상태·취소·재시도를 대신 처리. \"서버 데이터면 useEffect 말고 React Query\"가 반사. 4. Redux (Redux Toolkit) 정의: 앱 전역 클라이언트 상태를 예측 가능하게. 단일 스토어+액션+리듀서. ★ 최신 RTK 표준: 옛 Redux는 보일러플레이트 악명→RTK가 축소. createSlice(리듀서+액션 자동)/configureStore/createAsyncThunk(비동기). RTK Query(내장 데이터 페칭, RQ 유사). ★ 역할 분담(제일 중요): - 서버 상태(API) → React Query(또는 RTK Query) - 클라 전역 상태 → Redux/Zustand(모달·테마·필터·인증 UI) - 로컬 컴포넌트 → useState - 저빈도 전역 → useContext - 오해 주의: \"Redux에 API 데이터 다 넣기\"는 구식. 서버 상태는 RQ, Redux는 순수 클라 전역만. - Zustand: Redux보다 가벼운 대안(보일러플레이트 적음). 소규모=Zustand, 복잡·대규모=RTK. 5. NestJS 의존성 주입(DI) 정의: 객체가 의존성을 직접 안 만들고 외부에서 주입받음. Nest 핵심. 인과: 직접 생성(new Service())은 강결합→테스트 어렵고 교체 불가. DI는 인터페이스 의존+구현 주입→느슨한 결합·테스트 쉬움(목 주입)·재사용. 구현: @Injectable()(주입 가능 프로바이더)+생성자 주입(constructor(private svc: Service)). IoC 컨테이너가 생명주기 관리+자동 주입. @Module로 등록·스코프. ★ 본질=관심사 분리+테스트 용이성. \"Nest는 DI로 OOP 구조를 강제해 대규모 유지보수 강함\"(연상사전). 스프링 DI와 같은 철학."}, {"title": "인증·프론트엔드 부가 설명", "kind": "부가 설명", "url": "doc_28_frontend_supplement.html", "text": "[문서28] 인증·프론트엔드 부가 설명 — 난이도 있는 개념 보충 --- ① HttpOnly 쿠키 & CSRF (자세히) HttpOnly: 쿠키에 HttpOnly 플래그→JS가 못 읽음(document.cookie 불가). 브라우저가 서버 요청 시만 자동 전송. XSS로 악성 JS 주입돼도 탈취 불가. 왜 CSRF 취약: 쿠키 \"자동 전송\"이 양날. 브라우저는 해당 도메인 모든 요청에 쿠키 자동 첨부(요청 출처 안 따짐). CSRF 시나리오: 1) bank.com 로그인(HttpOnly 쿠키에 토큰) 2) 로그아웃 안 하고 evil.com 방문 3) evil.com에 숨은 <form action=bank.com/transfer POST 또는 <img src=... 4) 브라우저가 bank.com 요청에 인증 쿠키 자동 첨부! 5) 서버는 정상 요청으로 착각→이체 핵심: 공격자가 토큰 훔치는 게 아니라 \"브라우저가 쿠키를 붙여주는 걸 악용\". HttpOnly로 못 막음(읽는 게 아니니). 방어1 SameSite: - Strict: 다른 사이트 요청엔 쿠키 안 붙임. 가장 안전, 외부 링크 진입 시 로그인 풀림(UX). - Lax: 안전한 이동(링크/GET)엔 붙임, POST/이미지/iframe 위조엔 안 붙임. 실무 기본. - None: 항상 붙임(크로스 사이트), Secure 필수. 방어2 CSRF 토큰: 1) 서버가 예측 불가 랜덤 토큰 발급 2) 클라가 요청 시 헤더/body에 담아 전송 3) 서버가 \"세션+CSRF 토큰\" 짝 검증 evil.com은 이 랜덤 토큰 모름(같은 출처 아니라 못 읽음)→위조 불가. 상태 변경(POST/PUT/DELETE)에 적용. 정리: SameSite=Lax 기본+중요 변경엔 CSRF 토큰. HttpOnly(XSS)+SameSite+CSRF 토큰(CSRF)=삼중 방어. ② 액세스 토큰 vs 리프레시 토큰 (존재 이유=자동 로그인) 딜레마: 수명 짧으면 안전하나 자주 로그인(불편), 길면 편하나 탈취 시 오래 악용(위험). 해결(두 토큰): - 액세스: 짧음(15분~1h), 매 요청 첨부, 메모리 저장, 노출 큼. - 리프레시: 김(수일~수주), 액세스 갱신용, HttpOnly 쿠키, 노출 적음. 흐름(자동 로그인 실체): 1) 로그인→액세스(15분)+리프레시(2주) 발급 2) API마다 액세스 첨부 3) 15분 후 만료→401 4) 클라가 리프레시로 \"새 액세스 주세요\" 5) 서버 검증→새 액세스 발급 6) 사용자는 모름→끊김 없이 사용(=자동 로그인) 인과: 액세스 탈취돼도 15분이면 만료(피해 최소)+리프레시는 HttpOnly라 탈취 어렵고 갱신 때만 노출. \"2주 유지\"(편의)+\"탈취 피해 최소\"(보안) 동시 달성. ★ 리프레시 회전(rotation): 갱신마다 리프레시도 새로 발급+기존 폐기. 탈취된 것 재사용 시 감지해 세션 차단. ③ React Query \"서버 상태\"의 서버 = 백엔드 API (헷갈림 해소) - 서버 상태: 원본이 백엔드(API/DB)에 있는 데이터. 프론트는 fetch해 사본(캐시)만 들고 있음. - 클라이언트 상태: 프론트에만 존재(모달/폼 값/다크모드). - ★ React Query의 \"서버\" = 당신의 백엔드 API 서버(NestJS/Express). Next 서버 컴포넌트나 리액트 서버가 아님. Next와 관계: - Next 서버 컴포넌트: Next 서버에서 렌더링 시 데이터 미리 fetch(위치=렌더링). - React Query: 브라우저에서 백엔드 API fetch·캐싱(개념=데이터 원본). - 다른 층. 초기 데이터는 서버 컴포넌트, 이후 인터랙션은 React Query로 함께 씀. ④ DTO & ValidationPipe (NestJS) DTO: 계층 간 데이터 형태 정의 객체. \"이 요청/응답은 이런 필드\"의 계약. class CreateUserDto { @IsEmail() email; @IsString() @MinLength(8) password; @IsOptional() @IsInt() age?; } 왜: 명확한 계약(타입 명시)+유효성 기준(데코레이터)+엔티티와 분리(내부 필드 숨김). ValidationPipe: 컨트롤러 도달 전 입력 변환·검증. DTO 규칙과 대조. app.useGlobalPipes(new ValidationPipe({ whitelist:true(없는 필드 제거), forbidNonWhitelisted:true(없는 필드 에러), transform:true(타입 변환) })) - 위반이면 자동 400(컨트롤러 도달 전)→컨트롤러는 검증된 데이터만 받음. 검증 로직을 컨트롤러에서 분리. ⑤ NestJS 요청 한 바퀴 (전체 흐름) ★ [클라 요청] ① Middleware: 가장 먼저. 로깅/CORS/body 파싱/토큰 추출. Express 레벨. ② Guards: 인증·인가(\"접근 권한 있나?\"). JWT 검증/역할. 실패 403/401. ③ Interceptors(before): 요청 가로채 부가 처리(로깅/타이머 시작). ④ Pipes: 입력 변환·검증(ValidationPipe가 DTO로). 위반이면 400. ⑤ Controller: 라우트 핸들러, Service 호출. ⑥ Service: 비즈니스 로직(DI 주입). ⑦ Repository: DB 접근(TypeORM/Prisma), 쿼리 실행. [DB] 읽기/쓰기 → 역방향 ⑦→⑥→⑤ 반환 ③ Interceptors(after): 응답 가로채 변형(포맷 통일/로깅 완료/시간 측정). ② Exception Filters: 에러 잡아 응답 포맷팅. [클라 응답] ★ 인터셉터 vs 미들웨어: 미들웨어=컨트롤러 전에만, Express 레벨. 인터셉터=요청 전+응답 후 양쪽, Nest 레벨(응답 변형 가능, 포맷 통일 {data:...}이 대표 용도). 한문장: \"미들웨어(전처리)→가드(인증/인가)→인터셉터(전처리)→파이프(DTO 검증)→컨트롤러→서비스(로직)→레포지토리(DB), 응답은 인터셉터(후처리)로, 에러는 예외 필터가 잡음.\""}, {"title": "React · Next.js 핵심 사전 (프론트 면접 대비)", "kind": "완전 기초", "url": "doc_46_frontend_essentials.html", "text": "[문서] React · Next.js 핵심 사전 (프론트 면접 대비) 흩어진 React/Next 내용을 한곳에 모은 사전식 정리. 개념·용어·특징 위주. 마이너한 건 제외. 앞선 문서: 상태관리(26 React Query/Redux/Hooks), CSRF·토큰·NestJS(28), 병원결제 Next 실전(34). --- A. React 핵심 A1. 근본 개념 - 컴포넌트: UI를 재사용 가능한 조각으로. 함수형이 표준(클래스형은 레거시). - 선언형: \"어떻게 그릴지\"가 아니라 \"어떤 상태면 어떤 UI인지\"를 선언. 상태가 바뀌면 React가 알아서 다시 그림. - 단방향 데이터 흐름: 데이터는 부모→자식(props)으로만. 예측 가능성↑. - Virtual DOM: 실제 DOM 조작은 비쌈 → 가상 DOM에서 변경분(diff)을 계산해 바뀐 부분만 실제 DOM에 반영(reconciliation). \"직접 DOM 안 만지고 상태만 바꾼다.\" A2. JSX - JavaScript 안에 HTML처럼 쓰는 문법. 빌드 시 React.createElement 호출로 변환. - 표현식은 {}로 삽입. class 대신 className, 이벤트는 camelCase(onClick). - 반드시 하나의 부모로 감쌈(< ...</ Fragment 사용 가능). A3. props vs state - props: 부모가 자식에게 내려주는 값. 자식은 읽기 전용(불변). - state: 컴포넌트 내부에서 관리하는 변경 가능한 값. 바뀌면 리렌더. - ★ 상태는 불변으로 다룸: 직접 수정 말고 새 값으로 교체(setState/setX). React가 변경을 감지하는 방식이 참조 비교라서. A4. Hooks (함수 컴포넌트의 핵심) - useState: 로컬 상태. [값, 세터] 반환. - useEffect: 사이드 이펙트(데이터 fetch·구독·타이머). 의존성 배열로 실행 시점 제어, return으로 클린업(구독 해제 등). - []면 마운트 시 1회, [dep]면 dep 바뀔 때, 없으면 매 렌더. - useContext: 전역값 공유(prop drilling 회피). 저빈도 변경(테마·인증). - useMemo: 비싼 계산 결과 캐싱(의존성 안 바뀌면 재계산 X). - useCallback: 함수 재생성 방지(자식에 함수 넘길 때 리렌더 최적화). - useRef: 리렌더 없이 값 유지 + DOM 요소 직접 접근. - useReducer: 복잡한 상태 로직을 reducer로(Redux 축소판). - 커스텀 훅: use로 시작하는 로직 재사용 단위(useAuth, useDebounce). ★ 훅 규칙: 최상위에서만 호출(조건문·반복문 안 X), React 함수 안에서만. 호출 순서가 고정돼야 React가 상태를 매칭. A5. 렌더링 & 최적화 - 리렌더 트리거: state 변경, props 변경, 부모 리렌더. - key: 리스트 렌더 시 각 항목 식별자. 인덱스 대신 고유 id 권장(순서 바뀔 때 버그 방지). - React.memo: props 안 바뀌면 컴포넌트 리렌더 스킵. - 최적화 3종(useMemo/useCallback/memo)은 남용 금지 — 측정 후 병목만. - 지연 로딩: React.lazy + Suspense로 컴포넌트 코드 분할(초기 번들↓). A6. 기타 자주 나오는 것 - 제어 컴포넌트: 입력값을 state로 관리(value+onChange). vs 비제어(ref로 읽기). - 이벤트: SyntheticEvent(브라우저 이벤트 래핑, 크로스브라우저 일관성). - 에러 바운더리: 하위 렌더 에러를 잡아 폴백 UI(클래스형만 가능, 또는 라이브러리). - Portal: DOM 트리 바깥에 렌더(모달·툴팁). - StrictMode: 개발 중 잠재 문제 감지(이펙트 2번 실행 등). B. React 상태관리 (요약 — 상세는 문서26) - 서버 상태(API 데이터) → React Query(TanStack): 캐싱·dedup·stale-while-revalidate·자동 refetch. - 클라 전역 상태 → Redux Toolkit / Zustand: 모달·테마·필터. - 로컬 → useState, 저빈도 전역 → useContext. - ★ \"서버 상태는 React Query, 클라 전역은 Redux\"의 역할 분담이 현대 정석. Redux에 API 데이터 다 넣는 건 구식. C. Next.js 핵심 C1. Next란 & 왜 쓰나 - React 기반 풀스택 프레임워크. React만으로 부족한 것(라우팅·SSR·번들 최적화·백엔드)을 통합 제공. - 핵심 가치: 렌더링 전략 선택(SSR/SSG/ISR/CSR), 파일 기반 라우팅, SEO, 성능 최적화 기본 내장. C2. 렌더링 전략 (★ 면접 핵심) - CSR(Client-Side Rendering): 브라우저에서 JS로 렌더. 초기 로딩 느리고 SEO 불리. (순수 React) - SSR(Server-Side Rendering): 요청 시 서버가 HTML 생성. 최신 데이터·SEO 유리, 서버 부하. - SSG(Static Site Generation): 빌드 시 HTML 미리 생성. 가장 빠름, 자주 안 바뀌는 페이지(블로그·문서). - ISR(Incremental Static Regeneration): SSG인데 일정 주기로 백그라운드 재생성. 정적 속도+최신성 절충. - ★ 선택: 실시간 데이터·개인화=SSR, 고정 콘텐츠=SSG, 가끔 갱신=ISR, 상호작용 많은 대시보드 일부=CSR. C3. App Router (Next 13+, 현재 표준) - app/ 디렉토리 기반. 폴더=경로, page.tsx=페이지, layout.tsx=공통 레이아웃. - ★ 서버 컴포넌트가 기본: 페이지가 서버에서 렌더+데이터 직접 조회(async 컴포넌트). 번들에 JS 안 포함→가벼움. - 클라이언트 컴포넌트: 파일 상단 'use client'. 상태·이벤트·브라우저 API·훅을 쓸 때만. - ★ 경계 설계: 데이터 조회·정적 부분=서버 컴포넌트, 상호작용=클라이언트 컴포넌트로 분리. - (구) Pages Router: pages/ 기반, getServerSideProps/getStaticProps. 레거시지만 여전히 씀. C4. 라우팅 — 정의 방식 (React Router vs Next) ★ 근본 차이: React Router는 \"라우트를 코드에 선언\", Next는 \"파일 구조가 곧 라우트\". React(react-router-dom): 라이브러리 설치 후 <Route path element 로 매핑을 코드에 나열. <Routes <Route path=\"/about\" element={<About/ } / <Route path=\"/product/:id\" .../ </Routes 동적 파라미터 :id, 읽기 useParams(). 404는 path=\" \". Next(App Router): 폴더/파일 구조가 URL. 설치·선언 불필요. - 폴더=경로 세그먼트, page.tsx=그 경로의 페이지. app/about/page.tsx → /about. - [id]=동적 라우트. product/[id]/page.tsx → /product/123. 읽기: 서버 컴포넌트는 params props, 클라는 useParams(). - [slug]=SEO용 이름, [...all]=캐치올(여러 세그먼트). - layout.tsx=하위 공통 레이아웃(중첩 가능). (그룹)=괄호 폴더, URL에 안 나타남(구획용). - 특수 파일: loading.tsx(로딩 UI), error.tsx(에러 UI), not-found.tsx(404). C4-B. 페이지 이동 방식 (6가지) (1) <Link href — 선언적(클릭). 전체 리로드 없이 클라 전환 + 자동 prefetch(뷰포트에 보이면 미리 로드). 대부분의 링크. (2) useRouter().push() — 명령형(로직 중 이동, 폼 성공 후 등). 'use client' 필요, next/navigation에서 import(구 Pages Router는 next/router — 헷갈리지 말 것). - push(히스토리 쌓임) / replace(히스토리 교체, 로그인 후) / back()·forward() / refresh(서버 데이터 재요청). (3) redirect('/login') — ★ 서버 사이드 이동(서버 컴포넌트·서버 액션). React엔 없음. JS 로드 전 서버 단에서 이동→깜빡임 없음. 권한 체크에. (4) notFound() — 서버에서 404 강제 트리거(리소스 없을 때). (5) 미들웨어 NextResponse.redirect — 페이지 도달 전 요청 단계 이동. 전역 인증 게이트. (6) <a — 일반 링크(전체 리로드). 외부 링크에만. 언제 무엇: 클릭=Link / 로직 중=push / 히스토리 안 남기기=replace / 서버 권한 차단=redirect / 404=notFound / 전역 인증=미들웨어. React Router 대응: <Route →파일구조 / useNavigate()→useRouter().push() / useParams()→params·useParams() / redirect·notFound·미들웨어=Next 고유(서버 사이드). C5. 데이터 처리 (App Router) - 서버 컴포넌트에서 직접 fetch/DB 조회: async function Page() { const data = await getData(); }. - 서버 액션('use server'): 폼·변경(mutation)을 함수 호출처럼. API 라우트 없이 서버 로직 실행. revalidatePath로 캐시 무효화. - Route Handler(app/api/.../route.ts): 외부가 부르는 것(웹훅)·명시적 API 엔드포인트. - ★ 구분: 내부 변경=서버 액션, 외부 연동·웹훅=Route Handler, 조회=서버 컴포넌트. C6. 최적화 내장 기능 (자주 묻는 것) - next/image (<Image ): 자동 WebP·리사이징·lazy loading·레이아웃 시프트 방지. - next/link (<Link ): 클라 네비게이션 + 자동 prefetch. - next/font: 폰트 self-host로 외부 요청 제거·시프트 방지. - 코드 분할: 라우트별 자동 분할. dynamic()로 컴포넌트 지연 로딩. - 메타데이터 API: export const metadata / generateMetadata로 페이지별 SEO(title·og). - 캐싱: fetch 요청·라우트 캐싱 자동. revalidate로 주기 설정. C7. 미들웨어 - middleware.ts: 요청이 페이지 도달 전 실행(엣지). 인증 검사·리다이렉트·A/B·헤더 조작. - 라우트 단에서 접근 제어(로그인 필요·관리자 전용). C8. Next가 React 대비 개선/차별화한 것 (★ 빈출) React는 UI 라이브러리라 나머지를 직접 조립. Next는 프레임워크로 통합+개선. 거의 다 \"서버를 활용한다\"는 한 뿌리. 1. 렌더링(가장 큰 차이): React=CSR(브라우저 렌더, 초기 느림·SEO 불리) / Next=서버 렌더(SSR/SSG) 가능→첫 화면 빠름·SEO 유리, 페이지별 전략 선택. 2. 서버 컴포넌트: React=모든 컴포넌트가 클라 번들에 포함 / Next=조회·정적 부분은 서버 실행, 그 JS는 클라에 안 감→번들 경량화. 상호작용만 'use client'. 3. 라우팅: React=react-router 설치+<Route 선언 / Next=파일 기반 내장 + 서버 사이드 이동(redirect/notFound). 4. 데이터 페칭: React=useEffect로 마운트 후 fetch(깜빡임) / Next=서버 컴포넌트가 렌더 전 미리 조회, 변경은 서버 액션(API 없이). 5. 최적화 내장: 이미지(<Image 자동 WebP·lazy)·폰트(next/font)·코드분할(라우트별 자동)·prefetch가 기본. React는 라이브러리로 조립. 6. 풀스택: React=프론트만(백엔드 별도) / Next=Route Handler·서버 액션으로 백엔드가 한 프로젝트에. 7. 기타: layout.tsx 중첩 레이아웃, 미들웨어(요청 단계, React엔 없음—서버가 없으니), 메타데이터 API(SEO를 서버에서, React는 react-helmet). 한 장 요약: React=UI 라이브러리·CSR·클라 번들·라우터 설치·useEffect fetch·별도 백엔드 / Next=풀스택·SSR선택·서버컴포넌트·파일라우팅·서버조회·내장백엔드·미들웨어. ★ 핵심 통찰: \"React + 서버 = Next\". React는 브라우저에서만 도는 UI라 렌더링·SEO·데이터·백엔드가 클라 한계에 묶이는데, Next가 서버 레이어를 얹어 서버렌더·서버컴포넌트·서버액션·미들웨어·redirect가 가능해진 것. 대부분의 차별점이 이 하나로 설명됨. D. 렌더링·성능 용어 (프론트 공통) - Hydration(하이드레이션): 서버가 보낸 정적 HTML에 JS(이벤트·상태)를 \"붙여\" 상호작용 가능하게 만드는 과정. \"마른 HTML에 물(JS)을 부어 살린다\". - 흐름: 서버가 HTML 렌더→전송 / 브라우저가 HTML 즉시 표시(보이지만 죽어있음, 클릭 안 됨) / JS 번들 다운로드 / Hydration으로 이벤트·상태 연결(살아남) / 상호작용 가능. - 왜: SSR로 첫 화면·SEO는 챙기되, JS를 나중에 붙여 동작도 살리려고. CSR(빈 HTML→JS가 처음부터 그림)보다 첫 화면 빠름. - 문제1 Hydration mismatch: 서버가 그린 HTML과 클라 렌더 결과가 다르면 에러. 원인=Date.now()/Math.random()/window 접근 등 서버·클라 다른 값. - 문제2 상호작용 지연: HTML 보이는데 JS 로드·Hydration 전까진 클릭 안 먹는 갭. 번들 크면 길어짐. - 개선: 서버 컴포넌트(JS 안 보냄→Hydration 대상 아님), Islands/Partial Hydration(상호작용 부분만), Streaming SSR+Suspense. - ★ Next 연결: App Router의 서버 컴포넌트는 JS 미전송이라 Hydration 없음. 'use client' 컴포넌트만 Hydration 대상→필요한 곳에만 'use client' 쓰는 게 비용 절감. - CLS(Cumulative Layout Shift): 로딩 중 레이아웃이 밀리는 정도(이미지 크기 지정·폰트로 개선). - LCP/FCP: 가장 큰/첫 콘텐츠가 그려지는 시점(성능 지표, Core Web Vitals). - 코드 스플리팅: 번들을 쪼개 필요한 것만 로드(초기 로딩↓). - Tree shaking: 안 쓰는 코드를 빌드에서 제거. - prefetch: 다음에 갈 가능성 높은 페이지를 미리 로드. - SPA vs MPA: 단일 페이지(클라 라우팅) vs 다중 페이지(서버가 매번 HTML). E. 면접 빈출 한 줄 답 - \"React가 뭔가?\" → 선언형·컴포넌트 기반 UI 라이브러리. 상태가 바뀌면 Virtual DOM으로 바뀐 부분만 다시 그림. - \"Virtual DOM 왜?\" → 실제 DOM 조작이 비싸서, 가상 DOM에서 diff 계산 후 최소 변경만 반영. - \"useEffect 언제?\" → 렌더 외의 사이드 이펙트(fetch·구독·타이머). 의존성 배열로 시점 제어, 클린업 필수. - \"Next를 왜 React 대신?\" → 라우팅·SSR/SSG·SEO·이미지/폰트 최적화가 기본 내장. 렌더링 전략을 페이지마다 선택. - \"SSR vs SSG vs CSR?\" → 요청 시 서버 렌더(SSR, 최신·SEO) / 빌드 시 정적(SSG, 최속) / 브라우저 렌더(CSR, 상호작용). ISR은 둘 절충. - \"서버 컴포넌트?\" → App Router 기본. 서버에서 렌더+데이터 조회, JS 번들 미포함. 상호작용은 'use client'로 분리. - \"Hydration?\" → SSR HTML에 JS를 입혀 상호작용 가능하게 만드는 과정. - \"상태관리 도구 선택?\" → 서버 상태 React Query, 클라 전역 Redux/Zustand, 로컬 useState. - \"React Router와 Next 라우팅 차이?\" → React Router는 <Route 로 코드 선언, Next는 파일·폴더 구조가 곧 라우트(내장). - \"Next에서 페이지 이동?\" → 클릭은 <Link (prefetch), 로직 중은 useRouter().push(), 서버 권한 차단은 redirect(), 404는 notFound(). - \"Next가 React보다 나은 점?\" → 서버 렌더(SEO·속도), 서버 컴포넌트(번들↓), 파일 라우팅, 서버 조회·서버 액션(백엔드 내장), 이미지/폰트 최적화. 핵심은 \"React+서버\". 핵심 요약 React=선언형·컴포넌트·Virtual DOM·단방향·Hooks. 상태는 불변으로. Next=React 풀스택(라우팅·SSR/SSG/ISR·SEO·최적화 내장). App Router는 서버 컴포넌트 기본+'use client' 경계, 데이터는 서버 컴포넌트(조회)/서버 액션(변경)/Route Handler(외부). 최적화는 next/image·link·font·코드분할·메타데이터가 기본. 상태관리는 서버=React Query·클라=Redux/Zustand 역할 분담."}, {"title": "인증·프론트엔드 확인 질문", "kind": "확인 질문", "url": "doc_27_frontend_checkquestions.html", "text": "[문서27] 인증·프론트엔드 확인 질문 — 핵심 점검용 --- 1. 인증 저장소 - JWT는 \"무엇\"이고 쿠키/localStorage는 \"무엇\"인가? (형식 vs 위치) - \"JWT vs 쿠키\"가 왜 잘못된 대비인가? - 세션 방식과 JWT의 차이? JWT의 확장 장점과 단점(무효화)? - localStorage의 치명적 약점은? (XSS) - HttpOnly 쿠키가 막는 공격과 취약한 공격은? (XSS 방어/CSRF 취약) - CSRF는 어떻게 방어? (SameSite+CSRF 토큰) - 하이브리드 베스트 프랙티스를 설명? (액세스=메모리, 리프레시=HttpOnly 쿠키) - SSR(Next)에는 왜 쿠키가 유리? - 결국 어디 저장하든 무엇을 막는 게 근본? (XSS) 2. React/상태관리 - useEffect의 의존성 배열과 클린업은 각각 무엇? - useMemo/useCallback을 남용하면 안 되는 이유? - Next App Router에서 훅을 쓰려면? ('use client') - 서버 컴포넌트와 클라이언트 컴포넌트의 경계는? - React Query가 해결하는 문제? (수동 fetch 보일러플레이트) - stale-while-revalidate란? - React Query의 캐싱·dedup 장점? - \"서버 상태와 클라이언트 상태가 다르다\"는 무슨 뜻? - Redux Toolkit이 옛 Redux보다 나은 점? - ★ 서버 상태·클라 전역·로컬 상태를 각각 무엇으로 관리? (역할 분담) - \"Redux에 API 데이터를 다 넣는다\"가 왜 구식? - Zustand는 언제? 3. NestJS DI - DI를 한 문장으로? - 직접 생성(new)의 문제와 DI의 이점? - @Injectable과 생성자 주입의 역할? - DI가 테스트를 쉽게 하는 이유? 4. 심화 (CSRF/토큰/NestJS 흐름) - HttpOnly가 CSRF는 왜 못 막나? - CSRF 공격이 토큰을 훔치는 건가 아닌가? (브라우저 자동 전송 악용) - SameSite Strict/Lax/None 차이? - CSRF 토큰이 위조를 막는 원리? (evil.com이 못 읽음) - 액세스/리프레시 토큰을 왜 나누나? (보안vs편의 딜레마) - 자동 로그인이 안전하게 되는 흐름? - 리프레시 토큰 회전(rotation)이란? - React Query가 말하는 \"서버\"는 어느 서버? (백엔드 API, Next 서버 아님) - DTO를 왜 쓰나? (계약+검증+엔티티 분리) - ValidationPipe는 언제 동작하고 위반 시 무엇을 반환? - NestJS 요청 흐름 순서? (미들웨어→가드→인터셉터→파이프→컨트롤러→서비스→레포) - 인터셉터와 미들웨어의 차이? (인터셉터는 응답 후도, 응답 변형 가능) 종합 - \"웹 앱 인증을 설계한다면 토큰을 어디에 어떻게 저장하나?\" - \"프론트엔드 상태를 서버/전역/로컬로 나눠 각각 무슨 도구를 쓰나?\""}, {"title": "UI 컴포넌트 용어집 (프론트 공통 언어)", "kind": "용어 체크리스트", "url": "doc_47_frontend_glossary.html", "text": "[문서] UI 컴포넌트 용어집 (프론트 공통 언어) \"이런 UI를 뭐라 부르나\" — 개발자·디자이너·기획자 공통 언어. 라이브러리(Radix/shadcn/MUI) 문서도 이 이름. ★ 정확한 명칭으로 소통·검색. \"옆에서 나오는 메뉴\"가 아니라 \"드로어\". --- 알림·피드백 - Toast(토스트): 모서리에 잠깐 떴다 사라지는 알림(\"저장되었습니다\"). - Snackbar(스낵바): 토스트와 거의 같음(주로 하단, Material 용어). - Alert(얼럿): 페이지 안에 고정으로 뜨는 경고/안내 박스. - Modal / Dialog(모달/다이얼로그): 화면 덮고 뜨는 팝업. 배경 어두워짐. - Popover(팝오버): 특정 요소 옆에 떠서 부가 정보/액션. - Tooltip(툴팁): hover 시 뜨는 작은 설명. - Banner(배너): 상단 전체 폭 알림. - Progress bar / Spinner(프로그레스바/스피너): 로딩 표시. - Skeleton(스켈레톤): 로딩 중 회색 뼈대 표시. 네비게이션 - Breadcrumb(브레드크럼): \"홈 카테고리 상품\" 경로 표시. - Navbar / Header(네비바/헤더): 상단 네비게이션 바. - Sidebar / Drawer(사이드바/드로어): 옆에서 나오는 메뉴 패널. - Tabs(탭): 여러 뷰 전환. - Pagination(페이지네이션): \"1 2 3 ... 다음\" 페이지 이동. - Stepper(스테퍼): 단계별 진행 표시(결제 1→2→3). \"진행 바\". - Menu / Dropdown(메뉴/드롭다운): 클릭하면 펼쳐지는 목록. - Accordion(아코디언): 접혔다 펴지는 목록(FAQ). 입력(폼) - Input / Text field: 텍스트 입력. Textarea: 여러 줄. - Checkbox(다중 선택) / Radio(단일 선택). - Toggle / Switch(토글/스위치): 켜기/끄기. - Select(셀렉트): 목록에서 하나 선택. - Slider(슬라이더): 드래그로 값 조절. - Date picker(데이트 피커): 달력에서 날짜. - Autocomplete / Combobox(자동완성/콤보박스): 입력하면 후보 제시. - File upload(파일 업로드): 파일 첨부. 데이터 표시 - Table(테이블): 행·열 데이터. - Card(카드): 정보 담은 박스. - List(리스트): 목록. - Badge(뱃지): 작은 상태 표시(알림 개수, \"NEW\"). - Chip / Tag(칩/태그): 작은 라벨(필터·키워드). - Avatar(아바타): 프로필 이미지(원형). - Carousel(캐러셀): 이미지 슬라이드. - Tree(트리): 계층 구조(폴더). 오버레이·기타 - Backdrop / Overlay: 모달 뒤 어두운 배경. - Bottom sheet(바텀 시트): 모바일 아래서 올라오는 패널(=Drawer 하단형, vaul). - Command palette(커맨드 팔레트): Ctrl+K 검색·명령창. - Context menu(컨텍스트 메뉴): 우클릭 메뉴. - Divider(디바이더): 구분선. 헷갈리기 쉬운 것 구분 - Modal vs Popover vs Tooltip: 모달=화면 덮음(집중 강제) / 팝오버=요소 옆 작은 창(액션 포함) / 툴팁=순수 설명(hover). - Toast vs Alert: 토스트=자동 사라짐(임시) / 얼럿=페이지에 남음(고정). - Dropdown vs Select: 드롭다운=메뉴(액션) / 셀렉트=값 선택(폼 입력). - Drawer vs Modal: 드로어=옆/아래서 슬라이드 / 모달=중앙에 뜸. 왜 이름을 알아야 하나 개발자 간 공통 언어(\"공통된 코드로 대화\"). 정확한 명칭으로 디자이너·기획자와 소통하고, 라이브러리(Radix/shadcn/MUI) 문서도 이 이름이라 찾아 쓰려면 알아야 함. ★ 병원결제 프로젝트 실사용: Drawer(vaul 모바일 하단), Carousel(embla), Radio Group(결제수단), Toast, Dialog(모달), Badge 등이 shadcn 컴포넌트로. 면접 팁: \"이런 UI 구현해봤나요\"에 정확한 명칭으로(\"토스트로 알림, 스테퍼로 결제 단계, 드로어로 모바일 메뉴\") 답하면 실무 경험이 자연스럽게 드러남."}, {"title": "허 찌르는 질문 대비 (경험·버전·선택 트레이드오프)", "kind": "허 찌르는 질문", "url": "doc_50_frontend_gotcha.html", "text": "[문서] 허 찌르는 질문 대비 (경험·버전·선택 트레이드오프) 지식이 아니라 \"실제 경험·선택\"을 묻는 질문. 지어내지 말고 실제 기반으로. 모르면 정직하게, 아는 건 뻣뻣하게. ★ 경력직 답변 태도(문서0)와 세트: 개념은 아는 대로, 경험은 실제만. --- 1. \"최근에 써본 Next 버전 몇이에요?\" - 사실 확인: 2026년 기준 Next 16이 stable(2025년 10월 출시), 16.2.x가 현재 안정 라인. 15는 유지보수 LTS. - ★ 답변 원칙: 실제 쓴 버전을 말한다. 병원결제 프로젝트가 Next 15(App Router)였으면 \"15로 App Router 기반 결제 플랫폼을 만들었습니다\"로. 안 써본 최신 버전을 안다고 하지 말 것. - 버전 감각 보여주기(안 써봤어도 흐름은 알기): - 13: App Router 등장(서버 컴포넌트). - 14: 서버 액션 안정화. - 15: React 19, async request API, Turbopack 안정, fetch 캐싱 기본값 변경. - 16: Turbopack 기본 번들러(webpack 대체), React Compiler 안정, next lint 제거(ESLint 직접 실행), 라우팅/프리페치 최적화. - ★ \"15까지 써봤고 16은 Turbopack이 기본이 되고 캐싱이 명시적으로 바뀐 걸로 압니다\" 식으로 \"쓴 것+아는 것\"을 구분해 답하면 정직하면서 감각 있어 보임. 2. \"상태관리 툴 뭐까지 써봤어요?\" - ★ 실제 쓴 것만. 프로젝트 기반으로: - 서버 상태: React Query(TanStack) — 캐싱·refetch. - 클라 전역: Redux Toolkit 또는 Zustand. - 로컬: useState / useReducer, 저빈도 전역: useContext. - 안 써봤으면 \"Redux는 써봤고 Zustand는 안 써봤는데 더 가벼운 대안으로 압니다\"로 구분. - ★ 후속 대비: \"왜 그걸 골랐나?\" → \"서버 데이터라 React Query로 캐싱·동기화를 맡기고, 클라 전역(모달·필터)만 가벼운 Zustand로 나눴습니다.\" (서버상태/클라상태 분리 원칙, 문서26·46). - 함정 질문: \"Redux 없이 Context로 전역 못 하나?\" → \"가능하지만 Context는 값 바뀔 때 구독 컴포넌트가 다 리렌더돼서 자주 바뀌는 상태엔 부적합. 그래서 저빈도(테마·인증)만 Context, 자주 바뀌는 건 전용 도구.\" 3. \"왜 그 기술을 골랐어요?\" (선택 이유) - ★ \"남들이 써서\"는 최악. 트레이드오프로 답한다. - 예: \"왜 Next?\" → \"SSR·SEO·라우팅·이미지 최적화가 필요했고, React만으론 다 조립해야 해서. 풀스택이라 백엔드도 한 코드베이스로.\" (문서46 C8) - 예: \"왜 Prisma?\" → \"SQLite↔PG 무변경, 타입 안전. 단 복잡 쿼리는 raw도 병행.\" (문서48) - 예: \"왜 Zustand(또는 Redux)?\" → 규모·보일러플레이트·팀 친숙도 트레이드오프. - 정직 카드: \"사실 이건 회사에서 이미 쓰던 스택이라 따라간 부분도 있습니다\"도 솔직한 답(무리한 정당화보다 나음). 4. \"그거 안 써봤죠?\" / 모르는 것 찌르기 - ★ 지어내지 말 것. \"그건 직접 안 써봤습니다. 다만 개념은 ~로 이해하고 있습니다\"로 정직+지식. - 개념 질문이면 경험 언급 없이 아는 대로 뻣뻣하게(문서0). \"잘 모르겠습니다\" 고백보다 아는 만큼. - 절대 금지: 안 써본 걸 써봤다고 → 후속 질문에서 무너짐. 한 번 거짓이 드러나면 전체 신뢰 붕괴. 5. 자주 나오는 \"허 찌르기\" 유형별 대비 - \"이거 최신 버전에선 바뀐 거 아세요?\" → 모르면 \"그 부분은 최신 변경을 못 따라갔습니다. 확인해보겠습니다.\" (모르는 걸 인정하는 게 감점 아님) - \"그 라이브러리 단점은?\" → 장점만 말하면 의심받음. 반드시 트레이드오프도: \"React Query는 서버상태엔 좋지만 클라 전역엔 안 맞고, 러닝커브가 있습니다.\" - \"직접 밑바닥부터 구현할 수 있어요?\" → \"라이브러리로 했지만 원리는 ~입니다\"(예: JWT 검증, 상태관리 구독). 원리를 알면 OK. - \"왜 A 대신 B 안 썼어요?\" → 둘 다 알고 트레이드오프로 판단했음을 보이기. \"B도 고려했는데 A가 ~라서.\" - \"이 코드 왜 이렇게 짰어요?\" → 당시 판단 근거를 정직하게. 더 나은 방법 알면 \"지금이라면 ~로 하겠습니다\"(성장 서사). - \"성능 최적화 해봤어요?\" → 실제 한 것만. 측정 없이 \"최적화했다\"는 위험. \"N+1을 eager loading으로, 이미지를 next/image로\" 등 구체적으로. 6. 버전·트렌드 감각 (안 써봤어도 흐름은) - React: 19가 최신 라인(Server Components, Actions, use 훅, useEffectEvent). React Compiler로 자동 memoization. - Next: 16이 stable(Turbopack 기본, React Compiler 안정). - 상태관리 트렌드: Redux → Redux Toolkit(보일러플레이트↓) → Zustand/Jotai(경량) → 서버상태는 React Query가 표준. - 스타일: CSS Modules → styled-components(CSS-in-JS) → Tailwind(유틸리티, 현재 우세) + shadcn/ui. - ★ \"최신을 다 안 써봤어도 흐름과 이유는 안다\"를 보이면 됨. 트렌드의 방향(왜 이렇게 바뀌었나)이 핵심. 7. 답변 태도 요약 (문서0과 연결) - 경험 질문 = 실제만, 지어내지 말 것. 안 한 건 \"안 했다\". - 개념 질문 = 경험 언급 없이 아는 대로 뻣뻣하게. 고백 금지. - 선택 질문 = 트레이드오프로. \"남들이 써서\"는 금지. - 모르는 것 = 정직하게 인정 + 아는 부분은 말하기. 판단은 면접관 몫. - 항상 후속 대비: 한 번에 다 쏟지 말고 결론 먼저, 후속에서 심화. 핵심 요약 허 찌르는 질문은 지식이 아니라 \"실제 경험·선택·트레이드오프\"를 본다. 실제 쓴 버전·툴만 말하고(Next 15/React Query/Redux 등 프로젝트 기반), 안 써본 건 정직하게 인정하되 개념·흐름은 아는 대로 답한다. 선택 이유는 \"남들이 써서\"가 아니라 트레이드오프로, 단점도 함께. 버전 트렌드는 안 써봤어도 방향(왜 바뀌었나)을 알면 감각 있어 보인다. 지어내면 후속에서 무너지니 절대 금지."}, {"title": "DTO 설계", "kind": "DTO 설계", "url": "doc_51_frontend_dto.html", "text": "[문서] DTO 설계 — 엔티티·Zod·Enum 일관 규칙 (Nest·Next) \"DTO 필수인가? 규칙은? 엔티티/Zod/Enum과 관계는? 유려하게 어떻게?\"에 대한 정리. 핵심: 각 관심사의 진실을 한 곳에 두고 나머지는 파생. --- 1. DTO는 필수인가? — \"아마도\"의 정체 결론: 문법적으론 필수 아니지만 실무에선 사실상 필수. 단 \"모든 곳\"은 아님. DTO(Data Transfer Object) = 계층·경계를 넘나드는 데이터의 형태 정의. 필요 이유: - 입력 검증의 자리: 외부 입력(신뢰 불가)이 들어오는 경계에서 형태·타입 강제. - 엔티티 보호: DB 엔티티 그대로 노출하면 내부 구조 새고, 원치 않는 필드까지 받거나 반환. - 명시적 계약: \"이 API는 이런 형태를 받고 준다\"를 코드로 문서화. 생략 가능: 단순 조회(파라미터 1개), 경계 안 넘는 내부 함수. 하지만 외부 입력·응답 지점엔 거의 항상 둠. 2. 일관된 규칙 — 방향별로 나눈다 - 요청 DTO(Request/Input): 외부→우리. 검증 목적. 동작별로: Create{E}Dto, Update{E}Dto, SignInDto. - 응답 DTO(Response/Output): 우리→외부. 노출 제어 목적. {E}ResponseDto — 엔티티에서 민감 필드 제거. 네이밍 관례: - Create{Entity}Dto — 생성(모든 필수 필드) - Update{Entity}Dto — 수정(대부분 optional, 파생) - {Entity}ResponseDto — 응답(노출할 필드만) - {Entity}QueryDto — 목록 필터·페이지네이션 ★ DRY: Update는 Create의 부분집합인 경우 많음 → 파생. Nest는 PartialType(CreateDto), Zod는 .partial(). 중복 정의 피하고 한 소스에서. 3. 엔티티와의 관계 — 절대 섞지 마라 DTO ≠ 엔티티. 목적이 다름: - 엔티티: DB 테이블 매핑(저장 형태). ORM 소유. 모든 컬럼·관계·내부 필드. - DTO: 경계 넘는 데이터 형태. 앱 계층. 필요한 것만. 왜 분리: - 엔티티를 요청에 쓰면 → 사용자가 isAdmin:true 주입 가능(Mass Assignment 취약점). - 엔티티를 응답에 쓰면 → password·내부 플래그 노출. - 엔티티 구조 바뀌면 → API 계약이 의도치 않게 바뀜. 흐름: 요청 DTO(검증) → 서비스 → 엔티티(DB 저장) → 서비스 → 응답 DTO(노출 제어). 서비스가 DTO↔엔티티 변환. 경계=DTO, 내부·DB=엔티티. 4. Zod와의 관계 — \"같은 자리, 다른 도구\" Zod는 DTO를 만드는 한 방법. 대체가 아니라 구현 수단. - Nest(전통): 클래스 + 데코레이터(class-validator). class CreateUserDto { @IsEmail() email: string; @MinLength(8) password: string; } - Zod(스키마 기반, Next/TS): 스키마가 곧 DTO + 타입. const s = z.object({ email: z.string().email(), password: z.string().min(8) }); type CreateUserDto = z.infer<typeof s ; // 타입 자동 파생 ★ Zod 강점: 검증+타입이 한 소스(SSOT). z.infer로 스키마에서 타입 뽑으니 검증 규칙과 타입이 절대 안 어긋남. 5. Enum과의 관계 — 제한된 값의 SSOT Enum = \"정해진 값 중 하나\". DTO에서 필드의 허용값 제한. enum OrderStatus { PENDING='PENDING', PAID='PAID', SHIPPED='SHIPPED' } // Nest: @IsEnum(OrderStatus) status: OrderStatus; // Zod: status: z.nativeEnum(OrderStatus) // 또는 z.enum([...]) ★ 일관성: Enum을 한 곳 정의, DTO·엔티티·DB(Prisma enum)가 모두 참조. Prisma 스키마에 enum 정의하면 타입까지 생성되니 그걸 SSOT로. 6. 유려한 구현 — Nest 규칙: 전역 ValidationPipe(whitelist:true로 정의 안 된 필드 자동 제거→Mass Assignment 방지) / 요청은 동작별, Update는 PartialType / 응답은 @Expose·@Exclude로 노출 제어(인터셉터 자동 직렬화) / Enum은 한 곳, @IsEnum 참조. 7. 유려한 구현 — Next 규칙: Zod 스키마를 lib/validators.ts에 모아 DTO겸 타입 소스 / 타입은 z.infer 파생 / Update는 .partial() / 클라(zodResolver)+서버(parse) 같은 스키마 재사용 / Enum은 Prisma SSOT, z.nativeEnum 참조. 8. 전체 관통 원칙 ★ 핵심 통찰: DTO·Zod·Enum·엔티티는 각자 다른 역할이지만, \"각 관심사의 진실을 한 곳에 두고 나머지는 파생\"시키면 유려해짐. Enum 한 곳, 검증 스키마 한 곳, 거기서 타입·Update DTO 파생 → 필드 하나 추가할 때 여러 곳 안 고쳐도 됨. 면접 한 문장 \"DTO는 경계를 넘는 데이터 형태이자 검증 지점이라 외부 입력·응답엔 사실상 필수입니다. 엔티티와는 분리해 서비스가 변환하고(Mass Assignment·과다노출 방지), 요청/응답·동작별로 나누되 Update는 Create에서 파생합니다. Nest는 class-validator DTO+ValidationPipe, Next는 Zod 스키마를 DTO 겸 타입 소스로 써서 클라·서버가 재사용하고, Enum은 한 곳에 정의해 DTO·엔티티·DB가 모두 참조하게 합니다.\""}, {"title": "스타일링", "kind": "스타일링", "url": "doc_52_frontend_styling.html", "text": "[문서] 스타일링 — SCSS·Handlebars·Tailwind 커스텀 안 써본 것도 개념은 알기. SCSS 기본, 예전 프로젝트 방식(Handlebars 템플릿), Tailwind 전역 커스텀 설정. --- 1. SCSS(Sass) 기본 개념 SCSS = CSS를 프로그래밍 언어처럼 확장한 것. 순수 CSS엔 없는 기능을 더해 빌드 시 일반 CSS로 컴파일. (Sass는 언어, SCSS는 CSS 호환 문법 — 실무는 SCSS 문법) 핵심 기능(이것만): - 변수: 색·크기 재사용. $primary: 3b82f6; .btn { background: $primary; } - 중첩(nesting): 계층 그대로. .card { .title {...} &:hover {...} } (&=부모 참조) - mixin: 재사용 스타일 묶음(함수처럼). @mixin flex-center {...} .box { @include flex-center; } - @extend: 다른 선택자 스타일 상속. .critical { @extend .error; font-weight: bold; } - partials + @use: 파일 분리·모듈화. _variables.scss → @use 'variables'; ★ 한 줄: SCSS = CSS + 변수 + 중첩 + mixin + 모듈화. \"CSS를 유지보수하기 좋게 만든 상위 언어.\" SCSS vs Tailwind: SCSS=별도 파일에 의미 있는 클래스 정의(className=\\\"card\\\") / Tailwind=HTML에서 유틸리티 조합(className=\\\"p-4 flex\\\"). 접근이 반대. Next에서: npm i -D sass 만 하면 .scss/.module.scss import 가능(.module.scss는 scoped, 클래스 충돌 방지). 2. Handlebars — 예전 프로젝트 템플릿 방식 Handlebars = 서버 사이드(또는 빌드 타임) HTML 템플릿 엔진. React 이전/비-React 스택에서 흔했음. 로직 최소화(\"logic-less\") 철학. 문법: - 변수 출력: {{title}} (HTML 이스케이프됨). {{{raw}}} = 이스케이프 안 함. - 반복: {{ each items}} <li {{this.name}}</li {{/each}} - 조건: {{ if isActive}} ... {{else}} ... {{/if}} - 부분 템플릿(partial): {{ header}} (헤더 조각 재사용, 레이아웃 공통화) - 헬퍼(helper): {{formatDate date}} (커스텀 함수 등록해 값 변환) 동작 방식: 서버가 데이터 + 템플릿(.hbs)을 합쳐 완성된 HTML 문자열을 생성해 브라우저로 전송. (Express + express-handlebars 조합이 흔했음) ★ React와 대비: Handlebars=서버가 HTML을 미리 조립해 보냄(전통적 SSR, 상호작용은 별도 JS). React=클라이언트가 상태로 UI를 그림(컴포넌트+가상DOM). Handlebars는 \"템플릿에 값을 꽂아 문자열 HTML 생성\", React는 \"상태가 바뀌면 다시 렌더\". - 이 방식 스타일: 보통 전역 CSS/SCSS + 클래스명으로. 컴포넌트 스코프 개념이 약해 BEM 같은 네이밍 규칙으로 충돌 관리. ★ 경험 서술: \"예전 프로젝트는 Handlebars 템플릿에 SCSS로 스타일링하는 전통적 서버 렌더 방식이었습니다. 서버가 데이터를 템플릿에 꽂아 HTML을 만들어 보냈고, 스타일은 전역 SCSS에 클래스로 정의했습니다. 지금의 React 컴포넌트+Tailwind와는 접근이 달랐죠.\" 3. Tailwind 전역 커스텀 — 기본 설정 Tailwind는 프레임워크 기본값을 그대로 쓰지 않고 브랜드에 맞게 커스텀(design token). v3와 v4가 방식이 다름. v3 방식 (tailwind.config.js) 설정 파일에서 theme.extend로 색·폰트·간격 추가: → bg-primary, font-display, mt-18 같은 유틸리티가 생김. globals.css엔 @tailwind base/components/utilities. v4 방식 (globals.css의 @theme) — 현재 ★ v4는 tailwind.config.js를 없애고 CSS 안 @theme 디렉티브로 설정 이동: → 네임스페이스 접두어가 어떤 유틸리티를 만들지 결정: --color- → bg- /text- , --font- → font- , --breakpoint- → 반응형 변형. → 이 토큰들은 실제 CSS 변수도 되어 var(--color-primary)로 어디서든 참조 가능(디자인 시스템과 CSS가 같은 소스). 전역 커스텀에서 자주 하는 것 - @layer base: 전역 기본 스타일(body 폰트, 기본 색). @layer base { body { @apply bg-white text-gray-900; } } - @layer components: 반복되는 컴포넌트 클래스. @layer components { .btn-primary { @apply px-4 py-2 rounded bg-primary text-white; } } - 다크모드: :root와 [data-theme=\\\"dark\\\"]에 변수 정의 → @theme가 그 변수 참조 → 속성 하나 바꾸면 전체 전환(JS 클래스 스왑 없이). - 폰트: next/font로 로드한 폰트를 CSS 변수로 → @theme의 --font-sans에 연결. - 커스텀 유틸: @layer utilities로 없는 유틸리티 추가. 커스텀 흐름 요약 v3: tailwind.config.js의 theme.extend에 토큰 추가 → 유틸리티 생성. v4: globals.css의 @theme에 CSS 변수로 토큰 정의 → 유틸리티 생성 + CSS 변수로도 사용. 공통: content(스캔 대상)는 v4에서 자동 감지. 반복 조합은 @layer components + @apply로 묶기(남용은 자제). 4. 면접 답변 (안 써본 SCSS, 써본 것 구분) - \"SCSS 써봤어요?\" → \"직접은 안 써봤지만 개념은 압니다. CSS에 변수·중첩·mixin·모듈화를 더한 상위 언어로, 유지보수하기 좋게 확장한 거죠. 예전 프로젝트가 Handlebars 템플릿 + 전역 SCSS 방식이었던 걸로 기억합니다.\" (정직 + 개념 + 경험 연결) - \"Tailwind 커스텀 어떻게?\" → \"전역 CSS에서 디자인 토큰을 정의해 씁니다. v3는 tailwind.config의 theme.extend, v4는 globals.css의 @theme에 CSS 변수로 색·폰트·간격을 추가하고, 반복되는 조합은 @layer components에 @apply로 묶습니다. 다크모드는 CSS 변수를 data-theme으로 바꿔 처리합니다.\" - \"Handlebars랑 React 차이?\" → \"Handlebars는 서버가 템플릿에 값을 꽂아 HTML을 만들어 보내는 전통적 방식이고, React는 클라이언트가 상태로 컴포넌트를 렌더합니다. 전자는 전역 CSS+클래스, 후자는 컴포넌트 스코프 스타일이 자연스럽죠.\" 핵심 요약 SCSS=CSS+변수·중첩·mixin·모듈화(상위 언어, 컴파일하면 CSS). Handlebars=서버가 템플릿에 데이터를 꽂아 HTML 문자열을 만드는 전통적 템플릿 엔진(logic-less, partial·helper), 보통 전역 SCSS+클래스로 스타일. Tailwind 커스텀은 디자인 토큰을 v3는 tailwind.config theme.extend, v4는 globals.css @theme에 CSS 변수로 정의해 유틸리티를 생성하고, 반복은 @layer components+@apply, 다크모드는 CSS 변수 전환으로."}, {"title": "도메인 설계 사례", "kind": "실전편", "url": "doc_29_domain_practical.html", "text": "[문서29] 도메인 설계 사례 — 실무 경험을 면접 언어로 복잡한 비즈니스 로직을 설계·구현한 경험. 공통 뼈대=상태 머신+권한+큐/멱등성+감사. --- A. 구독 결제 시스템 전체: 결제는 정확성 최우선+외부 PG 의존+네트워크 실패 필연→큐·재시도·멱등성·상태 머신 필요. 카드 등록 & PG 모듈 ★ 카드 정보 직접 저장 안 함: 카드번호 DB 저장=PCI-DSS 위반+유출 재앙. - PG(토스/아임포트/스트라이프)에 카드 등록→빌링키(billing key)만 저장. 결제는 \"이 빌링키로 N원\". - 우리는 빌링키+카드 마지막 4자리(표시용)만. 결제 큐 & 재시도 - 왜 큐: 정기 결제 몰림(월초)→PG rate limit·DB 부하→큐로 완충. 비동기로 응답 빠름. - ★ 멱등성 필수: 재시도 시 이중 결제 방지. 멱등성 키(주문 ID)로 \"이미 처리?\" 확인. PG도 멱등성 키 지원. - 재시도: 지수 백오프(1분→5분→30분, 즉시 반복은 PG 차단). N회 실패→past_due+알림. DLQ로 격리. 환불 큐 - 부분/전액 환불도 큐. 멱등성(환불 ID). 상태 추적(요청→처리중→완료/실패), 웹훅으로 확정. 구독 상태 머신 (제일 중요) 상태: active / cancel_scheduled(취소 예정, 기간 말까지 사용) / canceled / past_due(연체) / paused. ★ \"취소 예정\"이 왜: 취소해도 이미 낸 기간까진 사용→즉시 canceled 아니라 cancel_scheduled, 크론이 기간 말에 canceled 전환. \"취소했는데 왜 쓸 수 있냐/왜 결제됐냐\" CS 방지. 크론잡 (매일 자정) 1. cancel_scheduled 중 만료 지난 것→canceled 2. active 중 결제일 도래→결제 큐 투입 3. past_due 유예 지난 것→서비스 중단 4. 곧 만료→알림 ★ 주의: 멱등성(중복 실행돼도 이중 처리 X, \"오늘 처리했나\" 체크), 대량은 배치 분할, 실패 격리. 시트 관리 & 할인 - 기본 제공 시트+추가는 결제. 시트 조정: 늘리면 즉시 과금(비례), 줄이면 다음 주기. - ★ proration(일할 계산): 월 중간 추가 시 남은 기간만 과금(\"15일 추가=반달치\"). - 할인 정책: 쿠폰/프로모션/연간 할인을 정책으로 분리(하드코딩 금지). 적용 순서·중복 규칙. 히스토리 - 구매/환불 히스토리(불변 로그): 정산·CS·분쟁. 상태 변경도 로그. 경험 서술: \"구독을 상태 머신으로. 취소는 cancel_scheduled로 두고 크론이 기간 말 전환→CS 제거. 결제는 큐+멱등성 키로 이중 결제 막고 지수 백오프 재시도. 카드는 PG 빌링키로만 저장해 PCI 부담 제거. 시트 추가는 proration 일할 계산.\" --- B. 건설 감리 결재 시스템 도메인: 건설사(시공)-감리사(감독)가 문서로 소통, 결재 체계로 진행, 공정률·집행률 계산·비교. 권한 제어+문서 관리 핵심. 프로젝트 & 주체 등록 - 프로젝트 생성→건설사 등록(시공)+감리사 등록(감독). 주체별 권한 다름(건설사=작성, 감리사=검토·승인). 공정률 & 집행률 (핵심 로직) - 공정률: 실제 시공 진척(%). 집행률: 예산 대비 집행된 시공비용(%). - ★ 비교: 집행률≫공정률=돈은 썼는데 진척 안 됨=위험 신호(부실·과다 청구). 감리사가 판별. 시스템이 두 수치 계산·비교가 핵심 가치. 감리사 판별 & 최종 채택 - 여러 감리사 판별 비교(같은 항목 다른 의견 가능)→최종 채택(이견 조율해 하나로 확정). \"누구 판단을 최종으로\" 워크플로우. 결재 체계 (상태 머신+권한) - 문서 상태: draft→submitted→under_review→approved/rejected. 반려되면 draft로. - 각 전이에 권한: 작성자만 submit, 감리사만 approve. 결재선을 데이터로 관리. 도장 단계별 날인. 문서 코드 관리 - ★ 체계적 코드 필수(문서 수천 개): 프로젝트-공종-종류-일련번호(예: PRJ001-CIVIL-INSP-0042). - 권한별 코드: 건설사·감리사가 보는/만드는 코드 범위 다름. 코드로 검색·분류·이력. 도면 개정(rev) 관리. 권한 제어 (RBAC) - ★ 문서별 작성·수정 권한: 역할(건설사/감리사/관리자)별. - 문서 종류·상태별: 건설사는 작성, 감리사는 검토·승인. approved는 불변(수정 불가). 반려된 것만 재수정. - 도장 등록: 각 주체 도장 등록, 승인 시 권한 확인 후 날인. 경험 서술: \"건설사-감리사가 결재 워크플로우로 소통. 문서를 상태 머신(작성→제출→검토→승인)으로, 각 전이에 RBAC로 건설사는 작성만·감리사는 승인만. 승인 문서는 불변 잠금, 반려는 재작성만. 공정률·집행률 계산·비교해 집행이 진척보다 앞서면 감리사가 위험 판별, 여러 의견 비교해 최종 채택. 문서는 프로젝트-공종-종류-일련번호 코드 체계+권한별 접근.\" --- 두 도메인 공통 5년차 역량 (★ 면접 포인트) 완전히 다른 도메인이지만 같은 뼈대로 푼다: - 상태 머신: 구독 상태 / 문서 결재 상태. \"상태 명확히 정의+전이 통제\"가 복잡 로직의 핵심. - 권한 제어(RBAC): 시트 권한 / 문서 작성·승인 권한. - 큐+재시도+멱등성: 결제·환불 / 대량 처리. - 크론잡: 구독 만료 체크 / 정기 리포트. - 감사 로그: 결제 히스토리 / 문서 이력. - 정책 분리: 할인 정책 / 결재선 규칙을 하드코딩 않고 데이터로. ★ 메시지: \"상태 머신+권한+큐/멱등성+감사\"라는 같은 뼈대로 다른 도메인을 푼다. 이 패턴을 아는 게 '복잡한 비즈니스 로직을 다뤄봤다'의 실체. --- C. 병원 결제 시스템 (멀티테넌트 + 크로스디바이스) 토스페이먼츠 PG (요청-승인 2단계) ★ 핵심: 요청과 승인이 분리된 2단계(정합성 위해). 1. SDK 결제 요청(orderId, successUrl, failUrl) 2. 카드사 인증창→사용자 인증 3. 성공→토스가 paymentKey 발급+successUrl 리다이렉트(쿼리에 paymentKey/orderId/amount) 4. 백엔드가 받은 값이 요청 때 값과 일치하는지 검증 5. 백엔드가 결제 승인 API(paymentKey+시크릿 키)→실제 청구 6. 승인 완료→Payment 객체→paymentKey DB 저장 ★ 왜 2단계: 한 번에 하면 웹훅 의존→불일치 위험. 분리하면 백엔드가 승인 직전 금액 재검증(위변조 방지). \"프론트 금액 그대로 안 믿는다\". paymentKey는 DB 저장(취소·조회), 시크릿 없으면 무용이라 노출돼도 안전. 상태: READY→IN_PROGRESS→DONE. 멀티테넌트 (서브도메인) - 메인 도메인 구매→병원별 서브도메인(hospital-a.service.com→A병원). - 테넌트 식별: 서브도메인으로 병원 판별→그 병원 데이터만. - 데이터 격리: 테넌트 ID로 모든 쿼리 필터(또는 스키마/DB 분리). - 격리 트레이드오프: 공유 DB+테넌트 ID(간단·저비용·약한 격리) vs 스키마/DB 분리(강한 격리·고비용). 대개 공유 DB+테넌트 ID로 시작. 크로스디바이스 결제 (QR+문자) 시나리오: 데스크톱에서 진료 확인, 결제는 환자 폰. 1. 데스크톱서 결제 정보 확정→결제 URL 생성 2. 전달(옵션): QR 코드(대면, 폰 스캔) or 문자 SMS(원격) 3. 환자 폰 브라우저서 결제 URL→토스 결제 4. 완료→영수증 ★ 결제 URL에 토큰(세션 식별, 만료·일회성). 상태 동기화(폰 결제 끝나면 데스크톱 갱신, 폴링/웹소켓). 단계별 진행 바 (UX) - 차트번호 입력→수술 종류 선택→결제 정보 재확인→결제→영수증. - ★ 결제 정보 재확인: 직전 금액·항목 재표시(되돌리기 어려우니 실수 방지). 진행 바로 이탈 감소. JSON 대량 업로드 - 병원별 라식 수술 종류를 JSON→스크립트 벌크 인서트. - ★ 멱등성(재실행 시 중복 X, upsert), 업로드 전 스키마 검증. 스택 (Neon+Vercel+Next+Lucide+Drawer) - Neon: 서버리스 PostgreSQL(사용량 기반, 자동 확장, 브랜칭). - Vercel: Next 배포(서버리스·엣지, Git 자동 배포). - Next: 서버 컴포넌트·서브도메인 라우팅. Lucide: 가벼운 아이콘. Drawer: 모바일 하단 슬라이드 UI. ★ 서버리스(Neon)+서버리스 배포(Vercel)=인프라 관리 없이 서비스, 트래픽 없으면 비용 최소. 경험 서술: \"병원별 멀티테넌트를 서브도메인 격리, 토스는 요청-승인 2단계로 백엔드에서 금액 재검증. 데스크톱 확정 결제를 QR/문자로 환자 폰에 넘기는 크로스디바이스. paymentKey 저장해 취소·조회 대비. 수술 종류는 JSON+스크립트 멱등 벌크 업로드. Neon+Vercel 서버리스로 인프라 부담 없이.\" --- D. 출구조사 데이터 정규화 (더러운 외부 데이터 길들이기) 문제 — flat한 엉망 데이터 선관위 원본이 계층이어야 할 것을 같은 레벨에 나열: { 선거구코드, 지역, 연령10, 연령20...연령60, 성별남, 성별여 } 연령대·성별이 상위 카테고리 하위여야 하는데 전부 최상위 키→처리 어렵고 키 이름 조금 바뀌면 코드 깨짐. 해결 — 정규화 flat→계층 파싱: { 선거구코드, 지역, 연령:{10,20,30...}, 성별:{남,여} } - 공통 패턴(연령XX, 성별X)을 파싱해 상위 카테고리로 그룹핑. - 리액트식 정규화: 일관된 객체 구조로 렌더링·조작 단순화. Enum화 - 컬러 코드·카테고리를 enum 중앙 관리. 정당별 색 한 곳에서, 매직 넘버·스트링 제거. ★ 핵심 성과 — 변경에 강한 구조 \"원본 키 이름이 조금 바뀌어도 대응, 데이터 로드 오류 없음\"이 핵심 가치: - 파싱 레이어로 원본과 내부 구조 분리→원본 바뀌어도 파싱 규칙만 조정, 내부 코드 그대로. - 패턴 기반 파싱(연령\\d+ 같은 패턴)→이름 조금 바뀌어도 흡수. - 방어적 로딩→예상 못 한 필드·누락에도 안 깨짐. = DI(\"인터페이스 의존, 구현 변화에 강하게\")+관심사 분리의 데이터 버전. 면접 가치 단순 구현 아닌 설계 판단의 증거: 더러운 데이터 길들이기(현실 데이터는 항상 엉망)+변경에 강한 설계(원본 변경 흡수)+정규화·enum 기본기. 경험 서술: \"출구조사 원본이 연령·성별을 flat 나열해 처리 어려움. 공통 패턴 파싱해 상위 카테고리 하위로 정규화, 컬러는 enum 중앙화. 핵심은 파싱 레이어로 원본과 내부 구조 분리라, 원본 키 바뀌어도 파싱 규칙만 조정하면 돼 로드가 안정적.\" --- 공통 확장 (C·D 추가 역량) - 멀티테넌시: 서브도메인 격리+테넌트 ID 필터. - 외부 연동 정합성: PG 요청-승인 분리, 백엔드 재검증(\"프론트 값 안 믿기\"). - 크로스디바이스: URL 토큰+상태 동기화. - 데이터 파이프라인: 파싱 레이어로 원본과 내부 분리→변경에 강하게(정규화·enum·방어적 로딩). - 벌크 처리: JSON+스크립트+멱등성. ★ 메시지: \"외부(PG·선관위)는 못 믿고 변한다. 경계에 검증·파싱 레이어를 둬서 내부를 보호한다\"가 두 사례의 공통 교훈. --- E. 행안부 SSO(AnyID) 연동 — 제약 환경 극복 프레이밍: \"SSO 붙였다\"가 아니라 \"폐쇄망·문서 부족·벤더 모듈·운영 테스트 제약에서 정부 인증을 끝까지 연동\". 문제 해결력·끈기의 최상급 사례. 난관을 어떻게 우회했는지가 핵심. 정상 인증 흐름 1. 로그인 버튼→API 트리거 2. 통합 세션 활성화 확인: 있으면 바로 로그인 전환 / 없으면 로그인 화면 렌더링+tx 값 수신 3. tx 값으로 AnyID 서버 인증 요청 4. 위조 요청 필터 통과 5. 성공→콜백 클래스 함수 실행 6. 유저 정보 파싱→세션 저장 ★ 핵심 분기: 통합 세션 있으면 바로, 없으면 화면+tx. 이 옵션 구현이 개발 환경에선 불가능했던 게 첫 난관. 난관1 — 폐쇄망(인바운드/아웃바운드 룰) - AnyID 인증은 우리 서버↔AnyID 양방향 통신 필요. 개발 서버는 방화벽 룰 안 열려 요청도 콜백도 불가→인증 흐름 재현 불가. - (네트워크편 인바운드/아웃바운드·방화벽이 실전에서 발목 잡은 사례.) - 우회: 인증 성공 리턴값을 JS로 흉내(모킹)→개발 서버서 인증 함수 순차 실행 흉내. 흐름 검증용 스텁(위조 필터·실제 콜백은 검증 못 함, 한계 명확). 난관2 — 운영 서버 직접 테스트(극약 처방) - 개발 서버로 실제 인증 못 끝내→주말에 운영 서버에 히든 로그인 페이지 배포해 테스트. - 운영이어야 방화벽·통합 세션·실제 연동 작동. 히든 페이지(메인에 등록하되 미노출)로 콜백 클래스 함수 돌려 유저 정보 파싱→세션 저장 검증. 주말+히든으로 영향 최소화. - 면접 서술: \"위험하지만 폐쇄망 제약상 실제 왕복 재현할 곳이 거기뿐. 트래픽 적은 주말+미노출 히든 페이지로 영향 최소화하며 검증.\" = 리스크 인지·통제. 벤더 모듈 특성 - AnyID 모듈=서블릿 자동 등록(URL 지정 안 해도 해당 주소 요청 시 백엔드 동작). 프론트 모듈·콜백 클래스 함수 제공. - 편함: 보일러플레이트 없음. ★ 함정: 내가 제어 못 하는 부분 많아 문제 시 내부 못 봐 디버깅 어려움. 벤더 모듈의 전형적 트레이드오프. 난관3 — JBoss 배포 사고(프론트 누락) - JBoss라 빌드 산출물(WAR/EAR, Java 웹 아티팩트) 풀어 배포. 백엔드+Nexacro 프론트가 한 패키지. - 빌드에서 Nexacro 프론트 빠진 채 배포→사이트 깨짐. 해결: 백엔드만 부분 배포+서버 재시작. - ★ 교훈: 백/프론트 한 아티팩트로 묶이면 부분 배포 어렵고 사고 시 전체 깨짐. (CI/CD편 \"레포 분리·아티팩트 관리\"의 반면교사.) 도메인 복잡성 — 다중 계정 & 사업자 유형 ★ 타 민원과 다름: 한 사람이 여러 계정 가능→단순 자동 연동 안 됨. - 흐름: 인증→개인 식별→그 정보로 유저 정보 재검색→여러 계정 프론트로 리턴→사용자가 계정 선택→로그인. - 마이페이지 AnyID 연동/해제. - 사업자 유형별: 개인사업자/법인/개인 각각 다르게. - ★ CI/DI 분리: CI(연계정보, 개인 식별 고유값, 사이트 무관 동일) / DI(중복가입확인정보, 사이트 내 중복 방지, 사이트마다 다름). 사업자 유형 따라 따로 관리. - 개인정보 격리: 개인·기업 식별정보를 세션 저장해 외부로 안 돌게 통제. 난관4 — 조직 간 협업(광주 서버 센터) - 폐쇄망 방화벽 룰을 광주 서버관리센터에 직접 요청. 내 서버 IP만 주고 센터 NATS 정보 안 알려줘 통신 문제. - 타 사이트서 민원 처리→내 사이트로 넘어와 리다이렉트하는 사이트 간 연계까지. - ★ 교훈: 대형 정부 시스템은 기술만이 아니라 조직 간 협업·정보 공유가 병목. \"누가 무슨 정보 가졌고 누구에게 요청\" 파악도 실력. 면접 자산화 나쁜 서술: \"방화벽 때문에 고생.\" 좋은 서술(문제→제약→판단→결과): \"행안부 AnyID를 연동했는데 폐쇄망 방화벽으로 개발 서버서 인증 왕복 재현 불가. 처음엔 리턴값을 JS 모킹해 흐름 검증, 실제 콜백·위조 필터는 트래픽 적은 주말 운영 서버 히든 페이지로 리스크 통제하며 진행. 한 사람이 여러 계정 가능해 인증 후 CI로 유저 재검색해 계정 선택 단계 추가, 개인·개인사업자·법인별 CI/DI 분리. 배포는 백/Nexacro 프론트가 한 아티팩트라 프론트 누락 사고 후 부분 배포로 대응. 방화벽 룰은 광주 센터 협업 필요했는데 정보 공유 병목 겪으며 조직 협업도 기술만큼 중요함을 배움.\" 강한 이유: 제약 하 판단(모킹→운영 테스트, 리스크 인지)+도메인 복잡성(다중 계정, CI/DI)+실패 숨기지 않음(배포 사고)+비기술 현실(조직 협업)=성숙함. --- 도메인 사례 총정리 (A~E 관통 원칙) - 상태 머신: 구독/문서 결재/결제 상태. - 권한 제어(RBAC): 시트/문서/계정. - 큐+멱등성: 결제·환불. - 경계 방어: PG 금액 백엔드 재검증, 출구조사 파싱 레이어, SSO 위조 필터. \"외부는 못 믿고 변한다→경계에 검증·파싱 레이어.\" - 제약 하 판단: 폐쇄망에서 모킹→운영 테스트(리스크 통제). - 데이터 정규화: 출구조사 flat→계층, CI/DI 분리. ★ 최종 메시지: \"도메인은 달라도 상태 머신+권한+큐/멱등성+경계 방어라는 뼈대로 푼다. 제약이 있으면 리스크를 인지·통제하며 우회한다.\" = 5년차 설계·문제해결 역량."}, {"title": "프로젝트 Voyage", "kind": "프로젝트 개요", "url": "doc_30_voyage_overview.html", "text": "[문서30] 프로젝트 Voyage — 설명 자료 (개요) \"무엇을 만들었나\"보다 \"왜 그렇게 설계했나 / 어떤 문제를 어떻게 풀었나\". 면접관이 좋아하는 건 기능 나열이 아니라 판단의 근거. 각 항목 \"문제→선택→이유→결과\". --- 1. 한 문장 소개 Voyage = 실제 상황 대화문을 7단계 반복 청취로 내재화하는 오디오 우선(audio-first) 영어 회화 학습 앱. - 웹/iOS/Android를 단일 코드베이스(Capacitor)로 서비스. - 콘텐츠·음원·삽화 3개 도메인의 생성 파이프라인을 직접 설계. 엘리베이터 피치(30초): \"사람은 문장이 아니라 장면을 기억한다는 원리에서 출발한 앱. AI로 대화 콘텐츠를 대량 생성하되 '들으면 장면이 그려지는 문장'만 통과시키는 품질 게이트를 만들었고, TTS 음원·삽화까지 파이프라인으로 자동화. iOS는 앱스토어 라이브, Android는 심사 제출 완료.\" 2. 기술 스택 (왜 골랐나까지) - 백엔드 FastAPI(Python): 콘텐츠·채점·음원 파이프라인이 전부 Python 생태계(LLM SDK, 오디오 처리)라 언어 통일. - DB PostgreSQL(Railway 메인/Neon 폴백): 운영 안정성 위해 메인-폴백 이중화. 로컬은 SQLite. - 프론트 React+Vite+Capacitor: 웹/iOS/Android를 하나의 코드베이스로. 개인 리소스로 3플랫폼 커버하는 현실적 선택. - TTS ElevenLabs/Edge-TTS: 음질(ElevenLabs) vs 비용(Edge) 트레이드오프를 캐시로 흡수. - 스토리지 Cloudflare R2: 음원은 DB가 아니라 R2에, 백엔드가 302 리다이렉트 → DB 경량화. - 인증 Supabase Auth(이메일 OTP): 로그인 없이 2회 무료 체험 → 진입장벽 낮춤. - 배포 Railway(백엔드)/Vercel(랜딩): 백엔드는 git push 즉시 배포, 프론트는 앱 빌드 필요(이 차이가 배포 전략 핵심). 3. 아키텍처 — 핵심 데이터 흐름 강조할 설계 결정: - 단일 소스 원칙(SSOT): 콘텐츠는 반드시 batches JSON→content.py→migrate→DB 경로로만. DB를 직접 수정 안 함. 이유: DB 직접 고치면 다음 migrate 때 덮어써져 유실(→8번 사례). - 텍스트/음원 파이프라인 분리: 텍스트는 즉시 배포(migrate), 음원은 별도 파이프라인(과금 이슈). 관심사 분리. 4. 가장 자랑할 것 — AI 콘텐츠 생성 + 품질 게이트 가장 임팩트 있는 부분. \"AI로 대량 생성하면 품질이 무너진다\"를 시스템으로 풀었다. 문제: LLM으로 레슨 대화 대량 생성하면 문법은 맞지만 \"외워지지 않는 문장\"이 쏟아짐. 반복 암기 앱엔 치명적. 해결 — 단 하나의 판별 기준: \"이 문장을 들으면 머릿속에 장면이 그려지는가?\" - ✅ \"Why didn't he pass?\" / \"My feet are killing me.\" - ❌ \"This is getting tense.\" / \"It smells amazing.\" 2층 검수 시스템: - 1층 구조: 스키마·필드 개수·orphan·중복 → validate.py(기계적), 위반 0건. - 2층 품질: 장면·감정·난이도·자연스러움 → 검수 에이전트/사람(판단), 체크리스트 통과. ★ 핵심 인사이트: \"구조 통과 ≠ 품질 통과\". 기계는 필드 맞는지만, 좋은 콘텐츠인지는 못 봄 → 두 층 분리. 생성/검증 주체 분리: - 생성은 서브에이전트가 병렬로. - 검증은 반드시 다른 주체가 교차검증(공통 맹점 회피). - 애매한 자연스러움만 외부 LLM(GPT/Gemini)에 독립 자문 — 전수 투입은 과함. 5. 채점 시스템 — 임베딩 + 메타데이터 보정 \"가장 어려웠던 기술 문제\"로 쓰기 좋음. 문제: 발화 채점은 cos 유사도(75%)+표면 매칭(25%) 하이브리드인데 임베딩만으론: - \"세련된 정답\"(다른 표현이지만 맞음)을 오답 처리 - \"구조는 비슷한 오답\"을 정답 처리 해결 — 두 종류 메타데이터 주입: - references(패러프레이즈): 정답+모든 references와의 cos 최댓값 사용 → 다르게 답해도 등록된 패러프레이즈와 가까우면 구제(관대). - critical_keywords(핵심어): 핵심어 전부 빠진 구조유사 발화에 점수 상한(cap) → 오답 차단(변별). ★ 한쪽은 위로(구제), 한쪽은 누름(차단). 양방향 보정이 설계 핵심. 안전장치: \"틀린 메타보다 빈 메타가 안전하다.\" - 확신 없는 references는 비움(빈 것도 채점 정상, 구제만 없음). - 부정확한 references는 오답을 정답으로, 부정확한 keywords는 정답을 오답으로 → 생성+교차검증 필수. 6. 실제 디버깅 — STT 포맷 이슈 (플랫폼별 함정) \"플랫폼 차이 미묘한 버그를 어떻게 잡았나\". 구체적이라 신뢰를 줌. 증상: Android에서만 발음 채점이 \"잘 안 들렸어요\"로 깨짐. iOS 정상. 원인: 녹음 라이브러리가 Android에서 raw AAC(ADTS)를 m4a 라벨 붙여 전송. Whisper는 aac 미지원→빈 텍스트. iOS는 실제 m4a라 통과 → 플랫폼별로 다르게 깨짐. 해결: - 백엔드에서 매직바이트로 실제 컨테이너 감지(파일 라벨 안 믿음). - 미지원이면 ffmpeg로 wav(16kHz mono) 변환. - ADTS를 MP3보다 먼저 엄격 검사(0xFF 동기 바이트 충돌 버그도 수정). ★ 교훈: \"클라이언트가 보내는 메타데이터(파일 라벨)를 믿지 말고 실제 바이트로 검증하라.\" 실기기 확인 완료. 7. 배포 전략 — \"짝/의존성\" 관리 릴리스 엔지니어링 감각. 코드만 짜는 게 아니라 배포까지 책임진다는 인상. 서버 배포 vs 앱 빌드 차이: - 백엔드/데이터: git push → Railway 자동 → 즉시 반영. - 프론트(jsx/css): 앱 빌드 필요 → 여러 수정 모아 한 버전(1.0.2)에. ★ 핵심 — \"같이 가야 하는 짝(의존성)\" 관리: 대표 사례: 음원에서 한국어 낭독 제거 ↔ 미리보기 모달 추가 - 이 둘은 반드시 동시에 나가야 함. - 음원만 먼저 빼면 → 기존 사용자는 한국어 안내가 사라지는데 대체 모달도 없음 = UX 훼손. - 배경음 차단과 대조: 배경음은 \"빼기만\" 하므로 짝 없어 서버만으로 처리 가능. intro_kr은 \"빼고 모달로 대체\"라 짝 필수. 말할 포인트: \"각 변경이 독립적인지, 짝으로 묶여야 하는지 구분하는 게 배포 사고의 절반.\" 8. 실전에서 배운 것 — 파이프라인으로 구조적 해결 성장 서사로 쓰기 좋음. 상황: 한 레슨에 대화 2개 합쳐진 걸 독립 레슨으로 분리하니, 분리 쌍의 title·썸네일이 동일 복제되어 화면 구분 안 됨(54쌍, 108개 전부). 잘못 vs 올바른 접근: - ❌ 임시: Railway DB 직접 UPDATE → 다음 migrate 때 덮어써짐. - ✅ 근본: batch 원본 수정→content.py 재조립→migrate 재실행. 소스와 DB 정합성 확보. 스스로 판단해 해결한 것: 분리본(L79~123)이 전부 카테고리 \"기타\"로 떨어지는 버그 발견 → detect_category에 번호−45로 원본 짝 카테고리 물려받는 로직 추가 → \"기타\" 0건. 말할 포인트: \"증상을 DB에서 직접 고치면 편하지만, 단일 소스 원칙을 지키려 파이프라인 위에서 고쳤다. 당장은 손이 더 가도 재현성·정합성 확보.\" 9. 시스템 설계 판단들 (짧게 여러 개) \"이 프로젝트에서 배운 설계 원칙?\"에 던질 카드: - 관심사 분리: 텍스트/음원/삽화를 독립 도메인 파이프라인으로. 각자 생성 도구·비용 구조 달라서. - 비용을 캐시로 흡수: TTS 캐시 키=text+voice+rate. 구조·GAP 변경은 무료 재생성, 새 문장·화자만 과금. 캐시 키 설계로 비용 통제. - 폴백 우선(graceful degradation): lesson_id 없이 요청 와도 에러 없이 기본 채점. 앱 구버전 호환. - 단일 진실원(SSOT): validate.py가 스키마의 정답. 문서와 코드 충돌 시 코드가 이김. - 메인-폴백 DB 이중화: Railway 메인/Neon 폴백. 단 \"migrate가 쓴 DB와 앱이 읽는 DB가 같은지\" 항상 확인(동기화 함정). 10. 예상 질문 & 대비 - \"왜 Capacitor?\" → 개인/소규모로 3플랫폼. 네이티브 성능 필수 아니라 웹뷰로 충분. 단 웹뷰 한계(iOS <audio .volume 무시 등)를 서버 토글로 우회한 경험도. - \"AI가 만든 콘텐츠 품질을 어떻게 믿나?\" → 2층 검수(구조 validate+품질 게이트)+생성/검증 주체 분리+애매한 것만 외부 LLM. \"장면이 보이는가\" 단일 기준. - \"가장 어려웠던 문제는?\" → STT 플랫폼별 포맷(6번) 또는 채점 메타 보정(5번). - \"채점이 틀리면?\" → \"틀린 메타보다 빈 메타가 안전\". 확신 없으면 비워서 오채점 방지. - \"혼자 다 했나/협업은?\" → 역할 분담: 판단·명세·코드는 메인, 대량 생성·검수는 서브에이전트 병렬, 결정·빌드·DB 반영은 사람. 교차검증. - \"규모는?\" → 레슨 124개+(E/L/S 3난이도), iOS 앱스토어 라이브, Android 심사 제출 완료. 11. 30초 / 2분 / 5분 버전 가이드 - 30초: 1번 엘리베이터 피치. - 2분: 1번 + 4번(품질 게이트) + 성과(iOS 라이브/Android 제출). - 5분: 3번(아키텍처)→4번(콘텐츠 파이프라인)→5번 또는 6번(기술 문제 하나)→7번(배포 짝)→9번 원칙 1~2개. 핵심 한 줄 (외워둘 것) \"AI로 콘텐츠를 대량 생성하되 '장면이 보이는 문장'만 통과시키는 2층 품질 게이트를 만들고, 콘텐츠·음원·삽화를 각각의 파이프라인으로 자동화해 웹/iOS/Android 단일 코드베이스로 배포한 오디오 학습 앱. 채점 정확도, 플랫폼별 포맷 버그, 배포 의존성 관리까지 직접 설계·해결.\""}, {"title": "프로젝트 Voyage", "kind": "기술 심화", "url": "doc_31_voyage_techdeep.html", "text": "[문서31] 프로젝트 Voyage — 기술 심화 개요 문서와 짝. \"구체적으로 어떻게 짰나\"를 묻는 기술 질문 대비용. 각 항목은 파일명·라이브러리·구조를 정확히 짚고 \"왜 그렇게 했나\"를 붙임. --- 1. 백엔드 — 프레임워크 선택 FastAPI(Python) 왜: 1. 생태계 통일: 무게중심이 API가 아니라 콘텐츠·채점·음원 파이프라인. LLM SDK, 임베딩(OpenAI), TTS(ElevenLabs), 오디오(pydub)가 전부 Python이라 API 서버도 Python이면 같은 코드에서 파이프라인 호출. 언어 경계 없음. 2. 비동기+타입: async 네이티브라 TTS/외부 API 같은 I/O 바운드에 유리. Pydantic 타입 검증으로 요청/응답 스키마 코드로 강제. 3. 자동 문서화: OpenAPI 스펙 자동 생성(API_SPEC.md). 프론트와 API 계약 맞추기 쉬움. 4. 가벼움: 개인/소규모라 Django처럼 무거운 풀스택은 과함. 라우팅+검증만. ★ 트레이드오프 인지: GIL 때문에 CPU 바운드엔 약함. 근데 무거운 작업(음원 생성)은 런타임 API가 아니라 오프라인 스크립트(generate_all.py)로 분리. Railway 무료 플랜 HTTP 타임아웃(~100초) 안에서 음원 생성 불가 → 생성은 로컬, 결과물만 R2/DB에. 프레임워크 한계를 아키텍처로 우회. 2. 백엔드 — SQL 라이브러리와 DB SQLAlchemy(ORM): - models_db.py: User, Lesson, LearningRecord, Bookmark, Playlist 등. - db.py: 3단 폴백 — DATABASE_URL(Railway 메인)→DATABASE_FALLBACK_URL(Neon 폴백)→로컬 SQLite(dialogue.db). _try_connect로 순서대로 시도. - init_db.py: 테이블 초기화. 왜 ORM: 로컬 SQLite↔운영 PostgreSQL을 코드 변경 없이. 개발 SQLite, 배포 PG로 같은 모델 재사용. 왜 메인-폴백: 운영 DB 장애 대비. ★ 함정: migrate가 쓴 DB와 앱이 읽는 DB가 다르면 \"migrate는 됐는데 앱엔 안 뜸\". 그래서 반영 후 \"앱이 읽는 DB에 직접 COUNT 쿼리\"로 정합성 확인 절차. (이 함정을 안다는 것 자체가 면접 포인트) JSON 컬럼 활용: practice(dialogue 배열)는 정규화 안 하고 PostgreSQL JSON 컬럼에 통째로. 레슨 콘텐츠는 함께 읽고 쓰는 단위라 조인보다 JSON이 단순·빠름. references/critical_keywords 채점 메타도 이 JSON 안에. → ORM vs 생 SQL 경계의 실제 코드는 문서32(DB 접근 전략), 백엔드 파일별 역할 실측은 문서33. 3. 백엔드 — 스키마 설계 콘텐츠 스키마(레슨 JSON) — 단일 진실원: 레슨 하나 = 최상위 9필드(전부 필수, 필드명 변경 금지): id, theme, ambient, situation_tags, lesson_info, practice, expressions, reaction, pronunciation ★ 핵심 설계 결정 3가지: (a) level/category를 데이터에 안 넣음. id 접두어로 migrate가 생성(E/S→A2, L→B1). 이유: 데이터에 박으면 불일치 위험. 접두어에서 파생하면 항상 일관. 기존 DB 불일치 0행 검증. (b) validate.py가 스키마의 \"정답\"(SSOT). 문서와 코드 충돌 시 코드가 이김. 스키마를 문서가 아니라 실행 가능한 검증 스크립트로 강제. 사람 판단보다 신뢰도↑. 규칙 예: expressions 8필드 필수·pattern_examples 정확히 3개·dialogue_examples 2개 / reaction variations 5개·빈칸 1개 / pronunciation chunks 3개 / orphan 검사(참조 문장이 실제 dialogue에 존재) / 쌍둥이 검사(두 레슨 파생탭 md5 100% 동일이면 실패, 복붙 방지) / tag 11종 화이트리스트만. (c) 난이도(E/L/S)는 공통 스키마+개수만 변형. 구조는 전부 같고 dialogue 턴 수와 expr/pron/react 개수만 다름(E·L=10턴 4/3/3, S=5~6턴 2/1/2). 고정 개수(3/2/5/3)는 난이도 무관 동일 → 검증 로직 하나로 3난이도 커버. DB 스키마(운영): lessons 테이블 — id, level, category, title, practice(JSON), quality_score(INT), quality_grade(TEXT), quality_detail(JSON). level/category는 migrate가 접두어로 채움. quality_score는 별도 채점 파이프라인. 4. 백엔드 — 주요 파일 구성 구성 원칙: - core=외부 연동(TTS,R2,캐시) / services=우리 도메인 로직(콘텐츠,채점,음원 합성). 외부 의존과 내부 로직 분리. - 런타임(main.py) vs 오프라인 스크립트(generate_all/migrate) 분리. 무거운 배치는 API에서 빼서 스크립트로. Railway 타임아웃 회피+관심사 분리. - content.py=콘텐츠 단일 소스. DB는 파생물. 항상 batches JSON→content.py→migrate→DB로만. ★ 실측(문서33): content.py는 49k줄로 전체 코드의 88%(로직 아니라 데이터). 런타임 라우트는 main.py 단 하나(47개). 미참조 레거시 5개(pm6r_builder 등)는 PM6R/Dialogue 초기 설계 잔재로 인지 중. 주요 API: GET /api/lessons(목록) / GET /api/lesson/{id}(상세) / GET /api/stats(통계) / POST /api/session/start·complete / GET /audio/{hash}.mp3(캐시 음원) / POST /api/users/sync(Supabase JWT 검증, 여기서만). 5. 프론트 — 프레임워크 선택과 구성 React+Vite+Capacitor 왜: - React+Vite: 컴포넌트 UI, Vite로 빠른 개발/빌드. 외부 UI 라이브러리 없이 순수 CSS+SVG(번들 경량화, 완전한 제어). - Capacitor: 웹 코드를 그대로 iOS/Android 네이티브로 감쌈. 하나의 코드베이스로 3플랫폼. 네이티브 성능 필수 아니라 웹뷰로 충분. 모바일 빌드는 --mode mobile로 분기(.env.mobile). ★ 트레이드오프: 웹뷰 한계 — iOS WebView는 <audio .volume 무시. \"볼륨을 오디오 파일에 미리 구워넣고 코드에선 volume=1.0\"로 우회(8번). 웹뷰 선택의 대가를 알고 대응. 프론트 파일 구성: 구성 원칙: - 컴포넌트마다 .jsx+.css 쌍 — 스타일 지역화, 전역 오염 방지. - utils/api.js에 API_BASE 중앙관리+apiFetch 래퍼 — API 호출 단일화(인증 헤더, 베이스 URL). 컴포넌트가 fetch 직접 안 부름. - utils에 관심사별 유틸 분리 — 녹음/STT/배경음/이미지 매핑을 각 파일로. 6. 플레이어 구현(Player.jsx) — 가장 기술적 \"오디오 학습 앱의 심장을 어떻게 구현했나\". 깊게 물으면 여기. 타임라인 기반 재생: 음원 합성 시 만든 timeline.json을 따라 재생: { lesson_id, title, duration_sec, events[] }, events: { type, label, tab, time_ms, time_sec } - 이벤트 타입: intro_en, memorization, reflection, rehearsal, speed, retrieval, prompt, reaction, pron_chunk 등. - 플레이어는 오디오 파일 하나를 재생하며 현재 시각(time)에 맞는 이벤트를 찾아 화면 하이라이트·탭 전환·단계 표시. 단계 구조가 음원·타임라인에 이미 박혀 나오므로 프론트는 \"지금 어디쯤인지\"만 따라감. 3개 독립 오디오 ref — 동시 재생/부분 정지 (핵심 설계): - audioRef: 메인 대화 음성(TTS 학습). 서버 캐시에서 서빙. - bgAudioRef: 리듬 비트(reflection_bg.wav). Reflection(리듬 느끼기) 단계 전용. - ambientAudioRef: 테마 배경음(ambient/ .mp3). +ambientTimerRef(페이드 타이머, 중복 방지). → 셋을 별도 볼륨/재생 제어 → 동시에 겹쳐 재생하거나 일부만 멈춤(메인 대화 위에 리듬 비트 얹기). 상태 전환 처리(구현 디테일): - 마운트 시 bg/ambient 볼륨 0 초기화 → 갑작스런 큰 소리 방지. - Reflection 진입 시: 비트 켜되 500ms 가드(진입 후 500ms 뒤에도 여전히 Reflection이어야 재생, 빠르게 지나가는 단계에서 비트 깜빡임 방지). 볼륨 페이드인. - Reflection 이탈/탭 이동 시: 비트 페이드아웃→pause+currentTime=0. 비트는 리듬 단계 전용. - 탭 구조: practice/reaction/pronunciation/expressions. ★ 설계 포인트: \"오디오 상태 전환은 race condition이 잘 남. 500ms 가드, 페이드 타이머 중복 방지, 마운트 시 볼륨 0 초기화 — 전부 '의도치 않은 소리/끊김'을 막는 방어 코드.\" 7. 학습 설계가 코드에 박힌 부분 (GAP 상수) 플레이어와 음원 합성이 공유하는 타이밍 설계. \"왜 이 숫자?\"에 답할 수 있으면 강함. 음원 합성(audio_pipeline.py) 단계별 무음 간격: - GAP_REHEARSAL=6000ms: 떠올려 말하기(인출) 대기. 학습자가 답을 스스로 떠올릴 시간. ★ 학습 설계 핵심이라 건드리면 안 되는 값. - GAP_RETRIEVAL=500ms: 반사적으로 말하기 대기. - GAP_ECHO_MEMORIZATION=2200ms: 따라 말하기 대기. - 단계별 재생 속도: 따라하기 -10%, 빠르게 +20%, 발음 -15%(더 천천히). ★ 면접 포인트: \"무음의 길이가 학습 효과를 결정. 6초 인출 대기는 '능동적 회상(active recall)'을 강제하는 장치. 학습 원리를 오디오 타이밍에 녹였다.\" 8. 개발 난점 (실제로 겪고 해결) \"어려웠던 점\"에 던질 카드. 구체적일수록 신뢰. 난점1 — iOS WebView가 볼륨 무시: - 문제: iOS WebView는 <audio .volume 무시. 3개 오디오 코드 믹싱 볼륨 밸런스가 iOS에서 다 100%로 터짐. - 해결: 볼륨을 오디오 파일에 미리 구워넣고(메인 -21dB, 비트 -28dB, ambient -43dB) 코드에선 volume=1.0. 웹뷰가 못 건드려도 파일 자체 음량으로 밸런스. - 교훈: 플랫폼이 API를 무시할 수 있다. 제어권 없으면 데이터(파일) 쪽으로 옮긴다. 난점2 — STT 포맷 플랫폼별 불일치: - Android가 raw AAC를 m4a 라벨로 전송→Whisper 실패. 매직바이트로 실제 컨테이너 감지+ffmpeg 변환. \"라벨 말고 바이트를 검증.\" 난점3 — 랜덤 비트 파일 HTTP 416: - 문제: 크기 다른 비트 파일들(9MB vs 2MB)을 한 URL로 랜덤 응답→<audio loop 가 Range 재요청 중 파일 바뀌어 416(Range Not Satisfiable)→재생 뭉개짐. - 시도: no-store, 302 리다이렉트 다 실패. - 해결: 단일 비트로 복귀. 여러 파일을 한 URL로 서빙하려면 크기/길이/포맷 통일하거나 프론트에서 URL 고정. - 교훈: <audio Range 요청은 파일이 불변이라 가정. 서빙 계층에서 이 가정을 깨면 안 됨. 난점4 — 정적 오디오 서빙 경로 착각: - 문제: 비트/ambient를 backend/app/static에 뒀는데 서버가 안 봄. - 원인: STATIC_DIR이 frontend/dist(Railway가 vite build로 public→dist 복사). 정답 경로는 frontend/public/audio. backend/static은 레거시 폴백. - 교훈: 빌드 파이프라인이 파일을 어디로 옮기는지 모르면 \"분명 넣었는데 없다\"에 빠짐. 난점5 — 모바일 비트 진입 끊김 (미해결로 정직하게): - 리듬 단계 바로 진입 시 모바일에서 비트가 잠깐 들리다 끊김(웹 정상). 추정: WebView 오디오 디코드 지연+진입 즉시 play 경합. → 정직하게 \"아직 해결 못 한 이슈\"로 말할 수 있음(모르는 걸 안다고 안 하는 태도가 오히려 신뢰). 난점6 — 콘텐츠 정합성(DB 직접수정 함정): - 레슨 분리 후 title 중복(54쌍). DB 직접 UPDATE는 다음 migrate 때 덮어써짐→소스(batch)부터 고쳐 파이프라인 재실행으로 근본 해결. \"단일 소스 원칙 지키려 당장 손 더 가는 길을 택함.\" 9. 예상 기술 질문 대비 - \"왜 ORM? 생 SQL은?\" → 로컬 SQLite↔운영 PG 무변경 전환, 모델 재사용. 복잡 쿼리(정합성 검증)는 생 SQL도 병행. - \"practice를 왜 JSON 컬럼에?\" → 함께 읽고 쓰는 단위라 조인보다 단순·빠름. 채점 메타도 같이. - \"level을 왜 데이터에 안 넣나?\" → 접두어에서 파생 생성→항상 일관. DB 검증으로 불일치 0행. - \"플레이어에서 오디오 3개를 어떻게 관리?\" → 3개 독립 ref, 별도 볼륨/재생 제어. 500ms 가드·페이드 타이머로 경합 방어. - \"timeline.json의 역할?\" → 음원에 단계 구조를 박아 생성→프론트는 시각만 따라가며 하이라이트/탭전환. - \"가장 까다로웠던 버그?\" → STT 포맷(매직바이트) 또는 iOS 볼륨(파일에 구워넣기). - \"Capacitor 성능 이슈는?\" → 웹뷰 한계 있음(볼륨 무시 등). 필요한 곳만 파일/네이티브로 우회. 무거운 작업은 오프라인 스크립트로. - \"테스트는?\" → test_scoring.py, test_meta_regression.py — 채점 로직 회귀 테스트. 핵심 한 줄 \"백엔드는 파이프라인 생태계 통일 위해 FastAPI+SQLAlchemy(Railway PG 메인/Neon 폴백/SQLite 로컬), 콘텐츠는 batch→content.py→migrate→DB 단일 소스로만 흐르며 validate.py가 스키마 강제. 프론트는 React+Vite+Capacitor 단일 코드베이스, 플레이어는 timeline.json 따라 3개 독립 오디오 ref를 경합 방어하며 재생. iOS 볼륨 무시·STT 포맷·HTTP 416 같은 웹뷰/서빙 함정을 직접 진단·해결.\""}, {"title": "프로젝트 Voyage", "kind": "DB 접근 전략", "url": "doc_32_voyage_dbaccess.html", "text": "[문서32] 프로젝트 Voyage — ORM & 생 SQL (DB 접근 전략) 문서31의 \"왜 ORM?\" 질문에 대한 실제 코드 기반 답변. 핵심 서사: ORM이 기본, 생 SQL은 명확히 두 경우(DDL·헬스체크)에만. 경계가 일관된 게 강점. --- 핵심 한 줄 \"애플리케이션의 모든 CRUD·조회·집계는 SQLAlchemy ORM으로, 생 SQL은 ORM이 다루기 힘든 DDL(ALTER TABLE 컬럼 추가)과 연결 헬스체크(SELECT 1)에만 국소적으로 썼다. '데이터는 ORM, 스키마 변경은 생 SQL'이라는 경계가 코드 전체에서 일관된다.\" 1. 왜 ORM을 기본으로? - 로컬 SQLite↔운영 PostgreSQL 무변경 전환. 같은 모델(models_db.py)로 개발은 SQLite, 배포는 PG. 방언 차이를 ORM이 흡수 → 코드 한 벌로 두 DB. - 관계는 relationship(back_populates)으로 선언 → 명시적 .join() 없이 FK 기반 조인을 ORM 관계에 위임. lazy-load로 필요 시 로드. - 타입 안전·가독성. db.query(User).filter(User.id == uid).first()가 SQL 문자열보다 명확. ORM 대표 3패턴(실제 코드): - 단순 조회(main.py:790): db.query(User).filter(User.id == user_id).first() — PK 단건, 없으면 None. 가장 흔함. - 복합 필터+정렬(main.py:303): user_id+날짜 범위( =, <)를 복합 필터 → .order_by(started_at.asc()).all() 체인. 집계도 ORM .count()(main.py:1006). - 쓰기(main.py:1291): ScheduleEntry(...) → db.add → db.commit → db.refresh(autoincrement id 회수). 쓰기 전 ORM으로 중복 확인까지. 2. 생 SQL은 정확히 두 경우만 (a) 연결 헬스체크 — db.py:45 with eng.connect() as conn: conn.execute(text(\"SELECT 1\")) Railway(메인)→Neon(폴백) 폴백 로직에서 \"이 DB URL이 살아있나\" 판정용 최소 쿼리. ORM 모델과 무관한 순수 커넥션 테스트라 text()가 자연스러움. (b) 런타임 스키마 마이그레이션(DDL) — init_db.py / migrate_content.py stmts = [\"ALTER TABLE users ADD COLUMN avatar VARCHAR(40)\", ...] if is_pg: stmts = [s.replace(\"ADD COLUMN\", \"ADD COLUMN IF NOT EXISTS\") for s in stmts] for s in stmts: try: conn.execute(text(s)); conn.commit() except: conn.rollback() SQLite: 이미 있으면 무시 ★ 왜 생 SQL? Base.metadata.create_all()은 없는 테이블만 만들고 기존 테이블에 새 컬럼은 안 붙인다. Alembic 도입하기엔 규모가 작아 가볍게 DDL 직접 실행. PG는 IF NOT EXISTS, SQLite는 예외 무시로 방언 차이까지 흡수. lessons 테이블의 코칭·삽화 컬럼 사후 추가(migrate_content.py:88)도 같은 구조·이유. 3. 혼용 지점 — 한 흐름에서 역할 분담 migrate_content.py가 대표적. 같은 마이그레이션 실행 안에서: 1. 생 SQL(DDL): ensure_columns()가 ALTER TABLE ADD COLUMN — 스키마 보강 2. ORM(DML): upsert 루프 — db.query(Lesson).filter(...).first()로 조회, 있으면 setattr 업데이트 / 없으면 db.add, --reset이면 db.query(Lesson).delete() 3. ORM 검증: db.query(Lesson).count()로 건수 확인 → 컬럼 존재 보장(생 SQL) → 행 upsert(ORM) → 건수 카운트(ORM) 순. DDL만 생 SQL, 데이터·검증은 ORM이라는 경계가 한 파일 안에서도 지켜짐. init_db.py도 유사: create_all()(ORM 메타)+ensure_user_columns()의 ALTER(생 SQL) 연달아 호출. 4. 정합성 검증은 어떻게? - DB 레벨: 생 SQL COUNT 비교는 없음. ORM .count()로 대체(migrate_content.py:225 등). - 콘텐츠 레벨: DB가 아니라 파일/모델 단계에서 파이썬 assert로 검증(예: assert len(LESSONS)==108, 삽화 업로드 시 중복/누락 ID 검사). SQL 정합성이 아니라 파이프라인 입력 검증. - 결론: \"생 SQL 정합성 쿼리\"는 없음. 정합성 = ORM .count() + 파이썬 assert. 5. 예상 질문 대비 - \"왜 전부 ORM 안 쓰고 생 SQL을 섞었나?\" → ORM은 기존 테이블에 컬럼 추가(ALTER)를 안 해준다. Alembic은 규모 대비 과해서 DDL만 생 SQL로 가볍게. 데이터 조작은 전부 ORM. - \"왜 Alembic을 안 썼나?\" → 개인/소규모라 컬럼 몇 개 추가에 Alembic은 오버. IF NOT EXISTS+예외 무시로 멱등하게. 규모 커지면 Alembic 전환이 맞다(트레이드오프 인지). - \"조인은?\" → 명시적 .join() 대신 relationship(back_populates)으로 선언, 필요 시 lazy-load. - \"생 SQL 인젝션 위험은?\" → 생 SQL은 전부 하드코딩된 DDL 문자열(사용자 입력 안 들어감). 사용자 입력 닿는 경로는 100% ORM이라 파라미터 바인딩으로 안전. 핵심 요약 ORM 기본 / 생 SQL은 DDL·헬스체크 한정. 경계가 일관됨. 관계는 relationship에 위임, 정합성은 ORM count+assert. SQLite↔PG 무변경이 ORM 채택의 실질 이유, DDL 한계가 생 SQL의 이유."}, {"title": "프로젝트 Voyage", "kind": "백엔드 파일 분류", "url": "doc_33_voyage_backendfiles.html", "text": "[문서33] 프로젝트 Voyage — 백엔드 파일 역할 분류 문서31의 파일 구성을 실제 코드로 검증·분류. 전체 37개 .py / 55,730줄. ★ 문서31과 다른 발견: 미참조 레거시 5개, content.py가 전체의 88%(데이터). --- 핵심 한 줄 \"FastAPI 라우트를 가진 파일은 main.py 단 하나. 나머지는 라이브러리 모듈 아니면 오프라인 스크립트. 런타임 표면적은 작고(main+조회/채점/음원/STT+core), 코드의 88%(content.py 49k줄)는 '로직'이 아니라 콘텐츠 데이터. batches→content.py→migrate→DB→content_db 단방향 흐름.\" A. 콘텐츠 생성 / 데이터 파이프라인 (오프라인) - services/content.py (49,042줄): 콘텐츠 원본 데이터 배열(대사·표현·발음·리액션). 런타임 미로드, migrate 소스. - migrate_content.py (235): content.py→lessons 테이블 upsert(ALTER 생SQL+ORM add/update). - generate_all.py (241): 음원 배치 자동생성(TTS→믹싱→timeline). - push_quality_scores.py (71): 채점 결과(json)를 DB 반영. - rebuild_reaction/fix_pronunciation/fix_reaction (346/84/85): E시리즈 포맷 변환·재구성. - upload_existing_audio/upload_illustrations (160/121): 음원·삽화 R2 일괄 업로드. - generate_card_webp (94): 삽화 WebP 변형+LQIP blur 생성. - regen_illustrations_32/regen_swap/crop_replace (104/104/107): 삽화 재생성·crop·R2 교체. - insert_sample_records (121): 학습 달력 테스트용 샘플 DB 삽입. ★ content.py 49,042줄 = 전체 코드의 88%. 면접에서 반드시 \"이건 로직이 아니라 데이터\"라고 명확히. \"코드 5.5만 줄\"이 아니라 \"데이터 소스가 대부분, 실제 로직은 작다.\" B. 런타임 — 라우팅 + 비즈니스 로직 - app/main.py (1,676): 유일한 FastAPI 앱. 47개 엔드포인트(음원 서빙, 레슨 조회, 채점 /api/score, STT, 유저 동기화, 통계/스트릭, 북마크/플레이리스트/스케줄/메모/노트/프로필). - api.py (3): from app.main import app — 배포 진입점(ASGI). - services/content_db.py (103): 런타임 콘텐츠 조회 계층. lessons 테이블→dict. main.py가 content.py 대신 이걸 씀. - services/scoring.py (235): 발화 채점(표면유사도+코사인+키워드 cap). STT 벤더와 분리. - services/audio_pipeline.py (655): 7단계 학습 음원 파이프라인(화자 보이스 매핑, timeline 빌드). - services/share_page.py (288): /s/{lesson_id} 공유 페이지 HTML 렌더. ⚠️ 미참조 레거시 (코드 확인됨 — 정직하게 말할 카드) - services/session_builder.py (71): 어디서도 import 안 됨 → 초기 Dialogue 설계 잔재. - services/pm6r_builder.py (256): 미참조 → audio_pipeline으로 대체된 듯. - services/db_service.py (86): 미참조 → 초기 Dialogue 모델용 레거시. C. 외부 연동 / 인프라 (core) - core/tts_service.py (228): ElevenLabs TTS 래퍼+캐시. - core/r2_storage.py (115): Cloudflare R2(S3호환) 업로드/URL/존재확인. - services/stt_client.py (137): OpenAI Whisper STT+임베딩(컨테이너 sniff, ffmpeg wav 변환). - app/db.py (79): DB 엔진 — Railway PG 주/Neon 폴백/SQLite 로컬. - app/models_db.py (202): SQLAlchemy 모델 14종. - app/init_db.py (43): create_all+ALTER 컬럼 보강. - core/models.py (110): dataclass/Enum 도메인 타입. - core/cache.py (2): TTSService 재-export shim. ★ 벤더 격리: tts_service/r2_storage/stt_client가 외부 API를 각각 얇은 래퍼로 분리. \"벤더 교체 시 이 파일만 갈아끼운다\"는 설계. scoring도 STT 벤더와 분리. D. 유틸 (보조 — 현 런타임 연결 불명확) - core/chunker.py (95): 문장→청크 분할. 레거시 빌더만 사용. - core/templates.py (108): 학습 스텝 템플릿. 참조처 없음 → 레거시. - utils/mixer.py (32): TTS+BGM 믹싱(pydub). import 안 됨 → 오프라인/잔재. E. 오프라인 스크립트 / 테스트 - test_scoring.py (67): 채점 곡선 검증(실 임베딩으로 점수 분포). - test_meta_regression.py (115): 메타 채점 회귀 테스트(메타 ON/OFF 비교). - _check_step2.py (102): 콘텐츠 검증(레슨 108개, practice 키, assert). content.py 직접 로드하는 유일한 곳. 면접 포인트 (이 분류에서 나오는 이야기) 1. 런타임 표면적은 작다. 실제 서버가 도는 코드는 main.py+content_db/scoring/audio_pipeline/share_page/stt_client+core(tts/r2/db/models). content.py(49k)는 데이터 소스. → \"코드량\"이 아니라 \"런타임에 실제 도는 것\"으로 규모를 말하는 게 정확. 2. 벤더 격리 설계. 외부 API(TTS/STT/R2)를 각각 얇은 래퍼로. 교체 시 그 파일만. 3. 데이터 흐름 단방향. batches/ .json→content.py→migrate→DB→content_db(런타임 조회). DB 직접 수정 안 함(SSOT). 문서30·31의 원칙과 코드가 일치. 4. 레거시 잔재를 정직하게. pm6r_builder·session_builder·db_service·templates·mixer는 현 런타임 미참조. 초기 \"PM6R/Dialogue\" 설계가 현재 audio_pipeline+lessons 테이블로 전환된 흔적. → 물으면 \"구조 전환의 흔적, 정리 대상으로 인지하고 있다\"로 답하는 게 오히려 신뢰(모르는 척하거나 \"다 쓴다\"고 하면 역효과). 핵심 요약 main.py 단일 FastAPI(47라우트). content.py는 88%가 데이터. 런타임=조회/채점/음원/STT+core. 외부 API는 얇은 래퍼로 벤더 격리. 흐름은 batch→content→migrate→DB→content_db 단방향. 미참조 레거시 5개는 PM6R/Dialogue 초기 설계의 잔재로 인지 중."}, {"title": "프로젝트 Voyage", "kind": "스택 심화", "url": "doc_37_voyage_stackdeep.html", "text": "[문서37] 프로젝트 Voyage — 백엔드/기술 스택 상세 기술 스택 + 구현 방법 구체 정리. 라이브러리 일반 동작(검증) + 프로젝트 특유 내용 결합. ★ 집중 환기용 원자료. --- 1. 기술 스택 전체 지도 백엔드 - 언어/프레임워크: Python + FastAPI (async 네이티브, Pydantic 타입검증, OpenAPI 자동문서) - ORM/DB: SQLAlchemy + PostgreSQL (Railway 메인 / Neon 폴백 / 로컬 SQLite) - TTS(음성합성): ElevenLabs(고음질 유료) + edge-tts(무료 폴백) - STT(음성인식): OpenAI Whisper API + 임베딩(text-embedding)으로 채점 - 오디오 처리: pydub(믹싱·볼륨·페이드), ffmpeg(포맷 변환) - 스토리지: Cloudflare R2(S3 호환) — 음원 파일 저장, 백엔드는 302 리다이렉트 - 인증: Supabase Auth(이메일 OTP, JWT) - 배포: Railway(백엔드, git push 자동배포) 프론트엔드 - React + Vite (컴포넌트 UI, 빠른 빌드, 외부 UI 라이브러리 없이 순수 CSS+SVG) - Capacitor — 웹 코드를 iOS/Android 네이티브로 감싸는 크로스플랫폼 런타임 - 상태: React hooks (useState 등), 전역 상태 라이브러리 최소화 핵심 설계 축 - 콘텐츠 단일 소스(SSOT): batches/ .json → content.py → migrate → DB → 런타임 조회 - 텍스트/음원/삽화를 독립 파이프라인으로 분리 (생성도구·비용구조가 달라서) - 런타임(main.py)은 가볍게, 무거운 생성(음원)은 오프라인 스크립트로 2. TTS — ElevenLabs에서 무엇을 가져오나 ElevenLabs 역할: 대화문(dialogue) 텍스트를 실제 사람 같은 음성으로 합성. 학습 음원의 메인 화자 목소리를 여기서 가져온다. - 입력: 텍스트 + voice_id(화자별 목소리 ID) + 설정(속도 등) - 출력: mp3 오디오 바이트 - 화자 매핑: 대화에 여러 화자(예: CUSTOMER/BARISTA)가 있으면 각 화자에 다른 voice_id를 매핑 → 대화가 실제 두 사람 대화처럼 들림. (audio_pipeline이 화자→voice_id 매핑 관리) - 캐시: 같은 (텍스트 + voice + rate)면 재생성 안 하고 캐시 재사용 → API 비용 통제. 캐시 키 = text+voice+rate 해시. 구조·간격(GAP) 변경은 무료(캐시 히트), 새 문장·새 화자만 과금. 왜 ElevenLabs? 영어 학습은 발음·억양 품질이 핵심 → 고음질 우선. 단 비용이 있어 캐시로 흡수. 3. edge-tts — 음원을 어떻게 생성하나 edge-tts 역할: Microsoft Edge 브라우저의 온라인 TTS 서비스를 Python에서 API 키 없이 쓰는 무료 라이브러리. ElevenLabs의 비용 부담을 줄이는 폴백/보조 TTS. 동작 원리 (검증됨): - Edge가 내부적으로 쓰는 클라우드 음성(neural voices)을 그대로 호출. Edge 브라우저나 Windows 설치 불필요, API 키 불필요. - 내부적으로 Microsoft 음성 서비스에 WebSocket(WSS)으로 연결해 스트리밍 합성. - 비동기(async) API라 배치 처리·웹 백엔드에 적합. - 사용법: edge_tts.Communicate(text, voice, rate) → .save(output.mp3). - 음성은 locale+voice명으로 선택(예: en-US-AndrewNeural). rate/volume/pitch 조절 가능 (예: --rate=-50% 느리게). 자막(SRT/VTT)도 같이 출력 가능. 트레이드오프: 무료·경량·빠름·고음질이지만, MS 서비스 의존이라 과도 사용 시 차단 위험. 그래서 메인은 ElevenLabs, edge-tts는 보조. 4. pydub — 언제 쓰이나 pydub 역할: 파이썬 오디오 처리 라이브러리(내부적으로 ffmpeg 사용). Voyage에서는 여러 음원을 하나로 합성·타이밍 조립할 때 쓴다. 구체적 용도: - 볼륨 조절: 메인 대화·리듬 비트·배경음의 음량을 각각 다르게 (dB 단위). iOS WebView가 <audio .volume을 무시하는 문제 때문에 볼륨을 파일 자체에 구워넣음(메인 -21dB, 비트 -28dB, ambient -43dB). 코드에선 volume=1.0이어도 파일 음량으로 밸런스가 맞음. - 무음(silence) 삽입: 학습 단계별 대기 시간을 무음으로 넣음. 예: 떠올려 말하기 6초 대기 → 그만큼의 무음을 오디오에 삽입. (아래 7단계 참고) - 믹싱/페이드/ducking: 배경음 위에 대화를 얹고, 페이드인/아웃 처리. - 이어붙이기(concat): 여러 TTS 조각 + 무음 + 비트를 순서대로 합쳐 한 레슨 음원 완성. 즉 pydub은 음원 \"합성·편집\" 단계에서 쓴다(생성은 TTS, 편집은 pydub). 5. Whisper — 음성 인식 후 어떻게 평가하나 (채점 프로세스) STT 단계 (stt_client.py): 1. 사용자가 마이크로 문장을 말함 → 녹음 파일이 백엔드로 전송. 2. 컨테이너 sniff: 파일 라벨(m4a 등)을 믿지 않고 매직바이트로 실제 포맷 감지. (안드로이드가 raw AAC를 m4a 라벨로 보내는 버그 대응) 3. Whisper 미지원 포맷이면 ffmpeg로 wav(16kHz mono) 변환. 4. OpenAI Whisper API로 음성 → 텍스트(전사, transcription). 채점 단계 (scoring.py) — 하이브리드 방식: - 의미 유사도(코사인, 약 75%): 사용자 발화와 정답 문장을 각각 임베딩(벡터화)해 코사인 유사도 계산. 표현이 달라도 의미가 가까우면 높은 점수. - 표면 매칭(약 25%): 단어·문자열 표면 일치도. - 메타데이터 보정 (양방향): - references(패러프레이즈): 정답 + 등록된 모든 패러프레이즈와의 코사인 최댓값 사용 → 다르게 말해도 등록된 표현과 가까우면 구제(관대). \"정답을 오답 처리\"하는 실수 방지. - cri
