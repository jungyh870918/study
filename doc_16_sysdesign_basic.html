제 시간에 못 받음(백엔드 느림) ★ 401 vs 403: 인증(누구냐) vs 인가(권한). 면접 단골. ★ 502 vs 504: 백엔드가 죽었나(502) vs 살았는데 느린가(504). 트러블슈팅 방향이 다름. 경험 서술: \"리버스 프록시 뒤 WAS가 OOM으로 죽어 502가 떴고, 헬스체크+오토스케일로 대응.\" --- 2. API 통신 디버깅 — 개발자 관점 (응답이 안 오거나 이상할 때) 두 방향: (A)내가 클라이언트 (B)내가 서버. 접근이 다름. A. 클라이언트 입장 \"왜 응답이 안 오지/이상하지?\" 첫 원칙: 머릿속 코드 말고 \"실제 나간 요청\"부터 눈으로 봐라. 1) 브라우저 개발자도구 Network 탭: - 상태 코드부터. 4xx=내 요청 잘못(내 코드), 5xx=서버 잘못(서버 로그), CORS/요청 안 뜸=브라우저가 막음, pending 멈춤=타임아웃. - 실제 Request URL/Headers/Payload/Response 확인. \"보낸다고 생각한 것\" vs \"실제 보낸 것\"이 다른 게 대부분. 2) curl/Postman으로 코드 밖에서 재현(격리): curl -v -X POST url -H \"Content-Type: application/json\" -H \"Authorization: Bearer $TOKEN\" -d '{...}' - curl 되는데 내 코드 안 됨 → 내 코드가 요청 잘못 생성(헤더 누락/직렬화/인코딩) - curl도 안 됨 → 서버 문제거나 스펙 자체가 틀림 → API 문서 확인 - 개발자도구 \"Copy as cURL\"로 그대로 복제(필수 팁). -v로 헤더·TLS까지 다 보임. 3) 상태 코드별 분기: 400=payload/Content-Type/필수필드 / 401=토큰 만료·누락 / 403=권한 / 404=URL·버전 / 405=메서드 / 422=유효성 / 429=rate limit / 5xx=내 문제 아님(서버 로그) / 타임아웃=과부하·타임아웃 설정 4) 그래도 모르면 API 문서(요청 스펙 대조, 4xx는 대개 여기 답)→요청/응답 로깅(axios/fetch 인터셉터로 전체 남김). B. 서버 입장 \"내 서버가 응답을 제대로 못 주네?\" 첫 원칙: 요청이 도달했는지, 어디까지 실행됐는지 로그로 추적. 1) 요청이 들어오긴 했나: 액세스 로그 확인. 안 찍힘→요청이 서버까지 못 옴(라우팅/방화벽/포트=아래 인프라 진단) or 리버스 프록시에서 막힘. 찍힘→서버 안 문제. 2) 어디서 터졌나: 애플리케이션 에러 로그+스택 트레이스(몇 번째 줄/어느 함수). 500이면 반드시 원인 예외가 로그에. \"500 떴다\"만 보지 말고 스택을 봐라. 3) 자주 터지는 서버측 원인: - DB 연결/쿼리(커넥션 풀 고갈, 느린 쿼리, 타임아웃) - 외부 API 호출 실패(내가 부른 서비스가 죽음/느림→내 응답도 지연, circuit breaker 없으면 연쇄 장애) - Null/직렬화 오류(예상 못 한 데이터 형태) - 타임아웃 체인(클라 타임아웃 < 내 서버가 DB/외부 기다리는 시간) - 예외 삼킴(try-catch로 먹어 로그에 안 남음=조용히 실패, 최악) 4) 재현·격리: 로컬에서 같은 요청 재현(되면 환경 문제, 안 되면 코드 문제). 요청 ID(correlation ID)로 클라~서버~DB 관통 추적(MSA 필수). 두 관점 가르는 핵심 응답 이상 → 상태 코드? 4xx=내 요청(클라 코드/API 문서), 5xx=서버(로그/스택), 응답 없음=도달 여부부터(액세스 로그 or 인프라 진단). 한 문장: \"상태 코드로 클라(4xx)냐 서버(5xx)냐 가르고, curl로 코드 밖 재현해 격리. 클라면 실제 나간 요청을 Network/로그로 API 문서와 대조, 서버면 액세스 로그로 도달·에러 로그 스택으로 터진 지점 추적.\" --- 3. 네트워크/인프라 진단 (요청이 서버까지 도달 안 할 때) 정의: 위 B-1에서 '요청이 안 찍힘'이면 이 인프라 계층 진단으로. 계층을 좁혀 범인 격리. 표준 순서: 1) 로컬 인터페이스 살았나 → ip addr , ip link 2) 게이트웨이까지 가나 → ping <gateway 3) 외부 IP까지 가나 → ping 8.8.8.8 (L3 확인) 4) DNS 되나 → nslookup google.com / dig google.com (IP는 되는데 도메인 안 되면 DNS 문제) 5) 경로 어디서 끊기나 → traceroute <host / mtr <host 6) 포트 열렸나 → telnet <host 443 / nc -zv <host 443 (L4) 7) 서비스 응답하나 → curl -v https://<host (L7, TLS+HTTP) 8) 내 서버가 리슨 중인가 → ss -tlnp 9) 방화벽 확인 → iptables -L / 보안그룹 핵심 감별: - ping 8.8.8.8 OK + nslookup 실패 → DNS 문제 - ping OK + telnet 포트 실패 → 방화벽/서비스 다운(L4) - 포트 OK + curl TLS 실패 → 인증서/TLS(L6) - curl 200 → 네트워크 정상, 앱 로직 문제(L7) 경험 서술: \"IP는 되는데 도메인만 안 돼서 DNS 리졸버 문제로 좁혔고, resolv.conf의 네임서버가 죽어있었다.\" --- 4. ping 사용법/경험 정의: ICMP Echo로 생존 확인 + RTT 측정. 명령어: - ping google.com — 기본 - ping -c 4 host — 4번만 - ping -i 0.2 host — 0.2초 간격 - ping -s 1472 -M do host — MTU 테스트(DF 켜고 큰 패킷). 실패하면 MTU 초과 지점 탐색 - ping -f host — flood(부하 테스트, root) 읽는 법: - time=xx ms → RTT. 튀면 지연/혼잡 - 패킷 손실 % → 손실 있으면 링크 불안정 - Request timeout → 도달 실패 or ICMP 차단 - 주의: ping 실패 ≠ 서비스 다운(ICMP만 막았을 수도) 경험 서술: \"간헐적 지연 민원에 ping으로 손실률·RTT 모니터링 걸어 특정 시간대 패킷 손실 확인 → 스위치 포트 이상 발견.\" MTU 실전: ping -s <size -M do 로 크기 올리며 안 되는 지점 찾아 실질 MTU 역산 → MSS 조정. --- 5. 웹서버 셋업 경험 (Nginx 기준) 정의: Nginx = 리버스 프록시 + 정적 서빙 + TLS 종료 + 로드밸런싱. 기본 구성 요소: - server 블록: 도메인(server_name), 포트(listen 443 ssl) - location 블록: 경로별 라우팅 - proxy_pass: 뒤 WAS로 전달(리버스 프록시) - ssl_certificate / ssl_certificate_key: 인증서(TLS 종료) - upstream: 백엔드 풀(로드밸런싱) 핵심 설정 감각: - 정적 파일은 Nginx가 직접, 동적은 proxy_pass로 WAS(gunicorn/uvicorn/tomcat) - gzip 압축, 캐시 헤더, keepalive_timeout - 502 나면 → 뒤 WAS 죽음/포트 불일치. 504 나면 → proxy_read_timeout 늘리거나 WAS 최적화 - Let's Encrypt(certbot)로 무료 인증서 자동 갱신 경험 서술: \"Nginx 리버스 프록시로 TLS 종료하고 뒤 3대 WAS에 least_conn 로드밸런싱, certbot으로 인증서 자동 갱신 구성. 502 알람에 헬스체크 추가.\" --- 6. SSH 통신 경험 (심화) 정의: SSH = 신뢰 못할 네트워크 위 암호화된 원격 셸/터널. 포트 22. TLS와 구조 유사(키 교환→세션키→대칭키 암호화). 접속 시 벌어지는 일: 1) TCP 3-way(22) 2) 버전·알고리즘 협상 3) 키 교환(DH)→세션키(이후 암호화) 4) 서버 인증(host key ↔ known_hosts) 5) 사용자 인증(공개키/비번) 6) 채널 열림 ★ known_hosts 경고(\"HOST KEY CHANGED\"): 서버 재생성(정상) or MITM(위험). 무작정 지우지 말고 이유 확인. 공개키 인증 원리(핵심): - 클라: 키쌍 생성(개인키 id_ed25519 / 공개키 .pub) - 서버: 공개키를 ~/.ssh/authorized_keys 등록 - 접속: 서버 챌린지 → 클라가 개인키로 서명 → 서버가 공개키로 검증. 개인키는 네트워크에 안 흐름. - 비번처럼 \"비밀 전송\"이 아니라 \"서명을 검증\" → 안전. 명령어: - ssh user@host / ssh -i key.pem user@host / ssh -p 2222 user@host - ssh-keygen -t ed25519 -C \"email\" (ed25519 권장) - ssh-copy-id user@host (공개키 등록) - scp file user@host:/path (복사), rsync -avz dir/ user@host:/path (증분) 포트 포워딩(필수): - -L 로컬포워딩: 원격 자원을 내게 당김. ssh -L 5432:db-internal:5432 user@bastion → localhost:5432가 내부 DB로. (프라이빗 DB를 로컬 툴로 디버깅) - -R 원격포워딩: 내 자원을 원격에 밀어냄. ssh -R 8080:localhost:3000 user@pub → pub:8080이 내 로컬로. - -D 동적: SOCKS 프록시. ssh -D 1080 user@host → 통째 프록시. - 한줄: -L=당겨오기, -R=밀어내기, -D=통째 프록시. ~/.ssh/config: - Host 별칭 + HostName/User/IdentityFile/Port 지정 → ssh 별칭만으로 접속. - ProxyJump bastion: 베스천 경유해 프라이빗 서브넷 진입(표준 패턴). 보안 하드닝(sshd_config): - PasswordAuthentication no(공개키만) / PermitRootLogin no / Port 변경 / fail2ban / 보안그룹으로 22 제한. 트러블슈팅: - Permission denied(publickey) → authorized_keys 미등록 or 키 권한 - Connection refused → sshd 안 뜸/포트 다름 (ss -tlnp) - Connection timed out → 방화벽/보안그룹 22 인바운드 - HOST KEY CHANGED → 서버 재생성 or MITM ★ 권한 함정: ~/.ssh=700, 개인키=600. 너무 열리면 SSH가 키를 아예 무시. \"키 맞는데 안 됨\"의 최다 원인 → chmod 600. 경험 서술: \"베스천 ProxyJump로 프라이빗 서브넷 접근, -L 포워딩으로 내부 DB에 로컬 DBeaver 붙여 디버깅. 공개키만 허용하고 fail2ban으로 하드닝.\" --- 7. 소켓 통신 구현 (심화) 정의: 소켓 = OS가 주는 통신 끝점(IP+포트). TCP 소켓은 \"바이트 스트림\" — 함정 대부분이 여기서. API 흐름: 서버: socket()→bind()→listen()→accept()→recv/send→close() 클라: socket()→connect()→send/recv→close() ★ 메시지 경계가 없다 (제일 중요): - TCP는 \"메시지\"를 모름, 바이트만 흐름. - send(\"AAA\")+send(\"BBB\") → \"AAABBB\"로 뭉쳐 올 수 있음(뭉침) - send(\"AAABBB\") → \"AAA\"+\"BBB\"로 쪼개 올 수 있음(분할) - 해결=프레이밍: ①길이 프리픽스 [4바이트 길이][데이터] ②구분자(\\n 등) - 한문장: \"TCP는 스트림이라 메시지 경계가 없어 프레이밍이 필요하다.\" 부분 수신: recv(1024)는 1024 보장 안 함(그때 온 만큼만) → 원하는 만큼 모일 때까지 루프. C10K(동시 접속): - 순진: 연결1개=스레드1개 → 1만 연결=1만 스레드=폭발 - 해결: 논블로킹 소켓+이벤트 루프(epoll/kqueue) → 스레드1개가 수만 연결. Node/nginx/Redis 방식. Nagle: 실시간이면 TCP_NODELAY. 경험 서술: \"TCP는 스트림이라 경계가 없어 4바이트 길이 프리픽스로 프레이밍, epoll 논블로킹으로 동시 연결 처리.\" --- 8. WebSocket (채팅앱 핵심) 정의: HTTP로 시작해 양방향 지속 연결로 업그레이드하는 프로토콜. 서버가 클라에게 먼저 push 가능. 왜 채팅에 필요: - HTTP는 요청-응답만 → 서버가 새 메시지 알아서 못 밀어줌 - 옛날 폴링(계속 물어보기)=비효율 → WebSocket은 한 번 연결하면 양쪽 아무때나 전송 동작: 클라 \"Upgrade: websocket\" 요청 → 서버 101 Switching Protocols → 같은 TCP가 양방향 채널로 → 프레임 단위 송수신. (ws:// / wss://) --- 9. 채팅앱 설계 (종합) 구성: [브라우저]--WebSocket-- [채팅서버]--Redis Pub/Sub-- [다른 서버]-- [DB 영속화] 핵심 이슈(5년차): ① 서버 여러 대: A는 서버1, B는 서버2 → Redis Pub/Sub(또는 Kafka)로 인스턴스 간 메시지 전파. 스케일아웃하면 필수. ② 순서 보장: 서버 시퀀스 번호/타임스탬프로 정렬. ③ 전달 보장(at-least-once): 끊긴 사이 메시지 → DB 저장, 재접속 시 커서(마지막 읽은 이후) 복구. ④ presence(온라인 상태): Redis TTL+하트비트, 끊기면 만료. ⑤ 확장성: WebSocket 연결을 여러 서버 분산 + LB(sticky 또는 상태 외부화). 경험 서술: \"브라우저-서버는 WebSocket, 서버 여러 대라 Redis Pub/Sub로 인스턴스 간 전파. 메시지는 DB 저장해 재접속 시 커서로 놓친 것 복구, presence는 Redis TTL+하트비트, 순서는 서버 시퀀스로 보장.\" --- 10. REST vs gRPC vs GraphQL 정의: 셋 다 API 통신 방식. 어느 게 낫냐가 아니라 경계마다 맞는 걸 씀. REST gRPC GraphQL --- ------ ------ --------- 스타일 HTTP 메서드+URL RPC(원격 함수 호출) 쿼리 언어 전송 HTTP/1.1 HTTP/2 HTTP 포맷 JSON/텍스트 Protobuf(바이너리) JSON 계약 느슨(문서 별도) 엄격(.proto) 스키마 강점 단순/호환/캐싱/디버깅 성능/저지연/스트리밍/강타입 정밀 페칭/단일 엔드포인트 약점 over/under-fetch 브라우저X(gRPC-Web 필요), 사람이 못 읽음 캐싱 어려움, N+1, 쿼리 복잡도 성능: gRPC 바이너리 직렬화가 JSON보다 ~3배 빠르고 메시지 30~35% 작음. HTTP/2 멀티플렉싱. 실무 정답(★): - 공개 API → REST - 내부 서비스 간(마이크로서비스) → gRPC - 다양한 클라이언트의 서로 다른 데이터 요구(모바일/웹) → GraphQL - 한 시스템에서 계층별로 섞어 씀(하이브리드가 정석) RPC란: \"원격 서버의 함수를 로컬 함수처럼 호출\". gRPC는 .proto로 함수·타입 정의 → 서버/클라 코드 자동 생성(계약 강제, 타입 안정). .proto 예: service ChatService { rpc SendMessage(Message) returns (Ack); // unary rpc Subscribe(Room) returns (stream Message); // 서버 스트리밍 rpc Chat(stream Message) returns (stream Message); // 양방향 ★ } gRPC 스트리밍 4종: - Unary: 1요청-1응답 - Server streaming: 1요청→여러 응답(알림 구독) - Client streaming: 여러 요청→1응답(로그 업로드) - Bidirectional: 양쪽 독립 스트림(실시간 채팅 ★) 한계: 브라우저 네이티브 X → gRPC-Web+프록시 필요. 그래서 브라우저 채팅=WebSocket, 서버 간=gRPC로 갈림. GraphQL 주의: - N+1 문제: 리졸버가 항목마다 쿼리 → DataLoader로 배치 - 쿼리 깊이/복잡도 제한(depth limiting) 필수 — 안 하면 DoS 위험 - introspection으로 스키마 노출 주의 경험 서술: \"공개 API는 REST로 두되, 내부 마이크로서비스 간은 gRPC로 바꿔 지연을 줄였고, 프론트가 필요 데이터만 가져가도록 BFF에 GraphQL을 얹었다. GraphQL은 N+1이 터져 DataLoader로 배치 처리했다.\" --- 11. PuTTY / PEM 키 / keygen (서버 접속) 정의: 클라우드 서버는 비번 아닌 키페어(.pem)로 접속(SSH 공개키 인증). 개인키 가진 사람만 통과. Windows PuTTY: AWS는 .pem(OpenSSH) 제공, PuTTY는 .ppk만 씀 → PuTTYgen으로 pem→ppk 변환 후 등록. 리눅스/맥은 ssh -i key.pem user@IP 바로. ★ 함정: - pem 권한 너무 열리면 거부 → chmod 400 key.pem - 유저명 AMI마다 다름: Amazon Linux=ec2-user, Ubuntu=ubuntu, CentOS=centos - pem 분실 시 복구 불가 → 인스턴스 키 재설정 경험: \"EC2에 PuTTYgen으로 pem→ppk 변환 등록, ubuntu 유저·400 권한 이슈 해결.\" 12. WAS / DB 서버 분리 (3-tier) 구성: [웹 Nginx 퍼블릭]→[WAS Tomcat/gunicorn 프라이빗]→[DB 프라이빗, 외부차단] 왜 분리: - 보안: DB를 프라이빗 서브넷, WAS만 접근 - 확장: WAS는 스케일아웃, DB는 별도 증설/복제 - 장애 격리: 웹 죽어도 DB 살아있음 ★ 방화벽 규칙이 여기서 나옴: - 웹: 인바운드 80/443만 - WAS: 웹에서 오는 것만(8080), 외부 차단 - DB: WAS 보안그룹에서 오는 3306만, 나머지 차단 경험: \"DB는 WAS 보안그룹발 3306만 허용, 나머지 차단.\" 13. 인바운드/아웃바운드/방화벽/UFW 정의: 인바운드=들어오는(외부→서버), 아웃바운드=나가는(서버→외부). 방화벽이 규칙으로 통제. 기본 정책: 잘된 방화벽은 인바운드 기본 차단(deny)+필요 포트만 허용(화이트리스트). 아웃바운드는 보통 허용, 강한 환경은 제한(유출 방지). UFW 실무: ufw default deny incoming / ufw default allow outgoing ufw allow 22/tcp / ufw allow 80,443/tcp ufw allow from 10.0.1.5 to any port 3306 (특정 IP만 DB) ufw enable / ufw status verbose ★ 함정: - enable 전에 22(SSH) 먼저 허용 안 하면 자기 접속 끊김(흔한 사고) - 클라우드는 2중 방화벽: UFW + 보안그룹. 둘 다 열어야. \"UFW 열었는데 안 됨\"→보안그룹 확인. 경험: \"DB UFW로 WAS발 3306만, 보안그룹까지 이중으로 맞춤.\" 14. 웹 스크래핑 정의: 웹 데이터를 프로그램으로 수집. HTTP 요청→HTML 파싱→추출. 갈림: - 정적: HTML에 데이터 있음 → requests+BeautifulSoup, 빠름 - 동적(SPA): JS가 데이터 채움 → HTML 텅 빔 → Selenium/Playwright로 JS 실행 후 수집(느림) ★ 실무 이슈: - robots.txt/약관 확인(법적·윤리) - Rate limit: 너무 빠르면 429/IP밴 → 딜레이·지수 백오프 - User-Agent/헤더 설정(봇 차단 회피) - ★ 고급팁: \"브라우저엔 보이는데 requests엔 안 잡힘\"→JS 렌더링. 개발자도구 Network에서 실제 데이터 API(XHR)를 찾아 직접 호출하면 Selenium보다 훨씬 빠름. 경험: \"동적 페이지라 백엔드 XHR API 직접 호출로 Selenium 없이 수집, 지수 백오프 적용.\" 15. CORS 정의: 브라우저가 다른 출처(스킴+호스트+포트) 리소스 접근을 제어하는 보안 장치. 동일 출처 정책(SOP) 완화. ★ 출처 = 스킴+호스트+포트 셋 다 같아야 동일. 하나라도 다르면 교차 출처. - https://example.com vs http://example.com → 스킴 다름 ❌ - example.com vs api.example.com → 호스트 다름 ❌ - localhost:3000 vs localhost:8000 → 포트 다름 ❌ (경로만 다른 건 같은 출처 ✅) ★ \"같은 호스트 다른 포트\"도 다른 출처 → CORS 막힘. localhost:3000(프론트)→localhost:8000(API)이 개발 최다 사례. \"localhost인데 왜 CORS?\" = 브라우저가 포트까지 봄. 해결: ①서버가 Allow-Origin에 프론트 출처 명시 ②프론트 개발서버 proxy로 같은 출처처럼 위장(CORS 자체 회피, React proxy/Vite server.proxy). 배포 시 같은 도메인 뒤 경로로 나눠(example.com=프론트, example.com/api=백엔드) CORS 회피 가능(리버스 프록시 원리). ★ 핵심 오해: CORS 에러는 서버가 아니라 \"브라우저\"가 막는 것. 서버는 정상 응답했지만 브라우저가 JS에 안 넘김. → curl/Postman은 되는데 브라우저만 실패 = CORS 시그니처. Preflight(예비 요청): - 위험 가능 요청 전 OPTIONS로 \"허용돼?\" 먼저 물음. - 단순 요청(preflight 없음): 메서드 GET/HEAD/POST + Content-Type이 form-urlencoded/multipart/text-plain 중 하나 + 커스텀 헤더 없음. - ★ application/json이면 조건 위반 → 무조건 preflight. Authorization 등 커스텀 헤더도 유발. 즉 요즘 JSON API는 대부분 OPTIONS 먼저 날아감. 서버 응답 헤더: Access-Control-Allow-Origin: https://myapp.com (credentials와 동시 불가) Access-Control-Allow-Methods / Allow-Headers Access-Control-Allow-Credentials: true (쿠키 보낼 때) Access-Control-Max-Age: 86400 (preflight 캐싱, 성능↑) ★ 흔한 실수: - credentials 쓰며 Allow-Origin: → 동작 안 함, 구체 출처 명시 - 서버가 OPTIONS 처리 안 함(404/405) → preflight 실패 → 실제 요청 차단 - Max-Age 없어 매번 preflight → 성능 저하 경험: \"JSON API마다 preflight 떠서 서버 OPTIONS 처리+구체 출처+credentials true로 해결, Max-Age로 캐싱.\" 16. 트래픽 핸들링 (부하 대응) 정의: 몰리는 트래픽을 안정적으로 처리·분산·보호. 계층별 도구: - 로드밸런싱: L4(IP/포트) / L7(URL/헤더). 라운드로빈/least_conn/IP해시 - 오토스케일링: 부하 따라 서버 수 자동 증감 - 캐싱: CDN(정적)/Redis(동적·세션)/HTTP 캐시헤더 → 원본 부하↓ - Rate limiting: 초당 요청 제한, 남용·DoS 방어(429) - 큐잉: 급증을 Kafka/RabbitMQ로 완충 → 소화 가능 속도로 처리(backpressure) - Circuit Breaker: 뒤 서비스 죽으면 빠르게 실패시켜 연쇄 장애 방지 - Graceful degradation: 과부하 시 핵심만 유지 ★ 사고 흐름: 캐싱으로 원본 부하↓ → LB+오토스케일 수평확장 → 쓰기는 큐 완충 → 남용은 rate limit → 뒤 장애는 circuit breaker. 한 방법 아닌 \"계층별 방어선\" 겹치기. 경험: \"이벤트 급증에 CDN으로 정적 부하 제거, WAS 오토스케일, 주문 쓰기는 Kafka 완충, 결제 외부API엔 circuit breaker로 연쇄 장애 차단.\" 17. 캐싱 실제 구현 (NestJS) 세 계층: [CDN 엣지]→[브라우저/HTTP캐시]→[NestJS+Redis]→[DB]. 바깥에서 막을수록 원본 부하↓. (1) HTTP 캐시 헤더 — 브라우저/CDN이 캐싱하게 @Header('Cache-Control', 'public, max-age=3600') 를 GET에 부여. - public=CDN·프록시도 캐싱 / private=브라우저만(사용자별) / no-cache=캐싱하되 매번 검증 / no-store=절대 금지(민감) - ETag: Nest(Express) 기본 생성. If-None-Match로 안 바뀌면 304 Not Modified(본문 없음)→대역폭 절약. (2) Redis — 서버사이드 캐싱 (@nestjs/cache-manager) 설정: CacheModule.registerAsync + redisStore(host/port, ttl). 방법A 자동(인터셉터): @UseInterceptors(CacheInterceptor) + @CacheTTL(300_000). URL을 키로 GET 응답 통째 캐싱. 방법B 수동(cache-aside, 가장 흔함): const cached = await cache.get(key); if(cached) return cached; const data = await repo.find(); await cache.set(key, data, ttl); return data; ★ 변경 시 무효화: await cache.del( product:${id} ) — 안 하면 옛 데이터 노출. 세션: 서버 여러 대면 메모리 세션 불가(서버1 로그인→서버2 요청 시 세션 없음)→Redis로 외부화(상태 외부화). (3) CDN — Nest 바깥 인프라 계층 코드 아님. Nest가 할 일은 올바른 Cache-Control 내려주기. CDN(CloudFront/Cloudflare)이 헤더 보고 엣지에 캐싱. 흔한 실수(★) - 무효화 누락: 데이터 바꿨는데 캐시 안 지워 옛 데이터 노출. - 사용자별 데이터를 public 캐싱 → CDN이 캐싱해 남에게 노출. 반드시 private. - Cache Stampede: 인기 키 동시 만료 → 요청 한꺼번에 DB로. TTL 지터/잠금으로 완화. 경험: \"상품 조회 API는 CacheInterceptor로 Redis 캐싱, 수정 시 del로 무효화. 세션은 Redis 외부화, 정적은 Cache-Control 길게 줘 CDN 엣지 처리. 사용자별 데이터가 CDN 캐싱되던 사고를 private로 해결.\" 18. AWS 실무 핵심 개념 전체 그림: [사용자]→IGW→[퍼블릭:ALB/웹]→(SG 참조)→[프라이빗:WAS]→(Role로 S3)→[프라이빗:DB]. IAM이 \"누가 조작\"을 감싸고 SG/NACL이 트래픽 통제. IAM (누가 무엇을) 정의: AWS 리소스 접근 권한 통제. SG/NACL=트래픽, IAM=AWS 작업 권한. 4요소: User(장기 자격증명) / Group(User 묶음+정책) / Role(임시 자격증명, assume) / Policy(권한 정의 JSON). ★ User보다 Role: 액세스 키(User)=유출 위험 장기 자격. Role=임시라 안전. EC2→S3 접근 시 키 하드코딩 말고 Instance Profile(Role)로 → AWS가 임시 키 자동 발급·순환. Policy 예: {Effect:Allow, Action:[\"s3:GetObject\"], Resource:\"arn:aws:s3:::bucket/ \"} ★ 평가 규칙: 명시적 Deny Allow / Allow 없으면 암묵적 Deny / 최소 권한 원칙(Admin 남발 금지). SG vs NACL vs IAM (세 방어선) - SG: 인스턴스 레벨, Allow만, Stateful(인바운드 허용 시 응답 자동 허용) - NACL: 서브넷 레벨, Allow+Deny, Stateless(응답용 아웃바운드 따로 열어야, ephemeral 포트 함정) - IAM: AWS API/리소스 작업 권한 ★ 킬러: \"SG는 인스턴스 방화벽+stateful라 응답 자동 허용, NACL은 서브넷 방화벽+stateless라 양방향 다 열어야, IAM은 트래픽 아닌 AWS 작업 권한.\" VPC / 서브넷 / 화이트리스트 정의: VPC=AWS 안 격리된 가상 네트워크. 3-tier가 여기 올라감. - 퍼블릭 서브넷: 라우팅이 IGW 가리킴 → 외부 통신. 웹/LB/NAT. - 프라이빗 서브넷: IGW 없음 → DB 숨김. 나갈 땐 NAT 게이트웨이(아웃바운드만). ★ 화이트리스트: IP 하드코딩 대신 SG가 다른 SG 참조. \"DB SG는 WAS SG발 3306만\" → 오토스케일로 늘어도 IP 수정 불필요. IP 아닌 \"역할(SG) 단위\". VPN 설정 정의: 온프레미스/원격을 VPC에 안전 연결. - Site-to-Site: 회사 DC↔VPC 암호화 터널 - Client VPN: 개별 사용자→VPC(원격근무자가 프라이빗 DB 접근) 대안: 베스천 호스트(점프 서버 SSH 경유) / SSM Session Manager(22 포트 안 열고 접속, 요즘 정석, 공격면 축소). S3 객체 생성/가져오기 (SDK v3) 정의: S3=객체 스토리지. 파일(객체)을 버킷에. Node/Nest: const s3 = new S3Client({ region }); // 키 안 박음, EC2 Role 자동 await s3.send(new PutObjectCommand({Bucket,Key,Body,ContentType})); // 업로드 await s3.send(new GetObjectCommand({Bucket,Key})); // 가져오기 ★ 포인트: - Presigned URL: 서버가 임시 서명 URL 발급→클라가 서버 안 거치고 S3 직접 업/다운. 대용량 서버 부하 회피. 면접 단골. - 자격증명 코드에 없음: S3Client에 region만, Role 임시 키를 SDK가 자동 사용(IAM Role 실활용). - 버킷 정책 vs IAM 정책: 접근은 IAM(누가)+버킷정책(리소스측) 양쪽. 퍼블릭 노출 사고 다발. 면접 한 문장: \"VPC에 퍼블릭/프라이빗 나눠 DB를 프라이빗에 숨기고, SG를 IP 아닌 SG 참조로 화이트리스트해 오토스케일 대응. 권한은 IAM으로, EC2는 키 대신 Role로 S3 접근해 유출 위험 제거.\" 17-B. AWS 네트워크 최소→하나씩 쌓기 (학습 순서) 각 단계 = 앞 단계의 한계 → 추가 → 연결 개념. 0. 빈 계정: 목표=웹서비스 안전하게 올리기. 1. VPC: 격리된 내 네트워크 상자. CIDR 10.0.0.0/16(사설 대역). 아직 외부 단절. 2. 서브넷: VPC를 칸막이. 퍼블릭 10.0.1.0/24 + 프라이빗 10.0.2.0/24. 이름만 나눔(아직 외부연결 없음). (실무: Multi-AZ로 고가용성) 3. IGW+라우팅: 밖으로 나가는 문. 퍼블릭 라우팅 0.0.0.0/0→IGW. ★이 라우팅이 있어야 진짜 퍼블릭. 프라이빗은 이 경로 없어 자동 격리 = 퍼블릭/프라이빗 실체. 4. Security Group: 인스턴스 문단속(최소 방화벽). 웹 SG 인바운드 443/80 from 0.0.0.0/0, 22 from 내IP. stateful이라 응답 자동. → 여기까지가 \"웹 한 대 안전 노출\" 최소 구성. 5. DB 프라이빗+SG 참조: DB를 프라이빗에, DB SG 인바운드 3306 from [WAS-SG]. IP 아닌 SG 참조 → 오토스케일 대응. 역할 단위 화이트리스트 완성. 6. NAT 게이트웨이: 프라이빗도 나가야(업데이트/외부API). 프라이빗 라우팅 0.0.0.0/0→NAT. 나가기만, 들어오긴 못함(비대칭 통로). NAT 원리. 7. IAM Role: WAS가 S3 접근. 키 하드코딩 대신 Instance Profile(Role) → SDK 임시 키 자동. 트래픽(SG)과 별개로 \"누가 무슨 작업\"을 IAM이 감쌈. 8+. 필요시: ALB(분산)/NACL(서브넷 방어,stateless)/Multi-AZ(고가용성)/VPN·SSM(관리접속)/CloudFront+Route53(CDN·DNS). 한 문장: \"VPC로 격리→퍼블릭/프라이빗 분할→퍼블릭은 IGW 라우팅으로 외부와, 프라이빗은 NAT로 나가기만→SG로 인스턴스 문단속+DB는 WAS-SG 참조 화이트리스트→접근은 키 대신 IAM Role.\" 18. 서버리스 & AWS Lambda (함수형 API, 사용량 과금) 정의: 서버를 직접 관리 안 하고 코드(함수)만 올리면 클라우드가 실행·확장·과금. \"서버 없다\"가 아니라 \"서버 신경 안 쓴다\". 인과(기존 대비): - EC2/EKS: 인스턴스 항상 띄움→요청 없어도 켜진 동안 과금, 확장 내가 설정. - Lambda: 요청 올 때만 함수 잠깐 실행→실행한 만큼만 과금(안 쓰면 0원), 확장 자동. AWS Lambda: - 과금: 요청 수+실행시간(ms)×메모리. 안 쓰면 0원. 간헐적·예측 불가 워크로드 유리. 프리티어 월 100만 요청. - 트리거: API Gateway(HTTP→Lambda), S3 이벤트(업로드 후 처리), SQS/SNS/EventBridge, DynamoDB Streams, 스케줄(cron). - 서버리스 API: [클라]→API Gateway(라우팅)→Lambda(로직)→DynamoDB(서버리스 DB). 서버 0대로 API 운영. 장점: 비용 효율(쓴 만큼), 자동 확장(1~1만 알아서), 운영 부담 0, 빠른 개발. ★ 단점: - 콜드 스타트: 한동안 안 쓰이면 꺼졌다가 첫 요청 때 초기화 시간(수백ms~수초). 지연 민감 서비스 문제(프로비저닝된 동시성으로 완화). - 실행 시간 제한 15분(긴 작업 부적합). - 무상태(매번 초기화, 상태는 DynamoDB/S3 외부화). - 벤더 종속, 디버깅·로컬 테스트 어려움. - ★ 비용 역전: 트래픽 지속적으로 많으면 오히려 EC2/EKS보다 비쌀 수 있음(항상 켜둘 거면 상시 서버가 쌈). 언제: - 서버리스 유리: 간헐적·예측 불가 트래픽, 이벤트 기반(파일 업로드 후 처리), 배치·크론, 프로토타입, 트래픽 급변. - 상시 서버 유리: 지속 높은 트래픽, 긴 실행, 낮은 지연 필수(콜드 스타트 곤란), 세밀한 제어. ★ 한 문장: \"서버리스는 안 쓰면 0원+자동 확장이라 간헐적·이벤트 기반에 최적, 단 콜드 스타트·15분 제한 있고 지속 트래픽 많으면 상시 서버가 쌈. 워크로드 특성으로 선택.\" 다른 서버리스: Fargate(컨테이너 서버리스, 긴 작업), DynamoDB(NoSQL), S3(스토리지), API Gateway(API 관문). 조합하면 서버 0대로 완전한 서비스. 연결: 함수형 API=이벤트 드리븐의 서버리스 버전 / 오토스케일을 AWS가 함수 레벨 자동 / 무상태 강제(상태 외부화). 19. AWS 기본 서비스 지도 (카테고리별 대표 서비스) 큰 그림: 200개+ 서비스지만 5년차 핵심은 카테고리별 대표 1~2개. \"이름-역할-언제 쓰나\" 수준으로 넓고 얕게(핵심 개념은 깊게, 도구는 넓게 원칙). 컴퓨팅 (코드 실행) - EC2: 가상 서버. OS부터 직접 관리, 가장 유연·관리 부담 큼. \"클라우드 위 내 서버 한 대.\" - Lambda: 서버리스 함수. 요청 올 때만 실행·쓴 만큼 과금·관리 없음. - ECS/EKS: 컨테이너 오케스트레이션. ECS=AWS 고유(간단), EKS=관리형 쿠버네티스(표준). - Fargate: 컨테이너를 서버리스로(노드 관리 없이). ECS/EKS와 결합. ★ 선택: 완전한 제어·상시=EC2, 간헐적·이벤트=Lambda, 컨테이너=ECS/EKS, 노드 관리 싫으면 Fargate. 스토리지 - S3: 객체 스토리지. 파일·이미지·백업·정적 사이트. 무한 용량·저렴·고내구성. 가장 많이 씀. - EBS: EC2에 붙이는 디스크(블록). 한 인스턴스에 붙음. DB 데이터 등. - EFS: 여러 EC2가 공유하는 파일 시스템. ★ 구분: 파일 저장·서빙=S3, EC2 디스크=EBS(한 대), 여러 서버 공유=EFS. 데이터베이스 - RDS: 관리형 관계형 DB(MySQL/PostgreSQL/Aurora). 백업·복제·패치를 AWS가. (\"DB는 RDS가 대개 낫다\") - Aurora: AWS 제작 고성능 관계형(MySQL/PG 호환). RDS 상위. - DynamoDB: 관리형 NoSQL. 서버리스·자동 확장·밀리초. 대규모 확장 강함. - ElastiCache: 관리형 Redis/Memcached. 캐싱·세션. ★ 선택: 정형·트랜잭션=RDS/Aurora, 대규모·유연 스키마=DynamoDB, 캐시=ElastiCache. 네트워킹 - VPC: 내 가상 네트워크. 서브넷·라우팅·방화벽 격리. - Route 53: DNS. 도메인·이름 해석·헬스체크 라우팅. - CloudFront: CDN. 정적 자원 엣지 서빙(전세계 캐싱). - ELB: 로드 밸런서. ALB(L7/HTTP)·NLB(L4/TCP). - API Gateway: API 관문. 서버리스 API·rate limit·인증. ★ 흐름: 사용자→Route 53(DNS)→CloudFront(CDN)→ELB(분산)→EC2/Lambda, 전체가 VPC 안. 보안/권한 - IAM: 사용자·역할·권한. \"누가 무엇을.\" 최소 권한. - Security Group: 인스턴스 방화벽(허용 규칙). vs NACL(서브넷). - Secrets Manager/Parameter Store: 시크릿 저장·회전. - KMS: 암호화 키 관리. Cognito: 사용자 인증·회원관리. ★ IAM Role로 키 없이 권한(IRSA·OIDC), 시크릿은 Secrets Manager, 방화벽은 SG. 배포/운영 - CloudWatch: 모니터링·로그·메트릭·알람. - CloudFormation: IaC(AWS 네이티브, Terraform은 멀티클라우드). - ECR: Docker 이미지 저장소. - CodePipeline/Build/Deploy: CI/CD. - CloudTrail: API 호출 감사 로그. 메시징/비동기 - SQS: 메시지 큐. 작업 완충·비동기 분리(1:1). - SNS: 발행-구독 알림(1:N 팬아웃, 푸시·이메일·SMS). - EventBridge: 이벤트 버스(서비스 간 라우팅). - Kinesis: 실시간 스트리밍. ★ 구분: 작업 큐=SQS, 알림 팬아웃=SNS, 이벤트 라우팅=EventBridge, 스트림=Kinesis. 전형적 웹 서비스 아키텍처 (조합) 사용자→Route 53(DNS)→CloudFront(CDN)→ALB(분산)→ECS/EKS·EC2(앱, Auto Scaling)→RDS(DB)+ElastiCache(캐시)→S3(파일). SQS로 비동기, CloudWatch로 모니터링, IAM으로 권한, 전체가 VPC 안. ★ 이 그림에 배운 게 다: CDN·LB·오토스케일·캐시·큐·모니터링(트래픽 핸들링)+VPC·IAM(네트워크)+RDS(DB). 우선순위 - 반드시: EC2, S3, RDS, VPC, IAM, Security Group, CloudWatch, ELB, Lambda, ECR - 자주: DynamoDB, ElastiCache, SQS, CloudFront, Route 53, EKS/ECS, Secrets Manager - 알면 좋음: SNS, EventBridge, CloudFormation, Cognito, KMS, Fargate 핵심 관점 (도구는 넓게, 개념은 깊게) AWS 서비스는 \"이름-역할-언제\"만 알면 충분. 각각은 핵심 개념의 관리형 구현이라 개념 알면 바로 매핑: ElastiCache=\"Redis 관리형\", EKS=\"쿠버네티스 관리형\", RDS=\"DB 운영 대행\", SQS=\"메시지 큐\". 핵심(네트워크·DB·캐시·큐)이 튼튼하면 서비스는 이름표. 면접 한 문장: \"AWS는 카테고리별 대표 서비스로 이해한다 — 컴퓨팅(EC2/Lambda), 스토리지(S3), DB(RDS/DynamoDB), 네트워킹(VPC/CloudFront/ELB), 권한(IAM), 큐(SQS), 모니터링(CloudWatch). 각각은 핵심 개념의 관리형 구현이라 개념을 알면 빠르게 익힌다.\""}, {"title": "DB 기본", "kind": "기본 설명", "url": "doc_6_db_basic.html", "text": "[문서6] DB 기본 — 면접 실전용 포맷: 용어 정의 → 핵심 개념(한두 줄) → 문제 정의/인과관계 --- 1. 인덱스 원리 (B-Tree/B+Tree) 정의: 테이블 데이터를 정렬된 별도 구조로 미리 만들어 원하는 행을 빨리 찾는 자료구조. 책 뒤 색인. 인과: 없으면 Full Table Scan O(n), 있으면 트리 타고 O(log n). 100만 행: 풀스캔 100만 vs B-Tree ~20. 왜 B+Tree인가: - 이유1 디스크 I/O 최소화: 디스크는 블록(4~16KB) 단위. 한 노드에 수백 키 담아 트리를 낮고 넓게(fan-out↑) → 100만 행도 3~4단계=디스크 접근 3~4번. - 이유2 범위 검색: B+Tree는 실제 데이터가 리프에만, 리프끼리 링크드리스트 연결 → BETWEEN/ORDER BY 빠름(시작점 찾고 옆으로 쭉). InnoDB가 B+Tree 쓰는 결정적 이유. - 해시 인덱스: =검색 O(1) 최고지만 범위·정렬 불가(순서 없음) → 특수 상황만. 클러스터형 vs 논클러스터형: - 클러스터형: 인덱스 순서=실제 물리 저장 순서. 테이블당 1개(보통 PK). - 논클러스터형(세컨더리): 별도 존재, 여러 개. 리프에 데이터 대신 위치(PK/포인터). ★ 세컨더리 2단계 조회(InnoDB): ①세컨더리에서 PK 찾고 ②PK로 클러스터 재조회해 데이터(back to table). 한 번 더 탐 → 살짝 느림 → 커버링 인덱스 최적화 등장(2강). 장단점(인덱싱 장단점): - 장점: SELECT 극적 가속. WHERE/JOIN/ORDER BY/GROUP BY. - 단점: 쓰기 저하(INSERT/UPDATE/DELETE 시 인덱스도 갱신) / 저장 공간 / 잘못 만들면 무용(카디널리티 낮은 컬럼). - 한문장: \"읽기를 O(log n)으로 빠르게 하는 대신 쓰기 비용·공간을 대가로. 읽기 많고 카디널리티 높은 컬럼에 선별적으로.\" 인덱스 안 타는 경우(실무 필수): - 컬럼 가공: WHERE YEAR(date)=2024 ✗ → date ='2024-01-01' ✓ - 함수/연산: WHERE price 1.1 100 ✗ - LIKE '%검색' ✗ (LIKE '검색%' ✓) - OR 조건(한쪽 인덱스 없으면 풀스캔) - 카디널리티 낮음(옵티마이저가 풀스캔 선택) - 암묵적 형변환(문자 컬럼에 숫자 검색) - ★ 원칙: \"컬럼은 그대로 두고 비교값을 가공하라.\" 컬럼 건드리면 인덱스 죽음. 풀스캔이 무조건 나쁜 건 아니다(인덱스 손익분기점): - 세컨더리 인덱스 재조회 = 행마다 랜덤 I/O. 풀스캔 = 순차 I/O(디스크에 효율적). - 읽을 행이 많아지면 인덱스 \"골라읽기\"가 손해 → 대략 전체의 5~20%(≈10%) 넘게 읽으면 풀스캔이 낫다. - 정확한 수치 아님(행 크기/클러스터링/SSD 여부로 임계 변동. SSD는 랜덤 페널티 작아 임계↑). - ★ 옵티마이저가 selectivity(조건이 몇 % 고르나)를 통계로 추정해 임계 넘으면 인덱스 있어도 일부러 풀스캔. = \"카디널리티 낮으면 풀스캔 선택\"의 메커니즘. - 함정: \"인덱스 있는데 왜 안 타?\" 답이 종종 \"옵티마이저가 그게 느리다고 판단\". force index가 오히려 느려질 수 있음. - 한문장: \"인덱스는 소량 고를 때 유리, 읽을 비율이 임계(~10~20%) 넘으면 랜덤I/O 때문에 순차 풀스캔이 빠름.\" --- 2. 쿼리 최적화 (실행계획·인덱스 활용) 실행 계획(EXPLAIN): 정의: 옵티마이저가 세운 실행 전략. 튜닝의 출발점. 인과: SQL은 \"무엇\"만, \"어떻게\"는 옵티마이저가(선언형) → 선택에 따라 100배 차이 → EXPLAIN으로 들여다봄. 꼭 보는 것(MySQL): - type: const eq_ref ref range index ALL(풀스캔,최악). ALL이면 인덱스 안 탐 경고. - key: 실제 사용 인덱스. NULL이면 안 씀. - rows: 예상 훑을 행 수(적을수록 좋음). - Extra: Using index(커버링,좋음)/Using filesort(정렬 별도작업,주의)/Using temporary(임시테이블,주의). ★ rows는 통계 기반 추정. 낡으면 오판. EXPLAIN ANALYZE는 실제 실행값. 커버링 인덱스: 정의: 필요한 모든 컬럼이 인덱스에 다 있어 테이블 재조회 불필요. 인과(1강 연결): 세컨더리 2단계(PK찾고 클러스터 재조회)를 없앰. SELECT 컬럼이 전부 인덱스에 있으면 인덱스만 읽고 끝. EXPLAIN Extra=Using index. 인덱스(user_id,status): SELECT status WHERE user_id=5 → 커버링 / SELECT → 재조회(커버링 아님) 복합 인덱스 & 왼쪽 접두사 원칙(제일 많이 틀림): ★ (a,b,c)는 왼쪽부터 연속으로 쓸 때만 탐: WHERE a=1 ✓ / a=1 AND b=2 ✓ / a=1 AND b=2 AND c=3 ✓(완전) WHERE b=2 ✗(a 건너뜀) / a=1 AND c=3 △(a까지만) 왜: a로 정렬→그 안에서 b→그 안에서 c. 전화번호부 성→이름 순, 이름만으론 못 찾음. 선두 컬럼 없으면 무용. 설계 원칙: 자주 쓰는 조건 앞에 / 등호(=)를 범위( ,<)보다 앞에(범위 뒤는 정렬 깨짐) / 카디널리티 높은 컬럼 앞. 한문장: \"복합 인덱스는 왼쪽부터 연속으로 타고, 등호 앞·범위 뒤.\" 옵티마이저 & 통계: 정의: 여러 계획의 예상 비용(cost) 계산해 최소 선택(CBO). 근거=통계(행수,값 분포,카디널리티). ★ 통계 낡으면 오판: \"10건일 것\" 추정했는데 실제 100만 → 잘못된 계획(풀스캔/조인순서). \"어제까진 빨랐는데 오늘 느림\"의 흔한 원인. 대응 ANALYZE TABLE. ★ 그러나 통계 갱신은 양날의 검: - plan regression: 통계 바뀌면 옵티마이저가 계획 재작성 → 잘 돌던 쿼리가 새 계획으로 오히려 느려질 수 있음(계획 퇴행). 핵심 쿼리에서 터지면 장애급. - 갱신 부하: ANALYZE가 테이블 스캔 → 대형 테이블은 I/O·CPU 잡아먹어 바쁜 시간엔 업무 마비 위험. - 실무 대응: 한가한 시간대에 / 큰 테이블은 샘플링 / 갱신 후 핵심 쿼리 계획 검증 / 중요 시스템은 계획 고정(baseline/hint). - 태도: \"최신이 항상 옳다\"가 아니라 \"최신화하되 영향을 검증한다\". 조인 원리: 정의: 여러 테이블 연결. 내부 알고리즘 3종. - Nested Loop: 각 행마다 다른 테이블 반복. 작은 테이블+인덱스 있을 때. OLTP 기본. - Hash Join: 한쪽으로 해시 만들어 매칭. 큰 테이블+등호+인덱스 없을 때. 대량 분석. - Sort Merge: 양쪽 정렬 후 병합. 정렬돼 있거나 범위 조인. ★ 조인 키(FK)에 인덱스 없으면 Nested Loop가 매번 풀스캔 = 재앙. 조인 키 인덱스 거의 필수. 옵티마이저가 driving table(먼저 읽을 테이블) 정하는데 통계 부정확하면 순서 틀어짐. N:N: 중간 테이블(junction)로 분해. 학생-수업 N:N → student_course(student_id,course_id)로 1:N 두 개. 두 FK에 인덱스 걸어야 빠름. --- 3. 트랜잭션 · ACID · 격리수준 · 락 · MVCC 트랜잭션 & ACID: 정의: 더 못 쪼개는 하나의 논리적 작업 단위. 전부 성공/전부 실패(all-or-nothing). 예: 계좌 이체. ACID: Atomicity(전부 or 롤백) / Consistency(제약조건 유지) / Isolation(서로 간섭 안 함) / Durability(커밋되면 죽어도 유지). ★ 구현: 원자성·지속성=WAL(Write-Ahead Log, 데이터 바꾸기 전 변경내역을 로그에 먼저 → redo/undo 복구). 격리성=락+MVCC. 격리 수준(제일 중요): 인과: 완벽 격리는 안전하나 느림(동시성 죽음) → 안전성vs성능 4단계로 선택. 이상 현상: Dirty Read(커밋 안 된 것 읽음) / Non-Repeatable(같은 행 두 번 값 다름) / Phantom(같은 조건 행 개수 다름). 4단계(낮음→높음): - READ UNCOMMITTED: 다 발생 - READ COMMITTED: Dirty 방지 - REPEATABLE READ: Dirty+Non-Repeatable 방지 (InnoDB는 갭락으로 Phantom도 상당 방지) - SERIALIZABLE: 다 방지 ★ 기본값: PostgreSQL/Oracle=READ COMMITTED, MySQL(InnoDB)=REPEATABLE READ. 락(비관적): - 공유 락(S): 동시 읽기 OK, 쓰기 막음 - 배타 락(X): 나만, 읽기·쓰기 다 막음 - 단위: 행 락<테이블 락(행이 동시성 좋음) ★ 데드락: A가 락1잡고 락2대기, B가 락2잡고 락1대기 → 영원 대기. DB가 한쪽 죽임. 예방: 락을 항상 같은 순서로 획득. MVCC(5년차 킬러): 정의: 수정 시 덮어쓰지 않고 새 버전 생성 → 읽기와 쓰기가 서로 안 막음. 인과: 전통 락은 쓰는 중 읽기도 대기. MVCC는 읽는 쪽이 트랜잭션 시작 시점 스냅샷(옛 버전)을 봄 → 읽기가 쓰기 안 막고 쓰기가 읽기 안 막음. \"읽기는 락 안 건다\"가 정수. PG/InnoDB/Oracle 사용. 구현(InnoDB): 행에 버전(트랜잭션 ID), 옛 버전은 undo 로그. 읽을 때 볼 수 있는 버전 재구성(consistent read). 대가: 옛 버전 정리 필요(PG vacuum, InnoDB purge). 한문장: \"수정 시 새 버전 만들어 읽는 쪽엔 스냅샷 → 읽기·쓰기 안 막음 → 락 없이 높은 동시성.\" 비관적 vs 낙관적 락: - 비관적: 충돌 날 것 → 미리 락(SELECT FOR UPDATE). 충돌 많은 환경. 대기·데드락 위험. - 낙관적: 충돌 드물 것 → 락 없이 커밋 시 version 컬럼으로 \"남이 바꿨나\" 확인, 바뀌면 재시도. 충돌 적은 환경. 실무: 재고 차감 등 충돌 잦으면 비관적, 일반 수정은 낙관적(버전 컬럼). --- 4. DB 아키텍처 (요소별 역할) 큰 틀: Database vs Instance - Database = 디스크 위 파일 집합(데이터파일·컨트롤파일·리두로그·아카이브). 스스로 일 안 함(죽은 구조). - Instance = DB를 움직이는 실행 주체(공유 메모리 + 백그라운드 프로세스). - ★ 사용자는 파일에 직접 접근 못 함. 항상 Instance를 통과: User→Server Process→메모리→Background Process→Disk. 메모리 — 공유(SGA) vs 전용(PGA) - SGA: 인스턴스 전체가 공유하는 메모리. 여러 세션이 같은 블록·SQL·메타정보 재사용. - PGA: 서버 프로세스 전용. 정렬/해시/세션·커서 상태 등 개인 작업. 공유하면 꼬임. - ★ 데이터는 SGA(버퍼 캐시)에서 읽고, 계산(sort/hash)은 PGA에서. \"원본은 캐시, 계산은 작업장.\" - 대가: SGA는 공유라 동시 접근 제어(latch/lock) 필요 → contention이 성능 병목의 원인. SGA 3대 구성 - Buffer Cache: 데이터파일 블록을 올려두는 작업장. 대부분 읽기·수정이 여기서 시작. 부족하면 physical read↑. - Redo Log Buffer: 변경 이력을 잠시 담는 곳. \"데이터보다 변경 이력을 먼저 안전하게.\" - Shared Pool: SQL·실행계획 재사용(Library Cache) + 오브젝트 메타정보(Dictionary Cache). 버퍼 상태 3종 (Buffer Cache 내부) - Free: 비어서 새 블록 읽어올 수 있음. - Dirty: 메모리에서 변경됐지만 아직 디스크 미반영. 언젠가 DBWR가 내림. - Pinned: 지금 누가 읽기/수정 중이라 못 밀어냄. - LRU: 캐시가 유한 → 오래 안 쓴 블록부터 밀어냄(최근 쓴 건 또 쓸 확률 높음). 백그라운드 프로세스 5대 (역할 분담) - DBWR: dirty buffer를 데이터파일에 내림(지연 쓰기). 이 덕에 commit이 빠름. - LGWR: redo를 리두 로그 파일에 먼저 기록. ★ commit 순간 가장 중요한 프로세스(DBWR 아님). - CKPT: \"데이터파일이 redo의 어느 시점까지 따라왔나\" 기준점 기록 → 복구 시작점 축소. - SMON: 인스턴스 장애 복구(redo로 roll forward → commit 안 된 건 undo로 roll back). - PMON: 죽은 세션/프로세스의 자원(PGA 등) 회수. WAL — 로그 먼저, 데이터 나중 (핵심 원리) 1. UPDATE 발생 → 2. Redo Log Buffer 먼저 기록 → 3. Buffer Cache 블록 변경 → 4. COMMIT 시 LGWR가 Redo 파일 기록 → 5. DBWR가 나중에 데이터파일 반영. - 왜: 데이터파일 갱신은 랜덤 write라 느림, redo는 append라 빠름. 정합성은 redo로 보장, 실제 쓰기는 미룸. - ★ Fast Commit: commit = \"데이터파일에 다 썼다\"가 아니라 \"복구 가능한 redo가 디스크에 안전히 기록됐다\". - 복구: 장애 시 checkpoint 이후 redo로 roll forward → commit 안 된 것 undo로 roll back. 프로세스 vs 스레드 모델 - 프로세스 기반(Oracle/PostgreSQL): 유저 1명 = 서버 프로세스 1개(Dedicated). 세션·커서·트랜잭션 상태 분리, PGA가 프로세스 전용이라. 격리 좋음, 생성 비쌈. - 스레드 기반(MySQL): 커넥션마다 스레드. 가볍고 빠름, 하나 크래시가 전체 영향 가능. - ★ Too Many Connections: 유저 1000명=프로세스 1000개=PGA 1000개 → 메모리 폭증·context switching↑ → 커넥션 풀 필요. 커넥션 풀 (요약) - 정의: 커넥션을 미리 N개 만들어 빌려주고 반납. 유저 수와 DB 커넥션 수를 분리해 DB 보호. - ★ 크기: 작으면 대기, 크면 DB 프로세스 폭증. 느린 쿼리·누수·롱 트랜잭션이 풀 고갈 유발. WAS에서 max/min/timeout/validation 설정. DB 기동 3단계 (역할이 다름) - NOMOUNT: parameter file 읽어 SGA·백그라운드 프로세스 기동. 인스턴스만 생김. 파일 안 붙음. - MOUNT: control file 열어 데이터·리두 파일의 \"지도\"(위치·checkpoint 메타) 확보. 데이터 접근 불가. 복구 판단·파일 이동이 여기서. - OPEN: 데이터파일 열고 정합성 확인(필요시 recovery). 사용자 SQL 가능. ★ \"RAM에 다 올림\"이 아니라 \"서비스 가능한 정합성 상태\". - 순서 불가역: parameter→control→datafile. 실패 단계로 원인 분리(NOMOUNT=파라미터/메모리, MOUNT=컨트롤파일, OPEN=데이터파일/복구). - Shutdown은 역순(close→unmount→종료). 실무 기본 shutdown immediate. 한문장: \"Instance가 파일을 대신 다루고, SGA(공유)·PGA(전용)로 메모리를 나누며, LGWR가 redo를 먼저 써 정합성을 보장하고 DBWR가 나중에 데이터를 내린다. 기동은 NOMOUNT→MOUNT→OPEN으로 점검하며 올린다.\" 5. 데이터 모델링 (정규화·관계·자료형) 정규화: 정의: 중복 제거해 이상 현상 막는 설계. 각 데이터가 한 곳에만. 이상 현상 3종: 삽입 이상(불필요 데이터 없이 못 넣음)/갱신 이상(중복 하나만 고쳐 불일치)/삭제 이상(지우면 딸린 정보 소실). 단계(보통 3NF까지): 1NF 원자값 / 2NF 부분 종속 제거 / 3NF 이행 종속 제거. 암기: \"키에, 전체 키에, 오직 키에만 종속되게.\" 반정규화(5년차 핵심): 정의: 의도적으로 중복 허용해 조회 성능↑. 인과: 정규화하면 조인 많아져 느림. 자주 함께 읽는 데이터를 중복 저장해 조인 감소. 예: 주문에 user_name 중복. ★ 트레이드오프: 얻음=읽기 속도, 잃음=쓰기 복잡+정합성 위험(갱신 시 여러 곳 동기화). 원칙: \"정규화로 설계하고, 병목 증명되면 선택적으로 반정규화.\" 처음부터 반정규화 X. 관계(1:1, 1:N, N:N): - 1:1: 드묾(보안·분리). - 1:N: 가장 흔함. N쪽에 FK(주문에 user_id). - N:N: 직접 표현 불가 → 중간 테이블로 1:N+1:N 분해. ★ 중간 테이블: enrollment(student_id, course_id, 신청일, 성적). 두 FK 인덱스, 보통 복합 PK. 관계 자체의 속성(신청일/성적)을 담을 수 있는 게 진짜 이점. 조인 키(FK)에 인덱스 필수. 키: - PK: 유일 식별, NULL 불가. 보통 클러스터 인덱스. - FK: 다른 테이블 PK 참조. 참조 무결성 보장. ★ 자연 키 vs 대리 키: 자연(주민번호/이메일, 바뀔 수 있고 노출 위험) vs 대리(auto_increment/UUID, 의미 없고 안 변함=실무 기본). - auto_increment(순차, 인덱스 효율 좋지만 예측가능·분산 충돌) vs UUID(전역 유일·분산 유리, 랜덤이라 인덱스 삽입 저하) → 순차 UUID(v7)로 절충. 자료형과 용량: 정의: 타입 선택이 공간·성능·정합성 직결. \"대충 VARCHAR(255)\" 금지. - 정수: TINYINT(1B)/SMALLINT(2B)/INT(4B)/BIGINT(8B). 범위 보고 최소로. 21억 넘으면 BIGINT. - 실수: FLOAT/DOUBLE(오차) vs DECIMAL(정확). ★ 금액은 반드시 DECIMAL(FLOAT는 반올림 사고). - 문자: CHAR(고정, 국가코드) vs VARCHAR(가변, 대부분) / TEXT(대용량, 인덱스 제약). - 날짜: DATE/DATETIME(8B)/TIMESTAMP(4B, UTC 변환·2038 한계). - ★ TIMESTAMP(UTC 저장·타임존 자동변환·절약, 2038 문제) vs DATETIME(범위 넓음·타임존 없음). - 불리언: MySQL은 TINYINT(1). JSON: 유연하나 인덱싱·정합성 약함(남용 주의). ★ 왜 아끼나: 행 작을수록 한 페이지에 더 많은 행→같은 I/O로 더 읽음→버퍼 풀 효율↑. 인덱스 컬럼 작을수록 빠름. 한문장: \"타입은 필요 범위의 최소로, 금액은 DECIMAL, 날짜는 타임존 요구로 TIMESTAMP/DATETIME 구분. 행이 작아야 페이지·인덱스 효율↑.\" 스키마 설계 대표 케이스: - 이력/변경 추적: 현재값+이력 테이블 분리, 또는 유효기간(valid_from/to). - 상태 관리: 상태 컬럼+전이 로그(pending→paid→shipped). - 계층 구조: 인접 리스트(parent_id) vs 경로 열거 vs 클로저 테이블. - 소프트 삭제: deleted_at 플래그(복구·감사). - 다형 관계: target_type+target_id(댓글이 게시글·사진 등에). - 감사: created_at/updated_at/created_by 공통 컬럼. ★ 원칙: \"정규화 기본, 읽기 패턴 보고 인덱스·반정규화 추가. 키는 대리키, 금액은 DECIMAL, 삭제는 대개 소프트 삭제.\""}, {"title": "DB 부가 설명", "kind": "부가 설명", "url": "doc_7_db_supplement.html", "text": "[문서7] DB 부가 설명 — 난이도 있는 개념 보충 문서6에서 한 번 더 파고들 가치가 있는 것들. --- ① 인덱스 손익분기점 (풀스캔이 나은 경우) - 세컨더리 인덱스 조회 = 행마다 랜덤 I/O(디스크 여기저기). 풀스캔 = 순차 I/O(처음부터 쭉, 효율적). - 읽을 행이 많아지면 랜덤 I/O 수십만 번 < 순차로 다 읽기 → 풀스캔 승. - 경험칙: 전체의 5~20%(≈10%) 넘게 읽으면 풀스캔 유리. 단 행 크기/클러스터링/SSD로 변동. - 옵티마이저가 selectivity 추정해 자동 판단. force index가 독이 될 수 있음. ② 통계 갱신의 양날 (plan regression) - 통계 갱신 → 계획 재작성 → 잘 돌던 쿼리가 더 느린 계획으로 바뀔 수 있음(퇴행). - ANALYZE 자체가 대형 테이블에선 부하 → 바쁜 시간엔 마비 위험. - 대응: 한가한 시간+샘플링+계획 검증+중요 쿼리는 계획 고정. ③ WAL & LSN — 커밋 넘버링으로 순차 저장 보장 정의: 모든 변경(로그 레코드)에 단조 증가하는 순번 LSN(Log Sequence Number) 부여 = 절대 순서. 왜 순번이 필요: - 순서 보장: 크래시 복구 시 WAL을 LSN 순서로 재생(replay) → 바뀐 순서 그대로 복구. 순번 없으면 선후 불명 → 복구 불가. - WAL 원칙: \"데이터 페이지를 디스크에 쓰기 전에 그 변경 로그(해당 LSN까지)가 먼저 디스크에.\" 각 페이지는 자신을 마지막 바꾼 LSN을 기록 → 복구 시 \"이 페이지는 LSN 100까지 반영\" 알고 그 지점부터 재생. - 커밋 확정(Durability): 커밋 로그 레코드(특정 LSN)가 디스크에 안전히 기록될 때까지 기다린 뒤 \"커밋 완료\" 응답. 이후 죽어도 재시작 시 그 LSN까지 재생해 되살림. 복구 흐름: 1. 크래시 → 재시작 2. 마지막 체크포인트 LSN부터 WAL 읽기 3. Redo: 커밋된 변경을 LSN 순서로 재적용 4. Undo: 커밋 안 된(진행 중) 트랜잭션 롤백 복제 연결: LSN으로 replication lag 측정(마스터 5000, replica 4800 → 200 뒤처짐). PG=LSN, MySQL=GTID/binlog position. 한문장: \"모든 변경에 단조 증가 LSN을 매겨 절대 순서를 만들고, 데이터보다 로그를 먼저 써(WAL) 커밋 로그가 기록돼야 커밋 확정. 복구는 LSN 순서로 redo/undo, 복제 지연도 LSN 차이로 측정.\" ④ SCN vs RBA (checkpoint의 두 좌표) - SCN(System Change Number): 논리적 시점(시간축 같은 순번). \"언제\"의 기준. - RBA(Redo Byte Address): redo 로그 안의 물리적 위치. \"어디서부터 읽을지\"의 주소. - checkpoint는 이 둘을 control file header + 각 datafile header에 기록 → startup/recovery 때 전체·개별 상태를 비교 판단. - checkpoint의 의미: \"redo가 어디까지 발생했나\"가 아니라 \"datafile이 redo의 어느 시점까지 따라왔나\". 복구 시작점을 앞당겨 recovery 시간 단축. ⑤ Instance Recovery (roll forward → roll back) - 장애 시 메모리는 날아가고 redo 파일만 디스크에 남음. - Roll Forward: 마지막 checkpoint 이후 redo를 재적용(발생한 사실 전체 재생). - Roll Back: 그중 commit 안 된 트랜잭션만 undo로 제거. - 순서 핵심: \"일단 다 재생하고, 나중에 완료 안 된 것만 되돌린다.\" SMON이 수행. ⑥ Hard Parsing & Bind Variable (Shared Pool 보호) - Hard Parse: SQL 새로 분석+문법검사+오브젝트 조회+실행계획 생성. CPU 많이 씀. - 문제: 값만 다른 SQL(WHERE id=1, id=2...)을 Oracle이 다른 SQL로 인식 → 매번 hard parse. - Bind Variable: 값을 변수로(WHERE id=:id) → SQL 구조 동일 → 실행계획 재사용 → hard parse↓. - 핵심: 하드파싱 많으면 CPU 소모+Shared Pool 오염. 바인드 변수는 Shared Pool 보호의 기본 습관. ⑦ PGA 폭증 (batch/parallel 위험) - PGA는 프로세스 전용이라 프로세스 수·작업 크기에 비례해 선형 증가(공유 아님). - 배치: full scan/대량 sort/hash join → 쿼리 하나가 큰 workarea 요구. - 병렬: parallel 8 → worker 8개 → PGA 8배. 동시 배치까지 겹치면 수십 GB → OS 압박·swap. - 위험 조합: Batch + Parallel + 바인드 변수 없음 → PGA 폭증+CPU 폭증+Shared Pool 오염 동시. - 통제: pga_aggregate_target/limit로 상한. sort가 넘치면 TEMP로 spill. ⑧ OLTP vs Batch (튜닝 방향이 다름) - OLTP: 짧고 빠른 트랜잭션, 동시 사용자 많음, 인덱스 사용 → SGA 중심(캐시 효율·동시성). - Batch/DW: 대량 처리, 긴 실행, full scan/sort/hash → PGA 중심(workarea 버티기). - 한 문장: \"OLTP는 SGA, Batch는 PGA.\" ⑨ 가장 흔한 DB 병목 순위 (Oracle 실무 감각) 1. log file sync(commit 병목): commit 잦음/redo 디스크 느림/LGWR latency. 체감=\"저장이 느림\". 2. 동시성 경합(hot block/row lock): 같은 row 집중, sequence/index hotspot. 3. Buffer Cache 부족: SGA 작음/full scan → physical read↑. 4. PGA 폭발: batch/parallel sort·hash. 5. dirty buffer pressure → free buffer waits: update 많은데 DBWR 느림. 6. checkpoint 문제: 너무 드묾 → recovery 시간↑. ⑩ shutdown 옵션 (실무) - normal: 모든 유저 logoff까지 대기(잘 안 끝남, 실무 기피). - transactional: 진행 중 트랜잭션 끝날 때까지 대기. - immediate: 트랜잭션 강제 종료+rollback 후 종료. ★ 실무 기본(통제성·정합성 균형). - abort: rollback 없이 강제 종료(kill -9급). 다음 startup에 recovery 부담↑. 최후 수단. - ★ 공지 없이 immediate = 사고. restricted session으로 신규 차단 후 수행."}, {"title": "DB 완전 기초", "kind": "완전 기초", "url": "doc_8_db_essentials.html", "text": "[문서8] DB 완전 기초 — 모르면 안 되는 상식 강의에서 당연시하고 넘어간 기본기. 이거 틀리면 치명적. --- SQL 분류 - DDL(정의): CREATE, ALTER, DROP, TRUNCATE — 구조 정의 - DML(조작): SELECT, INSERT, UPDATE, DELETE — 데이터 조작 - DCL(제어): GRANT, REVOKE — 권한 - TCL(트랜잭션): COMMIT, ROLLBACK, SAVEPOINT - ★ TRUNCATE vs DELETE: TRUNCATE는 DDL(전체 삭제, 롤백 어려움, 빠름, auto_increment 리셋), DELETE는 DML(조건 가능, 롤백 가능, 느림). SELECT 실행(논리) 순서 FROM → WHERE → GROUP BY → HAVING → SELECT → ORDER BY → LIMIT - ★ WHERE는 그룹화 전 필터, HAVING은 그룹화 후 필터. 그래서 집계함수 조건은 HAVING. - 별칭(SELECT의 alias)은 WHERE에서 못 씀(SELECT가 나중), ORDER BY에선 가능. JOIN 종류 - INNER JOIN: 양쪽 다 매칭되는 것만 - LEFT/RIGHT OUTER: 한쪽 전부 + 매칭(없으면 NULL) - FULL OUTER: 양쪽 전부 - CROSS JOIN: 곱집합(모든 조합) - SELF JOIN: 자기 자신과(계층/비교) 제약조건(Constraint) - PRIMARY KEY: 유일+NOT NULL, 행 식별 - FOREIGN KEY: 다른 테이블 참조, 참조 무결성 - UNIQUE: 중복 금지(NULL은 허용) - NOT NULL: 빈 값 금지 - CHECK: 값 조건(age = 0) - DEFAULT: 기본값 NULL 처리 - NULL = 알 수 없음. NULL과의 비교는 = 아니라 IS NULL / IS NOT NULL. - NULL은 집계에서 제외(COUNT(col)은 NULL 제외, COUNT( )는 포함). - COALESCE(a, b): a가 NULL이면 b. IFNULL/NVL도 유사. 집계 & 그룹 - COUNT/SUM/AVG/MAX/MIN - GROUP BY로 그룹핑, HAVING으로 그룹 필터 - DISTINCT: 중복 제거 트랜잭션 명령 - BEGIN/START TRANSACTION → COMMIT(확정)/ROLLBACK(취소) - SAVEPOINT: 부분 롤백 지점 - 자동 커밋(autocommit): 기본 ON이면 문장마다 커밋. 명시적 트랜잭션은 OFF/BEGIN. 서브쿼리 & 조인 - 서브쿼리: 쿼리 안의 쿼리. WHERE/FROM/SELECT절에. - 상관 서브쿼리: 외부 쿼리 값 참조(행마다 실행, 느릴 수 있음). - 대개 JOIN이 서브쿼리보다 옵티마이저에 유리한 경우 많음. 뷰(View) & 인덱스 기본 - 뷰: 저장된 쿼리(가상 테이블). 복잡 쿼리 재사용·보안(컬럼 제한). 물리 저장 X(머티리얼라이즈드 뷰는 저장). - 인덱스 생성: CREATE INDEX idx ON t(col). UNIQUE INDEX는 중복 방지 겸용. RDB vs NoSQL - RDB: 정해진 스키마, ACID, 조인. 정합성 중요한 것(금융, 주문). - NoSQL: 유연 스키마, 수평 확장, 빠름. 문서(MongoDB)/키-값(Redis)/컬럼(Cassandra)/그래프. - 선택: 정합성·복잡 관계=RDB, 대용량·유연·확장=NoSQL. 섞어 씀. 기본 용어 - 스키마: DB 구조 정의(테이블·관계·제약). / 인스턴스: 특정 시점 실제 데이터. - 튜플(행)/애트리뷰트(컬럼)/도메인(값 범위). - 카디널리티: 컬럼 값의 고유 종류 수(높으면 인덱스 효과 좋음)."}, {"title": "DB 확인 질문", "kind": "확인 질문", "url": "doc_9_db_checkquestions.html", "text": "[문서9] DB 확인 질문 — 핵심 점검용 문서6~8 각 개념을 듣고 나올 후속 질문. \"핵심을 제대로 짚었나\" 재확인용. 이해했다면 1~2문장으로 바로 답할 수 있어야 함. --- 1. 인덱스 - 인덱스가 없으면 어떻게 검색하나? 있으면 복잡도는? - 왜 이진트리가 아니라 B+Tree를 쓰나? (2가지) - B+Tree가 범위 검색에 강한 이유? - 해시 인덱스가 기본이 아닌 이유? - 클러스터형과 논클러스터형 차이? 테이블당 클러스터는 몇 개? - 세컨더리 인덱스의 2단계 조회란? 이게 왜 커버링 인덱스로 이어지나? - 인덱스의 단점 2가지? - 인덱스가 안 타는 경우 3개? 공통 원칙은? - 풀스캔이 인덱스보다 나은 경우? 대략 몇 % 기준? 2. 쿼리 최적화 - EXPLAIN에서 type=ALL이 뜻하는 것? - 커버링 인덱스를 한 문장으로? - 복합 인덱스 (a,b,c)에서 WHERE b=2는 타나? 왜? - 등호와 범위 조건, 복합 인덱스에서 어느 걸 앞에 두나? - \"어제까진 빨랐는데 오늘 느림\" — 무엇을 의심? (통계) - 통계 갱신이 위험할 수 있는 이유 2가지? - 조인 알고리즘 3가지와 각각 언제? - 조인 키에 인덱스가 없으면? 3. 트랜잭션/동시성 - ACID 각각 한 단어로? - 원자성·지속성은 무엇으로 구현? (WAL) - 격리 수준 4단계와 각각 막는 이상 현상? - MySQL과 PostgreSQL 기본 격리 수준? - MVCC를 한 문장으로? \"읽기는 ___을 안 건다\"? - 데드락 예방법? - 비관적 락과 낙관적 락 차이? 각각 언제? 4. 아키텍처 - Database와 Instance 차이? - SGA와 PGA 차이? 정렬/해시는 어디서? - 백그라운드 프로세스 5개와 역할? (DBWR/LGWR/CKPT/SMON/PMON) - commit 순간 가장 중요한 프로세스는? (DBWR? LGWR?) - WAL에서 로그와 데이터 중 뭐가 먼저? - Fast Commit의 의미? - 버퍼 상태 3종? Dirty가 많으면 뭘 의심? - 커넥션 풀이 왜 필요? 크기는 크면 좋은가? - DB 기동 3단계와 각 단계 역할? 실패 단계로 뭘 진단? 5. 데이터 모델링 - 정규화가 막는 이상 현상 3가지? - 3NF를 한 문장으로? - 반정규화는 무엇을 얻고 무엇을 잃나? - N:N을 어떻게 표현? 중간 테이블의 진짜 이점? - 자연 키와 대리 키 차이? 실무 기본은? - auto_increment와 UUID의 트레이드오프? - 금액에 FLOAT를 쓰면 안 되는 이유? - TIMESTAMP와 DATETIME 차이? - 타입을 작게 쓰면 왜 성능에 유리? 6. 실전 - N+1 문제란? 어떻게 해결? - N+1이 로컬에서 안 보이는 이유? - 슬로우 쿼리 튜닝 순서? - 복제에서 읽기/쓰기 분리 원리? 복제 지연 문제는? - 샤딩과 파티셔닝 차이? 샤드 키가 왜 중요? - ORM 함정 3가지? - OFFSET 페이지네이션이 느린 이유? 대안은? 6-B. 기초 - DDL/DML/DCL/TCL 구분? - TRUNCATE와 DELETE 차이? - SELECT 논리 실행 순서? WHERE와 HAVING 차이? - NULL 비교는 어떻게? COUNT( )와 COUNT(col) 차이? - INNER/LEFT/FULL JOIN 차이? - RDB와 NoSQL 선택 기준? 종합 - \"인덱스를 설계하고 쿼리를 튜닝하는 전체 과정을 설명해보라.\" - \"트랜잭션이 커밋되고 장애가 나도 데이터가 살아남는 원리를 설명해보라.\" - \"목록 API가 느리다. 어떤 순서로 원인을 찾고 개선하나?\""}, {"title": "DB 실전편", "kind": "실전편", "url": "doc_10_db_practical.html", "text": "[문서10] DB 실전편 — 실무·경험 기반 이론이 아니라 \"실무에서 어떻게 쓰고, 면접에서 경험을 어떻게 말하나\". 각 항목: 개념 → 실무 포인트 → 경험 서술. --- 1. N+1 문제 (ORM 최대 함정) 정의: 목록 N개 조회 후 각 항목의 연관 데이터를 N번 더 쿼리 → 총 1+N번. ORM 지연 로딩(lazy) 때문에 자기도 모르게 발생. 예: 게시글 10개(1번) → 작성자 각각(10번) = 11번. 1000개면 1001번. 해결: 즉시 로딩/조인으로 한 번에. - JPA: fetch join, @EntityGraph - Django: select_related(1:1,N:1) / prefetch_related(N:N,1:N) - TypeORM/Sequelize: relations / include - 핵심: \"한 번의 조인 or IN 쿼리로 묶는다.\" ★ 로컬(데이터 적음)에선 안 보이다 운영에서 터짐. 쿼리 로깅 켜서 실제 쿼리 수 확인이 방어책. 경험: \"목록 API가 느려 쿼리 로그 보니 N+1이었고, fetch join으로 11번→1번으로 줄였다.\" 2. 슬로우 쿼리 튜닝 흐름 1) 슬로우 쿼리 로그로 느린 쿼리 식별(임계 시간) 2) EXPLAIN으로 실행 계획 확인(type=ALL 풀스캔인가, 인덱스 타는가) 3) 인덱스 추가/수정 or 쿼리 재작성(컬럼 가공 제거) 4) 재측정 5) 필요시 반정규화·캐싱·페이지네이션 경험: \"슬로우 로그로 잡은 쿼리가 YEAR(date) 가공 때문에 인덱스를 못 타서, 범위 조건으로 바꿔 풀스캔을 없앴다.\" 3. 복제(Replication) & 읽기/쓰기 분리 정의: 마스터(쓰기)-레플리카(읽기) 복제. 읽기 트래픽을 레플리카로 분산. 인과: 읽기 압도적으로 많은 서비스에서 쓰기는 마스터 1대, 읽기는 여러 레플리카로. WAL/binlog를 레플리카가 재생해 동기화(LSN). ★ 복제 지연(replication lag): 마스터에 쓴 게 레플리카 반영까지 시간차 → \"방금 쓴 걸 바로 읽었는데 없음\"(read-your-writes). 중요한 직후 조회는 마스터로. 경험: \"읽기 부하가 커서 레플리카로 조회를 분산했고, 결제 직후 조회는 lag 때문에 마스터로 라우팅했다.\" 4. 샤딩 & 파티셔닝 파티셔닝: 한 DB 안에서 큰 테이블을 기준(날짜/범위/해시)으로 조각. 필요한 파티션만 스캔(프루닝). 샤딩: 데이터를 여러 DB 서버에 수평 분할. 한 대로 감당 안 될 때. - ★ 샤드 키 선택이 핵심: 잘못 고르면 특정 샤드 몰림(hotspot). - 대가: 샤드 간 조인·트랜잭션 어려움, 재분배 복잡 → \"정말 필요할 때만.\" 경험: \"로그 테이블이 커져 월 단위 파티셔닝으로 조회·삭제를 파티션 단위로 처리했다.\" 5. 데드락 실전 대응 - 데드락 로그로 충돌한 쿼리 확인 - 락 획득 순서 통일(순환 제거) - 트랜잭션 짧게 - 인덱스로 락 범위 축소(범위 넓으면 갭 락으로 충돌↑) 경험: \"두 배치가 반대 순서로 테이블을 잠가 데드락 → 락 순서를 통일해 해결.\" 6. ORM 함정 모음 - N+1(위) - SELECT : 불필요 컬럼까지 → 필요 컬럼만 지정 - 트랜잭션 경계 모호 → 롱 트랜잭션 유발 - 대량 처리에 ORM: 수만 건 반복 저장 느림 → bulk insert/raw query - 지연 로딩 남발 → N+1 - 원칙: \"ORM은 편하지만 나가는 SQL을 항상 의식하라. 로깅으로 검증.\" 7. 대용량/성능 실무 기타 - 페이지네이션: OFFSET 큰 값은 느림(앞의 것 다 세고 버림) → 커서 기반(WHERE id 마지막id)이 효율적. - 벌크 연산: 반복 INSERT 대신 배치 INSERT, UPDATE는 조건 묶어서. - 커넥션 풀 고갈: 느린 쿼리·누수·롱 트랜잭션 확인(문서6 4강). - 캐싱: 자주 읽고 덜 바뀌는 데이터는 Redis(cache-aside), 무효화 주의(네트워크 문서5). - 인덱스 재구성: 대량 삭제·갱신 후 인덱스 단편화 → 재빌드 고려. 8. 서브쿼리·조인 남발·쿼리 지옥 왜 지옥: 조인/서브쿼리 자체는 문제 아님. 옵티마이저가 감당 못 하는 복잡도가 문제. - 조인 남발: 5~6개+ 조인이면 옵티마이저가 조인 순서 경우의 수 폭증→나쁜 계획. 조인 키 인덱스 없으면 재앙. - 중첩 서브쿼리: 상관 서브쿼리(외부 값 참조)는 행마다 반복 실행→O(n²)처럼. - 가독성 지옥: 5단 중첩은 6개월 뒤 나도 못 읽음. 해법: - 상관 서브쿼리→JOIN(옵티마이저 유리). - 깊은 중첩→CTE(WITH)로 평탄화, 단계별 이름. - 너무 복잡하면 쿼리 쪼갬(앱에서 나눔/임시 테이블). - 반정규화·집계 테이블(매번 무거운 조인 대신 미리 계산). - EXPLAIN으로 검증. ★ 원칙: \"조인·서브쿼리 많다고 나쁜 게 아니라 옵티마이저가 이해 못 하거나 사람이 못 읽으면 나쁘다. 인덱스로 옵티마이저 돕고, CTE로 사람 돕고, 정 안 되면 쪼갠다.\" 9. 복잡도 경험을 면접에서 녹여내는 법 나쁜 예(숫자 자랑): \"8개 테이블 조인 짰습니다\" → 못 읽는 쿼리 자백일 수도. 좋은 예(문제→판단→결과): \"정산 리포트 6테이블 조인이 3초 넘어서, EXPLAIN 보니 조인 키 인덱스 없어 풀스캔 겹침. 인덱스 걸고 매번 계산하던 집계를 일 단위 집계 테이블로 반정규화해 300ms로. 대신 갱신 배치를 새벽에 돌리는 트레이드오프 감수.\" 구조: ①구체 상황 ②진단 도구(EXPLAIN) ③원인 ④해결 ⑤트레이드오프 인식. ★ 핵심: \"복잡한 걸 다뤄봤다\"가 아니라 \"복잡한 걸 단순하게 만들 줄 안다\". 진짜 시니어는 복잡한 쿼리를 자랑 안 하고 안 복잡하게 만든 이야기를 함. 10. Python MySQL 라이브러리 - mysql-connector-python: 공식, 순수 파이썬. - PyMySQL: 순수 파이썬, 가볍고 널리 씀. - mysqlclient: C 확장, 빠름(컴파일 의존성). - SQLAlchemy: ORM/쿼리 빌더(위 드라이버 위). Core는 SQL에 가깝게, ORM은 객체 매핑. ★ 실무: - 커넥션 풀 사용(SQLAlchemy/DBUtils). - ★ 파라미터 바인딩 필수: execute(\"...WHERE id=%s\", (uid,)). f-string 금지(SQL 인젝션). 타협 불가. - with 문으로 커서·커넥션 관리(안 닫으면 누수). 11. NestJS에서 ORM 대신 생 SQL 언제: ORM 쿼리가 비효율(N+1/불필요 조인), 복잡 집계·윈도우 함수·DB 고유 기능, 성능 critical 핫패스. TypeORM: - dataSource.query('SELECT ... WHERE age $1', [18]) — 완전 생 SQL(파라미터 바인딩). - createQueryBuilder — SQL에 가깝지만 타입 안전. ★ 판단: 기본은 ORM(생산성·타입·유지보수), 필요한 곳만 생 SQL(성능·복잡). 전부 생 SQL=역행, 전부 ORM=성능 포기. 파라미터 바인딩 필수(인젝션). \"종교 전쟁 아니라 케이스별 도구 선택.\""}, {"title": "Prisma", "kind": "Prisma 기본", "url": "doc_48_db_dbprisma.html", "text": "[문서48] Prisma — 셋업·스키마·쿼리 기본 (ORM 실무) Next.js에서 Prisma를 쓸 때 알아야 할 것 정리. 라이브러리 일반 동작(문법·명령어) + 자주 쓰는 쿼리 케이스 + 내부 처리 멘션 결합. ★ 집중 환기용 원자료. --- 1. 셋업 순서 한 줄 지도 - migrate와 generate는 완전히 다른 대상을 건드린다(아래 3번). - migrate dev 는 내부적으로 generate를 포함하므로 개발 중엔 보통 migrate만 신경 쓰면 됨. 2. 기본 파일 셋업 (Next 기준) 클라이언트 인스턴스(싱글톤) — Next 개발 모드 hot reload에서 연결이 계속 새로 생기는 걸 막는다. 3. migrate vs generate — 무엇이 다른가 (핵심) 둘은 서로 다른 대상을 만든다. - prisma migrate — DB 스키마 를 바꾼다. 스키마 파일의 변경을 실제 테이블 구조로 반영하고 prisma/migrations/ 에 SQL 기록을 남김. - migrate dev --name xxx : 개발용. 마이그레이션 파일 생성 + DB 적용 + generate까지 자동. - migrate deploy : 배포용. 이미 만든 마이그레이션 파일을 프로덕션 DB에 적용만(새로 안 만듦). - migrate reset : DB 날리고 처음부터. - prisma generate — DB를 안 건드린다. 스키마를 읽어 node_modules/@prisma/client 에 타입 붙은 클라이언트 코드를 생성. 이게 있어야 prisma.product.findMany() 자동완성·타입이 나옴. - 스키마 필드만 바꾸고 DB 구조 변경이 필요 없을 때, 또는 npm install 직후 클라이언트 재생성이 필요할 때 단독으로. - db push (마이그레이션 파일 없이 스키마를 DB에 바로 밀어넣기, 프로토타이핑용)와 헷갈리지 말 것. ★ 한 줄: migrate는 데이터베이스를, generate는 타입스크립트 클라이언트 코드를 만든다. generate를 따로 부르는 건 CI/빌드 단계나 클라이언트만 갱신할 때. 4. 스키마 정의 문법 자주 쓰는 문법: @id , @default() , @unique , @relation , ? (nullable), [] (리스트/관계), @db.타입 (DB 네이티브 타입), 모델 레벨 @@index([...]) · @@unique([...]) . 5. 기본 CRUD findUnique vs findFirst : findUnique는 @id / @unique 필드로만 조회 가능하고 내부 최적화가 더 걸림. 비고유 조건이면 findFirst. 6. where — 필터 연산자 7. 정렬·페이지네이션·부분선택 - select (이것만) vs include (관계 추가로) — 동시 사용 불가. - 커서 페이지네이션(대용량에 유리, offset보다 성능 좋음): 8. 조인(관계 조회) — include / select Prisma엔 SQL의 JOIN 키워드가 없다. 관계 필드를 include/select로 가져오면 처리됨. ★ (내부 처리 멘션) 기본은 관계마다 별도 쿼리 후 앱에서 병합 . relationLoadStrategy: \"join\" 지정 시 DB 단일 LATERAL JOIN 한 방으로 전환(Postgres). 관계 쓰기(연결/생성): 9. 집계 — aggregate / groupBy / count 10. 트랜잭션 & 원자 연산 원자적 필드 연산: ★ (내부 처리 멘션) increment 등은 DB에서 SET stock = stock - 1 로 원자적 처리 → race condition 회피. stock: p.stock - 1 처럼 읽어온 값으로 계산하면 동시성 문제가 생기니 이 방식이 안전. 11. Raw 쿼리 ★ (내부 처리 멘션) 태그드 템플릿의 보간값은 파라미터 바인딩 으로 처리되어 SQL 인젝션이 자동 방지됨. $queryRawUnsafe 는 문자열 보간이라 위험 → 신뢰 가능한 입력에만. 12. 내부적으로 그렇게 처리되는 것들 (멘션 모음) - 관계 로딩: include/select는 기본 관계마다 별도 쿼리 후 앱에서 병합 . relationLoadStrategy: \"join\" 이면 DB 단일 JOIN. - findUnique 배칭: 같은 tick에 여러 findUnique가 나가면 자동으로 하나의 IN 쿼리로 배칭 → N+1 완화. - 원자 연산/트랜잭션: increment 등과 $transaction 은 DB 레벨에서 원자적 실행. - $queryRaw 태그드 템플릿: 보간값이 파라미터 바인딩 → 인젝션 방지. 핵심 요약 (한 문단) Prisma 셋업은 schema 작성 → migrate(DB 구조 변경, migrations 폴더에 SQL 기록) → generate(타입 붙은 클라이언트 코드 생성, DB 안 건드림) → 싱글톤 PrismaClient 인스턴스 순이며, migrate dev는 generate를 포함한다. 스키마는 model + @id / @default / @unique / @relation / ? / [] / @db.타입 으로 정의하고, 쿼리는 CRUD + where 연산자 + orderBy/skip/take + select/include로 구성한다. 조인 키워드는 없고 관계 필드를 include/select로 가져오면 기본은 별도 쿼리 병합(옵션으로 단일 JOIN), findUnique는 자동 IN 배칭으로 N+1을 완화한다. 집계는 aggregate/groupBy(having)/count, 동시성은 원자 연산(increment)과 $transaction으로 DB 레벨에서 안전하게, raw는 태그드 템플릿의 파라미터 바인딩으로 인젝션을 막는다."}, {"title": "자료구조·알고리즘 기본", "kind": "기본 설명", "url": "doc_11_algo_basic.html", "text": "[문서11] 자료구조·알고리즘 기본 — 면접 실전용 포맷: 용어 정의 → 핵심 개념(한두 줄) → 문제/인과관계 핵심은 암기가 아니라 \"복잡도로 사고하고 상황에 맞는 자료구조를 고르는 것\". --- 1. 시간/공간 복잡도 (Big-O) 정의: 입력 n이 커질 때 연산 횟수/메모리가 어떻게 증가하는지. 상수·낮은 차수 무시, 지배적 증가율만. 인과: n 충분히 크면 증가율이 성능 지배. n=100만이면 O(n) vs O(n²)는 100만 배. 상수 2배는 무의미. 증가율(느린→빠른): - O(1) 상수: 배열 인덱스, 해시 조회 - O(log n): 이진 탐색, 균형 트리 - O(n): 배열 순회 - O(n log n): 효율적 정렬(병합/퀵/힙) - O(n²): 이중 루프, 버블 - O(2ⁿ): 부분집합 완전탐색 - O(n!): 순열 완전탐색 ★ 최악/평균/최선: 퀵정렬 평균 O(n log n)/최악 O(n²)(정렬된 데이터+나쁜 피벗). 해시 평균 O(1)/최악 O(n)(충돌). \"평균만 말하면 반쪽, 최악을 알아야 안전.\" ★ 분할상환(amortized): 동적 배열 append 대부분 O(1), 가끔 O(n)(2배 확장). 평균 O(1). 2. 배열 vs 연결 리스트 정의: 둘 다 순차 데이터, 저장 방식 다름. - 배열: 연속 메모리. 인덱스 접근 O(1), 중간 삽입/삭제 O(n), 캐시 친화적. - 연결 리스트: 포인터 연결(흩어짐). 인덱스 접근 O(n), 삽입/삭제 O(1)(위치 알면), 포인터 오버헤드. 인과: 배열은 연속이라 인덱스 계산으로 바로 접근+캐시 유리 → 실무 기본(동적 배열). 연결 리스트는 삽입/삭제 잦고 위치 아는 특수 상황. 3. 스택 & 큐 - 스택(Stack): LIFO 후입선출. 함수 호출스택, undo, 괄호 검사, DFS. - 큐(Queue): FIFO 선입선출. 작업 대기열, BFS, 메시지 큐. - 덱(Deque): 양쪽 삽입/삭제. - 우선순위 큐: 우선순위 순으로 꺼냄 → 보통 힙으로 구현. 4. 해시 테이블 (실무 최다) 정의: 키를 해시 함수로 인덱스 변환해 저장. 평균 O(1) 조회/삽입/삭제. 인과: 해시 함수가 인덱스 바로 계산 → 탐색 없이 접근. - 충돌: 다른 키가 같은 인덱스 → 체이닝(연결 리스트)/개방 주소법(다음 빈자리). - ★ 최악 O(n): 충돌 몰리면 한 버킷에 쌓여 순회. 좋은 해시 함수+부하율(load factor) 중요. 넘으면 리해싱(더 큰 배열 재배치). 실무: dict/map/HashMap. \"빠른 조회=해시\" 반사. 5. 트리 & 이진 탐색 트리(BST) 정의: 트리=계층(부모-자식). BST=왼쪽<부모<오른쪽 → 탐색 O(log n). ★ 균형 문제: 삽입 순서 나쁘면(정렬 데이터) 한쪽 치우쳐 O(n) 퇴화(연결 리스트化). - 해결: 균형 트리 AVL/레드-블랙(자동 재균형, O(log n) 보장). Java TreeMap/C++ map=레드-블랙. - B-Tree/B+Tree: 디스크용(DB 인덱스). 노드에 여러 키→낮고 넓음. 6. 힙(Heap) 정의: 부모가 자식보다 항상 크거나(최대) 작은(최소) 완전 이진 트리. 최대/최솟값 O(1) 확인, O(log n) 삽입/삭제. 용도: 우선순위 큐, Top-K(가장 큰/작은 K개), 힙 정렬, 다익스트라. \"최댓값 계속 빠르게 꺼내면 힙\" 반사. --- 7. 정렬 알고리즘 정의: 순서대로 나열. \"최고\"가 아니라 상황에 맞는 선택. 특성(5년차는 특성으로 기억): - 버블/선택/삽입: O(n²). 작은 데이터·거의 정렬된 것(삽입정렬). 삽입만 안정. - 병합(Merge): 평균/최악 다 O(n log n), 공간 O(n), 안정. 최악 보장·안정 필요할 때. - 퀵(Quick): 평균 O(n log n)/최악 O(n²), 제자리·캐시 유리. 실무 기본. - 힙(Heap): O(n log n) 보장+제자리, 상수 큼. ★ 포인트: - 퀵이 실무 기본: 평균 빠름+제자리+캐시 친화. 최악 O(n²)(정렬 데이터+나쁜 피벗)→피벗 랜덤/중앙값으로 회피. - 병합: 최악도 O(n log n)+안정. 단 O(n) 추가 메모리. - 안정 정렬: 같은 값 원래 순서 유지(\"이름순 후 나이순\"에서 이름 순서 유지 필요 시). - 실무 정렬(Java/Python)=Timsort(병합+삽입 하이브리드, 안정, 거의 정렬된 데이터 빠름). 8. 이진 탐색 정의: 정렬된 배열에서 중간값 비교해 절반씩 줄임. O(log n). 인과: 매번 후보 절반 → 100만도 20번. 전제=정렬돼 있어야. 한 번 정렬 후 여러 번 탐색 시 유리. ★ Lower/Upper Bound: \"이 값 이상이 처음 나오는 위치\" 변형. 범위 쿼리·삽입 위치. off-by-one 자주 틀림. 9. 재귀 & 분할 정복 - 재귀: 함수가 자신 호출, 같은 형태 작은 문제로. - 분할 정복: 반으로 나눠 각각 풀고 합침. 병합/퀵/이진탐색의 뼈대. ★ 주의: - 스택 오버플로우: 너무 깊으면 호출 스택 넘침 → 반복문 변환/꼬리 재귀. - 중복 계산: 순진한 피보나치=O(2ⁿ) 반복 → 메모이제이션/DP(3강). 10. 그래프 탐색 DFS & BFS - DFS(깊이 우선): 끝까지 갔다 되돌아옴. 스택/재귀. 경로 존재, 사이클 검출, 위상 정렬. - BFS(너비 우선): 가까운 것부터 층층이. 큐. 최단 경로(가중치 없을 때), 레벨 탐색. ★ 선택: \"최단 거리(간선 수)\"→BFS / \"모든 경로·백트래킹\"→DFS. 둘 다 O(V+E). 11. 백트래킹 정의: DFS로 모든 경우 탐색하되 가망 없으면 즉시 되돌아감(가지치기)로 공간 축소. 순열/조합, N-Queens, 스도쿠, 미로. 핵심: \"해보고 안 되면 되돌린다.\" 완전 탐색이지만 pruning으로 실용적 속도. --- 12. 동적 계획법(DP) 정의: 큰 문제를 작은 부분 문제로 쪼개고 답을 저장해 재사용. 중복 계산 해결. 두 조건: 겹치는 부분 문제(같은 작은 문제 반복)+최적 부분 구조(큰 최적해가 작은 최적해로 구성). 구현: Top-down(메모이제이션, 재귀+캐싱) / Bottom-up(타뷸레이션, 표 채워 올라감, 스택오버플로우 없음). ★ 어려움=상태 정의+점화식 찾기. O(2ⁿ) 완전탐색을 O(n²)/O(n)으로. 예: 피보나치 O(2ⁿ)→O(n), 배낭, LCS, 편집 거리. 13. 그리디 정의: 매 순간 당장 최선 선택(지역 최적). 인과: 통하려면 지역 최적 연속이 전역 최적 되는 구조(그리디 선택 속성+최적 부분 구조). - 안 통하는 예: 동전[1,3,4]로 6원 → 그리디 4+1+1=3개, 최적 3+3=2개. 이땐 DP. ★ 그리디 vs DP: 그리디 빠르지만 항상 옳지 않음, DP 느리지만 항상 최적. \"그리디가 맞다는 증명\"되면 그리디. 대표: 회의실 배정, 허프만, MST. 14. 최단 경로 - BFS: 가중치 없는 최단 경로. O(V+E). - 다익스트라: 양의 가중치. 매번 가장 가까운 노드 확정(그리디)+우선순위 큐. O((V+E)log V). 내비. - 벨만-포드: 음의 가중치 허용, 음수 사이클 검출. O(VE) 느림. - 플로이드-워셜: 모든 쌍. O(V³). 노드 적을 때. ★ 선택: 가중치 없음→BFS, 양수→다익스트라, 음수→벨만-포드, 모든 쌍→플로이드. \"음수면 다익스트라 못 씀\"이 함정. 15. 최소 신장 트리(MST) 정의: 모든 노드를 최소 비용으로 연결(사이클 없이). 네트워크/도로. - 크루스칼: 간선 가중치 순 정렬→사이클 안 생기게 추가. Union-Find로 검사. O(E log E). - 프림: 한 노드서 시작해 가장 싼 간선으로 확장. 힙. 16. Union-Find (서로소 집합) 정의: 원소가 어느 그룹인지 빠르게 관리. \"같은 그룹인가\"+\"합치기\"를 거의 O(1). 핵심: 경로 압축+랭크로 거의 상수. 사이클 검출, 연결성, 그룹핑. \"연결 관계·그룹\"이면 반사. 17. 위상 정렬 정의: 방향 그래프에서 순서 제약 지키는 나열(선수→후수). 사이클 없는 DAG만. 용도: 작업 스케줄링, 빌드 의존성, 강의 선후. DFS 또는 진입차수(in-degree) BFS. 알고리즘 선택 치트 (실무 반사) - 정렬된 데이터 찾기 → 이진 탐색 - 빠른 조회/중복 체크 → 해시 - 최댓값 계속 꺼내기/Top-K → 힙 - 최단 거리(가중치 없음) → BFS - 최단 거리(양의 가중치) → 다익스트라 - 모든 경로/조합 → DFS/백트래킹 - \"최적\"인데 그리디 틀림 → DP - 연결 관계/그룹 → Union-Find - 순서 제약 나열 → 위상 정렬 - 최소 비용 연결 → MST"}, {"title": "알고리즘 부가 설명", "kind": "부가 설명", "url": "doc_12_algo_supplement.html", "text": "[문서12] 알고리즘 부가 설명 — 난이도 있는 개념 보충 문서11에서 한 번 더 파고들 가치가 있는 것들. --- ① 최악/평균/분할상환 구분 - 퀵정렬: 평균 O(n log n), 최악 O(n²)(정렬 데이터+나쁜 피벗). 피벗 랜덤/중앙값으로 회피. - 해시: 평균 O(1), 최악 O(n)(충돌 몰림). 좋은 해시+부하율 관리. - 분할상환(amortized): 동적 배열 append 대부분 O(1), 가끔 O(n)(2배 확장). 평균 O(1). \"가끔 비싼 연산을 전체로 나누면 싸다.\" ② 안정 정렬(stable)이 왜 중요 - 같은 값의 원래 순서 유지. \"이름순 정렬 후 나이순 정렬\"에서 나이 같으면 이름 순서 유지되어야. - 병합=안정, 퀵=불안정. 다중 기준 정렬 시 안정성 필요. - 실무 Timsort(Java/Python)=안정+거의 정렬된 데이터에 빠름. ③ 해시 충돌 처리 - 체이닝: 같은 버킷에 연결 리스트. 부하율 높아도 동작, 포인터 오버헤드. - 개방 주소법: 충돌 시 다음 빈자리(선형/이차 탐사). 캐시 유리, 부하율 민감(삭제 까다로움). - 리해싱: 부하율(load factor) 임계 넘으면 더 큰 배열로 재배치(비용 O(n)이지만 분할상환 O(1)). ④ BST 균형의 중요성 - BST는 삽입 순서 나쁘면(정렬 데이터) 한쪽 치우쳐 O(n) 퇴화=연결 리스트. - 균형 트리(AVL/레드-블랙)는 삽입/삭제마다 회전으로 재균형→O(log n) 보장. - AVL(엄격 균형, 조회 빠름) vs 레드-블랙(느슨, 삽입/삭제 빠름). 실무 map/TreeMap=레드-블랙. ⑤ DP 상태 정의와 점화식 - 핵심 어려움: \"무엇을 상태로 두고, 작은 답으로 큰 답을 어떻게 만드나\". - 예 배낭: dp[i][w]=i번째까지 무게 w일 때 최대 가치. 점화식=넣거나 안 넣거나 max. - Top-down(메모이제이션, 필요한 것만) vs Bottom-up(타뷸레이션, 표 채움, 스택오버플로우 없음). ⑥ 그리디가 틀리는 순간 - 지역 최적≠전역 최적인 구조에선 실패. 동전[1,3,4] 6원: 그리디 3개, DP 2개. - \"그리디가 맞다\"는 증명(교환 논법 등)이 서야 안전. 안 서면 DP로. ⑦ 다익스트라가 음수를 못 다루는 이유 - 다익스트라는 \"한 번 확정한 노드는 다시 안 본다\"(그리디). 음수 간선이 있으면 나중에 더 짧은 경로가 나올 수 있어 이 가정이 깨짐. - → 음수 있으면 벨만-포드(모든 간선 반복 완화), 음수 사이클은 무한히 줄어 검출 필요. ⑧ 재귀 → 반복 변환 - 깊은 재귀는 스택 오버플로우. 명시적 스택으로 반복 변환하거나 Bottom-up DP로. - 꼬리 재귀(tail recursion): 일부 언어는 최적화하지만 Python/Java는 안 함 → 반복문이 안전."}, {"title": "알고리즘 완전 기초", "kind": "완전 기초", "url": "doc_13_algo_essentials.html", "text": "[문서13] 알고리즘 완전 기초 — 모르면 안 되는 상식 강의에서 당연시하고 넘어간 기본기. --- 자료구조 한눈에 - 배열: 인덱스 O(1), 삽입/삭제 O(n). 연속 메모리. - 연결 리스트: 접근 O(n), 삽입/삭제 O(1). 포인터. - 스택: LIFO. 큐: FIFO. 덱: 양쪽. - 해시: 평균 O(1) 조회. 트리: 계층. 힙: 최대/최소 빠르게. 그래프: 노드+간선. 복잡도 감각 (n=백만 기준) - O(1): 즉시 / O(log n): ~20회 / O(n): 백만 / O(n log n): 2천만 / O(n²): 1조(느림) / O(2ⁿ): 불가능. - 실무 규칙: n이 크면 O(n²) 이상은 위험. O(n log n) 이하를 목표. 그래프 표현 - 인접 행렬: V×V 배열. 간선 확인 O(1), 공간 O(V²). 밀집 그래프. - 인접 리스트: 각 노드의 이웃 목록. 공간 O(V+E). 희소 그래프(대부분). 정렬 안정성/제자리 - 안정(stable): 같은 값 순서 유지. 병합=안정, 퀵/힙=불안정. - 제자리(in-place): 추가 메모리 O(1). 퀵/힙=제자리, 병합=O(n) 추가. 트리 순회 - 전위(root→L→R) / 중위(L→root→R, BST면 정렬 순) / 후위(L→R→root) / 레벨(BFS). 비트/수학 기본 - 2진수, 비트 연산(AND/OR/XOR/shift). XOR로 중복 찾기, 짝 검출. - 모듈러 연산(나머지), 큰 수는 mod로 관리. GCD(유클리드 호제법). 재귀 3요소 - 종료 조건(base case) / 자기 호출 / 문제 축소. 종료 조건 없으면 무한 재귀→스택 오버플로우. 완전탐색 vs 최적화 - 완전탐색(brute force): 모든 경우. 정확하지만 느림(작은 n). - 최적화: 그리디/DP/분할정복으로 탐색 공간 축소. - 순서: 일단 완전탐색으로 정답 확인 → 시간 초과면 최적화. 대표 문제 유형 - 정렬/탐색, 투 포인터, 슬라이딩 윈도우, 누적합, 이분 탐색, - DFS/BFS, DP, 그리디, 백트래킹, 그래프(최단경로/MST/위상정렬)."}, {"title": "알고리즘 확인 질문", "kind": "확인 질문", "url": "doc_14_algo_checkquestions.html", "text": "[문서14] 알고리즘 확인 질문 — 핵심 점검용 이해했다면 1~2문장으로 바로 답할 수 있어야 함. --- 1. 복잡도/자료구조 - Big-O에서 상수를 무시하는 이유? - 퀵정렬의 평균과 최악 복잡도? 최악은 언제? - 분할상환(amortized)을 예로 설명? - 배열과 연결 리스트, 인덱스 접근과 삽입/삭제 복잡도 비교? - 배열이 실무 기본인 이유? (캐시) - 해시가 평균 O(1)인데 최악 O(n)이 되는 경우? - 충돌 처리 2가지? - BST가 O(n)으로 퇴화하는 경우? 해결책은? - 힙은 어떤 연산이 빠른가? 대표 용도? 2. 정렬/탐색/재귀 - 퀵정렬이 실무 기본인 이유와 약점? - 병합정렬을 언제 쓰나? 대가는? - 안정 정렬이 필요한 상황 예시? - 이진 탐색의 전제 조건과 복잡도? - 재귀의 위험 2가지? (스택오버플로우, 중복계산) 3. 그래프/DP/그리디 - DFS와 BFS를 각각 언제 쓰나? - DFS/BFS는 무슨 자료구조로 구현? - DP가 성립하는 두 조건? - Top-down과 Bottom-up 차이? - 그리디가 틀리는 예를 들어보라? - 그리디 vs DP 선택 기준? - 다익스트라가 음수 가중치를 못 다루는 이유? - 가중치 없는 최단 경로는 무슨 알고리즘? - Union-Find는 언제 쓰나? - 위상 정렬은 무슨 그래프에서 가능? - MST 알고리즘 2가지? 종합 - \"이런 문제엔 어떤 자료구조/알고리즘?\"에 즉답하기 (치트 참고) - \"완전탐색으로 풀면 시간 초과다. 어떻게 최적화 접근하나?\" - \"최단 경로 문제, 조건에 따라 알고리즘을 어떻게 고르나?\""}, {"title": "알고리즘 실전편", "kind": "실전편", "url": "doc_15_algo_practical.html", "text": "[문서15] 알고리즘 실전편 — 실무·코테 적용 이론을 실제 문제·실무에 어떻게 적용하나. --- 1. 코딩 테스트 접근 순서 1) 문제 이해+예시로 손으로 풀어보기 2) 제약조건(n 크기) 확인 → 허용 복잡도 역산 (n≤10⁶면 O(n log n) 이하) 3) 자료구조/알고리즘 후보 선정(치트) 4) 완전탐색으로 정답 로직 확정 → 시간초과면 최적화 5) 엣지 케이스(빈 입력, 최대, 중복, 음수) ★ n 크기로 복잡도 역산이 핵심: n≤20이면 O(2ⁿ) 가능, n≤10³이면 O(n²), n≤10⁶이면 O(n log n). 2. 자주 쓰는 실무 패턴 - 투 포인터: 정렬된 배열서 양끝/두 지점으로 O(n). 합·구간 문제. - 슬라이딩 윈도우: 연속 구간 최댓값/합을 O(n)에. 고정/가변 창. - 누적합(prefix sum): 구간 합을 O(1)에(미리 계산). 반복 구간 쿼리. - 해시맵 활용: 중복 체크, 카운팅, 두 수의 합(O(n)). 3. 실무에서 자료구조 선택 - 빠른 조회 필요 → 해시맵/셋 - 순서 유지+빠른 조회 → 정렬된 구조(TreeMap) - 최근 것부터 처리 → 스택 - 순서대로 처리/대기열 → 큐 - 우선순위 처리/Top-K → 힙(우선순위 큐) - 캐시 → LRU(해시맵+이중연결리스트) - 자동완성/접두사 → 트라이(Trie) 4. 실무에 알고리즘이 숨은 곳 - DB 인덱스 = B+Tree (네트워크/DB편 연결) - 캐시 만료 = LRU - 작업 스케줄러 = 우선순위 큐/위상정렬 - 추천/랭킹 = 힙(Top-K), 정렬 - 지도 길찾기 = 다익스트라/A - 문자열 검색 = KMP, 해시 - 중복 제거/그룹핑 = 해시셋, Union-Find - 로드밸런서 해시 = 컨시스턴트 해싱 5. LRU 캐시 (단골 문제) 정의: 가장 오래 안 쓴 것부터 버리는 캐시. 구현: 해시맵(O(1) 조회) + 이중 연결 리스트(O(1) 순서 갱신). get/put 모두 O(1). - 접근하면 그 노드를 리스트 맨 앞으로, 꽉 차면 맨 뒤(가장 오래된 것) 제거. 실무: Redis 메모리 정책, 브라우저 캐시. (네트워크 문서5 캐싱과 연결) 6. 경험 서술 예시 - \"대량 로그에서 상위 K개 추출을 힙으로 O(n log k)에 처리했다.\" - \"중복 사용자 판별을 해시셋으로 O(n)에, 연결 그룹은 Union-Find로 묶었다.\" - \"구간 합 쿼리가 많아 누적합으로 전처리해 O(1) 응답으로 만들었다.\" --- 7. 자료구조 구현 (파이썬, 검증된 코드) 이진 탐색 트리(BST) — 인덱스 원리의 뼈대 ★ 인덱스 연결: DB 인덱스=B+Tree. BST와 원리 같음(\"정렬된 트리로 탐색 반씩 줄임\"). 차이: BST는 치우치면 O(n)→DB는 한 노드에 수백 키 담아 낮게(B+Tree)+리프 연결로 범위 검색. 중위 순회가 정렬 순인 게 BST 핵심. 힙(최소 힙) — 우선순위 큐/Top-K ★ 실무는 heapq: heapq.heapify(리스트) / heappush / heappop / nlargest(k, 리스트). 직접 구현은 원리 이해용. 8. 대표 코테 문제 10선 (검증된 풀이) [1] Two Sum (해시맵, O(n)) 핵심: \"이미 본 값\"을 해시에 저장→보수(target-n) 존재 확인. 이중 루프 O(n²)를 O(n)으로. [2] 이진 탐색 (O(log n)) 전제: 정렬돼 있어야. 경계(lo<=hi, mid±1) 자주 틀림. [3] 슬라이딩 윈도우 (길이 k 최대합, O(n)) 핵심: 매번 다시 합산(O(nk)) 대신 창을 밀며 차이만(O(n)). [4] 투 포인터 (정렬 배열 합=target) 핵심: 정렬 배열 양끝에서 좁혀감. 합 작으면 lo↑, 크면 hi↓. [5] BFS 최단 거리 (큐) 핵심: 가까운 것부터 층층이→가중치 없는 최단 거리. visited로 재방문 방지. [6] DFS 백트래킹 (부분집합) 핵심: 선택→재귀→되돌림(pop). 조합/순열/순열 문제의 뼈대. [7] DP 피보나치 (메모이제이션, O(n)) 핵심: 순진한 재귀 O(2ⁿ)→저장으로 O(n). 겹치는 부분 문제 제거. [8] DP 계단 오르기 (Bottom-up) 핵심: dp[n]=dp[n-1]+dp[n-2]. 변수 2개로 공간 O(1). [9] Top-K (힙) 핵심: 전체 정렬(O(n log n)) 대신 크기 k 힙 유지(O(n log k)). [10] 유효한 괄호 (스택) 핵심: 여는 괄호 push, 닫는 괄호에 짝 맞는지 pop 확인. LIFO의 전형. 9. 코테 문제→도구 매핑 (반사) - 두 수/중복/카운팅 → 해시맵 - 정렬 배열 탐색 → 이진 탐색 - 연속 구간 → 슬라이딩 윈도우/투 포인터 - 최단 거리(가중치 없음) → BFS - 모든 경우/조합/순열 → DFS 백트래킹 - 최적화(\"최대/최소\" + 겹치는 부분) → DP - 상위/하위 K개 → 힙 - 괄호/후입선출/undo → 스택 - 그룹/연결 → Union-Find"}, {"title": "시스템 디자인 기본", "kind": "기본 설명", "url": "doc_16_sysdesign_basic.html", "text": "[문서16] 시스템 디자인 기본 — 면접 실전용 핵심은 개념 암기가 아니라 \"트레이드오프를 저울질하고 선택을 정당화\". 빌딩 블록은 네트워크·DB편에서 이미 다룸. 여기선 \"언제 무엇을 조합하나\". --- 1. 접근 프레임워크 (구조화된 순서) 개방형 문제를 이 순서로 끊는다: 1. 요구사항 명확화: 기능(핵심 기능?)+비기능(규모/지연/가용성/일관성). ★ 바로 그리지 말고 질문으로 범위 좁히기. 2. 규모 추정(back-of-envelope): DAU, QPS, 저장 용량, 대역폭, 읽기:쓰기 비율(대개 읽기 압도)→캐싱/샤딩/CDN 결정. 3. API 설계: 핵심 엔드포인트(계약). REST/gRPC. 4. 데이터 모델 & 저장소: RDB vs NoSQL, 스키마, 인덱스(DB편). 5. 고수준 설계(HLD): 클라→LB→서버→캐시→DB, 데이터 흐름. 6. 상세 설계(Deep Dive): 병목 컴포넌트 깊게(면접관 유도). 7. 병목 식별 & 확장: SPOF 제거, 스케일링, 모니터링. ★ 사고 과정을 소리 내어 설명. \"왜 이 선택인지\" 계속 말하기. 침묵하며 그리지 말 것. 2. 스케일링 (Vertical vs Horizontal) - 수직(scale-up): 사양 업그레이드. 간단하나 한계·SPOF. - 수평(scale-out): 대수 늘림. 무한 확장, 분산 복잡. 로드밸런서 필요. - ★ 상태 외부화(세션을 Redis로)해야 수평 확장 가능. 대규모의 답은 수평. 3. 핵심 빌딩 블록 (기존 편 통합) - 로드밸런서: L4(IP/포트) vs L7(URL/헤더). RR/least_conn/IP해시. (네트워크편) - 캐싱: CDN(정적)/Redis(동적·세션)/앱 캐시. cache-aside, 무효화 주의. (네트워크편) - DB 확장: 복제(읽기 분산)+샤딩(쓰기 분산). (DB편) - 메시지 큐: Kafka/RabbitMQ로 비동기·완충·디커플링(backpressure). (연상사전) 4. CAP 정리 정의: 분산은 일관성(C)·가용성(A)·분할내성(P) 중 둘만. 분할(P)은 불가피 → 분할 시 C냐 A냐 선택. - CP(일관성 우선): 분할 시 일부 막아서라도 정합성. 금융·결제. (HBase, MongoDB 기본) - AP(가용성 우선): 분할 시에도 응답, 일시 불일치 허용. SNS 피드·좋아요. (Cassandra, DynamoDB) ★ 실제론 스펙트럼. 최종 일관성(eventual): \"결국 일치\". 대규모의 현실적 타협. = DB 복제 지연. 5. 일관성 vs 가용성 트레이드오프 (핵심 사고) - 강한 일관성 필요: 계좌 잔액, 재고, 예약 → 틀리면 사고. - 최종 일관성 허용: 좋아요 수, 조회수, 팔로워 수 → 잠깐 틀려도 됨. - ★ \"모든 걸 강하게\"는 느리고 비쌈. 기능별로 나눠 판단하는 게 5년차. --- 6. SPOF 제거 & 고가용성 정의: SPOF=하나 죽으면 전체 멈춤. HA 첫걸음은 SPOF 제거. - 이중화: 모든 계층 복수(LB 2대 active-standby, DB 복제) - failover: 주 노드 죽으면 대기 승격(마스터 장애→레플리카 승격) - 헬스체크: LB가 죽은 서버 감지해 제외 ★ \"이 컴포넌트 죽으면?\"을 모든 박스에 질문. \"전체 중단\"이면 이중화 필요. 7. 일관된 해싱(Consistent Hashing) 정의: 서버 추가/제거 시 재배치 최소화. 캐시·샤딩·분산 저장 핵심. 인과: 단순 hash%N은 N 바뀌면 거의 전부 재배치→캐시 대량 무효화. 일관된 해싱은 원형 링에 배치→인접 구간 키만 이동. - 가상 노드: 서버를 링에 여러 번 배치해 부하 고르게(hotspot 방지). 용도: 분산 캐시, Cassandra/DynamoDB 파티셔닝. \"서버 늘려도 재배치 최소\". 8. 메시지 큐 & 비동기 (심화) 정의: 생산자-소비자를 큐로 분리(비동기·완충·디커플링). - 완충: 급증을 큐가 흡수, 소비자는 감당 속도로(backpressure) - 디커플링: 생산자는 소비자 상태 몰라도 됨(장애 격리) - 비동기: 무거운 작업(메일/이미지) 분리→응답 빠름 ★ 전달 보장: at-most-once(유실 가능)/at-least-once(중복 가능→멱등성으로, 실무 기본)/exactly-once(이상적·비쌈). Dead Letter Queue로 무한 재시도 방지. 9. 멱등성(Idempotency) 정의: 같은 요청 여러 번 실행해도 결과가 한 번과 같음. 인과: 네트워크 불안정→재시도 필연. 재시도로 결제 두 번=재앙 → 멱등성 키로 \"이미 처리?\" 확인. 결제/주문/at-least-once 큐 필수. 10. 속도 제한(Rate Limiting) - 토큰 버킷: 일정 속도로 토큰 채우고 요청마다 소비. 버스트 허용(가장 흔함). - 누출 버킷: 일정 속도로만 처리(부드러운 유출). - 고정/슬라이딩 윈도우: 시간 창 카운트. - 분산 환경은 Redis로 카운터 공유. 11. DB 확장 결정 트리 (통합) - 읽기 병목 → 복제+캐싱 - 쓰기 병목 → 샤딩 - 관계 복잡·정합성 → RDB 유지 - 유연·초대용량·단순 조회 → NoSQL - 분석/집계 → OLAP/DW ★ 순서: 캐싱→읽기 복제→인덱스 최적화→그래도 안 되면 샤딩. 샤딩은 조인·트랜잭션 잃어 최후 수단. 12. 마이크로서비스 vs 모놀리스 - 모놀리스: 단일 코드베이스. 초기 간단·네트워크 호출 적음. 부분 확장 어렵고 커지면 관리↑. - 마이크로서비스: 독립 배포 서비스들. 확장·장애 격리·독립 배포. 복잡도·네트워크 오버헤드↑. ★ 선택: 크고 빠르게 진화=마이크로서비스, 작은 팀·초기=모놀리스. \"항상 마이크로서비스\"는 착각. 분산 복잡성(네트워크 실패·정합성·분산 트랜잭션) 감당 가능할 때만."}, {"title": "시스템 디자인 부가 설명", "kind": "부가 설명", "url": "doc_17_sysdesign_supplement.html", "text": "[문서17] 시스템 디자인 부가 설명 — 난이도 있는 개념 보충 문서16에서 한 번 더 파고들 가치가 있는 것들. --- ① CAP를 넘어 — PACELC - CAP: 분할(P) 시 C vs A. - PACELC: 분할(P) 시 A vs C, 아니면(Else) 지연(L) vs 일관성(C)까지 확장. - 즉 분할 없는 평상시에도 \"빠르게(낮은 지연) vs 정확하게(강한 일관성)\" 트레이드오프가 있다. - 예: DynamoDB=PA/EL(가용·저지연 우선), 전통 RDB=PC/EC(일관성 우선). ② 최종 일관성의 실제 (충돌 해결) - 여러 노드에 동시 쓰기 → 충돌. 해결법: - Last-Write-Wins(타임스탬프 최신 우선, 단순하나 유실 위험) - 벡터 클록(인과관계 추적) - CRDT(수학적으로 병합 가능한 자료구조, 협업 편집) - read-your-writes: 방금 쓴 걸 못 읽는 문제 → 쓴 직후엔 마스터로 라우팅. ③ 일관된 해싱 심화 - 가상 노드가 없으면 서버 3대일 때 부하가 33%씩 안 나뉘고 치우침 → 각 서버를 링에 100~200번 배치해 균등화. - 서버 추가 시 이동하는 키 = 전체/서버수 (예: 3→4대면 약 1/4만 이동). ④ 큐 vs 스트림 - 메시지 큐(RabbitMQ): 작업 분배, 소비되면 사라짐. - 이벤트 스트림(Kafka): 로그 보존, 여러 컨슈머가 각자 오프셋으로 재생 가능. 이벤트 소싱·재처리에 유리. - 선택: 단순 작업 분배=큐, 이벤트 기록·재생·여러 소비자=스트림. ⑤ 캐싱 전략 4종 - Cache-aside(lazy): 앱이 캐시 확인→없으면 DB→캐시 채움. 가장 흔함. - Write-through: 쓸 때 캐시+DB 동시. 읽기 빠름, 쓰기 느림. - Write-back: 캐시에만 쓰고 나중에 DB. 빠르지만 유실 위험. - Write-around: DB에만 쓰고 캐시는 읽을 때. 쓰고 안 읽는 데이터. ⑥ 데이터베이스 종류별 용도 - RDB(PostgreSQL/MySQL): 정합성·관계·트랜잭션. - 문서(MongoDB): 유연 스키마, 중첩 데이터. - 키-값(Redis/DynamoDB): 초고속 조회, 캐시·세션. - 컬럼(Cassandra): 대용량 쓰기, 시계열. - 그래프(Neo4j): 관계 탐색(친구의 친구). - 검색(Elasticsearch): 전문 검색, 역색인. - 시계열(InfluxDB): 메트릭·로그. ⑦ 낙관적 UI & 비동기 패턴 - 낙관적 업데이트: 서버 응답 전에 UI 먼저 반영(좋아요 즉시 표시)→실패 시 롤백. 체감 속도↑. - 폴링 vs 롱폴링 vs WebSocket vs SSE: 실시간성 요구에 따라(채팅=WebSocket, 알림=SSE). ⑧ 관측성(Observability) 3축 - 로그(무슨 일이): 구조화 로깅+요청 ID. - 메트릭(얼마나): QPS, 지연 p50/p99, 에러율. - 트레이싱(어디서): 분산 추적(요청이 서비스들을 어떻게 통과). - ★ p99가 평균보다 중요: 평균은 좋아도 상위 1% 사용자가 느리면 문제. ⑨ 이벤트 드리븐 & 메시지 큐 영속성 (NATS/Kafka) \"서비스가 꺼졌다 켜지면 이벤트가 자동으로 채워짐\"의 원리: - durable subscription(영속 구독)+offset 추적: 각 컨슈머가 \"어디까지 처리했나\"를 offset(시퀀스 번호)으로 기록. - 브로커가 메시지 영속화(persistence)→서비스 죽어도 유실 안 됨. - 재시작 시 \"마지막 offset 다음부터\" 다시 받음→꺼진 동안 쌓인 이벤트 순서대로 전달=자동으로 채워짐. - = at-least-once 전달 보장의 실체. 이벤트 소싱/이벤트 드리븐 아키텍처. - 각 MSA가 이벤트를 자기 DB에 저장+다른 서비스도 같은 이벤트 받아 갱신→최종 일관성(eventual). ⑩ 이벤트 순서 보장 & 넘버링 - 각 이벤트에 단조 증가 시퀀스 번호(NATS=sequence, Kafka=offset). WAL/LSN과 같은 원리. - 컨슈머는 번호 순서대로 처리+\"여기까지 처리\" commit. - 순서 범위: 파티션/스트림 내에서는 순서 보장, 여러 파티션 걸치면 전역 순서 미보장→순서 중요하면 같은 키를 같은 파티션(같은 주문 ID→같은 파티션). ★ 순서 vs 확장 트레이드오프: 전역 순서 원하면 파티션 1개(병렬 불가, 느림), 확장하려면 여러 개(파티션 내 순서만). 실무: 순서 중요한 단위(주문/사용자 ID)를 파티션 키로→\"단위 내 순서+단위 간 병렬\". - 멱등성 결합: at-least-once라 중복 전달 가능→컨슈머가 이벤트 번호로 \"이미 처리?\" 확인해 중복 무시. 순서 보장+멱등성이 이벤트 처리 안정성 핵심. 경험 서술: \"NATS Streaming으로 이벤트 드리븐 구성. durable subscription으로 offset 추적해 서비스 재시작 시 놓친 이벤트 순서대로 재생받아 자동 복구. 시퀀스 번호로 순서 보장, at-least-once라 멱등성으로 중복 처리.\""}, {"title": "시스템 디자인 완전 기초", "kind": "완전 기초", "url": "doc_18_sysdesign_essentials.html", "text": "[문서18] 시스템 디자인 완전 기초 — 모르면 안 되는 상식 강의에서 당연시하고 넘어간 기본기. --- 규모 추정 감각 (back-of-envelope) - QPS = DAU × 인당 요청수 / 86400(초). 피크는 평균의 2~3배. - 저장: 레코드 크기 × 개수. 1KB × 10억 = 1TB. - 읽기:쓰기 비율 대개 100:1 이상(SNS) → 캐싱·복제가 답. - 1일=86400초, 백만 QPS면 초당 백만 요청. 지연 숫자 감각 (아는 게 힘) - 메모리 접근: ~100ns - SSD 읽기: ~100μs - 네트워크 같은 지역 왕복: ~0.5ms - 디스크 탐색: ~10ms - 대륙 간 왕복: ~150ms - ★ 메모리는 디스크보다 ~10만 배 빠름 → 캐싱의 근거. 가용성 (nines) - 99% = 연 3.65일 다운 / 99.9% = 8.7시간 / 99.99% = 52분 / 99.999% = 5분. - SLA에서 \"몇 개의 9\"인지가 이중화 수준을 정함. 핵심 컴포넌트 역할 - 로드밸런서: 트래픽 분산. - 리버스 프록시: 서버 앞단(TLS 종료, 캐싱, 라우팅). - CDN: 정적 자원을 엣지에서. - 캐시(Redis): 빠른 조회, 세션. - 메시지 큐: 비동기·완충. - DB: 영속 저장. - 오브젝트 스토리지(S3): 파일·이미지·백업. 수평 확장의 전제 - 무상태(stateless) 서버: 상태를 서버에 두지 말고 외부화(세션→Redis). - 그래야 아무 서버나 요청 처리 가능→LB로 분산. API 스타일 - REST: 자원 중심, 범용. - gRPC: 서비스 간, 고성능. - GraphQL: 클라가 필요한 것만. - WebSocket: 양방향 실시간. 데이터 처리 방식 - 동기 vs 비동기: 즉시 응답 필요 vs 나중에 처리. - 배치 vs 스트림: 모아서 처리 vs 실시간 흐름. - OLTP(트랜잭션) vs OLAP(분석). 기본 보안 - 인증(누구냐) vs 인가(권한). JWT/세션. - HTTPS/TLS(네트워크편). rate limiting. - 최소 권한 원칙(IAM, 네트워크편)."}, {"title": "시스템 디자인 확인 질문", "kind": "확인 질문", "url": "doc_19_sysdesign_checkquestions.html", "text": "[문서19] 시스템 디자인 확인 질문 — 핵심 점검용 이해했다면 1~2문장으로 바로 답할 수 있어야 함. --- 1. 접근 & 기본 - 시스템 디자인 문제를 받으면 첫 단계는? (요구사항 명확화) - 규모 추정에서 무엇을 계산? 왜 읽기:쓰기 비율이 중요? - 수직 확장과 수평 확장 차이? 수평의 전제 조건은? (무상태) - 왜 상태를 외부화해야 하나? 2. 분산 핵심 - CAP 정리를 한 문장으로? 분할 시 무엇을 선택? - CP와 AP 시스템의 예와 용도? - 최종 일관성이란? 어떤 데이터에 허용 가능? - 강한 일관성이 꼭 필요한 데이터 예시? - SPOF를 어떻게 찾고 제거하나? - 일관된 해싱이 왜 필요? 단순 hash%N의 문제는? - 가상 노드는 왜 두나? 3. 패턴 - 메시지 큐가 주는 3가지 이점? - at-least-once와 멱등성의 관계? - 멱등성 키는 어디에 쓰나? - Rate Limiting 대표 알고리즘? - DB 확장 순서? 왜 샤딩이 최후인가? - 마이크로서비스가 항상 옳지 않은 이유? 4. 심화 - CAP와 PACELC 차이? - 캐싱 전략 4종과 각 특징? - 큐와 스트림(Kafka) 차이? - 관측성 3축? 왜 p99가 평균보다 중요? - read-your-writes 문제와 해결? 4-B. 대량 트래픽 핸들링 - 트래픽 대응의 핵심 원칙? (은탄환 없음, 계층별 방어선) - 방어선을 바깥→안으로 나열하면? - 왜 바깥에서 막는 게 유리한가? - 캐시 무효화를 안 하면? Cache Stampede란? 대응은? - Hot Key 문제와 대응? - 수평 확장의 전제 조건? (무상태) - 오토스케일 두 층? (HPA / 노드) - 스케일 아웃/인의 속도는 왜 다르게? 예측 이벤트 대응은? (예열) - 읽기는 캐싱으로 막는데 쓰기는 무엇으로? (큐) - DB 확장 순서? 왜 샤딩이 최후? - 모니터링 3축? 왜 p99가 평균보다 중요? - 반드시 보는 지표 3~4개? - Circuit Breaker/Graceful Degradation/Bulkhead 각각? 종합 (설계 문제) - \"URL 단축기를 설계해보라.\" (해싱, 캐싱, 리다이렉트, 규모) - \"실시간 채팅을 설계해보라.\" (WebSocket, Pub/Sub, 순서, presence) - \"뉴스 피드를 설계해보라.\" (fan-out, 캐싱, 랭킹) - \"결제 시스템을 설계해보라.\" (멱등성, 큐, 정합성, 웹훅) - 각 설계에서 트레이드오프를 소리 내어 설명할 수 있는가? - \"트래픽이 평소의 100배로 급증했다. 계층별로 어떻게 대응하나?\""}, {"title": "시스템 디자인 실전편", "kind": "실전편", "url": "doc_20_sysdesign_practical.html", "text": "[문서20] 시스템 디자인 실전편 — 대표 설계 문제 자주 나오는 문제를 프레임워크(요구사항→규모→API→저장→HLD→병목)로. --- 1. URL 단축기 (TinyURL) 요구: 긴 URL→짧은 코드, 리다이렉트. 읽기 압도적(100:1+). 핵심: - 코드 생성: 해시(충돌 처리) 또는 카운터+base62 인코딩(7자면 62^7≈3.5조). - 저장: 키-값(단축코드→원본). 읽기 많으니 캐싱(Redis) 필수. - 리다이렉트: 301(영구)vs302(임시). 클릭 추적 원하면 302. - 규모: 읽기 폭발→CDN·캐시. 쓰기 적음→샤딩 거의 불필요. 트레이드오프: 해시(단순, 충돌) vs 카운터(충돌 없음, 분산 시 조율 필요→범위 분배). 2. 실시간 채팅 요구: 1:1/그룹, 실시간, 순서, presence, 오프라인 메시지. 핵심: - 연결: WebSocket(양방향). 서버 여러 대→Redis Pub/Sub로 인스턴스 간 전파. - 순서: 서버 시퀀스/타임스탬프. - 전달: DB 저장, 재접속 시 커서로 놓친 것 복구(at-least-once). - presence: Redis TTL+하트비트. - 확장: 연결을 여러 서버 분산+상태 외부화. (네트워크 문서5와 연결) 트레이드오프: 강한 순서 보장 vs 지연. 그룹 대규모면 fan-out 비용. 3. 뉴스 피드 (SNS) 요구: 팔로우 기반 피드, 최신순/랭킹. 핵심 - fan-out 전략: - Fan-out on write(push): 글 쓸 때 팔로워 피드에 미리 뿌림. 읽기 빠름, 셀럽(수백만 팔로워)이면 쓰기 폭발. - Fan-out on read(pull): 읽을 때 팔로우 목록의 글을 모음. 쓰기 싸고 읽기 느림. - ★ 하이브리드: 일반은 push, 셀럽은 pull(읽을 때 합침). 실무 정답. - 캐싱: 피드를 Redis에. 랭킹은 점수 기반 정렬(힙/Sorted Set). 트레이드오프: 저장 공간(push 중복) vs 읽기 지연(pull). 4. 결제 시스템 요구: 정확성 최우선, 중복 방지, 외부 PG 연동. 핵심: - 멱등성 키: 재시도로 이중 결제 방지(필수). - 상태 머신: pending→paid→failed. 각 전이 기록. - 큐: 결제 요청 완충, 순서 처리. - PG 웹훅: 비동기 결제 결과 수신으로 최종 확정. - 정합성: 강한 일관성(잔액·재고는 틀리면 사고). 트랜잭션. 트레이드오프: 정합성 위해 가용성·속도 일부 희생(CP 성향). (연상사전 결제와 연결) 5. 대용량 읽기 서비스 (일반 패턴) - CDN(정적)→LB→무상태 서버(오토스케일)→캐시(Redis)→읽기 레플리카→마스터. - 각 계층에서 걸러 원본 DB 부하 최소화. - 쓰기는 마스터, 읽기는 레플리카. 캐시 무효화 주의. 6. 면접 팁 (경험 서술) - 요구사항 질문부터: \"동시 사용자? 읽기/쓰기 비율? 일관성 요구?\" - 규모를 숫자로: \"DAU 100만, 읽기 100:1이면 캐싱이 핵심.\" - 트레이드오프를 말로: \"여기선 가용성을 위해 최종 일관성을 택하겠습니다.\" - 병목을 스스로 짚기: \"이 LB가 SPOF라 이중화하겠습니다.\" - 과도한 설계 경계: \"지금 규모엔 샤딩 불필요, 캐싱으로 충분.\" --- 7. 대량 트래픽 핸들링 — 계층별 방어 (종합) 핵심 원칙: 은탄환 없음. 요청이 DB(최고 비용)에 닿기 전 각 계층에서 걸러냄. 바깥일수록 싸고 안쪽일수록 비쌈. 방어선: [사용자]→①CDN→②LB→③Rate Limit→④앱서버(오토스케일)→⑤Redis 캐시→⑥메시지 큐→[DB 복제/샤딩] ① 캐싱 (가장 효과 큰 첫 방어선) 인과: 읽기 압도적(100:1)에서 같은 데이터 매번 DB 읽기는 낭비→캐시 반환으로 DB 부하 급감. - CDN: 정적 자원 엣지에서. Redis: 동적·세션·집계. 앱 캐시: 메모리 값. Redis 전략: - cache-aside: 캐시 확인→없으면 DB→채움. 가장 흔함. - ★ 무효화: 변경 시 캐시 삭제(안 하면 옛 데이터). 최다 실수. - ★ Cache Stampede: 인기 키 동시 만료→수천 요청 DB로. 대응 TTL 지터/잠금(하나만 조회, 나머지 대기). - Hot Key: 특정 키 집중→노드 과부하. 로컬 캐시/키 분산. 추가 활용: 세션 외부화(수평확장 전제), rate limit 카운터, 분산 락, Pub/Sub. ② 로드밸런싱 & 오토스케일링 LB: 여러 서버 분산. L4/L7, RR/least_conn/IP해시. ★ 수평 확장 전제=무상태(stateless): 상태(세션)를 서버에 두면 확장 막힘→외부화(Redis)해야 아무 서버나 처리. 오토스케일 두 층: - HPA: CPU/메트릭 기준 Pod/인스턴스 수. - Cluster Autoscaler/Karpenter: 노드 자체. AWS ASG: EC2 대수. ★ 실무: - 예측형 vs 반응형: 반응형은 급증에 늦음(인스턴스 뜨는 시간)→예측 이벤트는 미리 예열(pre-warming). - 스케일 아웃 빠르게, 인 천천히(다시 몰릴 수 있음). - 콜드 스타트: 준비 전엔 트래픽 안 보냄(readiness probe). ③ Rate Limiting 인과: 어뷰징·봇·DDoS·폭주가 시스템 죽임→단위 시간당 제한. - 토큰 버킷(버스트 허용, 가장 흔함)/누출 버킷/슬라이딩 윈도우. - 분산은 Redis 카운터 공유. 초과 시 429+Retry-After. ④ 메시지 큐 (쓰기 완충) 인과: 읽기는 캐싱, 쓰기는 캐싱 불가(DB 반영 필요)→큐가 흡수해 DB 감당 속도로. - 완충(backpressure), 비동기 분리(무거운 작업), 디커플링. Kafka/RabbitMQ. ⑤ DB 확장 (최후) - 읽기 병목→읽기 복제+캐싱. 쓰기 병목→샤딩(조인·트랜잭션 잃어 최후). - ★ 순서: 캐싱→읽기 복제→인덱스 최적화→샤딩. ⑥ 자원 모니터링 & 관측성 (대응의 눈) 인과: 안 보이면 대응 못 함. 병목 위치·스케일 시점 판단. 오토스케일도 이 메트릭 기반. 3축: - 메트릭: QPS/지연/에러율/CPU·메모리/커넥션 풀. Prometheus+Grafana(HPA가 이걸로 스케일). - 로그: 구조화+요청 ID. CloudWatch/Loki/ELK. - 트레이싱: 분산 추적(요청 경로). Jaeger. ★ 반드시 보는 지표: - p99 지연(평균보다 중요, 상위 1% 느리면 문제). p50/p95/p99 함께. - 에러율(5xx 급증=위험), 포화도(saturation), 커넥션 풀 사용률(고갈→대기·타임아웃). - 알림: 임계 넘으면 자동 알림→선제 대응. ⑦ 장애 격리 & 우아한 저하 - Circuit Breaker: 뒤 서비스 죽으면 빠르게 실패→연쇄 장애 방지. - Graceful Degradation: 과부하 시 핵심만 유지(추천 끄고 주문만). - Bulkhead: 자원 격벽으로 나눠 번짐 방지. - Backpressure: 감당 못 하면 받는 속도 늦춤(큐/rate limit). 종합 시나리오 (\"100배 급증 대응\") \"계층별 방어선을 겹친다: CDN으로 정적 걷어내고, Redis로 읽기 부하 분리, 무상태 서버를 HPA·Karpenter로 오토스케일, 쓰기 폭주는 큐로 완충, 남용은 rate limit(429), DB 병목은 읽기 복제. Prometheus/Grafana로 p99·에러율 보며 대응, 뒤 장애는 circuit breaker로 격리, 예측 이벤트는 미리 예열.\" 한문장: \"은탄환 없음. CDN·캐시·오토스케일·큐·rate limit·복제를 계층별로 겹치고, 모니터링으로 병목 보며 대응. 바깥일수록 싸고 DB가 최후.\""}, {"title": "CI/CD·쿠버네티스 기본", "kind": "기본 설명", "url": "doc_21_devops_basic.html", "text": "[문서21] CI/CD·쿠버네티스 기본 — 면접 실전용 스택: Git → GitHub Actions(CI) → Docker/ECR → Terraform(IaC) → EKS → ArgoCD(CD) 참고: EKS = Elastic Kubernetes Service(AWS 관리형 K8s). \"EKG\" 아님. --- 용어 정리 - Docker: 컨테이너를 만들고 실행. 앱을 이미지로 패키징. - Kubernetes(K8s): 컨테이너를 여러 서버에 걸쳐 운영·확장·복구하는 오케스트레이터. - EKS: AWS 관리형 K8s(컨트롤 플레인을 AWS가 관리). - ECR: AWS Docker 이미지 저장소. - Terraform: 인프라를 코드로(IaC) 정의·생성. - GitHub Actions: GitHub 내장 CI/CD. - ArgoCD: GitOps 배포 도구(Git을 진실의 원천으로 클러스터 동기화). 전체 그림 (Push CI + Pull CD) 개발자 push → GitHub Actions(빌드·테스트·이미지→ECR) → 매니페스트 레포 태그 업데이트 커밋 → ArgoCD 감지 → EKS에 pull 동기화. EKS는 Terraform으로 미리 구축. ★ 핵심: \"CI는 push, CD는 pull\". 1. CI/CD 개념 - CI(지속적 통합): 자주 병합+자동 빌드·테스트로 문제 조기 발견. - CD(지속적 배포/전달): 검증된 빌드 자동 배포. Delivery(승인 후)/Deployment(완전 자동). 인과: 수동 배포는 느리고 실수 잦음 → 자동화로 속도·안정·반복성. ★ CI 게이트: 테스트·보안 스캔 통과 못 하면 배포 차단. \"빠르되 안전하게\"의 근간. 2. Git 브랜치 전략 - Git Flow: main/develop/feature/release/hotfix. 엄격, 정기 릴리즈. - GitHub Flow: main+feature→PR→머지하면 배포. 단순, 지속 배포. - Trunk-based: 짧은 브랜치 자주 main 병합. CI/CD 최적, 대규모. ★ GitHub Flow/Trunk가 CI/CD와 맞음. main은 항상 배포 가능 상태 유지. 3. GitHub Actions (CI) - .github/workflows/ .yml, push/PR 이벤트에 반응. - 흐름: checkout→테스트→Docker 빌드→ECR push→매니페스트 태그 업데이트. ★ 포인트: - OIDC로 AWS 인증: 액세스 키 박지 말고 OIDC 페더레이션으로 임시 자격증명(IAM Role 원리, 키 유출 제거). - 캐싱(의존성·Docker 레이어), 매트릭스 빌드(병렬), 시크릿(GitHub Secrets/Secrets Manager). 4. Docker & ECR - Dockerfile로 빌드→ECR 저장→EKS가 pull. ★ 실무: - 멀티스테이지 빌드: 빌드/실행 환경 분리→최종 이미지 작게(빌드 도구 제외). - 태그: latest 금지→커밋 SHA/시맨틱 버전(롤백·추적). - 이미지 스캔(Trivy): 취약점 심각하면 차단. - 레이어 최소화: 안 바뀌는 것(의존성) 앞 레이어→캐시. 5. Terraform (IaC) 정의: 인프라를 코드로. VPC·EKS·IAM·RDS를 .tf로 정의, terraform apply로 생성. 인과: 콘솔 클릭은 재현·추적 불가. 코드는 버전관리·리뷰·재현·롤백 가능. (AWS \"최소에서 쌓기\"를 코드로) ★ 포인트: - 상태 파일(state): \"지금 뭐가 있나\" 기록. S3 원격 저장+DynamoDB 잠금(동시 수정 방지). 로컬 state는 협업 재앙. - 모듈화(VPC/EKS 모듈 재사용). - plan→apply: plan으로 변경 미리보기 후 apply. - 드리프트: 콘솔 수동 변경 시 코드와 어긋남→Terraform 감지. 6. 쿠버네티스 핵심 오브젝트 정의: 원하는 상태 선언→실제 상태를 맞춤(reconcile). - Pod: 컨테이너 감싼 최소 단위(보통 컨테이너 1개). - Deployment: Pod를 원하는 개수 유지·롤링 업데이트·롤백. 죽으면 자동 재생성. - Service: Pod들에 안정적 접근점(IP/DNS). Pod IP 바뀌어도 앞에서 로드밸런싱. - Ingress: 외부 HTTP(S)를 Service로 라우팅(도메인·경로). AWS는 ALB Ingress Controller. - ConfigMap/Secret: 설정·민감정보를 코드와 분리해 주입. - Namespace: 논리 격리(dev/staging/prod). ★ 자동 확장: - HPA(Horizontal Pod Autoscaler): 메트릭 기준 Pod 수 조절. - Cluster Autoscaler/Karpenter: 노드(서버) 자체 증감. 7. ArgoCD & GitOps (CD) 정의: Git을 인프라·앱 상태의 유일한 진실의 원천으로. ArgoCD가 Git과 클러스터 실제 상태를 지속 비교·동기화. 4원칙: 선언적 정의/버전관리된 불변 상태/자동 pull/지속 감시. ★ 왜 GitOps(전통 대비): - 전통: CI가 클러스터에 push(kubectl apply). CI가 클러스터 권한 가져야 해 보안 부담. - GitOps: 클러스터가 Git에서 pull. 감사성(모든 변경 커밋)/드리프트 감지/간단 롤백(커밋 되돌리기). 동작: 매니페스트에 \"이미지 v2\" 커밋→ArgoCD 감지→EKS 적용→헬스체크→실패 시 롤백. 8. 배포 전략 (무중단) - 롤링 업데이트(K8s 기본): 하나씩 교체. 무중단, 잠시 구/신 공존. - 블루-그린: 새 버전 완전히 띄우고 트래픽 한 번에 전환. 롤백 즉시. - 카나리: 트래픽 일부(5%)만 새 버전→문제없으면 확대. 위험 최소. ★ 선택: 안전 최우선=카나리, 빠른 전환·롤백=블루-그린, 일반=롤링. 전체 흐름 한 문장 \"Terraform으로 VPC·EKS·IAM을 코드로 프로비저닝, push하면 GitHub Actions가 빌드·테스트·이미지 스캔 후 ECR에 올리고 매니페스트 태그 갱신. ArgoCD가 감지해 EKS에 pull 동기화, HPA로 Pod·Karpenter로 노드 오토스케일. 배포는 카나리로 점진 검증, 실패 시 Git 롤백.\""}, {"title": "CI/CD·쿠버네티스 부가 설명", "kind": "부가 설명", "url": "doc_22_devops_supplement.html", "text": "[문서22] CI/CD·쿠버네티스 부가 설명 — 난이도 있는 개념 보충 --- ① K8s는 어떻게 \"원하는 상태\"를 유지하나 (Reconciliation Loop) - 선언적: \"Pod 3개 원함\"을 선언 → 컨트롤러가 실제와 비교 → 다르면 조치(하나 죽으면 생성). - etcd: 클러스터의 모든 상태를 저장하는 키-값 저장소(진실의 원천). - 컨트롤 플레인: API Server(관문)+Scheduler(Pod를 노드에 배치)+Controller Manager(reconcile)+etcd. - 워커 노드: kubelet(Pod 실행)+kube-proxy(네트워킹)+컨테이너 런타임. ② EKS에서 AWS가 관리하는 것 vs 내가 하는 것 - AWS 관리: 컨트롤 플레인(API Server, etcd, Scheduler) — 이중화·업그레이드. - 내 몫: 워커 노드(EC2/Fargate), 앱 배포, 네트워킹 설정, 오토스케일 구성. - Fargate: 노드 관리도 서버리스로 위임(노드 신경 안 씀). vs 관리형 노드그룹(EC2 직접). ③ IRSA (IAM Roles for Service Accounts) - Pod가 AWS 서비스(S3 등) 접근 시 키 대신 IAM Role을 ServiceAccount에 연결. - OIDC 페더레이션으로 Pod에 임시 자격증명 자동 주입(EC2 Instance Profile의 Pod 버전). - 키 하드코딩 없이 최소 권한. (AWS편 IAM Role 원리와 동일) ④ Terraform state 심화 - state = 코드와 실제 인프라의 매핑. 없으면 Terraform이 뭘 만들었는지 모름. - 원격 백엔드(S3)+잠금(DynamoDB): 팀이 동시에 apply해도 충돌 방지. - terraform import: 콘솔로 만든 기존 리소스를 코드 관리로 편입. - 민감정보: state에 평문 저장될 수 있어 암호화·접근 제한 필수. ⑤ 헬름(Helm) & Kustomize - Helm: K8s 매니페스트의 패키지 매니저. 템플릿+values로 환경별 설정 주입. 차트로 재사용. - Kustomize: 베이스 매니페스트에 환경별 오버레이(패치). 템플릿 없이 순수 YAML. - 선택: 복잡한 파라미터화=Helm, 단순 환경 차이=Kustomize. ⑥ 시크릿 관리 (GitOps의 난제) - Git에 평문 시크릿 금지. 해결: - Sealed Secrets: 암호화해 Git에 저장, 클러스터에서만 복호화. - External Secrets Operator: AWS Secrets Manager에서 실시간 주입. - SOPS: 파일 단위 암호화. - ★ GitOps에서 \"모든 걸 Git에\"와 \"시크릿은 Git에 넣으면 안 됨\"의 충돌을 이렇게 푼다. ⑦ 배포 전략 상세 - 롤링: maxSurge(추가 생성 수)/maxUnavailable(동시 중단 수)로 속도·안정 조절. - 카나리: 트래픽 가중치를 서비스 메시(Istio)나 인그레스로 조절. 메트릭 보고 자동 승격/롤백(Argo Rollouts, Flagger). - 블루-그린: 트래픽 스위치가 순간이라 롤백 즉시. 단 두 배 리소스 필요. ⑧ 파이프라인 보안 (DevSecOps) - SAST(SonarQube): 코드 정적 분석. - SCA(Snyk): 의존성 취약점. - 이미지 스캔(Trivy): 컨테이너 취약점. - IaC 스캔(tfsec/Checkov): Terraform 보안. - 이미지 서명(cosign): 공급망 무결성. - OPA/Gatekeeper: 클러스터 정책 강제(예: 권한 있는 컨테이너 금지). - ★ 각 단계가 게이트: 심각 취약점이면 파이프라인 중단. ⑨ 관측성 (운영) - 로그: EKS→CloudWatch/Loki. 요청 ID로 추적. - 메트릭: Prometheus+Grafana. HPA도 이 메트릭 기반. - 트레이싱: 분산 추적(Jaeger). - ★ Pod가 죽고 사는 환경이라 개별 서버가 아닌 집계·라벨 기반 관측 필수."}, {"title": "CI/CD·쿠버네티스 완전 기초", "kind": "완전 기초", "url": "doc_23_devops_essentials.html", "text": "[문서23] CI/CD·쿠버네티스 완전 기초 — 모르면 안 되는 상식 --- 컨테이너 vs VM - VM: 하드웨어 가상화, 게스트 OS 포함(무겁다). - 컨테이너: OS 커널 공유, 프로세스 격리(가볍다, 빠른 시작). - Docker는 컨테이너, 이미지는 그 실행 템플릿. Docker 기본 - Dockerfile: 이미지 빌드 레시피. - 이미지: 불변 패키지(앱+환경). 컨테이너: 이미지의 실행 인스턴스. - FROM(베이스)/RUN(명령)/COPY(파일)/CMD(실행)/EXPOSE(포트). - docker build/run/push/pull. K8s 기본 명령 - kubectl get/describe/logs/exec/apply/delete. - kubectl apply -f manifest.yaml (선언적 적용). - kubectl rollout undo (롤백). K8s 오브젝트 요약 - Pod(최소 단위)/Deployment(Pod 관리)/Service(접근점)/Ingress(외부 라우팅)/ConfigMap·Secret(설정)/Namespace(격리). - ReplicaSet(Pod 복제)/StatefulSet(상태 있는 앱, DB)/DaemonSet(모든 노드에 하나씩). CI/CD 용어 - 파이프라인/스테이지/잡/스텝/러너(실행 환경). - 아티팩트: 빌드 결과물(이미지·바이너리). - 트리거: 파이프라인 시작 이벤트(push/PR/스케줄). IaC 개념 - 인프라를 코드로. 선언형(Terraform: 원하는 상태)/명령형(스크립트: 단계). - 멱등성: 여러 번 apply해도 같은 결과. - 상태 관리, plan/apply. 환경 분리 - dev/staging/prod. 설정은 환경변수·ConfigMap으로 분리. - 12-Factor App: 설정을 코드와 분리, 상태 외부화 등. AWS 컨테이너 서비스 비교 - EKS: 관리형 쿠버네티스(표준 K8s). - ECS: AWS 고유 오케스트레이터(단순, AWS 종속). - Fargate: 서버리스 컨테이너(노드 관리 없음). EKS/ECS와 결합. 롤백 개념 - 배포 실패 시 이전 버전으로. K8s는 rollout undo, GitOps는 커밋 revert. - 이미지 태그를 버전으로 관리해야 롤백 가능(latest 금지 이유)."}, {"title": "CI/CD·쿠버네티스 확인 질문", "kind": "확인 질문", "url": "doc_24_devops_checkquestions.html", "text": "[문서24] CI/CD·쿠버네티스 확인 질문 — 핵심 점검용 --- 1. CI/CD & Git - CI와 CD 차이? Delivery와 Deployment 차이? - CI 게이트란? 왜 중요? - GitHub Flow가 CI/CD와 잘 맞는 이유? - GitHub Actions에서 AWS 인증을 키 대신 뭘로? (OIDC) 2. Docker & 이미지 - 컨테이너와 VM 차이? - 멀티스테이지 빌드를 왜 쓰나? - 이미지 태그에 latest를 쓰면 안 되는 이유? - 이미지 취약점은 어떻게 검사? 3. Terraform - IaC가 콘솔 클릭보다 나은 점? - Terraform state가 뭐고 왜 S3+DynamoDB에 두나? - plan과 apply 차이? - 드리프트란? 4. 쿠버네티스 - Pod/Deployment/Service/Ingress 각 역할? - Deployment는 Pod가 죽으면 어떻게? - Service가 필요한 이유? (Pod IP 변동) - HPA와 Cluster Autoscaler(Karpenter) 차이? - EKS에서 AWS가 관리하는 것 vs 내 몫? - IRSA란? (Pod의 AWS 권한) - K8s의 reconciliation loop를 한 문장으로? 5. GitOps & 배포 - GitOps를 한 문장으로? 진실의 원천은? - 전통 CI/CD(push)와 GitOps(pull)의 차이와 장점? - ArgoCD는 무엇을 지속적으로 하나? - 롤링/블루-그린/카나리 각각 언제? - GitOps에서 시크릿을 어떻게 다루나? 종합 - \"코드 커밋부터 EKS 배포까지 전체 파이프라인을 설명해보라.\" - \"배포 후 장애가 났다. 어떻게 롤백하나?\" - \"Terraform으로 인프라를, GitHub Actions로 CI를, ArgoCD로 CD를 어떻게 엮나?\""}, {"title": "CI/CD·쿠버네티스 실전편", "kind": "실전편", "url": "doc_25_devops_practical.html", "text": "[문서25] CI/CD·쿠버네티스 실전편 — 구축·운영·트러블슈팅 --- 1. 파이프라인 구축 순서 (실전) 1) Terraform으로 VPC·EKS·ECR·IAM 프로비저닝(state는 S3+DynamoDB). 2) EKS에 필수 애드온: ALB Ingress Controller, Cluster Autoscaler/Karpenter, metrics-server(HPA용), External Secrets. 3) ArgoCD 설치, 매니페스트 레포 연결. 4) 앱 레포에 GitHub Actions: 빌드→테스트→스캔→ECR push→매니페스트 태그 커밋. 5) ArgoCD가 감지해 배포. 헬스체크·롤백 구성. 경험: \"앱 레포(코드)와 매니페스트 레포(배포 설정)를 분리해 관심사를 나눴고, CI가 이미지 태그만 매니페스트에 커밋하면 ArgoCD가 배포했다.\" 2. 두 레포 분리 패턴 (GitOps 정석) - 앱 레포: 소스 코드 + Dockerfile + CI(Jenkinsfile/workflow). - 매니페스트 레포: k8s YAML/Helm/Kustomize. ArgoCD가 감시. - 이유: 코드 변경과 배포 설정 변경의 관심사 분리. 배포 이력이 매니페스트 레포 커밋으로 남음. 3. 자주 겪는 트러블슈팅 - Pod가 안 뜸: kubectl describe pod로 이벤트 확인. - ImagePullBackOff → 이미지 태그/ECR 권한 문제. - CrashLoopBackOff → 앱이 시작 직후 죽음(로그 kubectl logs 확인). 설정·환경변수·의존 서비스. - Pending → 노드 자원 부족(오토스케일 확인) or 스케줄 제약. - OOMKilled: 메모리 limit 초과 → limit 조정 or 앱 메모리 누수. - Service 접속 안 됨: selector 라벨 불일치, 포트 매핑, Ingress 설정. - 배포됐는데 트래픽 안 옴: readiness probe 실패로 트래픽 제외됨. 4. probe (헬스체크 3종) - liveness: 죽었나? 실패 시 Pod 재시작. - readiness: 트래픽 받을 준비됐나? 실패 시 Service에서 제외(재시작 X). - startup: 느린 시작 앱용, 시작 완료까지 다른 probe 유예. ★ readiness 잘못 설정하면 \"배포됐는데 트래픽 안 옴\". liveness 너무 민감하면 재시작 루프. 5. 리소스 관리 - requests: 스케줄링 기준(이만큼 보장). limits: 상한(넘으면 throttle/OOMKill). - request 없으면 스케줄러가 자원 판단 못 함. limit 없으면 한 Pod가 노드 자원 독점. - HPA는 request 대비 사용률로 스케일. 6. 비용·운영 최적화 - Karpenter: 필요한 만큼만 노드 프로비저닝(빠르고 저렴). - Spot 인스턴스: 무상태 워크로드에 비용 절감. - 이미지 작게(멀티스테이지)→pull 빠름·비용↓. - 네임스페이스별 리소스 쿼터로 폭주 방지. 7. 롤백 실전 - GitOps: 매니페스트 레포에서 이전 커밋으로 revert→ArgoCD가 자동 동기화. - K8s 직접: kubectl rollout undo deployment/앱. - Argo Rollouts: 카나리 중 메트릭 나쁘면 자동 롤백. 경험: \"배포 후 에러율 급증 알람 → 매니페스트 레포 revert 한 번으로 이전 버전 복구, 5분 내 정상화.\" 8. 면접 경험 서술 - \"Terraform 모듈로 멀티 환경(dev/staging/prod) EKS를 코드로 관리했다.\" - \"GitHub Actions에서 OIDC로 키 없이 ECR에 push하고, Trivy 스캔을 게이트로 걸었다.\" - \"ArgoCD로 GitOps를 구성해 배포 이력을 Git에 남기고 커밋 revert로 롤백했다.\" - \"HPA로 Pod, Karpenter로 노드를 오토스케일해 트래픽 급증에 대응했다.\" - \"readiness probe 오설정으로 트래픽이 안 붙던 걸 진단해 고쳤다.\" --- 9. Helm (쿠버네티스 패키지 매니저) 정의: 앱 배포에 필요한 여러 YAML(Deployment/Service/ConfigMap)을 하나의 패키지(차트)로 묶어 관리. \"K8s의 apt/npm\". 인과: 앱 하나에 YAML 10개+환경별 값 차이→복붙 지옥. Helm은 템플릿+values로 해결(템플릿 하나+환경별 values.yaml 주입). 차트 구조: Chart.yaml(메타)/values.yaml(기본값)/templates/(YAML 템플릿, {{ .Values.image }}). 명령: helm install/upgrade/rollback. helm install myapp bitnami/redis(공개 차트 한 줄). ★ 가치: Redis/PG/모니터링을 검증된 공개 차트로 한 줄 설치+우리 앱도 차트로 환경별 배포·롤백. (Kustomize와 대안: 복잡 파라미터화=Helm, 단순 환경차이=Kustomize) 10. Docker & kubectl 필수 명령어 Docker: - docker build -t app:v1 . / run -p 8080:80 app:v1 / ps / logs <id / exec -it <id sh / push / images / stop·rm kubectl: - get pods(-A 전체) / describe pod(이벤트, 트러블슈팅 1순위) / logs(-f 실시간, --previous 이전 컨테이너) - exec -it <pod -- sh / apply -f / delete -f - rollout status·undo deploy/app / scale --replicas=5 / get svc·ingress / top pods(리소스) ★ 트러블슈팅 3종: get(뭐가 있나)→describe(왜 이상, 이벤트)→logs(앱이 뭐라). Pod 안 뜨면 이 순서. 11. 쿠버네티스 스토리지 핵심 문제: Pod는 일시적(ephemeral)→죽으면 데이터 소실. DB·파일은 영속 필요→이 간극을 메움. 계층: - Volume: Pod에 붙는 공간. emptyDir(임시)/hostPath(노드 디스크). - PV(PersistentVolume): 클러스터 레벨 실제 저장소(EBS/EFS/NFS). - PVC(PersistentVolumeClaim): Pod가 \"이만큼 주세요\" 요청. PV와 바인딩. - StorageClass: PV를 동적 자동 생성 템플릿(EBS gp3). PVC 오면 자동 생성. 흐름: Pod→PVC(요청)→PV(실제)←StorageClass(자동 생성). ★ StatefulSet: 일반 Deployment는 Pod 이름·저장소 뒤죽박죽→DB 부적합. StatefulSet은 안정적 이름(app-0,1)+각자 영속 볼륨. DB/Kafka/Redis 클러스터처럼 정체성·데이터 유지 필요한 앱. ★ 실무: StatefulSet+PVC로 DB 올릴 수 있지만 관리형(RDS)이 대개 나음(백업·복제·복구를 AWS에). K8s는 무상태 앱만. \"넣을 수 있지만 넣어야 하나?\"의 판단. EBS(블록,한 노드) vs EFS(파일,여러 노드 공유). 12. 헬스체크 주기 설정 (probe 튜닝) livenessProbe: initialDelaySeconds(첫 체크까지 대기, 앱 부팅시간)/periodSeconds(주기)/timeoutSeconds/failureThreshold(몇 번 실패하면 조치). ★ 튜닝: - initialDelay 너무 짧으면 부팅 중 앱을 죽었다 오판→재시작 루프. 시작시간보다 넉넉히. - period 짧으면 빠른 감지+부하↑. liveness 여유롭게, readiness 촘촘히(트래픽 결정). - failureThreshold 민감하면 일시 지연에도 재시작, 둔하면 늦게 감지. - ★ liveness 너무 민감=정상인데 계속 재시작 재앙. readiness=트래픽 받을지, liveness=재시작할지."}, {"title": "인증·프론트엔드 기본", "kind": "기본 설명", "url": "doc_26_frontend_basic.html", "text": "[문서26] 인증·프론트엔드 기본 — 면접 실전용 인증 저장소(JWT/쿠키/localStorage) + 상태관리(React Query/Redux/Hooks) + NestJS DI. --- 1. JWT / 쿠키 / localStorage (세션 관리) 개념 구분: JWT=토큰의 \"형식\"(무엇 저장), 쿠키/localStorage/메모리=저장 \"위치\"(어디에). 다른 축. \"JWT vs 쿠키\"는 잘못된 대비(JWT를 쿠키에도 localStorage에도 담을 수 있음). JWT 본질(세션 vs 토큰): - 전통 세션: 서버가 상태 보관(stateful), 클라는 세션 ID만. 확장 시 세션 공유 필요. - JWT: 서버 서명만 검증, 상태 안 가짐(stateless) → 수평 확장 쉬움. 단 즉시 무효화 어려움(만료까지 유효)→블랙리스트/짧은 만료로 보완. 저장 위치별 장단점: - localStorage: 간단·JS 접근 쉬움·5MB·CSRF 면역 / ★ XSS 취약(JS 탈취)·수동 헤더 주입·만료 수동. - 쿠키(HttpOnly): ★ XSS 방어(JS 접근 불가)·자동 전송·SSR 친화 / CSRF 취약(대응 필요)·4KB·매 요청 오버헤드. - 메모리(JS 변수): 가장 안전(새로고침 시 소멸) / 새로고침하면 사라짐→리프레시 토큰 필요. 두 공격: - XSS: 악성 JS 주입→localStorage 탈취. HttpOnly 쿠키는 JS 접근 불가라 방어. - CSRF: 요청 위조. 쿠키 자동 전송돼 취약→SameSite=Strict/Lax+CSRF 토큰 방어. ★ 실무 정답(하이브리드): - 액세스 토큰(짧은 수명 15분) → 메모리(React state) - 리프레시 토큰(긴 수명) → HttpOnly+Secure+SameSite 쿠키 - 두 공격 동시 최소화. XSS로도 지속 탈취 어렵고, 리프레시는 JS가 못 읽음. 상황별: - REST+모바일/서드파티: localStorage/헤더(쿠키 못 쓰는 환경), CSP로 XSS 방어. - 웹+SSR(Next): HttpOnly 쿠키(서버가 읽어 인증, Next 궁합). - 보안 최우선(금융): 하이브리드+짧은 만료+리프레시 회전. - ★ 원칙: \"편하면 localStorage, 민감하면 HttpOnly 쿠키, 최고 보안은 하이브리드. XSS 막는 게 근본(뚫리면 어디 저장하든 위험).\" 2. React Hooks - useState: 로컬 상태. useEffect: 사이드이펙트(fetch/구독/타이머), 의존성 배열+클린업. - useContext: 전역값(prop drilling 회피), 저빈도 변경(테마/인증). - useMemo/useCallback: 비싼 계산·함수 재생성 방지(리렌더 최적화), 남용 금지. - useRef: 리렌더 없이 값 유지·DOM 접근. 커스텀 훅: 로직 재사용. ★ Next(서버 컴포넌트 시대): App Router는 서버 컴포넌트 기본. 훅은 클라이언트 컴포넌트에서만('use client' 명시). 데이터 페칭=서버 컴포넌트(async), 인터랙션·브라우저 API=클라이언트 훅. 이 경계 나누기가 핵심. 3. React Query (TanStack Query) 정의: 서버 상태(API 데이터)를 관리. 캐싱·동기화·백그라운드 갱신 자동화. 인과: 전통은 useEffect fetch+useState+로딩/에러/캐싱 전부 수동(보일러플레이트 폭발). RQ는 자동화. \"서버 상태는 클라 상태와 다르다\"(원본은 서버, 캐시는 사본). 장점: - 캐싱: 캐시에서 즉시 반환, 중복 요청 제거(dedup) - stale-while-revalidate: 캐시 즉시 표시+백그라운드 갱신→체감 속도↑ - 자동 refetch: 창 포커스·재연결 시 - isLoading/isError 자동 - 낙관적 업데이트: 응답 전 UI 먼저, 실패 시 롤백 - 무한 스크롤·페이지네이션 내장 ★ 비동기: 경쟁 상태·취소·재시도를 대신 처리. \"서버 데이터면 useEffect 말고 React Query\"가 반사. 4. Redux (Redux Toolkit) 정의: 앱 전역 클라이언트 상태를 예측 가능하게. 단일 스토어+액션+리듀서. ★ 최신 RTK 표준: 옛 Redux는 보일러플레이트 악명→RTK가 축소. createSlice(리듀서+액션 자동)/configureStore/createAsyncThunk(비동기). RTK Query(내장 데이터 페칭, RQ 유사). ★ 역할 분담(제일 중요): - 서버 상태(API) → React Query(또는 RTK Query) - 클라 전역 상태 → Redux/Zustand(모달·테마·필터·인증 UI) - 로컬 컴포넌트 → useState - 저빈도 전역 → useContext - 오해 주의: \"Redux에 API 데이터 다 넣기\"는 구식. 서버 상태는 RQ, Redux는 순수 클라 전역만. - Zustand: Redux보다 가벼운 대안(보일러플레이트 적음). 소규모=Zustand, 복잡·대규모=RTK. 5. NestJS 의존성 주입(DI) 정의: 객체가 의존성을 직접 안 만들고 외부에서 주입받음. Nest 핵심. 인과: 직접 생성(new Service())은 강결합→테스트 어렵고 교체 불가. DI는 인터페이스 의존+구현 주입→느슨한 결합·테스트 쉬움(목 주입)·재사용. 구현: @Injectable()(주입 가능 프로바이더)+생성자 주입(constructor(private svc: Service)). IoC 컨테이너가 생명주기 관리+자동 주입. @Module로 등록·스코프. ★ 본질=관심사 분리+테스트 용이성. \"Nest는 DI로 OOP 구조를 강제해 대규모 유지보수 강함\"(연상사전). 스프링 DI와 같은 철학."}, {"title": "인증·프론트엔드 부가 설명", "kind": "부가 설명", "url": "doc_28_frontend_supplement.html", "text": "[문서28] 인증·프론트엔드 부가 설명 — 난이도 있는 개념 보충 --- ① HttpOnly 쿠키 & CSRF (자세히) HttpOnly: 쿠키에 HttpOnly 플래그→JS가 못 읽음(document.cookie 불가). 브라우저가 서버 요청 시만 자동 전송. XSS로 악성 JS 주입돼도 탈취 불가. 왜 CSRF 취약: 쿠키 \"자동 전송\"이 양날. 브라우저는 해당 도메인 모든 요청에 쿠키 자동 첨부(요청 출처 안 따짐). CSRF
