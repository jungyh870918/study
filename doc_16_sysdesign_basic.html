 시나리오: 1) bank.com 로그인(HttpOnly 쿠키에 토큰) 2) 로그아웃 안 하고 evil.com 방문 3) evil.com에 숨은 <form action=bank.com/transfer POST 또는 <img src=... 4) 브라우저가 bank.com 요청에 인증 쿠키 자동 첨부! 5) 서버는 정상 요청으로 착각→이체 핵심: 공격자가 토큰 훔치는 게 아니라 \"브라우저가 쿠키를 붙여주는 걸 악용\". HttpOnly로 못 막음(읽는 게 아니니). 방어1 SameSite: - Strict: 다른 사이트 요청엔 쿠키 안 붙임. 가장 안전, 외부 링크 진입 시 로그인 풀림(UX). - Lax: 안전한 이동(링크/GET)엔 붙임, POST/이미지/iframe 위조엔 안 붙임. 실무 기본. - None: 항상 붙임(크로스 사이트), Secure 필수. 방어2 CSRF 토큰: 1) 서버가 예측 불가 랜덤 토큰 발급 2) 클라가 요청 시 헤더/body에 담아 전송 3) 서버가 \"세션+CSRF 토큰\" 짝 검증 evil.com은 이 랜덤 토큰 모름(같은 출처 아니라 못 읽음)→위조 불가. 상태 변경(POST/PUT/DELETE)에 적용. 정리: SameSite=Lax 기본+중요 변경엔 CSRF 토큰. HttpOnly(XSS)+SameSite+CSRF 토큰(CSRF)=삼중 방어. ② 액세스 토큰 vs 리프레시 토큰 (존재 이유=자동 로그인) 딜레마: 수명 짧으면 안전하나 자주 로그인(불편), 길면 편하나 탈취 시 오래 악용(위험). 해결(두 토큰): - 액세스: 짧음(15분~1h), 매 요청 첨부, 메모리 저장, 노출 큼. - 리프레시: 김(수일~수주), 액세스 갱신용, HttpOnly 쿠키, 노출 적음. 흐름(자동 로그인 실체): 1) 로그인→액세스(15분)+리프레시(2주) 발급 2) API마다 액세스 첨부 3) 15분 후 만료→401 4) 클라가 리프레시로 \"새 액세스 주세요\" 5) 서버 검증→새 액세스 발급 6) 사용자는 모름→끊김 없이 사용(=자동 로그인) 인과: 액세스 탈취돼도 15분이면 만료(피해 최소)+리프레시는 HttpOnly라 탈취 어렵고 갱신 때만 노출. \"2주 유지\"(편의)+\"탈취 피해 최소\"(보안) 동시 달성. ★ 리프레시 회전(rotation): 갱신마다 리프레시도 새로 발급+기존 폐기. 탈취된 것 재사용 시 감지해 세션 차단. ③ React Query \"서버 상태\"의 서버 = 백엔드 API (헷갈림 해소) - 서버 상태: 원본이 백엔드(API/DB)에 있는 데이터. 프론트는 fetch해 사본(캐시)만 들고 있음. - 클라이언트 상태: 프론트에만 존재(모달/폼 값/다크모드). - ★ React Query의 \"서버\" = 당신의 백엔드 API 서버(NestJS/Express). Next 서버 컴포넌트나 리액트 서버가 아님. Next와 관계: - Next 서버 컴포넌트: Next 서버에서 렌더링 시 데이터 미리 fetch(위치=렌더링). - React Query: 브라우저에서 백엔드 API fetch·캐싱(개념=데이터 원본). - 다른 층. 초기 데이터는 서버 컴포넌트, 이후 인터랙션은 React Query로 함께 씀. ④ DTO & ValidationPipe (NestJS) DTO: 계층 간 데이터 형태 정의 객체. \"이 요청/응답은 이런 필드\"의 계약. class CreateUserDto { @IsEmail() email; @IsString() @MinLength(8) password; @IsOptional() @IsInt() age?; } 왜: 명확한 계약(타입 명시)+유효성 기준(데코레이터)+엔티티와 분리(내부 필드 숨김). ValidationPipe: 컨트롤러 도달 전 입력 변환·검증. DTO 규칙과 대조. app.useGlobalPipes(new ValidationPipe({ whitelist:true(없는 필드 제거), forbidNonWhitelisted:true(없는 필드 에러), transform:true(타입 변환) })) - 위반이면 자동 400(컨트롤러 도달 전)→컨트롤러는 검증된 데이터만 받음. 검증 로직을 컨트롤러에서 분리. ⑤ NestJS 요청 한 바퀴 (전체 흐름) ★ [클라 요청] ① Middleware: 가장 먼저. 로깅/CORS/body 파싱/토큰 추출. Express 레벨. ② Guards: 인증·인가(\"접근 권한 있나?\"). JWT 검증/역할. 실패 403/401. ③ Interceptors(before): 요청 가로채 부가 처리(로깅/타이머 시작). ④ Pipes: 입력 변환·검증(ValidationPipe가 DTO로). 위반이면 400. ⑤ Controller: 라우트 핸들러, Service 호출. ⑥ Service: 비즈니스 로직(DI 주입). ⑦ Repository: DB 접근(TypeORM/Prisma), 쿼리 실행. [DB] 읽기/쓰기 → 역방향 ⑦→⑥→⑤ 반환 ③ Interceptors(after): 응답 가로채 변형(포맷 통일/로깅 완료/시간 측정). ② Exception Filters: 에러 잡아 응답 포맷팅. [클라 응답] ★ 인터셉터 vs 미들웨어: 미들웨어=컨트롤러 전에만, Express 레벨. 인터셉터=요청 전+응답 후 양쪽, Nest 레벨(응답 변형 가능, 포맷 통일 {data:...}이 대표 용도). 한문장: \"미들웨어(전처리)→가드(인증/인가)→인터셉터(전처리)→파이프(DTO 검증)→컨트롤러→서비스(로직)→레포지토리(DB), 응답은 인터셉터(후처리)로, 에러는 예외 필터가 잡음.\""}, {"title": "React · Next.js 핵심 사전 (프론트 면접 대비)", "kind": "완전 기초", "url": "doc_46_frontend_essentials.html", "text": "[문서] React · Next.js 핵심 사전 (프론트 면접 대비) 흩어진 React/Next 내용을 한곳에 모은 사전식 정리. 개념·용어·특징 위주. 마이너한 건 제외. 앞선 문서: 상태관리(26 React Query/Redux/Hooks), CSRF·토큰·NestJS(28), 병원결제 Next 실전(34). --- A. React 핵심 A1. 근본 개념 - 컴포넌트: UI를 재사용 가능한 조각으로. 함수형이 표준(클래스형은 레거시). - 선언형: \"어떻게 그릴지\"가 아니라 \"어떤 상태면 어떤 UI인지\"를 선언. 상태가 바뀌면 React가 알아서 다시 그림. - 단방향 데이터 흐름: 데이터는 부모→자식(props)으로만. 예측 가능성↑. - Virtual DOM: 실제 DOM 조작은 비쌈 → 가상 DOM에서 변경분(diff)을 계산해 바뀐 부분만 실제 DOM에 반영(reconciliation). \"직접 DOM 안 만지고 상태만 바꾼다.\" A2. JSX - JavaScript 안에 HTML처럼 쓰는 문법. 빌드 시 React.createElement 호출로 변환. - 표현식은 {}로 삽입. class 대신 className, 이벤트는 camelCase(onClick). - 반드시 하나의 부모로 감쌈(< ...</ Fragment 사용 가능). A3. props vs state - props: 부모가 자식에게 내려주는 값. 자식은 읽기 전용(불변). - state: 컴포넌트 내부에서 관리하는 변경 가능한 값. 바뀌면 리렌더. - ★ 상태는 불변으로 다룸: 직접 수정 말고 새 값으로 교체(setState/setX). React가 변경을 감지하는 방식이 참조 비교라서. A4. Hooks (함수 컴포넌트의 핵심) - useState: 로컬 상태. [값, 세터] 반환. - useEffect: 사이드 이펙트(데이터 fetch·구독·타이머). 의존성 배열로 실행 시점 제어, return으로 클린업(구독 해제 등). - []면 마운트 시 1회, [dep]면 dep 바뀔 때, 없으면 매 렌더. - useContext: 전역값 공유(prop drilling 회피). 저빈도 변경(테마·인증). - useMemo: 비싼 계산 결과 캐싱(의존성 안 바뀌면 재계산 X). - useCallback: 함수 재생성 방지(자식에 함수 넘길 때 리렌더 최적화). - useRef: 리렌더 없이 값 유지 + DOM 요소 직접 접근. - useReducer: 복잡한 상태 로직을 reducer로(Redux 축소판). - 커스텀 훅: use로 시작하는 로직 재사용 단위(useAuth, useDebounce). ★ 훅 규칙: 최상위에서만 호출(조건문·반복문 안 X), React 함수 안에서만. 호출 순서가 고정돼야 React가 상태를 매칭. A5. 렌더링 & 최적화 - 리렌더 트리거: state 변경, props 변경, 부모 리렌더. - key: 리스트 렌더 시 각 항목 식별자. 인덱스 대신 고유 id 권장(순서 바뀔 때 버그 방지). - React.memo: props 안 바뀌면 컴포넌트 리렌더 스킵. - 최적화 3종(useMemo/useCallback/memo)은 남용 금지 — 측정 후 병목만. - 지연 로딩: React.lazy + Suspense로 컴포넌트 코드 분할(초기 번들↓). A6. 기타 자주 나오는 것 - 제어 컴포넌트: 입력값을 state로 관리(value+onChange). vs 비제어(ref로 읽기). - 이벤트: SyntheticEvent(브라우저 이벤트 래핑, 크로스브라우저 일관성). - 에러 바운더리: 하위 렌더 에러를 잡아 폴백 UI(클래스형만 가능, 또는 라이브러리). - Portal: DOM 트리 바깥에 렌더(모달·툴팁). - StrictMode: 개발 중 잠재 문제 감지(이펙트 2번 실행 등). B. React 상태관리 (요약 — 상세는 문서26) - 서버 상태(API 데이터) → React Query(TanStack): 캐싱·dedup·stale-while-revalidate·자동 refetch. - 클라 전역 상태 → Redux Toolkit / Zustand: 모달·테마·필터. - 로컬 → useState, 저빈도 전역 → useContext. - ★ \"서버 상태는 React Query, 클라 전역은 Redux\"의 역할 분담이 현대 정석. Redux에 API 데이터 다 넣는 건 구식. C. Next.js 핵심 C1. Next란 & 왜 쓰나 - React 기반 풀스택 프레임워크. React만으로 부족한 것(라우팅·SSR·번들 최적화·백엔드)을 통합 제공. - 핵심 가치: 렌더링 전략 선택(SSR/SSG/ISR/CSR), 파일 기반 라우팅, SEO, 성능 최적화 기본 내장. C2. 렌더링 전략 (★ 면접 핵심) - CSR(Client-Side Rendering): 브라우저에서 JS로 렌더. 초기 로딩 느리고 SEO 불리. (순수 React) - SSR(Server-Side Rendering): 요청 시 서버가 HTML 생성. 최신 데이터·SEO 유리, 서버 부하. - SSG(Static Site Generation): 빌드 시 HTML 미리 생성. 가장 빠름, 자주 안 바뀌는 페이지(블로그·문서). - ISR(Incremental Static Regeneration): SSG인데 일정 주기로 백그라운드 재생성. 정적 속도+최신성 절충. - ★ 선택: 실시간 데이터·개인화=SSR, 고정 콘텐츠=SSG, 가끔 갱신=ISR, 상호작용 많은 대시보드 일부=CSR. C3. App Router (Next 13+, 현재 표준) - app/ 디렉토리 기반. 폴더=경로, page.tsx=페이지, layout.tsx=공통 레이아웃. - ★ 서버 컴포넌트가 기본: 페이지가 서버에서 렌더+데이터 직접 조회(async 컴포넌트). 번들에 JS 안 포함→가벼움. - 클라이언트 컴포넌트: 파일 상단 'use client'. 상태·이벤트·브라우저 API·훅을 쓸 때만. - ★ 경계 설계: 데이터 조회·정적 부분=서버 컴포넌트, 상호작용=클라이언트 컴포넌트로 분리. - (구) Pages Router: pages/ 기반, getServerSideProps/getStaticProps. 레거시지만 여전히 씀. C4. 라우팅 — 정의 방식 (React Router vs Next) ★ 근본 차이: React Router는 \"라우트를 코드에 선언\", Next는 \"파일 구조가 곧 라우트\". React(react-router-dom): 라이브러리 설치 후 <Route path element 로 매핑을 코드에 나열. <Routes <Route path=\"/about\" element={<About/ } / <Route path=\"/product/:id\" .../ </Routes 동적 파라미터 :id, 읽기 useParams(). 404는 path=\" \". Next(App Router): 폴더/파일 구조가 URL. 설치·선언 불필요. - 폴더=경로 세그먼트, page.tsx=그 경로의 페이지. app/about/page.tsx → /about. - [id]=동적 라우트. product/[id]/page.tsx → /product/123. 읽기: 서버 컴포넌트는 params props, 클라는 useParams(). - [slug]=SEO용 이름, [...all]=캐치올(여러 세그먼트). - layout.tsx=하위 공통 레이아웃(중첩 가능). (그룹)=괄호 폴더, URL에 안 나타남(구획용). - 특수 파일: loading.tsx(로딩 UI), error.tsx(에러 UI), not-found.tsx(404). C4-B. 페이지 이동 방식 (6가지) (1) <Link href — 선언적(클릭). 전체 리로드 없이 클라 전환 + 자동 prefetch(뷰포트에 보이면 미리 로드). 대부분의 링크. (2) useRouter().push() — 명령형(로직 중 이동, 폼 성공 후 등). 'use client' 필요, next/navigation에서 import(구 Pages Router는 next/router — 헷갈리지 말 것). - push(히스토리 쌓임) / replace(히스토리 교체, 로그인 후) / back()·forward() / refresh(서버 데이터 재요청). (3) redirect('/login') — ★ 서버 사이드 이동(서버 컴포넌트·서버 액션). React엔 없음. JS 로드 전 서버 단에서 이동→깜빡임 없음. 권한 체크에. (4) notFound() — 서버에서 404 강제 트리거(리소스 없을 때). (5) 미들웨어 NextResponse.redirect — 페이지 도달 전 요청 단계 이동. 전역 인증 게이트. (6) <a — 일반 링크(전체 리로드). 외부 링크에만. 언제 무엇: 클릭=Link / 로직 중=push / 히스토리 안 남기기=replace / 서버 권한 차단=redirect / 404=notFound / 전역 인증=미들웨어. React Router 대응: <Route →파일구조 / useNavigate()→useRouter().push() / useParams()→params·useParams() / redirect·notFound·미들웨어=Next 고유(서버 사이드). C5. 데이터 처리 (App Router) - 서버 컴포넌트에서 직접 fetch/DB 조회: async function Page() { const data = await getData(); }. - 서버 액션('use server'): 폼·변경(mutation)을 함수 호출처럼. API 라우트 없이 서버 로직 실행. revalidatePath로 캐시 무효화. - Route Handler(app/api/.../route.ts): 외부가 부르는 것(웹훅)·명시적 API 엔드포인트. - ★ 구분: 내부 변경=서버 액션, 외부 연동·웹훅=Route Handler, 조회=서버 컴포넌트. C6. 최적화 내장 기능 (자주 묻는 것) - next/image (<Image ): 자동 WebP·리사이징·lazy loading·레이아웃 시프트 방지. - next/link (<Link ): 클라 네비게이션 + 자동 prefetch. - next/font: 폰트 self-host로 외부 요청 제거·시프트 방지. - 코드 분할: 라우트별 자동 분할. dynamic()로 컴포넌트 지연 로딩. - 메타데이터 API: export const metadata / generateMetadata로 페이지별 SEO(title·og). - 캐싱: fetch 요청·라우트 캐싱 자동. revalidate로 주기 설정. C7. 미들웨어 - middleware.ts: 요청이 페이지 도달 전 실행(엣지). 인증 검사·리다이렉트·A/B·헤더 조작. - 라우트 단에서 접근 제어(로그인 필요·관리자 전용). C8. Next가 React 대비 개선/차별화한 것 (★ 빈출) React는 UI 라이브러리라 나머지를 직접 조립. Next는 프레임워크로 통합+개선. 거의 다 \"서버를 활용한다\"는 한 뿌리. 1. 렌더링(가장 큰 차이): React=CSR(브라우저 렌더, 초기 느림·SEO 불리) / Next=서버 렌더(SSR/SSG) 가능→첫 화면 빠름·SEO 유리, 페이지별 전략 선택. 2. 서버 컴포넌트: React=모든 컴포넌트가 클라 번들에 포함 / Next=조회·정적 부분은 서버 실행, 그 JS는 클라에 안 감→번들 경량화. 상호작용만 'use client'. 3. 라우팅: React=react-router 설치+<Route 선언 / Next=파일 기반 내장 + 서버 사이드 이동(redirect/notFound). 4. 데이터 페칭: React=useEffect로 마운트 후 fetch(깜빡임) / Next=서버 컴포넌트가 렌더 전 미리 조회, 변경은 서버 액션(API 없이). 5. 최적화 내장: 이미지(<Image 자동 WebP·lazy)·폰트(next/font)·코드분할(라우트별 자동)·prefetch가 기본. React는 라이브러리로 조립. 6. 풀스택: React=프론트만(백엔드 별도) / Next=Route Handler·서버 액션으로 백엔드가 한 프로젝트에. 7. 기타: layout.tsx 중첩 레이아웃, 미들웨어(요청 단계, React엔 없음—서버가 없으니), 메타데이터 API(SEO를 서버에서, React는 react-helmet). 한 장 요약: React=UI 라이브러리·CSR·클라 번들·라우터 설치·useEffect fetch·별도 백엔드 / Next=풀스택·SSR선택·서버컴포넌트·파일라우팅·서버조회·내장백엔드·미들웨어. ★ 핵심 통찰: \"React + 서버 = Next\". React는 브라우저에서만 도는 UI라 렌더링·SEO·데이터·백엔드가 클라 한계에 묶이는데, Next가 서버 레이어를 얹어 서버렌더·서버컴포넌트·서버액션·미들웨어·redirect가 가능해진 것. 대부분의 차별점이 이 하나로 설명됨. D. 렌더링·성능 용어 (프론트 공통) - Hydration(하이드레이션): 서버가 보낸 정적 HTML에 JS(이벤트·상태)를 \"붙여\" 상호작용 가능하게 만드는 과정. \"마른 HTML에 물(JS)을 부어 살린다\". - 흐름: 서버가 HTML 렌더→전송 / 브라우저가 HTML 즉시 표시(보이지만 죽어있음, 클릭 안 됨) / JS 번들 다운로드 / Hydration으로 이벤트·상태 연결(살아남) / 상호작용 가능. - 왜: SSR로 첫 화면·SEO는 챙기되, JS를 나중에 붙여 동작도 살리려고. CSR(빈 HTML→JS가 처음부터 그림)보다 첫 화면 빠름. - 문제1 Hydration mismatch: 서버가 그린 HTML과 클라 렌더 결과가 다르면 에러. 원인=Date.now()/Math.random()/window 접근 등 서버·클라 다른 값. - 문제2 상호작용 지연: HTML 보이는데 JS 로드·Hydration 전까진 클릭 안 먹는 갭. 번들 크면 길어짐. - 개선: 서버 컴포넌트(JS 안 보냄→Hydration 대상 아님), Islands/Partial Hydration(상호작용 부분만), Streaming SSR+Suspense. - ★ Next 연결: App Router의 서버 컴포넌트는 JS 미전송이라 Hydration 없음. 'use client' 컴포넌트만 Hydration 대상→필요한 곳에만 'use client' 쓰는 게 비용 절감. - CLS(Cumulative Layout Shift): 로딩 중 레이아웃이 밀리는 정도(이미지 크기 지정·폰트로 개선). - LCP/FCP: 가장 큰/첫 콘텐츠가 그려지는 시점(성능 지표, Core Web Vitals). - 코드 스플리팅: 번들을 쪼개 필요한 것만 로드(초기 로딩↓). - Tree shaking: 안 쓰는 코드를 빌드에서 제거. - prefetch: 다음에 갈 가능성 높은 페이지를 미리 로드. - SPA vs MPA: 단일 페이지(클라 라우팅) vs 다중 페이지(서버가 매번 HTML). E. 면접 빈출 한 줄 답 - \"React가 뭔가?\" → 선언형·컴포넌트 기반 UI 라이브러리. 상태가 바뀌면 Virtual DOM으로 바뀐 부분만 다시 그림. - \"Virtual DOM 왜?\" → 실제 DOM 조작이 비싸서, 가상 DOM에서 diff 계산 후 최소 변경만 반영. - \"useEffect 언제?\" → 렌더 외의 사이드 이펙트(fetch·구독·타이머). 의존성 배열로 시점 제어, 클린업 필수. - \"Next를 왜 React 대신?\" → 라우팅·SSR/SSG·SEO·이미지/폰트 최적화가 기본 내장. 렌더링 전략을 페이지마다 선택. - \"SSR vs SSG vs CSR?\" → 요청 시 서버 렌더(SSR, 최신·SEO) / 빌드 시 정적(SSG, 최속) / 브라우저 렌더(CSR, 상호작용). ISR은 둘 절충. - \"서버 컴포넌트?\" → App Router 기본. 서버에서 렌더+데이터 조회, JS 번들 미포함. 상호작용은 'use client'로 분리. - \"Hydration?\" → SSR HTML에 JS를 입혀 상호작용 가능하게 만드는 과정. - \"상태관리 도구 선택?\" → 서버 상태 React Query, 클라 전역 Redux/Zustand, 로컬 useState. - \"React Router와 Next 라우팅 차이?\" → React Router는 <Route 로 코드 선언, Next는 파일·폴더 구조가 곧 라우트(내장). - \"Next에서 페이지 이동?\" → 클릭은 <Link (prefetch), 로직 중은 useRouter().push(), 서버 권한 차단은 redirect(), 404는 notFound(). - \"Next가 React보다 나은 점?\" → 서버 렌더(SEO·속도), 서버 컴포넌트(번들↓), 파일 라우팅, 서버 조회·서버 액션(백엔드 내장), 이미지/폰트 최적화. 핵심은 \"React+서버\". 핵심 요약 React=선언형·컴포넌트·Virtual DOM·단방향·Hooks. 상태는 불변으로. Next=React 풀스택(라우팅·SSR/SSG/ISR·SEO·최적화 내장). App Router는 서버 컴포넌트 기본+'use client' 경계, 데이터는 서버 컴포넌트(조회)/서버 액션(변경)/Route Handler(외부). 최적화는 next/image·link·font·코드분할·메타데이터가 기본. 상태관리는 서버=React Query·클라=Redux/Zustand 역할 분담."}, {"title": "인증·프론트엔드 확인 질문", "kind": "확인 질문", "url": "doc_27_frontend_checkquestions.html", "text": "[문서27] 인증·프론트엔드 확인 질문 — 핵심 점검용 --- 1. 인증 저장소 - JWT는 \"무엇\"이고 쿠키/localStorage는 \"무엇\"인가? (형식 vs 위치) - \"JWT vs 쿠키\"가 왜 잘못된 대비인가? - 세션 방식과 JWT의 차이? JWT의 확장 장점과 단점(무효화)? - localStorage의 치명적 약점은? (XSS) - HttpOnly 쿠키가 막는 공격과 취약한 공격은? (XSS 방어/CSRF 취약) - CSRF는 어떻게 방어? (SameSite+CSRF 토큰) - 하이브리드 베스트 프랙티스를 설명? (액세스=메모리, 리프레시=HttpOnly 쿠키) - SSR(Next)에는 왜 쿠키가 유리? - 결국 어디 저장하든 무엇을 막는 게 근본? (XSS) 2. React/상태관리 - useEffect의 의존성 배열과 클린업은 각각 무엇? - useMemo/useCallback을 남용하면 안 되는 이유? - Next App Router에서 훅을 쓰려면? ('use client') - 서버 컴포넌트와 클라이언트 컴포넌트의 경계는? - React Query가 해결하는 문제? (수동 fetch 보일러플레이트) - stale-while-revalidate란? - React Query의 캐싱·dedup 장점? - \"서버 상태와 클라이언트 상태가 다르다\"는 무슨 뜻? - Redux Toolkit이 옛 Redux보다 나은 점? - ★ 서버 상태·클라 전역·로컬 상태를 각각 무엇으로 관리? (역할 분담) - \"Redux에 API 데이터를 다 넣는다\"가 왜 구식? - Zustand는 언제? 3. NestJS DI - DI를 한 문장으로? - 직접 생성(new)의 문제와 DI의 이점? - @Injectable과 생성자 주입의 역할? - DI가 테스트를 쉽게 하는 이유? 4. 심화 (CSRF/토큰/NestJS 흐름) - HttpOnly가 CSRF는 왜 못 막나? - CSRF 공격이 토큰을 훔치는 건가 아닌가? (브라우저 자동 전송 악용) - SameSite Strict/Lax/None 차이? - CSRF 토큰이 위조를 막는 원리? (evil.com이 못 읽음) - 액세스/리프레시 토큰을 왜 나누나? (보안vs편의 딜레마) - 자동 로그인이 안전하게 되는 흐름? - 리프레시 토큰 회전(rotation)이란? - React Query가 말하는 \"서버\"는 어느 서버? (백엔드 API, Next 서버 아님) - DTO를 왜 쓰나? (계약+검증+엔티티 분리) - ValidationPipe는 언제 동작하고 위반 시 무엇을 반환? - NestJS 요청 흐름 순서? (미들웨어→가드→인터셉터→파이프→컨트롤러→서비스→레포) - 인터셉터와 미들웨어의 차이? (인터셉터는 응답 후도, 응답 변형 가능) 종합 - \"웹 앱 인증을 설계한다면 토큰을 어디에 어떻게 저장하나?\" - \"프론트엔드 상태를 서버/전역/로컬로 나눠 각각 무슨 도구를 쓰나?\""}, {"title": "UI 컴포넌트 용어집 (프론트 공통 언어)", "kind": "용어 체크리스트", "url": "doc_47_frontend_glossary.html", "text": "[문서] UI 컴포넌트 용어집 (프론트 공통 언어) \"이런 UI를 뭐라 부르나\" — 개발자·디자이너·기획자 공통 언어. 라이브러리(Radix/shadcn/MUI) 문서도 이 이름. ★ 정확한 명칭으로 소통·검색. \"옆에서 나오는 메뉴\"가 아니라 \"드로어\". --- 알림·피드백 - Toast(토스트): 모서리에 잠깐 떴다 사라지는 알림(\"저장되었습니다\"). - Snackbar(스낵바): 토스트와 거의 같음(주로 하단, Material 용어). - Alert(얼럿): 페이지 안에 고정으로 뜨는 경고/안내 박스. - Modal / Dialog(모달/다이얼로그): 화면 덮고 뜨는 팝업. 배경 어두워짐. - Popover(팝오버): 특정 요소 옆에 떠서 부가 정보/액션. - Tooltip(툴팁): hover 시 뜨는 작은 설명. - Banner(배너): 상단 전체 폭 알림. - Progress bar / Spinner(프로그레스바/스피너): 로딩 표시. - Skeleton(스켈레톤): 로딩 중 회색 뼈대 표시. 네비게이션 - Breadcrumb(브레드크럼): \"홈 카테고리 상품\" 경로 표시. - Navbar / Header(네비바/헤더): 상단 네비게이션 바. - Sidebar / Drawer(사이드바/드로어): 옆에서 나오는 메뉴 패널. - Tabs(탭): 여러 뷰 전환. - Pagination(페이지네이션): \"1 2 3 ... 다음\" 페이지 이동. - Stepper(스테퍼): 단계별 진행 표시(결제 1→2→3). \"진행 바\". - Menu / Dropdown(메뉴/드롭다운): 클릭하면 펼쳐지는 목록. - Accordion(아코디언): 접혔다 펴지는 목록(FAQ). 입력(폼) - Input / Text field: 텍스트 입력. Textarea: 여러 줄. - Checkbox(다중 선택) / Radio(단일 선택). - Toggle / Switch(토글/스위치): 켜기/끄기. - Select(셀렉트): 목록에서 하나 선택. - Slider(슬라이더): 드래그로 값 조절. - Date picker(데이트 피커): 달력에서 날짜. - Autocomplete / Combobox(자동완성/콤보박스): 입력하면 후보 제시. - File upload(파일 업로드): 파일 첨부. 데이터 표시 - Table(테이블): 행·열 데이터. - Card(카드): 정보 담은 박스. - List(리스트): 목록. - Badge(뱃지): 작은 상태 표시(알림 개수, \"NEW\"). - Chip / Tag(칩/태그): 작은 라벨(필터·키워드). - Avatar(아바타): 프로필 이미지(원형). - Carousel(캐러셀): 이미지 슬라이드. - Tree(트리): 계층 구조(폴더). 오버레이·기타 - Backdrop / Overlay: 모달 뒤 어두운 배경. - Bottom sheet(바텀 시트): 모바일 아래서 올라오는 패널(=Drawer 하단형, vaul). - Command palette(커맨드 팔레트): Ctrl+K 검색·명령창. - Context menu(컨텍스트 메뉴): 우클릭 메뉴. - Divider(디바이더): 구분선. 헷갈리기 쉬운 것 구분 - Modal vs Popover vs Tooltip: 모달=화면 덮음(집중 강제) / 팝오버=요소 옆 작은 창(액션 포함) / 툴팁=순수 설명(hover). - Toast vs Alert: 토스트=자동 사라짐(임시) / 얼럿=페이지에 남음(고정). - Dropdown vs Select: 드롭다운=메뉴(액션) / 셀렉트=값 선택(폼 입력). - Drawer vs Modal: 드로어=옆/아래서 슬라이드 / 모달=중앙에 뜸. 왜 이름을 알아야 하나 개발자 간 공통 언어(\"공통된 코드로 대화\"). 정확한 명칭으로 디자이너·기획자와 소통하고, 라이브러리(Radix/shadcn/MUI) 문서도 이 이름이라 찾아 쓰려면 알아야 함. ★ 병원결제 프로젝트 실사용: Drawer(vaul 모바일 하단), Carousel(embla), Radio Group(결제수단), Toast, Dialog(모달), Badge 등이 shadcn 컴포넌트로. 면접 팁: \"이런 UI 구현해봤나요\"에 정확한 명칭으로(\"토스트로 알림, 스테퍼로 결제 단계, 드로어로 모바일 메뉴\") 답하면 실무 경험이 자연스럽게 드러남."}, {"title": "허 찌르는 질문 대비 (경험·버전·선택 트레이드오프)", "kind": "허 찌르는 질문", "url": "doc_50_frontend_gotcha.html", "text": "[문서] 허 찌르는 질문 대비 (경험·버전·선택 트레이드오프) 지식이 아니라 \"실제 경험·선택\"을 묻는 질문. 지어내지 말고 실제 기반으로. 모르면 정직하게, 아는 건 뻣뻣하게. ★ 경력직 답변 태도(문서0)와 세트: 개념은 아는 대로, 경험은 실제만. --- 1. \"최근에 써본 Next 버전 몇이에요?\" - 사실 확인: 2026년 기준 Next 16이 stable(2025년 10월 출시), 16.2.x가 현재 안정 라인. 15는 유지보수 LTS. - ★ 답변 원칙: 실제 쓴 버전을 말한다. 병원결제 프로젝트가 Next 15(App Router)였으면 \"15로 App Router 기반 결제 플랫폼을 만들었습니다\"로. 안 써본 최신 버전을 안다고 하지 말 것. - 버전 감각 보여주기(안 써봤어도 흐름은 알기): - 13: App Router 등장(서버 컴포넌트). - 14: 서버 액션 안정화. - 15: React 19, async request API, Turbopack 안정, fetch 캐싱 기본값 변경. - 16: Turbopack 기본 번들러(webpack 대체), React Compiler 안정, next lint 제거(ESLint 직접 실행), 라우팅/프리페치 최적화. - ★ \"15까지 써봤고 16은 Turbopack이 기본이 되고 캐싱이 명시적으로 바뀐 걸로 압니다\" 식으로 \"쓴 것+아는 것\"을 구분해 답하면 정직하면서 감각 있어 보임. 2. \"상태관리 툴 뭐까지 써봤어요?\" - ★ 실제 쓴 것만. 프로젝트 기반으로: - 서버 상태: React Query(TanStack) — 캐싱·refetch. - 클라 전역: Redux Toolkit 또는 Zustand. - 로컬: useState / useReducer, 저빈도 전역: useContext. - 안 써봤으면 \"Redux는 써봤고 Zustand는 안 써봤는데 더 가벼운 대안으로 압니다\"로 구분. - ★ 후속 대비: \"왜 그걸 골랐나?\" → \"서버 데이터라 React Query로 캐싱·동기화를 맡기고, 클라 전역(모달·필터)만 가벼운 Zustand로 나눴습니다.\" (서버상태/클라상태 분리 원칙, 문서26·46). - 함정 질문: \"Redux 없이 Context로 전역 못 하나?\" → \"가능하지만 Context는 값 바뀔 때 구독 컴포넌트가 다 리렌더돼서 자주 바뀌는 상태엔 부적합. 그래서 저빈도(테마·인증)만 Context, 자주 바뀌는 건 전용 도구.\" 3. \"왜 그 기술을 골랐어요?\" (선택 이유) - ★ \"남들이 써서\"는 최악. 트레이드오프로 답한다. - 예: \"왜 Next?\" → \"SSR·SEO·라우팅·이미지 최적화가 필요했고, React만으론 다 조립해야 해서. 풀스택이라 백엔드도 한 코드베이스로.\" (문서46 C8) - 예: \"왜 Prisma?\" → \"SQLite↔PG 무변경, 타입 안전. 단 복잡 쿼리는 raw도 병행.\" (문서48) - 예: \"왜 Zustand(또는 Redux)?\" → 규모·보일러플레이트·팀 친숙도 트레이드오프. - 정직 카드: \"사실 이건 회사에서 이미 쓰던 스택이라 따라간 부분도 있습니다\"도 솔직한 답(무리한 정당화보다 나음). 4. \"그거 안 써봤죠?\" / 모르는 것 찌르기 - ★ 지어내지 말 것. \"그건 직접 안 써봤습니다. 다만 개념은 ~로 이해하고 있습니다\"로 정직+지식. - 개념 질문이면 경험 언급 없이 아는 대로 뻣뻣하게(문서0). \"잘 모르겠습니다\" 고백보다 아는 만큼. - 절대 금지: 안 써본 걸 써봤다고 → 후속 질문에서 무너짐. 한 번 거짓이 드러나면 전체 신뢰 붕괴. 5. 자주 나오는 \"허 찌르기\" 유형별 대비 - \"이거 최신 버전에선 바뀐 거 아세요?\" → 모르면 \"그 부분은 최신 변경을 못 따라갔습니다. 확인해보겠습니다.\" (모르는 걸 인정하는 게 감점 아님) - \"그 라이브러리 단점은?\" → 장점만 말하면 의심받음. 반드시 트레이드오프도: \"React Query는 서버상태엔 좋지만 클라 전역엔 안 맞고, 러닝커브가 있습니다.\" - \"직접 밑바닥부터 구현할 수 있어요?\" → \"라이브러리로 했지만 원리는 ~입니다\"(예: JWT 검증, 상태관리 구독). 원리를 알면 OK. - \"왜 A 대신 B 안 썼어요?\" → 둘 다 알고 트레이드오프로 판단했음을 보이기. \"B도 고려했는데 A가 ~라서.\" - \"이 코드 왜 이렇게 짰어요?\" → 당시 판단 근거를 정직하게. 더 나은 방법 알면 \"지금이라면 ~로 하겠습니다\"(성장 서사). - \"성능 최적화 해봤어요?\" → 실제 한 것만. 측정 없이 \"최적화했다\"는 위험. \"N+1을 eager loading으로, 이미지를 next/image로\" 등 구체적으로. 6. 버전·트렌드 감각 (안 써봤어도 흐름은) - React: 19가 최신 라인(Server Components, Actions, use 훅, useEffectEvent). React Compiler로 자동 memoization. - Next: 16이 stable(Turbopack 기본, React Compiler 안정). - 상태관리 트렌드: Redux → Redux Toolkit(보일러플레이트↓) → Zustand/Jotai(경량) → 서버상태는 React Query가 표준. - 스타일: CSS Modules → styled-components(CSS-in-JS) → Tailwind(유틸리티, 현재 우세) + shadcn/ui. - ★ \"최신을 다 안 써봤어도 흐름과 이유는 안다\"를 보이면 됨. 트렌드의 방향(왜 이렇게 바뀌었나)이 핵심. 7. 답변 태도 요약 (문서0과 연결) - 경험 질문 = 실제만, 지어내지 말 것. 안 한 건 \"안 했다\". - 개념 질문 = 경험 언급 없이 아는 대로 뻣뻣하게. 고백 금지. - 선택 질문 = 트레이드오프로. \"남들이 써서\"는 금지. - 모르는 것 = 정직하게 인정 + 아는 부분은 말하기. 판단은 면접관 몫. - 항상 후속 대비: 한 번에 다 쏟지 말고 결론 먼저, 후속에서 심화. 핵심 요약 허 찌르는 질문은 지식이 아니라 \"실제 경험·선택·트레이드오프\"를 본다. 실제 쓴 버전·툴만 말하고(Next 15/React Query/Redux 등 프로젝트 기반), 안 써본 건 정직하게 인정하되 개념·흐름은 아는 대로 답한다. 선택 이유는 \"남들이 써서\"가 아니라 트레이드오프로, 단점도 함께. 버전 트렌드는 안 써봤어도 방향(왜 바뀌었나)을 알면 감각 있어 보인다. 지어내면 후속에서 무너지니 절대 금지."}, {"title": "DTO 설계", "kind": "DTO 설계", "url": "doc_51_frontend_dto.html", "text": "[문서] DTO 설계 — 엔티티·Zod·Enum 일관 규칙 (Nest·Next) \"DTO 필수인가? 규칙은? 엔티티/Zod/Enum과 관계는? 유려하게 어떻게?\"에 대한 정리. 핵심: 각 관심사의 진실을 한 곳에 두고 나머지는 파생. --- 1. DTO는 필수인가? — \"아마도\"의 정체 결론: 문법적으론 필수 아니지만 실무에선 사실상 필수. 단 \"모든 곳\"은 아님. DTO(Data Transfer Object) = 계층·경계를 넘나드는 데이터의 형태 정의. 필요 이유: - 입력 검증의 자리: 외부 입력(신뢰 불가)이 들어오는 경계에서 형태·타입 강제. - 엔티티 보호: DB 엔티티 그대로 노출하면 내부 구조 새고, 원치 않는 필드까지 받거나 반환. - 명시적 계약: \"이 API는 이런 형태를 받고 준다\"를 코드로 문서화. 생략 가능: 단순 조회(파라미터 1개), 경계 안 넘는 내부 함수. 하지만 외부 입력·응답 지점엔 거의 항상 둠. 2. 일관된 규칙 — 방향별로 나눈다 - 요청 DTO(Request/Input): 외부→우리. 검증 목적. 동작별로: Create{E}Dto, Update{E}Dto, SignInDto. - 응답 DTO(Response/Output): 우리→외부. 노출 제어 목적. {E}ResponseDto — 엔티티에서 민감 필드 제거. 네이밍 관례: - Create{Entity}Dto — 생성(모든 필수 필드) - Update{Entity}Dto — 수정(대부분 optional, 파생) - {Entity}ResponseDto — 응답(노출할 필드만) - {Entity}QueryDto — 목록 필터·페이지네이션 ★ DRY: Update는 Create의 부분집합인 경우 많음 → 파생. Nest는 PartialType(CreateDto), Zod는 .partial(). 중복 정의 피하고 한 소스에서. 3. 엔티티와의 관계 — 절대 섞지 마라 DTO ≠ 엔티티. 목적이 다름: - 엔티티: DB 테이블 매핑(저장 형태). ORM 소유. 모든 컬럼·관계·내부 필드. - DTO: 경계 넘는 데이터 형태. 앱 계층. 필요한 것만. 왜 분리: - 엔티티를 요청에 쓰면 → 사용자가 isAdmin:true 주입 가능(Mass Assignment 취약점). - 엔티티를 응답에 쓰면 → password·내부 플래그 노출. - 엔티티 구조 바뀌면 → API 계약이 의도치 않게 바뀜. 흐름: 요청 DTO(검증) → 서비스 → 엔티티(DB 저장) → 서비스 → 응답 DTO(노출 제어). 서비스가 DTO↔엔티티 변환. 경계=DTO, 내부·DB=엔티티. 4. Zod와의 관계 — \"같은 자리, 다른 도구\" Zod는 DTO를 만드는 한 방법. 대체가 아니라 구현 수단. - Nest(전통): 클래스 + 데코레이터(class-validator). class CreateUserDto { @IsEmail() email: string; @MinLength(8) password: string; } - Zod(스키마 기반, Next/TS): 스키마가 곧 DTO + 타입. const s = z.object({ email: z.string().email(), password: z.string().min(8) }); type CreateUserDto = z.infer<typeof s ; // 타입 자동 파생 ★ Zod 강점: 검증+타입이 한 소스(SSOT). z.infer로 스키마에서 타입 뽑으니 검증 규칙과 타입이 절대 안 어긋남. 5. Enum과의 관계 — 제한된 값의 SSOT Enum = \"정해진 값 중 하나\". DTO에서 필드의 허용값 제한. enum OrderStatus { PENDING='PENDING', PAID='PAID', SHIPPED='SHIPPED' } // Nest: @IsEnum(OrderStatus) status: OrderStatus; // Zod: status: z.nativeEnum(OrderStatus) // 또는 z.enum([...]) ★ 일관성: Enum을 한 곳 정의, DTO·엔티티·DB(Prisma enum)가 모두 참조. Prisma 스키마에 enum 정의하면 타입까지 생성되니 그걸 SSOT로. 6. 유려한 구현 — Nest 규칙: 전역 ValidationPipe(whitelist:true로 정의 안 된 필드 자동 제거→Mass Assignment 방지) / 요청은 동작별, Update는 PartialType / 응답은 @Expose·@Exclude로 노출 제어(인터셉터 자동 직렬화) / Enum은 한 곳, @IsEnum 참조. 7. 유려한 구현 — Next 규칙: Zod 스키마를 lib/validators.ts에 모아 DTO겸 타입 소스 / 타입은 z.infer 파생 / Update는 .partial() / 클라(zodResolver)+서버(parse) 같은 스키마 재사용 / Enum은 Prisma SSOT, z.nativeEnum 참조. 8. 전체 관통 원칙 ★ 핵심 통찰: DTO·Zod·Enum·엔티티는 각자 다른 역할이지만, \"각 관심사의 진실을 한 곳에 두고 나머지는 파생\"시키면 유려해짐. Enum 한 곳, 검증 스키마 한 곳, 거기서 타입·Update DTO 파생 → 필드 하나 추가할 때 여러 곳 안 고쳐도 됨. 면접 한 문장 \"DTO는 경계를 넘는 데이터 형태이자 검증 지점이라 외부 입력·응답엔 사실상 필수입니다. 엔티티와는 분리해 서비스가 변환하고(Mass Assignment·과다노출 방지), 요청/응답·동작별로 나누되 Update는 Create에서 파생합니다. Nest는 class-validator DTO+ValidationPipe, Next는 Zod 스키마를 DTO 겸 타입 소스로 써서 클라·서버가 재사용하고, Enum은 한 곳에 정의해 DTO·엔티티·DB가 모두 참조하게 합니다.\""}, {"title": "스타일링", "kind": "스타일링", "url": "doc_52_frontend_styling.html", "text": "[문서] 스타일링 — SCSS·Handlebars·Tailwind 커스텀 안 써본 것도 개념은 알기. SCSS 기본, 예전 프로젝트 방식(Handlebars 템플릿), Tailwind 전역 커스텀 설정. --- 1. SCSS(Sass) 기본 개념 SCSS = CSS를 프로그래밍 언어처럼 확장한 것. 순수 CSS엔 없는 기능을 더해 빌드 시 일반 CSS로 컴파일. (Sass는 언어, SCSS는 CSS 호환 문법 — 실무는 SCSS 문법) 핵심 기능(이것만): - 변수: 색·크기 재사용. $primary: 3b82f6; .btn { background: $primary; } - 중첩(nesting): 계층 그대로. .card { .title {...} &:hover {...} } (&=부모 참조) - mixin: 재사용 스타일 묶음(함수처럼). @mixin flex-center {...} .box { @include flex-center; } - @extend: 다른 선택자 스타일 상속. .critical { @extend .error; font-weight: bold; } - partials + @use: 파일 분리·모듈화. _variables.scss → @use 'variables'; ★ 한 줄: SCSS = CSS + 변수 + 중첩 + mixin + 모듈화. \"CSS를 유지보수하기 좋게 만든 상위 언어.\" SCSS vs Tailwind: SCSS=별도 파일에 의미 있는 클래스 정의(className=\\\"card\\\") / Tailwind=HTML에서 유틸리티 조합(className=\\\"p-4 flex\\\"). 접근이 반대. Next에서: npm i -D sass 만 하면 .scss/.module.scss import 가능(.module.scss는 scoped, 클래스 충돌 방지). 2. Handlebars — 예전 프로젝트 템플릿 방식 Handlebars = 서버 사이드(또는 빌드 타임) HTML 템플릿 엔진. React 이전/비-React 스택에서 흔했음. 로직 최소화(\"logic-less\") 철학. 문법: - 변수 출력: {{title}} (HTML 이스케이프됨). {{{raw}}} = 이스케이프 안 함. - 반복: {{ each items}} <li {{this.name}}</li {{/each}} - 조건: {{ if isActive}} ... {{else}} ... {{/if}} - 부분 템플릿(partial): {{ header}} (헤더 조각 재사용, 레이아웃 공통화) - 헬퍼(helper): {{formatDate date}} (커스텀 함수 등록해 값 변환) 동작 방식: 서버가 데이터 + 템플릿(.hbs)을 합쳐 완성된 HTML 문자열을 생성해 브라우저로 전송. (Express + express-handlebars 조합이 흔했음) ★ React와 대비: Handlebars=서버가 HTML을 미리 조립해 보냄(전통적 SSR, 상호작용은 별도 JS). React=클라이언트가 상태로 UI를 그림(컴포넌트+가상DOM). Handlebars는 \"템플릿에 값을 꽂아 문자열 HTML 생성\", React는 \"상태가 바뀌면 다시 렌더\". - 이 방식 스타일: 보통 전역 CSS/SCSS + 클래스명으로. 컴포넌트 스코프 개념이 약해 BEM 같은 네이밍 규칙으로 충돌 관리. ★ 경험 서술: \"예전 프로젝트는 Handlebars 템플릿에 SCSS로 스타일링하는 전통적 서버 렌더 방식이었습니다. 서버가 데이터를 템플릿에 꽂아 HTML을 만들어 보냈고, 스타일은 전역 SCSS에 클래스로 정의했습니다. 지금의 React 컴포넌트+Tailwind와는 접근이 달랐죠.\" 3. Tailwind 전역 커스텀 — 기본 설정 Tailwind는 프레임워크 기본값을 그대로 쓰지 않고 브랜드에 맞게 커스텀(design token). v3와 v4가 방식이 다름. v3 방식 (tailwind.config.js) 설정 파일에서 theme.extend로 색·폰트·간격 추가: → bg-primary, font-display, mt-18 같은 유틸리티가 생김. globals.css엔 @tailwind base/components/utilities. v4 방식 (globals.css의 @theme) — 현재 ★ v4는 tailwind.config.js를 없애고 CSS 안 @theme 디렉티브로 설정 이동: → 네임스페이스 접두어가 어떤 유틸리티를 만들지 결정: --color- → bg- /text- , --font- → font- , --breakpoint- → 반응형 변형. → 이 토큰들은 실제 CSS 변수도 되어 var(--color-primary)로 어디서든 참조 가능(디자인 시스템과 CSS가 같은 소스). 전역 커스텀에서 자주 하는 것 - @layer base: 전역 기본 스타일(body 폰트, 기본 색). @layer base { body { @apply bg-white text-gray-900; } } - @layer components: 반복되는 컴포넌트 클래스. @layer components { .btn-primary { @apply px-4 py-2 rounded bg-primary text-white; } } - 다크모드: :root와 [data-theme=\\\"dark\\\"]에 변수 정의 → @theme가 그 변수 참조 → 속성 하나 바꾸면 전체 전환(JS 클래스 스왑 없이). - 폰트: next/font로 로드한 폰트를 CSS 변수로 → @theme의 --font-sans에 연결. - 커스텀 유틸: @layer utilities로 없는 유틸리티 추가. 커스텀 흐름 요약 v3: tailwind.config.js의 theme.extend에 토큰 추가 → 유틸리티 생성. v4: globals.css의 @theme에 CSS 변수로 토큰 정의 → 유틸리티 생성 + CSS 변수로도 사용. 공통: content(스캔 대상)는 v4에서 자동 감지. 반복 조합은 @layer components + @apply로 묶기(남용은 자제). 4. 면접 답변 (안 써본 SCSS, 써본 것 구분) - \"SCSS 써봤어요?\" → \"직접은 안 써봤지만 개념은 압니다. CSS에 변수·중첩·mixin·모듈화를 더한 상위 언어로, 유지보수하기 좋게 확장한 거죠. 예전 프로젝트가 Handlebars 템플릿 + 전역 SCSS 방식이었던 걸로 기억합니다.\" (정직 + 개념 + 경험 연결) - \"Tailwind 커스텀 어떻게?\" → \"전역 CSS에서 디자인 토큰을 정의해 씁니다. v3는 tailwind.config의 theme.extend, v4는 globals.css의 @theme에 CSS 변수로 색·폰트·간격을 추가하고, 반복되는 조합은 @layer components에 @apply로 묶습니다. 다크모드는 CSS 변수를 data-theme으로 바꿔 처리합니다.\" - \"Handlebars랑 React 차이?\" → \"Handlebars는 서버가 템플릿에 값을 꽂아 HTML을 만들어 보내는 전통적 방식이고, React는 클라이언트가 상태로 컴포넌트를 렌더합니다. 전자는 전역 CSS+클래스, 후자는 컴포넌트 스코프 스타일이 자연스럽죠.\" 핵심 요약 SCSS=CSS+변수·중첩·mixin·모듈화(상위 언어, 컴파일하면 CSS). Handlebars=서버가 템플릿에 데이터를 꽂아 HTML 문자열을 만드는 전통적 템플릿 엔진(logic-less, partial·helper), 보통 전역 SCSS+클래스로 스타일. Tailwind 커스텀은 디자인 토큰을 v3는 tailwind.config theme.extend, v4는 globals.css @theme에 CSS 변수로 정의해 유틸리티를 생성하고, 반복은 @layer components+@apply, 다크모드는 CSS 변수 전환으로."}, {"title": "도메인 설계 사례", "kind": "실전편", "url": "doc_29_domain_practical.html", "text": "[문서29] 도메인 설계 사례 — 실무 경험을 면접 언어로 복잡한 비즈니스 로직을 설계·구현한 경험. 공통 뼈대=상태 머신+권한+큐/멱등성+감사. --- A. 구독 결제 시스템 전체: 결제는 정확성 최우선+외부 PG 의존+네트워크 실패 필연→큐·재시도·멱등성·상태 머신 필요. 카드 등록 & PG 모듈 ★ 카드 정보 직접 저장 안 함: 카드번호 DB 저장=PCI-DSS 위반+유출 재앙. - PG(토스/아임포트/스트라이프)에 카드 등록→빌링키(billing key)만 저장. 결제는 \"이 빌링키로 N원\". - 우리는 빌링키+카드 마지막 4자리(표시용)만. 결제 큐 & 재시도 - 왜 큐: 정기 결제 몰림(월초)→PG rate limit·DB 부하→큐로 완충. 비동기로 응답 빠름. - ★ 멱등성 필수: 재시도 시 이중 결제 방지. 멱등성 키(주문 ID)로 \"이미 처리?\" 확인. PG도 멱등성 키 지원. - 재시도: 지수 백오프(1분→5분→30분, 즉시 반복은 PG 차단). N회 실패→past_due+알림. DLQ로 격리. 환불 큐 - 부분/전액 환불도 큐. 멱등성(환불 ID). 상태 추적(요청→처리중→완료/실패), 웹훅으로 확정. 구독 상태 머신 (제일 중요) 상태: active / cancel_scheduled(취소 예정, 기간 말까지 사용) / canceled / past_due(연체) / paused. ★ \"취소 예정\"이 왜: 취소해도 이미 낸 기간까진 사용→즉시 canceled 아니라 cancel_scheduled, 크론이 기간 말에 canceled 전환. \"취소했는데 왜 쓸 수 있냐/왜 결제됐냐\" CS 방지. 크론잡 (매일 자정) 1. cancel_scheduled 중 만료 지난 것→canceled 2. active 중 결제일 도래→결제 큐 투입 3. past_due 유예 지난 것→서비스 중단 4. 곧 만료→알림 ★ 주의: 멱등성(중복 실행돼도 이중 처리 X, \"오늘 처리했나\" 체크), 대량은 배치 분할, 실패 격리. 시트 관리 & 할인 - 기본 제공 시트+추가는 결제. 시트 조정: 늘리면 즉시 과금(비례), 줄이면 다음 주기. - ★ proration(일할 계산): 월 중간 추가 시 남은 기간만 과금(\"15일 추가=반달치\"). - 할인 정책: 쿠폰/프로모션/연간 할인을 정책으로 분리(하드코딩 금지). 적용 순서·중복 규칙. 히스토리 - 구매/환불 히스토리(불변 로그): 정산·CS·분쟁. 상태 변경도 로그. 경험 서술: \"구독을 상태 머신으로. 취소는 cancel_scheduled로 두고 크론이 기간 말 전환→CS 제거. 결제는 큐+멱등성 키로 이중 결제 막고 지수 백오프 재시도. 카드는 PG 빌링키로만 저장해 PCI 부담 제거. 시트 추가는 proration 일할 계산.\" --- B. 건설 감리 결재 시스템 도메인: 건설사(시공)-감리사(감독)가 문서로 소통, 결재 체계로 진행, 공정률·집행률 계산·비교. 권한 제어+문서 관리 핵심. 프로젝트 & 주체 등록 - 프로젝트 생성→건설사 등록(시공)+감리사 등록(감독). 주체별 권한 다름(건설사=작성, 감리사=검토·승인). 공정률 & 집행률 (핵심 로직) - 공정률: 실제 시공 진척(%). 집행률: 예산 대비 집행된 시공비용(%). - ★ 비교: 집행률≫공정률=돈은 썼는데 진척 안 됨=위험 신호(부실·과다 청구). 감리사가 판별. 시스템이 두 수치 계산·비교가 핵심 가치. 감리사 판별 & 최종 채택 - 여러 감리사 판별 비교(같은 항목 다른 의견 가능)→최종 채택(이견 조율해 하나로 확정). \"누구 판단을 최종으로\" 워크플로우. 결재 체계 (상태 머신+권한) - 문서 상태: draft→submitted→under_review→approved/rejected. 반려되면 draft로. - 각 전이에 권한: 작성자만 submit, 감리사만 approve. 결재선을 데이터로 관리. 도장 단계별 날인. 문서 코드 관리 - ★ 체계적 코드 필수(문서 수천 개): 프로젝트-공종-종류-일련번호(예: PRJ001-CIVIL-INSP-0042). - 권한별 코드: 건설사·감리사가 보는/만드는 코드 범위 다름. 코드로 검색·분류·이력. 도면 개정(rev) 관리. 권한 제어 (RBAC) - ★ 문서별 작성·수정 권한: 역할(건설사/감리사/관리자)별. - 문서 종류·상태별: 건설사는 작성, 감리사는 검토·승인. approved는 불변(수정 불가). 반려된 것만 재수정. - 도장 등록: 각 주체 도장 등록, 승인 시 권한 확인 후 날인. 경험 서술: \"건설사-감리사가 결재 워크플로우로 소통. 문서를 상태 머신(작성→제출→검토→승인)으로, 각 전이에 RBAC로 건설사는 작성만·감리사는 승인만. 승인 문서는 불변 잠금, 반려는 재작성만. 공정률·집행률 계산·비교해 집행이 진척보다 앞서면 감리사가 위험 판별, 여러 의견 비교해 최종 채택. 문서는 프로젝트-공종-종류-일련번호 코드 체계+권한별 접근.\" --- 두 도메인 공통 5년차 역량 (★ 면접 포인트) 완전히 다른 도메인이지만 같은 뼈대로 푼다: - 상태 머신: 구독 상태 / 문서 결재 상태. \"상태 명확히 정의+전이 통제\"가 복잡 로직의 핵심. - 권한 제어(RBAC): 시트 권한 / 문서 작성·승인 권한. - 큐+재시도+멱등성: 결제·환불 / 대량 처리. - 크론잡: 구독 만료 체크 / 정기 리포트. - 감사 로그: 결제 히스토리 / 문서 이력. - 정책 분리: 할인 정책 / 결재선 규칙을 하드코딩 않고 데이터로. ★ 메시지: \"상태 머신+권한+큐/멱등성+감사\"라는 같은 뼈대로 다른 도메인을 푼다. 이 패턴을 아는 게 '복잡한 비즈니스 로직을 다뤄봤다'의 실체. --- C. 병원 결제 시스템 (멀티테넌트 + 크로스디바이스) 토스페이먼츠 PG (요청-승인 2단계) ★ 핵심: 요청과 승인이 분리된 2단계(정합성 위해). 1. SDK 결제 요청(orderId, successUrl, failUrl) 2. 카드사 인증창→사용자 인증 3. 성공→토스가 paymentKey 발급+successUrl 리다이렉트(쿼리에 paymentKey/orderId/amount) 4. 백엔드가 받은 값이 요청 때 값과 일치하는지 검증 5. 백엔드가 결제 승인 API(paymentKey+시크릿 키)→실제 청구 6. 승인 완료→Payment 객체→paymentKey DB 저장 ★ 왜 2단계: 한 번에 하면 웹훅 의존→불일치 위험. 분리하면 백엔드가 승인 직전 금액 재검증(위변조 방지). \"프론트 금액 그대로 안 믿는다\". paymentKey는 DB 저장(취소·조회), 시크릿 없으면 무용이라 노출돼도 안전. 상태: READY→IN_PROGRESS→DONE. 멀티테넌트 (서브도메인) - 메인 도메인 구매→병원별 서브도메인(hospital-a.service.com→A병원). - 테넌트 식별: 서브도메인으로 병원 판별→그 병원 데이터만. - 데이터 격리: 테넌트 ID로 모든 쿼리 필터(또는 스키마/DB 분리). - 격리 트레이드오프: 공유 DB+테넌트 ID(간단·저비용·약한 격리) vs 스키마/DB 분리(강한 격리·고비용). 대개 공유 DB+테넌트 ID로 시작. 크로스디바이스 결제 (QR+문자) 시나리오: 데스크톱에서 진료 확인, 결제는 환자 폰. 1. 데스크톱서 결제 정보 확정→결제 URL 생성 2. 전달(옵션): QR 코드(대면, 폰 스캔) or 문자 SMS(원격) 3. 환자 폰 브라우저서 결제 URL→토스 결제 4. 완료→영수증 ★ 결제 URL에 토큰(세션 식별, 만료·일회성). 상태 동기화(폰 결제 끝나면 데스크톱 갱신, 폴링/웹소켓). 단계별 진행 바 (UX) - 차트번호 입력→수술 종류 선택→결제 정보 재확인→결제→영수증. - ★ 결제 정보 재확인: 직전 금액·항목 재표시(되돌리기 어려우니 실수 방지). 진행 바로 이탈 감소. JSON 대량 업로드 - 병원별 라식 수술 종류를 JSON→스크립트 벌크 인서트. - ★ 멱등성(재실행 시 중복 X, upsert), 업로드 전 스키마 검증. 스택 (Neon+Vercel+Next+Lucide+Drawer) - Neon: 서버리스 PostgreSQL(사용량 기반, 자동 확장, 브랜칭). - Vercel: Next 배포(서버리스·엣지, Git 자동 배포). - Next: 서버 컴포넌트·서브도메인 라우팅. Lucide: 가벼운 아이콘. Drawer: 모바일 하단 슬라이드 UI. ★ 서버리스(Neon)+서버리스 배포(Vercel)=인프라 관리 없이 서비스, 트래픽 없으면 비용 최소. 경험 서술: \"병원별 멀티테넌트를 서브도메인 격리, 토스는 요청-승인 2단계로 백엔드에서 금액 재검증. 데스크톱 확정 결제를 QR/문자로 환자 폰에 넘기는 크로스디바이스. paymentKey 저장해 취소·조회 대비. 수술 종류는 JSON+스크립트 멱등 벌크 업로드. Neon+Vercel 서버리스로 인프라 부담 없이.\" --- D. 출구조사 데이터 정규화 (더러운 외부 데이터 길들이기) 문제 — flat한 엉망 데이터 선관위 원본이 계층이어야 할 것을 같은 레벨에 나열: { 선거구코드, 지역, 연령10, 연령20...연령60, 성별남, 성별여 } 연령대·성별이 상위 카테고리 하위여야 하는데 전부 최상위 키→처리 어렵고 키 이름 조금 바뀌면 코드 깨짐. 해결 — 정규화 flat→계층 파싱: { 선거구코드, 지역, 연령:{10,20,30...}, 성별:{남,여} } - 공통 패턴(연령XX, 성별X)을 파싱해 상위 카테고리로 그룹핑. - 리액트식 정규화: 일관된 객체 구조로 렌더링·조작 단순화. Enum화 - 컬러 코드·카테고리를 enum 중앙 관리. 정당별 색 한 곳에서, 매직 넘버·스트링 제거. ★ 핵심 성과 — 변경에 강한 구조 \"원본 키 이름이 조금 바뀌어도 대응, 데이터 로드 오류 없음\"이 핵심 가치: - 파싱 레이어로 원본과 내부 구조 분리→원본 바뀌어도 파싱 규칙만 조정, 내부 코드 그대로. - 패턴 기반 파싱(연령\\d+ 같은 패턴)→이름 조금 바뀌어도 흡수. - 방어적 로딩→예상 못 한 필드·누락에도 안 깨짐. = DI(\"인터페이스 의존, 구현 변화에 강하게\")+관심사 분리의 데이터 버전. 면접 가치 단순 구현 아닌 설계 판단의 증거: 더러운 데이터 길들이기(현실 데이터는 항상 엉망)+변경에 강한 설계(원본 변경 흡수)+정규화·enum 기본기. 경험 서술: \"출구조사 원본이 연령·성별을 flat 나열해 처리 어려움. 공통 패턴 파싱해 상위 카테고리 하위로 정규화, 컬러는 enum 중앙화. 핵심은 파싱 레이어로 원본과 내부 구조 분리라, 원본 키 바뀌어도 파싱 규칙만 조정하면 돼 로드가 안정적.\" --- 공통 확장 (C·D 추가 역량) - 멀티테넌시: 서브도메인 격리+테넌트 ID 필터. - 외부 연동 정합성: PG 요청-승인 분리, 백엔드 재검증(\"프론트 값 안 믿기\"). - 크로스디바이스: URL 토큰+상태 동기화. - 데이터 파이프라인: 파싱 레이어로 원본과 내부 분리→변경에 강하게(정규화·enum·방어적 로딩). - 벌크 처리: JSON+스크립트+멱등성. ★ 메시지: \"외부(PG·선관위)는 못 믿고 변한다. 경계에 검증·파싱 레이어를 둬서 내부를 보호한다\"가 두 사례의 공통 교훈. --- E. 행안부 SSO(AnyID) 연동 — 제약 환경 극복 프레이밍: \"SSO 붙였다\"가 아니라 \"폐쇄망·문서 부족·벤더 모듈·운영 테스트 제약에서 정부 인증을 끝까지 연동\". 문제 해결력·끈기의 최상급 사례. 난관을 어떻게 우회했는지가 핵심. 정상 인증 흐름 1. 로그인 버튼→API 트리거 2. 통합 세션 활성화 확인: 있으면 바로 로그인 전환 / 없으면 로그인 화면 렌더링+tx 값 수신 3. tx 값으로 AnyID 서버 인증 요청 4. 위조 요청 필터 통과 5. 성공→콜백 클래스 함수 실행 6. 유저 정보 파싱→세션 저장 ★ 핵심 분기: 통합 세션 있으면 바로, 없으면 화면+tx. 이 옵션 구현이 개발 환경에선 불가능했던 게 첫 난관. 난관1 — 폐쇄망(인바운드/아웃바운드 룰) - AnyID 인증은 우리 서버↔AnyID 양방향 통신 필요. 개발 서버는 방화벽 룰 안 열려 요청도 콜백도 불가→인증 흐름 재현 불가. - (네트워크편 인바운드/아웃바운드·방화벽이 실전에서 발목 잡은 사례.) - 우회: 인증 성공 리턴값을 JS로 흉내(모킹)→개발 서버서 인증 함수 순차 실행 흉내. 흐름 검증용 스텁(위조 필터·실제 콜백은 검증 못 함, 한계 명확). 난관2 — 운영 서버 직접 테스트(극약 처방) - 개발 서버로 실제 인증 못 끝내→주말에 운영 서버에 히든 로그인 페이지 배포해 테스트. - 운영이어야 방화벽·통합 세션·실제 연동 작동. 히든 페이지(메인에 등록하되 미노출)로 콜백 클래스 함수 돌려 유저 정보 파싱→세션 저장 검증. 주말+히든으로 영향 최소화. - 면접 서술: \"위험하지만 폐쇄망 제약상 실제 왕복 재현할 곳이 거기뿐. 트래픽 적은 주말+미노출 히든 페이지로 영향 최소화하며 검증.\" = 리스크 인지·통제. 벤더 모듈 특성 - AnyID 모듈=서블릿 자동 등록(URL 지정 안 해도 해당 주소 요청 시 백엔드 동작). 프론트 모듈·콜백 클래스 함수 제공. - 편함: 보일러플레이트 없음. ★ 함정: 내가 제어 못 하는 부분 많아 문제 시 내부 못 봐 디버깅 어려움. 벤더 모듈의 전형적 트레이드오프. 난관3 — JBoss 배포 사고(프론트 누락) - JBoss라 빌드 산출물(WAR/EAR, Java 웹 아티팩트) 풀어 배포. 백엔드+Nexacro 프론트가 한 패키지. - 빌드에서 Nexacro 프론트 빠진 채 배포→사이트 깨짐. 해결: 백엔드만 부분 배포+서버 재시작. - ★ 교훈: 백/프론트 한 아티팩트로 묶이면 부분 배포 어렵고 사고 시 전체 깨짐. (CI/CD편 \"레포 분리·아티팩트 관리\"의 반면교사.) 도메인 복잡성 — 다중 계정 & 사업자 유형 ★ 타 민원과 다름: 한 사람이 여러 계정 가능→단순 자동 연동 안 됨. - 흐름: 인증→개인 식별→그 정보로 유저 정보 재검색→여러 계정 프론트로 리턴→사용자가 계정 선택→로그인. - 마이페이지 AnyID 연동/해제. - 사업자 유형별: 개인사업자/법인/개인 각각 다르게. - ★ CI/DI 분리: CI(연계정보, 개인 식별 고유값, 사이트 무관 동일) / DI(중복가입확인정보, 사이트 내 중복 방지, 사이트마다 다름). 사업자 유형 따라 따로 관리. - 개인정보 격리: 개인·기업 식별정보를 세션 저장해 외부로 안 돌게 통제. 난관4 — 조직 간 협업(광주 서버 센터) - 폐쇄망 방화벽 룰을 광주 서버관리센터에 직접 요청. 내 서버 IP만 주고 센터 NATS 정보 안 알려줘 통신 문제. - 타 사이트서 민원 처리→내 사이트로 넘어와 리다이렉트하는 사이트 간 연계까지. - ★ 교훈: 대형 정부 시스템은 기술만이 아니라 조직 간 협업·정보 공유가 병목. \"누가 무슨 정보 가졌고 누구에게 요청\" 파악도 실력. 면접 자산화 나쁜 서술: \"방화벽 때문에 고생.\" 좋은 서술(문제→제약→판단→결과): \"행안부 AnyID를 연동했는데 폐쇄망 방화벽으로 개발 서버서 인증 왕복 재현 불가. 처음엔 리턴값을 JS 모킹해 흐름 검증, 실제 콜백·위조 필터는 트래픽 적은 주말 운영 서버 히든 페이지로 리스크 통제하며 진행. 한 사람이 여러 계정 가능해 인증 후 CI로 유저 재검색해 계정 선택 단계 추가, 개인·개인사업자·법인별 CI/DI 분리. 배포는 백/Nexacro 프론트가 한 아티팩트라 프론트 누락 사고 후 부분 배포로 대응. 방화벽 룰은 광주 센터 협업 필요했는데 정보 공유 병목 겪으며 조직 협업도 기술만큼 중요함을 배움.\" 강한 이유: 제약 하 판단(모킹→운영 테스트, 리스크 인지)+도메인 복잡성(다중 계정, CI/DI)+실패 숨기지 않음(배포 사고)+비기술 현실(조직 협업)=성숙함. --- 도메인 사례 총정리 (A~E 관통 원칙) - 상태 머신: 구독/문서 결재/결제 상태. - 권한 제어(RBAC): 시트/문서/계정. - 큐+멱등성: 결제·환불. - 경계 방어: PG 금액 백엔드 재검증, 출구조사 파싱 레이어, SSO 위조 필터. \"외부는 못 믿고 변한다→경계에 검증·파싱 레이어.\" - 제약 하 판단: 폐쇄망에서 모킹→운영 테스트(리스크 통제). - 데이터 정규화: 출구조사 flat→계층, CI/DI 분리. ★ 최종 메시지: \"도메인은 달라도 상태 머신+권한+큐/멱등성+경계 방어라는 뼈대로 푼다. 제약이 있으면 리스크를 인지·통제하며 우회한다.\" = 5년차 설계·문제해결 역량."}, {"title": "프로젝트 Voyage", "kind": "프로젝트 개요", "url": "doc_30_voyage_overview.html", "text": "[문서30] 프로젝트 Voyage — 설명 자료 (개요) \"무엇을 만들었나\"보다 \"왜 그렇게 설계했나 / 어떤 문제를 어떻게 풀었나\". 면접관이 좋아하는 건 기능 나열이 아니라 판단의 근거. 각 항목 \"문제→선택→이유→결과\". --- 1. 한 문장 소개 Voyage = 실제 상황 대화문을 7단계 반복 청취로 내재화하는 오디오 우선(audio-first) 영어 회화 학습 앱. - 웹/iOS/Android를 단일 코드베이스(Capacitor)로 서비스. - 콘텐츠·음원·삽화 3개 도메인의 생성 파이프라인을 직접 설계. 엘리베이터 피치(30초): \"사람은 문장이 아니라 장면을 기억한다는 원리에서 출발한 앱. AI로 대화 콘텐츠를 대량 생성하되 '들으면 장면이 그려지는 문장'만 통과시키는 품질 게이트를 만들었고, TTS 음원·삽화까지 파이프라인으로 자동화. iOS는 앱스토어 라이브, Android는 심사 제출 완료.\" 2. 기술 스택 (왜 골랐나까지) - 백엔드 FastAPI(Python): 콘텐츠·채점·음원 파이프라인이 전부 Python 생태계(LLM SDK, 오디오 처리)라 언어 통일. - DB PostgreSQL(Railway 메인/Neon 폴백): 운영 안정성 위해 메인-폴백 이중화. 로컬은 SQLite. - 프론트 React+Vite+Capacitor: 웹/iOS/Android를 하나의 코드베이스로. 개인 리소스로 3플랫폼 커버하는 현실적 선택. - TTS ElevenLabs/Edge-TTS: 음질(ElevenLabs) vs 비용(Edge) 트레이드오프를 캐시로 흡수. - 스토리지 Cloudflare R2: 음원은 DB가 아니라 R2에, 백엔드가 302 리다이렉트 → DB 경량화. - 인증 Supabase Auth(이메일 OTP): 로그인 없이 2회 무료 체험 → 진입장벽 낮춤. - 배포 Railway(백엔드)/Vercel(랜딩): 백엔드는 git push 즉시 배포, 프론트는 앱 빌드 필요(이 차이가 배포 전략 핵심). 3. 아키텍처 — 핵심 데이터 흐름 강조할 설계 결정: - 단일 소스 원칙(SSOT): 콘텐츠는 반드시 batches JSON→content.py→migrate→DB 경로로만. DB를 직접 수정 안 함. 이유: DB 직접 고치면 다음 migrate 때 덮어써져 유실(→8번 사례). - 텍스트/음원 파이프라인 분리: 텍스트는 즉시 배포(migrate), 음원은 별도 파이프라인(과금 이슈). 관심사 분리. 4. 가장 자랑할 것 — AI 콘텐츠 생성 + 품질 게이트 가장 임팩트 있는 부분. \"AI로 대량 생성하면 품질이 무너진다\"를 시스템으로 풀었다. 문제: LLM으로 레슨 대화 대량 생성하면 문법은 맞지만 \"외워지지 않는 문장\"이 쏟아짐. 반복 암기 앱엔 치명적. 해결 — 단 하나의 판별 기준: \"이 문장을 들으면 머릿속에 장면이 그려지는가?\" - ✅ \"Why didn't he pass?\" / \"My feet are killing me.\" - ❌ \"This is getting tense.\" / \"It smells amazing.\" 2층 검수 시스템: - 1층 구조: 스키마·필드 개수·orphan·중복 → validate.py(기계적), 위반 0건. - 2층 품질: 장면·감정·난이도·자연스러움 → 검수 에이전트/사람(판단), 체크리스트 통과. ★ 핵심 인사이트: \"구조 통과 ≠ 품질 통과\". 기계는 필드 맞는지만, 좋은 콘텐츠인지는 못 봄 → 두 층 분리. 생성/검증 주체 분리: - 생성은 서브에이전트가 병렬로. - 검증은 반드시 다른 주체가 교차검증(공통 맹점 회피). - 애매한 자연스러움만 외부 LLM(GPT/Gemini)에 독립 자문 — 전수 투입은 과함. 5. 채점 시스템 — 임베딩 + 메타데이터 보정 \"가장 어려웠던 기술 문제\"로 쓰기 좋음. 문제: 발화 채점은 cos 유사도(75%)+표면 매칭(25%) 하이브리드인데 임베딩만으론: - \"세련된 정답\"(다른 표현이지만 맞음)을 오답 처리 - \"구조는 비슷한 오답\"을 정답 처리 해결 — 두 종류 메타데이터 주입: - references(패러프레이즈): 정답+모든 references와의 cos 최댓값 사용 → 다르게 답해도 등록된 패러프레이즈와 가까우면 구제(관대). - critical_keywords(핵심어): 핵심어 전부 빠진 구조유사 발화에 점수 상한(cap) → 오답 차단(변별). ★ 한쪽은 위로(구제), 한쪽은 누름(차단). 양방향 보정이 설계 핵심. 안전장치: \"틀린 메타보다 빈 메타가 안전하다.\" - 확신 없는 references는 비움(빈 것도 채점 정상, 구제만 없음). - 부정확한 references는 오답을 정답으로, 부정확한 keywords는 정답을 오답으로 → 생성+교차검증 필수. 6. 실제 디버깅 — STT 포맷 이슈 (플랫폼별 함정) \"플랫폼 차이 미묘한 버그를 어떻게 잡았나\". 구체적이라 신뢰를 줌. 증상: Android에서만 발음 채점이 \"잘 안 들렸어요\"로 깨짐. iOS 정상. 원인: 녹음 라이브러리가 Android에서 raw AAC(ADTS)를 m4a 라벨 붙여 전송. Whisper는 aac 미지원→빈 텍스트. iOS는 실제 m4a라 통과 → 플랫폼별로 다르게 깨짐. 해결: - 백엔드에서 매직바이트로 실제 컨테이너 감지(파일 라벨 안 믿음). - 미지원이면 ffmpeg로 wav(16kHz mono) 변환. - ADTS를 MP3보다 먼저 엄격 검사(0xFF 동기 바이트 충돌 버그도 수정). ★ 교훈: \"클라이언트가 보내는 메타데이터(파일 라벨)를 믿지 말고 실제 바이트로 검증하라.\" 실기기 확인 완료. 7. 배포 전략 — \"짝/의존성\" 관리 릴리스 엔지니어링 감각. 코드만 짜는 게 아니라 배포까지 책임진다는 인상. 서버 배포 vs 앱 빌드 차이: - 백엔드/데이터: git push → Railway 자동 → 즉시 반영. - 프론트(jsx/css): 앱 빌드 필요 → 여러 수정 모아 한 버전(1.0.2)에. ★ 핵심 — \"같이 가야 하는 짝(의존성)\" 관리: 대표 사례: 음원에서 한국어 낭독 제거 ↔ 미리보기 모달 추가 - 이 둘은 반드시 동시에 나가야 함. - 음원만 먼저 빼면 → 기존 사용자는 한국어 안내가 사라지는데 대체 모달도 없음 = UX 훼손. - 배경음 차단과 대조: 배경음은 \"빼기만\" 하므로 짝 없어 서버만으로 처리 가능. intro_kr은 \"빼고 모달로 대체\"라 짝 필수. 말할 포인트: \"각 변경이 독립적인지, 짝으로 묶여야 하는지 구분하는 게 배포 사고의 절반.\" 8. 실전에서 배운 것 — 파이프라인으로 구조적 해결 성장 서사로 쓰기 좋음. 상황: 한 레슨에 대화 2개 합쳐진 걸 독립 레슨으로 분리하니, 분리 쌍의 title·썸네일이 동일 복제되어 화면 구분 안 됨(54쌍, 108개 전부). 잘못 vs 올바른 접근: - ❌ 임시: Railway DB 직접 UPDATE → 다음 migrate 때 덮어써짐. - ✅ 근본: batch 원본 수정→content.py 재조립→migrate 재실행. 소스와 DB 정합성 확보. 스스로 판단해 해결한 것: 분리본(L79~123)이 전부 카테고리 \"기타\"로 떨어지는 버그 발견 → detect_category에 번호−45로 원본 짝 카테고리 물려받는 로직 추가 → \"기타\" 0건. 말할 포인트: \"증상을 DB에서 직접 고치면 편하지만, 단일 소스 원칙을 지키려 파이프라인 위에서 고쳤다. 당장은 손이 더 가도 재현성·정합성 확보.\" 9. 시스템 설계 판단들 (짧게 여러 개) \"이 프로젝트에서 배운 설계 원칙?\"에 던질 카드: - 관심사 분리: 텍스트/음원/삽화를 독립 도메인 파이프라인으로. 각자 생성 도구·비용 구조 달라서. - 비용을 캐시로 흡수: TTS 캐시 키=text+voice+rate. 구조·GAP 변경은 무료 재생성, 새 문장·화자만 과금. 캐시 키 설계로 비용 통제. - 폴백 우선(graceful degradation): lesson_id 없이 요청 와도 에러 없이 기본 채점. 앱 구버전 호환. - 단일 진실원(SSOT): validate.py가 스키마의 정답. 문서와 코드 충돌 시 코드가 이김. - 메인-폴백 DB 이중화: Railway 메인/Neon 폴백. 단 \"migrate가 쓴 DB와 앱이 읽는 DB가 같은지\" 항상 확인(동기화 함정). 10. 예상 질문 & 대비 - \"왜 Capacitor?\" → 개인/소규모로 3플랫폼. 네이티브 성능 필수 아니라 웹뷰로 충분. 단 웹뷰 한계(iOS <audio .volume 무시 등)를 서버 토글로 우회한 경험도. - \"AI가 만든 콘텐츠 품질을 어떻게 믿나?\" → 2층 검수(구조 validate+품질 게이트)+생성/검증 주체 분리+애매한 것만 외부 LLM. \"장면이 보이는가\" 단일 기준. - \"가장 어려웠던 문제는?\" → STT 플랫폼별 포맷(6번) 또는 채점 메타 보정(5번). - \"채점이 틀리면?\" → \"틀린 메타보다 빈 메타가 안전\". 확신 없으면 비워서 오채점 방지. - \"혼자 다 했나/협업은?\" → 역할 분담: 판단·명세·코드는 메인, 대량 생성·검수는 서브에이전트 병렬, 결정·빌드·DB 반영은 사람. 교차검증. - \"규모는?\" → 레슨 124개+(E/L/S 3난이도), iOS 앱스토어 라이브, Android 심사 제출 완료. 11. 30초 / 2분 / 5분 버전 가이드 - 30초: 1번 엘리베이터 피치. - 2분: 1번 + 4번(품질 게이트) + 성과(iOS 라이브/Android 제출). - 5분: 3번(아키텍처)→4번(콘텐츠 파이프라인)→5번 또는 6번(기술 문제 하나)→7번(배포 짝)→9번 원칙 1~2개. 핵심 한 줄 (외워둘 것) \"AI로 콘텐츠를 대량 생성하되 '장면이 보이는 문장'만 통과시키는 2층 품질 게이트를 만들고, 콘텐츠·음원·삽화를 각각의 파이프라인으로 자동화해 웹/iOS/Android 단일 코드베이스로 배포한 오디오 학습 앱. 채점 정확도, 플랫폼별 포맷 버그, 배포 의존성 관리까지 직접 설계·해결.\""}, {"title": "프로젝트 Voyage", "kind": "기술 심화", "url": "doc_31_voyage_techdeep.html", "text": "[문서31] 프로젝트 Voyage — 기술 심화 개요 문서와 짝. \"구체적으로 어떻게 짰나\"를 묻는 기술 질문 대비용. 각 항목은 파일명·라이브러리·구조를 정확히 짚고 \"왜 그렇게 했나\"를 붙임. --- 1. 백엔드 — 프레임워크 선택 FastAPI(Python) 왜: 1. 생태계 통일: 무게중심이 API가 아니라 콘텐츠·채점·음원 파이프라인. LLM SDK, 임베딩(OpenAI), TTS(ElevenLabs), 오디오(pydub)가 전부 Python이라 API 서버도 Python이면 같은 코드에서 파이프라인 호출. 언어 경계 없음. 2. 비동기+타입: async 네이티브라 TTS/외부 API 같은 I/O 바운드에 유리. Pydantic 타입 검증으로 요청/응답 스키마 코드로 강제. 3. 자동 문서화: OpenAPI 스펙 자동 생성(API_SPEC.md). 프론트와 API 계약 맞추기 쉬움. 4. 가벼움: 개인/소규모라 Django처럼 무거운 풀스택은 과함. 라우팅+검증만. ★ 트레이드오프 인지: GIL 때문에 CPU 바운드엔 약함. 근데 무거운 작업(음원 생성)은 런타임 API가 아니라 오프라인 스크립트(generate_all.py)로 분리. Railway 무료 플랜 HTTP 타임아웃(~100초) 안에서 음원 생성 불가 → 생성은 로컬, 결과물만 R2/DB에. 프레임워크 한계를 아키텍처로 우회. 2. 백엔드 — SQL 라이브러리와 DB SQLAlchemy(ORM): - models_db.py: User, Lesson, LearningRecord, Bookmark, Playlist 등. - db.py: 3단 폴백 — DATABASE_URL(Railway 메인)→DATABASE_FALLBACK_URL(Neon 폴백)→로컬 SQLite(dialogue.db). _try_connect로 순서대로 시도. - init_db.py: 테이블 초기화. 왜 ORM: 로컬 SQLite↔운영 PostgreSQL을 코드 변경 없이. 개발 SQLite, 배포 PG로 같은 모델 재사용. 왜 메인-폴백: 운영 DB 장애 대비. ★ 함정: migrate가 쓴 DB와 앱이 읽는 DB가 다르면 \"migrate는 됐는데 앱엔 안 뜸\". 그래서 반영 후 \"앱이 읽는 DB에 직접 COUNT 쿼리\"로 정합성 확인 절차. (이 함정을 안다는 것 자체가 면접 포인트) JSON 컬럼 활용: practice(dialogue 배열)는 정규화 안 하고 PostgreSQL JSON 컬럼에 통째로. 레슨 콘텐츠는 함께 읽고 쓰는 단위라 조인보다 JSON이 단순·빠름. references/critical_keywords 채점 메타도 이 JSON 안에. → ORM vs 생 SQL 경계의 실제 코드는 문서32(DB 접근 전략), 백엔드 파일별 역할 실측은 문서33. 3. 백엔드 — 스키마 설계 콘텐츠 스키마(레슨 JSON) — 단일 진실원: 레슨 하나 = 최상위 9필드(전부 필수, 필드명 변경 금지): id, theme, ambient, situation_tags, lesson_info, practice, expressions, reaction, pronunciation ★ 핵심 설계 결정 3가지: (a) level/category를 데이터에 안 넣음. id 접두어로 migrate가 생성(E/S→A2, L→B1). 이유: 데이터에 박으면 불일치 위험. 접두어에서 파생하면 항상 일관. 기존 DB 불일치 0행 검증. (b) validate.py가 스키마의 \"정답\"(SSOT). 문서와 코드 충돌 시 코드가 이김. 스키마를 문서가 아니라 실행 가능한 검증 스크립트로 강제. 사람 판단보다 신뢰도↑. 규칙 예: expressions 8필드 필수·pattern_examples 정확히 3개·dialogue_examples 2개 / reaction variations 5개·빈칸 1개 / pronunciation chunks 3개 / orphan 검사(참조 문장이 실제 dialogue에 존재) / 쌍둥이 검사(두 레슨 파생탭 md5 100% 동일이면 실패, 복붙 방지) / tag 11종 화이트리스트만. (c) 난이도(E/L/S)는 공통 스키마+개수만 변형. 구조는 전부 같고 dialogue 턴 수와 expr/pron/react 개수만 다름(E·L=10턴 4/3/3, S=5~6턴 2/1/2). 고정 개수(3/2/5/3)는 난이도 무관 동일 → 검증 로직 하나로 3난이도 커버. DB 스키마(운영): lessons 테이블 — id, level, category, title, practice(JSON), quality_score(INT), quality_grade(TEXT), quality_detail(JSON). level/category는 migrate가 접두어로 채움. quality_score는 별도 채점 파이프라인. 4. 백엔드 — 주요 파일 구성 구성 원칙: - core=외부 연동(TTS,R2,캐시) / services=우리 도메인 로직(콘텐츠,채점,음원 합성). 외부 의존과 내부 로직 분리. - 런타임(main.py) vs 오프라인 스크립트(generate_all/migrate) 분리. 무거운 배치는 API에서 빼서 스크립트로. Railway 타임아웃 회피+관심사 분리. - content.py=콘텐츠 단일 소스. DB는 파생물. 항상 batches JSON→content.py→migrate→DB로만. ★ 실측(문서33): content.py는 49k줄로 전체 코드의 88%(로직 아니라 데이터). 런타임 라우트는 main.py 단 하나(47개). 미참조 레거시 5개(pm6r_builder 등)는 PM6R/Dialogue 초기 설계 잔재로 인지 중. 주요 API: GET /api/lessons(목록) / GET /api/lesson/{id}(상세) / GET /api/stats(통계) / POST /api/session/start·complete / GET /audio/{hash}.mp3(캐시 음원) / POST /api/users/sync(Supabase JWT 검증, 여기서만). 5. 프론트 — 프레임워크 선택과 구성 React+Vite+Capacitor 왜: - React+Vite: 컴포넌트 UI, Vite로 빠른 개발/빌드. 외부 UI 라이브러리 없이 순수 CSS+SVG(번들 경량화, 완전한 제어). - Capacitor: 웹 코드를 그대로 iOS/Android 네이티브로 감쌈. 하나의 코드베이스로 3플랫폼. 네이티브 성능 필수 아니라 웹뷰로 충분. 모바일 빌드는 --mode mobile로 분기(.env.mobile). ★ 트레이드오프: 웹뷰 한계 — iOS WebView는 <audio .volume 무시. \"볼륨을 오디오 파일에 미리 구워넣고 코드에선 volume=1.0\"로 우회(8번). 웹뷰 선택의 대가를 알고 대응. 프론트 파일 구성: 구성 원칙: - 컴포넌트마다 .jsx+.css 쌍 — 스타일 지역화, 전역 오염 방지. - utils/api.js에 API_BASE 중앙관리+apiFetch 래퍼 — API 호출 단일화(인증 헤더, 베이스 URL). 컴포넌트가 fetch 직접 안 부름. - utils에 관심사별 유틸 분리 — 녹음/STT/배경음/이미지 매핑을 각 파일로. 6. 플레이어 구현(Player.jsx) — 가장 기술적 \"오디오 학습 앱의 심장을 어떻게 구현했나\". 깊게 물으면 여기. 타임라인 기반 재생: 음원 합성 시 만든 timeline.json을 따라 재생: { lesson_id, title, duration_sec, events[] }, events: { type, label, tab, time_ms, time_sec } - 이벤트 타입: intro_en, memorization, reflection, rehearsal, speed, retrieval, prompt, reaction, pron_chunk 등. - 플레이어는 오디오 파일 하나를 재생하며 현재 시각(time)에 맞는 이벤트를 찾아 화면 하이라이트·탭 전환·단계 표시. 단계 구조가 음원·타임라인에 이미 박혀 나오므로 프론트는 \"지금 어디쯤인지\"만 따라감. 3개 독립 오디오 ref — 동시 재생/부분 정지 (핵심 설계): - audioRef: 메인 대화 음성(TTS 학습). 서버 캐시에서 서빙. - bgAudioRef: 리듬 비트(reflection_bg.wav). Reflection(리듬 느끼기) 단계 전용. - ambientAudioRef: 테마 배경음(ambient/ .mp3). +ambientTimerRef(페이드 타이머, 중복 방지). → 셋을 별도 볼륨/재생 제어 → 동시에 겹쳐 재생하거나 일부만 멈춤(메인 대화 위에 리듬 비트 얹기). 상태 전환 처리(구현 디테일): - 마운트 시 bg/ambient 볼륨 0 초기화 → 갑작스런 큰 소리 방지. - Reflection 진입 시: 비트 켜되 500ms 가드(진입 후 500ms 뒤에도 여전히 Reflection이어야 재생, 빠르게 지나가는 단계에서 비트 깜빡임 방지). 볼륨 페이드인. - Reflection 이탈/탭 이동 시: 비트 페이드아웃→pause+currentTime=0. 비트는 리듬 단계 전용. - 탭 구조: practice/reaction/pronunciation/expressions. ★ 설계 포인트: \"오디오 상태 전환은 race condition이 잘 남. 500ms 가드, 페이드 타이머 중복 방지, 마운트 시 볼륨 0 초기화 — 전부 '의도치 않은 소리/끊김'을 막는 방어 코드.\" 7. 학습 설계가 코드에 박힌 부분 (GAP 상수) 플레이어와 음원 합성이 공유하는 타이밍 설계. \"왜 이 숫자?\"에 답할 수 있으면 강함. 음원 합성(audio_pipeline.py) 단계별 무음 간격: - GAP_REHEARSAL=6000ms: 떠올려 말하기(인출) 대기. 학습자가 답을 스스로 떠올릴 시간. ★ 학습 설계 핵심이라 건드리면 안 되는 값. - GAP_RETRIEVAL=500ms: 반사적으로 말하기 대기. - GAP_ECHO_MEMORIZATION=2200ms: 따라 말하기 대기. - 단계별 재생 속도: 따라하기 -10%, 빠르게 +20%, 발음 -15%(더 천천히). ★ 면접 포인트: \"무음의 길이가 학습 효과를 결정. 6초 인출 대기는 '능동적 회상(active recall)'을 강제하는 장치. 학습 원리를 오디오 타이밍에 녹였다.\" 8. 개발 난점 (실제로 겪고 해결) \"어려웠던 점\"에 던질 카드. 구체적일수록 신뢰. 난점1 — iOS WebView가 볼륨 무시: - 문제: iOS WebView는 <audio .volume 무시. 3개 오디오 코드 믹싱 볼륨 밸런스가 iOS에서 다 100%로 터짐. - 해결: 볼륨을 오디오 파일에 미리 구워넣고(메인 -21dB, 비트 -28dB, ambient -43dB) 코드에선 volume=1.0. 웹뷰가 못 건드려도 파일 자체 음량으로 밸런스. - 교훈: 플랫폼이 API를 무시할 수 있다. 제어권 없으면 데이터(파일) 쪽으로 옮긴다. 난점2 — STT 포맷 플랫폼별 불일치: - Android가 raw AAC를 m4a 라벨로 전송→Whisper 실패. 매직바이트로 실제 컨테이너 감지+ffmpeg 변환. \"라벨 말고 바이트를 검증.\" 난점3 — 랜덤 비트 파일 HTTP 416: - 문제: 크기 다른 비트 파일들(9MB vs 2MB)을 한 URL로 랜덤 응답→<audio loop 가 Range 재요청 중 파일 바뀌어 416(Range Not Satisfiable)→재생 뭉개짐. - 시도: no-store, 302 리다이렉트 다 실패. - 해결: 단일 비트로 복귀. 여러 파일을 한 URL로 서빙하려면 크기/길이/포맷 통일하거나 프론트에서 URL 고정. - 교훈: <audio Range 요청은 파일이 불변이라 가정. 서빙 계층에서 이 가정을 깨면 안 됨. 난점4 — 정적 오디오 서빙 경로 착각: - 문제: 비트/ambient를 backend/app/static에 뒀는데 서버가 안 봄. - 원인: STATIC_DIR이 frontend/dist(Railway가 vite build로 public→dist 복사). 정답 경로는 frontend/public/audio. backend/static은 레거시 폴백. - 교훈: 빌드 파이프라인이 파일을 어디로 옮기는지 모르면 \"분명 넣었는데 없다\"에 빠짐. 난점5 — 모바일 비트 진입 끊김 (미해결로 정직하게): - 리듬 단계 바로 진입 시 모바일에서 비트가 잠깐 들리다 끊김(웹 정상). 추정: WebView 오디오 디코드 지연+진입 즉시 play 경합. → 정직하게 \"아직 해결 못 한 이슈\"로 말할 수 있음(모르는 걸 안다고 안 하는 태도가 오히려 신뢰). 난점6 — 콘텐츠 정합성(DB 직접수정 함정): - 레슨 분리 후 title 중복(54쌍). DB 직접 UPDATE는 다음 migrate 때 덮어써짐→소스(batch)부터 고쳐 파이프라인 재실행으로 근본 해결. \"단일 소스 원칙 지키려 당장 손 더 가는 길을 택함.\" 9. 예상 기술 질문 대비 - \"왜 ORM? 생 SQL은?\" → 로컬 SQLite↔운영 PG 무변경 전환, 모델 재사용. 복잡 쿼리(정합성 검증)는 생 SQL도 병행. - \"practice를 왜 JSON 컬럼에?\" → 함께 읽고 쓰는 단위라 조인보다 단순·빠름. 채점 메타도 같이. - \"level을 왜 데이터에 안 넣나?\" → 접두어에서 파생 생성→항상 일관. DB 검증으로 불일치 0행. - \"플레이어에서 오디오 3개를 어떻게 관리?\" → 3개 독립 ref, 별도 볼륨/재생 제어. 500ms 가드·페이드 타이머로 경합 방어. - \"timeline.json의 역할?\" → 음원에 단계 구조를 박아 생성→프론트는 시각만 따라가며 하이라이트/탭전환. - \"가장 까다로웠던 버그?\" → STT 포맷(매직바이트) 또는 iOS 볼륨(파일에 구워넣기). - \"Capacitor 성능 이슈는?\" → 웹뷰 한계 있음(볼륨 무시 등). 필요한 곳만 파일/네이티브로 우회. 무거운 작업은 오프라인 스크립트로. - \"테스트는?\" → test_scoring.py, test_meta_regression.py — 채점 로직 회귀 테스트. 핵심 한 줄 \"백엔드는 파이프라인 생태계 통일 위해 FastAPI+SQLAlchemy(Railway PG 메인/Neon 폴백/SQLite 로컬), 콘텐츠는 batch→content.py→migrate→DB 단일 소스로만 흐르며 validate.py가 스키마 강제. 프론트는 React+Vite+Capacitor 단일 코드베이스, 플레이어는 timeline.json 따라 3개 독립 오디오 ref를 경합 방어하며 재생. iOS 볼륨 무시·STT 포맷·HTTP 416 같은 웹뷰/서빙 함정을 직접 진단·해결.\""}, {"title": "프로젝트 Voyage", "kind": "DB 접근 전략", "url": "doc_32_voyage_dbaccess.html", "text": "[문서32] 프로젝트 Voyage — ORM & 생 SQL (DB 접근 전략) 문서31의 \"왜 ORM?\" 질문에 대한 실제 코드 기반 답변. 핵심 서사: ORM이 기본, 생 SQL은 명확히 두 경우(DDL·헬스체크)에만. 경계가 일관된 게 강점. --- 핵심 한 줄 \"애플리케이션의 모든 CRUD·조회·집계는 SQLAlchemy ORM으로, 생 SQL은 ORM이 다루기 힘든 DDL(ALTER TABLE 컬럼 추가)과 연결 헬스체크(SELECT 1)에만 국소적으로 썼다. '데이터는 ORM, 스키마 변경은 생 SQL'이라는 경계가 코드 전체에서 일관된다.\" 1. 왜 ORM을 기본으로? - 로컬 SQLite↔운영 PostgreSQL 무변경 전환. 같은 모델(models_db.py)로 개발은 SQLite, 배포는 PG. 방언 차이를 ORM이 흡수 → 코드 한 벌로 두 DB. - 관계는 relationship(back_populates)으로 선언 → 명시적 .join() 없이 FK 기반 조인을 ORM 관계에 위임. lazy-load로 필요 시 로드. - 타입 안전·가독성. db.query(User).filter(User.id == uid).first()가 SQL 문자열보다 명확. ORM 대표 3패턴(실제 코드): - 단순 조회(main.py:790): db.query(User).filter(User.id == user_id).first() — PK 단건, 없으면 None. 가장 흔함. - 복합 필터+정렬(main.py:303): user_id+날짜 범위( =, <)를 복합 필터 → .order_by(started_at.asc()).all() 체인. 집계도 ORM .count()(main.py:1006). - 쓰기(main.py:1291): ScheduleEntry(...) → db.add → db.commit → db.refresh(autoincrement id 회수). 쓰기 전 ORM으로 중복 확인까지. 2. 생 SQL은 정확히 두 경우만 (a) 연결 헬스체크 — db.py:45 with eng.connect() as conn: conn.execute(text(\"SELECT 1\")) Railway(메인)→Neon(폴백) 폴백 로직에서 \"이 DB URL이 살아있나\" 판정용 최소 쿼리. ORM 모델과 무관한 순수 커넥션 테스트라 text()가 자연스러움. (b) 런타임 스키마 마이그레이션(DDL) — init_db.py / migrate_content.py stmts = [\"ALTER TABLE users ADD COLUMN avatar VARCHAR(40)\", ...] if is_pg: stmts = [s.replace(\"ADD COLUMN\", \"ADD COLUMN IF NOT EXISTS\") for s in stmts] for s in stmts: try: conn.execute(text(s)); conn.commit() except: conn.rollback() SQLite: 이미 있으면 무시 ★ 왜 생 SQL? Base.metadata.create_all()은 없는 테이블만 만들고 기존 테이블에 새 컬럼은 안 붙인다. Alembic 도입하기엔 규모가 작아 가볍게 DDL 직접 실행. PG는 IF NOT EXISTS, SQLite는 예외 무시로 방언 차이까지 흡수. lessons 테이블의 코칭·삽화 컬럼 사후 추가(migrate_content.py:88)도 같은 구조·이유. 3. 혼용 지점 — 한 흐름에서 역할 분담 migrate_content.py가 대표적. 같은 마이그레이션 실행 안에서: 1. 생 SQL(DDL): ensure_columns()가 ALTER TABLE ADD COLUMN — 스키마 보강 2. ORM(DML): upsert 루프 — db.query(Lesson).filter(...).first()로 조회, 있으면 setattr 업데이트 / 없으면 db.add, --reset이면 db.query(Lesson).delete() 3. ORM 검증: db.query(Lesson).count()로 건수 확인 → 컬럼 존재 보장(생 SQL) → 행 upsert(ORM) → 건수 카운트(ORM) 순. DDL만 생 SQL, 데이터·검증은 ORM이라는 경계가 한 파일 안에서도 지켜짐. init_db.py도 유사: create_all()(ORM 메타)+ensure_user_columns()의 ALTER(생 SQL) 연달아 호출. 4. 정합성 검증은 어떻게? - DB 레벨: 생 SQL COUNT 비교는 없음. ORM .count()로 대체(migrate_content.py:225 등). - 콘텐츠 레벨: DB가 아니라 파일/모델 단계에서 파이썬 assert로 검증(예: assert len(LESSONS)==108, 삽화 업로드 시 중복/누락 ID 검사). SQL 정합성이 아니라 파이프라인 입력 검증. - 결론: \"생 SQL 정합성 쿼리\"는 없음. 정합성 = ORM .count() + 파이썬 assert. 5. 예상 질문 대비 - \"왜 전부 ORM 안 쓰고 생 SQL을 섞었나?\" → ORM은 기존 테이블에 컬럼 추가(ALTER)를 안 해준다. Alembic은 규모 대비 과해서 DDL만 생 SQL로 가볍게. 데이터 조작은 전부 ORM. - \"왜 Alembic을 안 썼나?\" → 개인/소규모라 컬럼 몇 개 추가에 Alembic은 오버. IF NOT EXISTS+예외 무시로 멱등하게. 규모 커지면 Alembic 전환이 맞다(트레이드오프 인지). - \"조인은?\" → 명시적 .join() 대신 relationship(back_populates)으로 선언, 필요 시 lazy-load. - \"생 SQL 인젝션 위험은?\" → 생 SQL은 전부 하드코딩된 DDL 문자열(사용자 입력 안 들어감). 사용자 입력 닿는 경로는 100% ORM이라 파라미터 바인딩으로 안전. 핵심 요약 ORM 기본 / 생 SQL은 DDL·헬스체크 한정. 경계가 일관됨. 관계는 relationship에 위임, 정합성은 ORM count+assert. SQLite↔PG 무변경이 ORM 채택의 실질 이유, DDL 한계가 생 SQL의 이유."}, {"title": "프로젝트 Voyage", "kind": "백엔드 파일 분류", "url": "doc_33_voyage_backendfiles.html", "text": "[문서33] 프로젝트 Voyage — 백엔드 파일 역할 분류 문서31의 파일 구성을 실제 코드로 검증·분류. 전체 37개 .py / 55,730줄. ★ 문서31과 다른 발견: 미참조 레거시 5개, content.py가 전체의 88%(데이터). --- 핵심 한 줄 \"FastAPI 라우트를 가진 파일은 main.py 단 하나. 나머지는 라이브러리 모듈 아니면 오프라인 스크립트. 런타임 표면적은 작고(main+조회/채점/음원/STT+core), 코드의 88%(content.py 49k줄)는 '로직'이 아니라 콘텐츠 데이터. batches→content.py→migrate→DB→content_db 단방향 흐름.\" A. 콘텐츠 생성 / 데이터 파이프라인 (오프라인) - services/content.py (49,042줄): 콘텐츠 원본 데이터 배열(대사·표현·발음·리액션). 런타임 미로드, migrate 소스. - migrate_content.py (235): content.py→lessons 테이블 upsert(ALTER 생SQL+ORM add/update). - generate_all.py (241): 음원 배치 자동생성(TTS→믹싱→timeline). - push_quality_scores.py (71): 채점 결과(json)를 DB 반영. - rebuild_reaction/fix_pronunciation/fix_reaction (346/84/85): E시리즈 포맷 변환·재구성. - upload_existing_audio/upload_illustrations (160/121): 음원·삽화 R2 일괄 업로드. - generate_card_webp (94): 삽화 WebP 변형+LQIP blur 생성. - regen_illustrations_32/regen_swap/crop_replace (104/104/107): 삽화 재생성·crop·R2 교체. - insert_sample_records (121): 학습 달력 테스트용 샘플 DB 삽입. ★ content.py 49,042줄 = 전체 코드의 88%. 면접에서 반드시 \"이건 로직이 아니라 데이터\"라고 명확히. \"코드 5.5만 줄\"이 아니라 \"데이터 소스가 대부분, 실제 로직은 작다.\" B. 런타임 — 라우팅 + 비즈니스 로직 - app/main.py (1,676): 유일한 FastAPI 앱. 47개 엔드포인트(음원 서빙, 레슨 조회, 채점 /api/score, STT, 유저 동기화, 통계/스트릭, 북마크/플레이리스트/스케줄/메모/노트/프로필). - api.py (3): from app.main import app — 배포 진입점(ASGI). - services/content_db.py (103): 런타임 콘텐츠 조회 계층. lessons 테이블→dict. main.py가 content.py 대신 이걸 씀. - services/scoring.py (235): 발화 채점(표면유사도+코사인+키워드 cap). STT 벤더와 분리. - services/audio_pipeline.py (655): 7단계 학습 음원 파이프라인(화자 보이스 매핑, timeline 빌드). - services/share_page.py (288): /s/{lesson_id} 공유 페이지 HTML 렌더. ⚠️ 미참조 레거시 (코드 확인됨 — 정직하게 말할 카드) - services/session_builder.py (71): 어디서도 import 안 됨 → 초기 Dialogue 설계 잔재. - services/pm6r_builder.py (256): 미참조 → audio_pipeline으로 대체된 듯. - services/db_service.py (86): 미참조 → 초기 Dialogue 모델용 레거시. C. 외부 연동 / 인프라 (core) - core/tts_service.py (228): ElevenLabs TTS 래퍼+캐시. - core/r2_storage.py (115): Cloudflare R2(S3호환) 업로드/URL/존재확인. - services/stt_client.py (137): OpenAI Whisper STT+임베딩(컨테이너 sniff, ffmpeg wav 변환). - app/db.py (79): DB 엔진 — Railway PG 주/Neon 폴백/SQLite 로컬. - app/models_db.py (202): SQLAlchemy 모델 14종. - app/init_db.py (43): create_all+ALTER 컬럼 보강. - core/models.py (110): dataclass/Enum 도메인 타입. - core/cache.py (2): TTSService 재-export shim. ★ 벤더 격리: tts_service/r2_storage/stt_client가 외부 API를 각각 얇은 래퍼로 분리. \"벤더 교체 시 이 파일만 갈아끼운다\"는 설계. scoring도 STT 벤더와 분리. D. 유틸 (보조 — 현 런타임 연결 불명확) - core/chunker.py (95): 문장→청크 분할. 레거시 빌더만 사용. - core/templates.py (108): 학습 스텝 템플릿. 참조처 없음 → 레거시. - utils/mixer.py (32): TTS+BGM 믹싱(pydub). import 안 됨 → 오프라인/잔재. E. 오프라인 스크립트 / 테스트 - test_scoring.py (67): 채점 곡선 검증(실 임베딩으로 점수 분포). - test_meta_regression.py (115): 메타 채점 회귀 테스트(메타 ON/OFF 비교). - _check_step2.py (102): 콘텐츠 검증(레슨 108개, practice 키, assert). content.py 직접 로드하는 유일한 곳. 면접 포인트 (이 분류에서 나오는 이야기) 1. 런타임 표면적은 작다. 실제 서버가 도는 코드는 main.py+content_db/scoring/audio_pipeline/share_page/stt_client+core(tts/r2/db/models). content.py(49k)는 데이터 소스. → \"코드량\"이 아니라 \"런타임에 실제 도는 것\"으로 규모를 말하는 게 정확. 2. 벤더 격리 설계. 외부 API(TTS/STT/R2)를 각각 얇은 래퍼로. 교체 시 그 파일만. 3. 데이터 흐름 단방향. batches/ .json→content.py→migrate→DB→content_db(런타임 조회). DB 직접 수정 안 함(SSOT). 문서30·31의 원칙과 코드가 일치. 4. 레거시 잔재를 정직하게. pm6r_builder·session_builder·db_service·templates·mixer는 현 런타임 미참조. 초기 \"PM6R/Dialogue\" 설계가 현재 audio_pipeline+lessons 테이블로 전환된 흔적. → 물으면 \"구조 전환의 흔적, 정리 대상으로 인지하고 있다\"로 답하는 게 오히려 신뢰(모르는 척하거나 \"다 쓴다\"고 하면 역효과). 핵심 요약 main.py 단일 FastAPI(47라우트). content.py는 88%가 데이터. 런타임=조회/채점/음원/STT+core. 외부 API는 얇은 래퍼로 벤더 격리. 흐름은 batch→content→migrate→DB→content_db 단방향. 미참조 레거시 5개는 PM6R/Dialogue 초기 설계의 잔재로 인지 중."}, {"title": "프로젝트 Voyage", "kind": "스택 심화", "url": "doc_37_voyage_stackdeep.html", "text": "[문서37] 프로젝트 Voyage — 백엔드/기술 스택 상세 기술 스택 + 구현 방법 구체 정리. 라이브러리 일반 동작(검증) + 프로젝트 특유 내용 결합. ★ 집중 환기용 원자료. --- 1. 기술 스택 전체 지도 백엔드 - 언어/프레임워크: Python + FastAPI (async 네이티브, Pydantic 타입검증, OpenAPI 자동문서) - ORM/DB: SQLAlchemy + PostgreSQL (Railway 메인 / Neon 폴백 / 로컬 SQLite) - TTS(음성합성): ElevenLabs(고음질 유료) + edge-tts(무료 폴백) - STT(음성인식): OpenAI Whisper API + 임베딩(text-embedding)으로 채점 - 오디오 처리: pydub(믹싱·볼륨·페이드), ffmpeg(포맷 변환) - 스토리지: Cloudflare R2(S3 호환) — 음원 파일 저장, 백엔드는 302 리다이렉트 - 인증: Supabase Auth(이메일 OTP, JWT) - 배포: Railway(백엔드, git push 자동배포) 프론트엔드 - React + Vite (컴포넌트 UI, 빠른 빌드, 외부 UI 라이브러리 없이 순수 CSS+SVG) - Capacitor — 웹 코드를 iOS/Android 네이티브로 감싸는 크로스플랫폼 런타임 - 상태: React hooks (useState 등), 전역 상태 라이브러리 최소화 핵심 설계 축 - 콘텐츠 단일 소스(SSOT): batches/ .json → content.py → migrate → DB → 런타임 조회 - 텍스트/음원/삽화를 독립 파이프라인으로 분리 (생성도구·비용구조가 달라서) - 런타임(main.py)은 가볍게, 무거운 생성(음원)은 오프라인 스크립트로 2. TTS — ElevenLabs에서 무엇을 가져오나 ElevenLabs 역할: 대화문(dialogue) 텍스트를 실제 사람 같은 음성으로 합성. 학습 음원의 메인 화자 목소리를 여기서 가져온다. - 입력: 텍스트 + voice_id(화자별 목소리 ID) + 설정(속도 등) - 출력: mp3 오디오 바이트 - 화자 매핑: 대화에 여러 화자(예: CUSTOMER/BARISTA)가 있으면 각 화자에 다른 voice_id를 매핑 → 대화가 실제 두 사람 대화처럼 들림. (audio_pipeline이 화자→voice_id 매핑 관리) - 캐시: 같은 (텍스트 + voice + rate)면 재생성 안 하고 캐시 재사용 → API 비용 통제. 캐시 키 = text+voice+rate 해시. 구조·간격(GAP) 변경은 무료(캐시 히트), 새 문장·새 화자만 과금. 왜 ElevenLabs? 영어 학습은 발음·억양 품질이 핵심 → 고음질 우선. 단 비용이 있어 캐시로 흡수. 3. edge-tts — 음원을 어떻게 생성하나 edge-tts 역할: Microsoft Edge 브라우저의 온라인 TTS 서비스를 Python에서 API 키 없이 쓰는 무료 라이브러리. ElevenLabs의 비용 부담을 줄이는 폴백/보조 TTS. 동작 원리 (검증됨): - Edge가 내부적으로 쓰는 클라우드 음성(neural voices)을 그대로 호출. Edge 브라우저나 Windows 설치 불필요, API 키 불필요. - 내부적으로 Microsoft 음성 서비스에 WebSocket(WSS)으로 연결해 스트리밍 합성. - 비동기(async) API라 배치 처리·웹 백엔드에 적합. - 사용법: edge_tts.Communicate(text, voice, rate) → .save(output.mp3). - 음성은 locale+voice명으로 선택(예: en-US-AndrewNeural). rate/volume/pitch 조절 가능 (예: --rate=-50% 느리게). 자막(SRT/VTT)도 같이 출력 가능. 트레이드오프: 무료·경량·빠름·고음질이지만, MS 서비스 의존이라 과도 사용 시 차단 위험. 그래서 메인은 ElevenLabs, edge-tts는 보조. 4. pydub — 언제 쓰이나 pydub 역할: 파이썬 오디오 처리 라이브러리(내부적으로 ffmpeg 사용). Voyage에서는 여러 음원을 하나로 합성·타이밍 조립할 때 쓴다. 구체적 용도: - 볼륨 조절: 메인 대화·리듬 비트·배경음의 음량을 각각 다르게 (dB 단위). iOS WebView가 <audio .volume을 무시하는 문제 때문에 볼륨을 파일 자체에 구워넣음(메인 -21dB, 비트 -28dB, ambient -43dB). 코드에선 volume=1.0이어도 파일 음량으로 밸런스가 맞음. - 무음(silence) 삽입: 학습 단계별 대기 시간을 무음으로 넣음. 예: 떠올려 말하기 6초 대기 → 그만큼의 무음을 오디오에 삽입. (아래 7단계 참고) - 믹싱/페이드/ducking: 배경음 위에 대화를 얹고, 페이드인/아웃 처리. - 이어붙이기(concat): 여러 TTS 조각 + 무음 + 비트를 순서대로 합쳐 한 레슨 음원 완성. 즉 pydub은 음원 \"합성·편집\" 단계에서 쓴다(생성은 TTS, 편집은 pydub). 5. Whisper — 음성 인식 후 어떻게 평가하나 (채점 프로세스) STT 단계 (stt_client.py): 1. 사용자가 마이크로 문장을 말함 → 녹음 파일이 백엔드로 전송. 2. 컨테이너 sniff: 파일 라벨(m4a 등)을 믿지 않고 매직바이트로 실제 포맷 감지. (안드로이드가 raw AAC를 m4a 라벨로 보내는 버그 대응) 3. Whisper 미지원 포맷이면 ffmpeg로 wav(16kHz mono) 변환. 4. OpenAI Whisper API로 음성 → 텍스트(전사, transcription). 채점 단계 (scoring.py) — 하이브리드 방식: - 의미 유사도(코사인, 약 75%): 사용자 발화와 정답 문장을 각각 임베딩(벡터화)해 코사인 유사도 계산. 표현이 달라도 의미가 가까우면 높은 점수. - 표면 매칭(약 25%): 단어·문자열 표면 일치도. - 메타데이터 보정 (양방향): - references(패러프레이즈): 정답 + 등록된 모든 패러프레이즈와의 코사인 최댓값 사용 → 다르게 말해도 등록된 표현과 가까우면 구제(관대). \"정답을 오답 처리\"하는 실수 방지. - critical_keywords(핵심어): 핵심어가 전부 빠진 \"구조만 비슷한 오답\"에 점수 상한(cap) → 오답 차단(변별). \"오답을 정답 처리\"하는 실수 방지. - ★ 한쪽은 올리고(구제), 한쪽은 누른다(차단) = 양방향 보정이 설계 핵심. - 안전장치: \"틀린 메타보다 빈 메타가 안전.\" 확신 없는 references는 비움(빈 것도 채점 정상 작동, 구제만 없음). 부정확한 메타가 오히려 오채점을 유발하므로. 결과: 점수(0~100) + 피드백. 임베딩만으론 \"세련된 정답\"을 놓치거나 \"구조 비슷한 오답\"을 통과시키는데, 메타 보정으로 양쪽을 잡음. 6. 플레이어 — 음원 생성 & 암기 테스트 프로세스 (7단계) 음원 생성 (오프라인, audio_pipeline.py + generate_all.py): - 레슨 대화문 → 화자별 ElevenLabs TTS → pydub로 단계별 무음·비트·볼륨 조립 → 하나의 음원 파일 + timeline.json 생성 → R2 업로드. - timeline.json: { lesson_id, title, duration_sec, events[] }. 각 event는 { type, label, tab, time_ms }. 단계 구조가 음원에 이미 박혀 나옴. 7단계 학습 흐름 (음원 타이밍에 학습 설계가 박혀 있음): 1. 들어보기(intro): 전체 대화 편하게 듣기. 2. 따라 말하기(memorization): 듣고 따라 말함. 재생 속도 -10%(천천히), 대기 2.2초. 3. 리듬 느끼기(reflection): 배경 리듬 비트 위에서 문장 흐름 따라 말하기. 4. 떠올려 말하기(rehearsal, 인출): 한글 보고 영어 떠올려 말하기. 대기 6초 (능동적 회상 active recall 강제 — 학습 핵심이라 이 값 못 건드림). 5. 빠르게 듣기(speed): 속도 +20%로 빠른 영어에 귀 틔우기. 6. 바로 말하기(retrieval): 한글 나오면 즉시 영어. 대기 0.5초(반사적). 7. 최종 점검(final review): 발음 직접 채점 + 표현 복습. ★ 무음 길이가 학습 효과를 결정한다. 6초 인출 대기는 \"스스로 떠올리게\" 하는 장치. 학습 원리를 오디오 타이밍에 녹인 것. 암기 결과 테스트(발음 채점): 위 5번(Whisper+임베딩+메타) 프로세스. 사용자가 말하면 STT→채점→점수·피드백. \"얼마나 정답에 가깝게 말했나\"를 의미+표면+메타로 종합 판정. 7. JSON 구조 (콘텐츠 스키마) 레슨 하나 = 최상위 9필드(전부 필수, 필드명 변경 금지): - id — 레슨 식별자. 접두어로 난이도 파생(E/S→A2, L→B1). - theme — 카테고리 판별용 테마. - ambient — 배경음 종류. - situation_tags — 상황 태그(화이트리스트 11종). - lesson_info — 제목·설명 등 메타. - practice — 대화(dialogue) 배열. 화자(speaker)·영어·한글. PostgreSQL JSON 컬럼에 통째로. - expressions — 핵심 표현(8필드 필수: 표현·뜻·when·pattern·pattern_examples 정확히 3개·dialogue_examples 2개 등). \"응용\" 패턴 학습. - reaction — 리액션 학습(variations 5개·빈칸 1개). - pronunciation — 발음 드릴(chunks 3개, 연음 포인트). 난이도별 변형: 구조는 동일, 개수만 다름. E·L=10턴(expr/pron/react 4/3/3), S=5~6턴(2/1/2). 고정 개수(pattern 3, dialogue 2, reaction variations 5, pron chunks 3)는 난이도 무관 동일 → 검증 로직 하나로 3난이도 커버. 검증(validate.py)이 스키마의 \"정답\"(SSOT): - 필드 개수 체크, orphan 검사(참조 문장이 실제 대화에 존재하는가), 쌍둥이 검사(두 레슨 파생탭 md5 100% 동일이면 복붙으로 판단해 실패), 태그 화이트리스트 11종만 허용. - level/category는 데이터에 안 넣고 id 접두어에서 파생 → 항상 일관(불일치 0행). DB 저장 형태(운영): lessons 테이블 — id, level, category, title, practice(JSON), quality_score, quality_grade, quality_detail(JSON). level/category는 migrate가 접두어로 채움. 8. Python 주요 라이브러리 정리 - FastAPI: 웹 프레임워크(라우팅, async, 타입검증) - SQLAlchemy: ORM(모델 정의, 쿼리). SQLite↔PG 무변경 - Pydantic: 요청/응답 스키마 타입 검증(FastAPI 내장) - openai: Whisper STT + 임베딩(채점) - elevenlabs: 고음질 TTS - edge-tts: 무료 TTS(폴백) - pydub: 오디오 믹싱·볼륨·무음·페이드 (ffmpeg 래핑) - boto3 / S3 클라이언트: Cloudflare R2(S3 호환) 업로드 - psycopg2 / asyncpg: PostgreSQL 드라이버 - numpy: 임베딩 벡터 코사인 유사도 계산 - Pillow(PIL): 삽화 WebP 변환·리사이즈·blur(LQIP) - python-jose / PyJWT: Supabase JWT 검증 - (외부 도구) ffmpeg: 오디오 포맷 변환(STT 전처리, pydub 백엔드) 9. Capacitor 동작 원리 (검증됨) 한 줄: Capacitor는 웹 앱을 WebView(네이티브 브라우저 컴포넌트)로 감싸고, 웹과 네이티브 사이에 브리지(bridge)를 주입해 서로 통신하게 하는 크로스플랫폼 런타임. 구조: - WebView: iOS는 WKWebView, Android는 Chromium 기반 WebView. 웹 앱(HTML/CSS/JS)이 이 안에서 렌더링됨. 크롬(주소창 등) 없는 전체화면 브라우저. - Native Bridge: WebView와 네이티브 코드 사이의 통신 계층. JS에서 window.Capacitor.Plugins로 네이티브 기능 호출 → 브리지가 JSON 메시지로 직렬화 → 네이티브(Swift/Java)가 파싱·실행 → 결과를 다시 JS로 반환. (비동기, JSON 인코딩 오버헤드 있음) - 네이티브 프로젝트는 진짜 네이티브 앱: iOS는 Xcode 프로젝트, Android는 Gradle 프로젝트. 즉 필요하면 네이티브 코드를 직접 추가/수정 가능. - 로컬 HTTP 서버: 웹 자산을 file://가 아니라 로컬 http://로 서빙(CORS 문제 회피). 빌드 흐름: 1. 웹 앱 빌드(vite build) → dist/ 생성 2. cap sync → 웹 자산을 네이티브 프로젝트로 복사 + 플러그인 반영 3. Xcode(iOS) / Android Studio(Gradle)로 네이티브 빌드 → .ipa / .aab 왜 Capacitor? 개인/소규모로 웹·iOS·Android를 하나의 코드베이스로. 네이티브 성능이 필수가 아니라 웹뷰로 충분한 앱에 적합. 단 웹뷰 한계 존재(아래 11번). 10. iOS/Android 빌드용 Capacitor 설정 - appId(번들 ID): org.voyageapp.app — iOS·Android 통일. - 모바일 빌드 분기: --mode mobile로 빌드(.env.mobile). 웹용 API_BASE와 모바일용 분리. - capacitor.config: appId, appName(Voyage), webDir(dist), 스플래시/상태바 설정 등. - sync 흐름: npm run sync:android (= vite build + cap sync) → 네이티브 프로젝트에 반영. - 안드로이드 서명: release keystore(alias voyage)로 .aab 서명. Play가 최종 서명. - versionCode/versionName: build.gradle. versionCode는 Play 전체 유일·증가(현재 5), versionName은 사용자 노출 버전(1.0). - iOS: Xcode에서 Team·Bundle ID 설정, Archive → App Store Connect 업로드. - 안드로이드 12+ 스플래시: OS 강제 규격(단색 배경+중앙 원형 아이콘). values-v31/styles.xml + drawable/splash_icon.png(나침반) + colors.xml(splash_background). 11. 마이크 지원 & 네이티브 흉내 & 특별히 신경 쓴 점 마이크(녹음) 기능: - Capacitor 플러그인 @independo/capacitor-voice-recorder로 마이크 녹음. - iOS는 m4a, 안드로이드는 raw AAC(ADTS)로 녹음됨(플랫폼 차이). 이게 STT 버그의 원인이었음. - 마이크 권한 거부 시 설정 화면으로 직접 이동하는 버튼 제공(capacitor-native-settings). → 사용자가 앱 안에서 바로 권한 설정 가능(네이티브 경험). 네이티브를 흉내내기 위해 애쓴 점: - 볼륨을 파일에 구워넣기: iOS WebView가 <audio .volume을 무시 → 코드로 볼륨 제어 불가. 그래서 pydub로 음원 자체 음량을 조절해 밸런스. \"제어권 없으면 데이터 쪽으로 옮긴다.\" - 오디오 상태 전환 방어(race condition): 3개 독립 오디오 ref(메인/비트/배경음)를 별도 볼륨·재생 제어. 탭 이동 시 정지/재개를 위해 — 마운트 시 볼륨 0 초기화, 리듬 진입 시 500ms 가드(빠르게 지나가는 단계에서 비트 깜빡임 방지), 이탈 시 페이드아웃→pause→currentTime=0, 페이드 타이머 중복 방지. → 네이티브 앱처럼 끊김 없는 오디오 경험. - 스플래시/아이콘을 iOS·Android 각각 OS 규격에 맞춰 정성껏(브랜드 일관성). - 로그인 없이 체험: 진입장벽 낮추려 로그인 전 무료 체험 제공. 특별히 신경 쓴 점 요약: - 학습 원리(능동적 회상 6초 대기 등)를 오디오 타이밍에 물리적으로 구현. - AI 대량 생성 콘텐츠의 품질 게이트(\"장면이 보이는 문장만 통과\"). - 플랫폼별 함정(iOS 볼륨, 안드로이드 STT 포맷)을 데이터/바이트 레벨에서 해결. - 채점의 양방향 메타 보정(구제 + 차단)으로 정확도 확보. 12. 오디오 탭 이동 제어 (요청 항목 상세) 플레이어에서 음원·비트 재생 중 표현/응용/발음 탭으로 이동할 때의 정지·재개 컨트롤: 문제: 메인 대화 음성 위에 리듬 비트를 얹어 재생 중, 사용자가 다른 탭으로 이동하면 어떤 소리는 멈춰야 하고(비트), 어떤 건 이어져야 하며, 돌아오면 재개돼야 함. 오디오는 비동기라 전환이 빠르면 소리가 겹치거나 깜빡이거나 끊김(race condition). 해결 — 3개 독립 오디오 ref: - audioRef: 메인 대화 음성(서버 캐시에서 서빙). - bgAudioRef: 리듬 비트(reflection_bg.wav). \"리듬 느끼기\" 단계 전용. - ambientAudioRef: 테마 배경음(ambient/ .mp3) + ambientTimerRef(페이드 타이머, 중복 방지). - → 셋을 별도 볼륨·재생으로 제어 → 겹쳐 재생하거나 일부만 멈춤 가능. 전환 방어 코드: - 마운트 시 bg/ambient 볼륨 0으로 초기화 → 갑작스런 큰 소리 방지. - 리듬(reflection) 진입 시: 비트 켜되 500ms 가드(진입 후 500ms 뒤에도 여전히 리듬 단계여야 재생 → 빠르게 지나가는 단계에서 비트 깜빡임 방지) + 볼륨 페이드인. - 리듬 이탈/탭 이동 시: 비트 페이드아웃 → pause + currentTime=0. - 페이드 타이머 중복 실행 방지(ref로 관리). ★ 교훈: 오디오 상태 전환은 선언적으로 짜기 어렵다. 타이밍 가드와 cleanup을 명시적으로 넣어야 \"의도치 않은 소리/끊김\"을 막을 수 있다. 미해결(정직하게): 모바일 웹뷰에서 리듬 단계 즉시 진입 시 비트가 잠깐 들리다 끊기는 이슈. 추정 원인: WebView 오디오 디코드 지연 + 진입 즉시 play 경합. 아직 완전 해결 못 함. 핵심 요약 (한 문단) FastAPI+SQLAlchemy 백엔드에서 ElevenLabs(고음질)/edge-tts(무료폴백)로 대화 음원을 합성하고 pydub로 볼륨·무음·비트를 조립해 timeline.json과 함께 R2에 저장. 플레이어는 그 타임라인을 따라 3개 독립 오디오 ref를 경합 방어하며 7단계 학습(6초 인출 대기 등 학습원리를 타이밍에 구현)을 재생. 발음 채점은 Whisper 전사 → 임베딩 코사인 유사도 + 표면 매칭 + references(구제)/keywords(차단) 양방향 메타 보정. 콘텐츠는 9필드 고정 JSON 스키마를 validate.py로 강제(SSOT). 프론트는 React+Vite를 Capacitor로 감싸 웹/iOS/Android 단일 코드베이스(WebView+네이티브 브리지)로 배포."}, {"title": "프로젝트: 병원 결제 시스템", "kind": "Next.js 활용", "url": "doc_34_jceye_nextfeatures.html", "text": "[문서34] 프로젝트: 병원 결제 시스템 — Next.js 활용 정리 안과 수술 결제 플랫폼(메이페이안과). Next.js 15 App Router의 핵심 기능을 실제로 어떻게 썼나. 스택: Next 15 + React 19 + Prisma + Neon(PostgreSQL) + NextAuth v5 + 토스페이먼츠/Stripe/PayPal. ★ 실제 코드 기반. \"Next로 무엇을 구현했나\"를 기능별로 정리. --- 핵심 한 줄 \"Next.js 15 App Router로 결제 플랫폼을 풀스택 단일 코드베이스로 구현. 서버 컴포넌트로 데이터를 직접 조회하고, 서버 액션으로 폼 변경을 처리하며, Route Handler로 결제·웹훅·SMS 외부 연동을 붙이고, 라우트 그룹으로 인증/쇼핑/관리자/유저 영역을 나눴다. 미들웨어(NextAuth)로 접근을 제어한다.\" 1. App Router 라우트 그룹 — 영역 분리 괄호 라우트 그룹으로 URL에 안 나타나는 논리적 구획: - (auth): 로그인/회원가입. 자체 layout.tsx(인증 전용 레이아웃). - (root): 메인 쇼핑·결제 플로우(상품→장바구니→환자정보→결제수단→주문→결제→영수증). - admin: 관리자(주문/상품/유저/통계). 자체 layout+main-nav. - user: 사용자 마이페이지(주문 내역/프로필). ★ 왜: 영역마다 레이아웃·권한이 달라서. 그룹 layout으로 공통 UI를 묶고, URL은 깔끔하게 유지. 2. 서버 컴포넌트 — 데이터를 직접 조회 App Router 기본이 서버 컴포넌트. 페이지(page.tsx)가 async 함수로 서버에서 직접 DB 조회: - place-order/page.tsx: await auth()로 세션, await getMyCart()로 장바구니를 서버에서 조회 후 렌더. - 클라이언트 상호작용 부분만 별도 파일로 분리(place-order-form.tsx에 'use client'). ★ 패턴: 서버 컴포넌트(page)가 데이터 fetch+초기 렌더 → 인터랙션은 클라이언트 컴포넌트(form)로 위임. 'use client' 43개 파일 vs 서버 컴포넌트 기본. 경계를 명확히 나눔. 3. 서버 액션('use server') — 폼·변경 처리 lib/actions/ .ts 6개 파일이 'use server'. 클라이언트에서 직접 호출하되 서버에서 실행: - order.actions.ts: createOrder(주문 생성), updateOrderChartNumber(차트번호 갱신). - cart/product/user/payments/refund/review.actions.ts: 각 도메인 변경. ★ 장점: API 라우트를 따로 안 만들고 함수 호출처럼 서버 로직 실행. revalidatePath로 캐시 무효화(변경 후 화면 갱신). auth()로 서버에서 인증 확인. 예: createOrder는 세션 확인→장바구니 조회→주문 생성→redirectTo 반환→클라가 router.push. 4. Route Handler(app/api/ ) — 외부 연동 전용 서버 액션으로 안 되는 것(외부에서 호출, 웹훅)만 API 라우트로: - api/payments/confirm: 토스 결제 승인(paymentKey+금액 재검증). - api/payments/refund: 환불. - api/payments/save-finished: 완료 결제 저장. - api/webhooks/stripe: Stripe 웹훅 수신(외부→우리). - api/notifications/sms: 문자 발송. - api/auth/[...nextauth]: NextAuth 캐치올 라우트. - api/uploadthing: 파일 업로드. ★ 기준: 우리 앱 내부 폼 처리=서버 액션, 외부에서 들어오는 것(웹훅)·외부로 나가는 것(SMS)=Route Handler. 경계가 명확. 5. 동적 라우트 - (root)/order/[id]: 주문 상세(주문별 페이지). - (root)/product/[slug]: 상품 상세(slug 기반, SEO 친화). - admin/products/[id], admin/users/[id]: 관리자 수정 페이지. - api/auth/[...nextauth]: 캐치올(...)로 NextAuth의 모든 인증 경로 처리. ★ [slug]는 SEO용 읽기 좋은 URL, [id]는 식별자, [...nextauth]는 여러 경로를 하나로. 6. 미들웨어(NextAuth v5) — 접근 제어 middleware.ts에서 NextAuth의 auth를 미들웨어로 export: export const { auth: middleware } = NextAuth(authConfig) ★ 모든 요청 전에 실행돼 인증/권한 확인. 로그인 필요 페이지, 관리자 전용(admin/ ) 등을 라우트 단에서 보호. auth-guard.ts로 추가 가드. 7. 메타데이터 & SEO - layout.tsx: Metadata 타입으로 title 템플릿( %s 메이페이안과 ), description, metadataBase 설정. - 각 페이지가 자기 title을 export → 템플릿에 끼워짐. - next/font(Inter)로 폰트 최적화, Pretendard는 CDN. next/image로 이미지 최적화. ★ App Router의 메타데이터 API로 페이지별 SEO를 서버에서 처리(CSR의 SEO 약점 해결). 8. 결제 3종 통합 (Next 위에서) - 토스페이먼츠(SDK): 국내 결제. 요청-승인 2단계, api/payments/confirm에서 백엔드 승인. - Stripe: 해외 카드. 웹훅(api/webhooks/stripe)으로 결과 수신. - PayPal(react-paypal-js): 해외. lib/paypal.ts. - PaymentSwitcher 컴포넌트가 결제수단에 따라 분기 렌더(order-details-table에서). ★ Next Route Handler가 각 PG의 승인·웹훅 엔드포인트 역할. 결제수단 선택은 payment-method-form(RadioGroup). 9. 결제 플로우 (단계별 페이지 = App Router 라우팅) 상품 → 장바구니(cart) → 환자정보(patient-information) → 결제수단(payment-method) → 주문확인(place-order, 차트번호 입력) → 주문상세/결제(order/[id]) → 성공/실패(payments/success·fail). - CheckoutSteps 컴포넌트로 진행 바 표시. - place-order-form: 차트번호 입력 모달+useTransition으로 pending 처리, createOrder 후 router.push. ★ 각 단계가 독립 라우트라 뒤로가기·북마크·새로고침에 안전. 서버 액션이 단계 간 상태(주문)를 DB에. 10. 기타 Next 생태계 활용 - Prisma + @prisma/adapter-neon: Neon 서버리스 PostgreSQL. ws로 서버리스 커넥션. - NextAuth v5(@auth/prisma-adapter): 세션·계정을 Prisma로. Account/Session/VerificationToken 모델. - react-hook-form + zod(@hookform/resolvers): 폼 검증. validators.ts에 zod 스키마. - Radix UI + Tailwind: 접근성 있는 UI 프리미티브+스타일. shadcn 스타일 components/ui. - react-email + resend: 구매 영수증 이메일(email/purchase-receipt.tsx). - uploadthing: 상품 이미지 업로드. - recharts: 관리자 통계 차트(admin/overview/charts). - vaul(Drawer), embla-carousel, framer-motion: 모바일 UI·캐러셀·애니메이션. - lib/encrypt.ts: 민감정보 암호화. 11. Prisma 데이터 모델 (10종) Product, User, Account, Session, VerificationToken, Cart, Order, OrderItem, FinishedPayment, Review. ★ Account/Session/VerificationToken은 NextAuth 표준. FinishedPayment로 완료 결제를 별도 기록(감사). Cart→Order→OrderItem 흐름. 면접 포인트 (이 프로젝트로 말할 것) 1. \"Next 풀스택\": 프론트+백엔드를 한 코드베이스로. 서버 컴포넌트(조회)+서버 액션(변경)+Route Handler(외부 연동) 3층을 용도별로 구분해 씀. 2. \"서버/클라 경계 설계\": page는 서버 컴포넌트로 데이터 조회, 인터랙션만 'use client'로 분리. 43개 클라 컴포넌트 vs 서버 기본. 3. \"결제 3종 통합\": 토스(국내)/Stripe·PayPal(해외)를 Route Handler로 각 PG 승인·웹훅 처리. 토스는 요청-승인 2단계로 백엔드 재검증. 4. \"라우트 그룹으로 영역 분리\": auth/root/admin/user를 그룹 레이아웃+미들웨어로 권한·UI 구획. 5. \"단계별 결제 플로우를 독립 라우트로\": 각 단계가 URL이라 새로고침·뒤로가기 안전, 서버 액션이 상태를 DB에. 핵심 요약 Next 15 App Router 풀스택 결제 플랫폼. 서버 컴포넌트(조회)+서버 액션(변경)+Route Handler(외부 연동) 3층 구분. 라우트 그룹으로 auth/root/admin/user 분리, 미들웨어(NextAuth)로 접근 제어. 결제 3종(토스/Stripe/PayPal)을 Route Handler로 통합, 결제 플로우를 단계별 독립 라우트로. Prisma+Neon 서버리스 DB, 메타데이터 API로 SEO. --- 12. 서버에서 외부 API 호출 — 두 방식 (실제 호출 경로 정정) ★ 질문: \"use server에서 API 호출 대표 예시 / api 폴더 따로 안 만들고 구현한 부분\" ★ 정정: 이 프로젝트는 두 방식을 다 쓴다. 어느 쪽이냐는 \"호출 경로\"로 갈린다. 방식 A — Route Handler 경유 (토스 결제 승인, confirmPayment) 실제 호출 사슬: 즉 confirmPayment는 \"서버 액션\"이 아니라 Route Handler에서 호출된다. 클라가 우리 /api/payments/confirm을 fetch하고, 그 안에서 confirmPayment(서버 전용 함수)가 토스 API를 부름. 왜 Route Handler? 결제 성공 페이지가 클라이언트 컴포넌트라 우리 API URL(/api/payments/confirm)에 fetch. (주석에 원래 서버 액션으로 하려던 흔적도 있음 → 방식 전환의 흔적) 방식 B — 서버 액션에서 외부 API 직접 (환불·PayPal) ← 이게 \"api 폴더 없이\" lib/actions/ .ts('use server')에서 외부 API를 직접 fetch. Route Handler(app/api) 안 거침: ★ 이게 진짜 \"api 폴더 없이 서버에서 외부 API 호출\". 클라가 이 서버 액션을 함수처럼 부르면 서버에서 실행되고, 그 안에서 외부 API+DB+revalidatePath까지. 정리 — 언제 무엇을 (이 프로젝트 실제 기준) - 서버 액션 직접 fetch: 환불(refund.actions), PayPal(order.actions). 클라가 액션을 함수처럼 호출→서버에서 외부 API+DB. - Route Handler 경유: 토스 confirm(클라 success 페이지가 우리 API URL에 fetch), Stripe 웹훅(외부가 우리를 호출), SMS, NextAuth. - 갈리는 기준: 외부가 우리를 부르거나(웹훅) 클라가 명시적 URL로 부르면 Route Handler / 내부 흐름에서 함수처럼 부르면 서버 액션. 시크릿 키는 어느 쪽이든 서버 전용 환경변수라 노출 안 됨. - ★ 면접 정직 포인트: \"confirmPayment는 Route Handler에서 부르고, 환불·PayPal은 서버 액션에서 직접 부른다. 한 프로젝트 안에 두 방식이 섞여 있고, 토스 confirm은 원래 서버 액션으로 하려다 Route Handler로 바꾼 흔적이 있다\"고 정확히 말할 수 있는 게 강점. 13. Next 고유 기능 (기존 React와 다른 것들) ★ 질문: \"router push처럼 Next에서 변형되어 쓰는 고유 기능, 이미지 로딩 태그 등\" next/navigation (라우팅 — React Router 대체) - useRouter: router.push('/order/123')로 프로그래밍 방식 이동(실제 코드: createOrder 후 router.push(res.redirectTo)). - redirect('/unauthorized'): 서버 컴포넌트·서버 액션에서 서버 사이드 리다이렉트(React엔 없음). - usePathname: 현재 경로(admin/main-nav에서 활성 탭 표시). - useSearchParams: 쿼리스트링 읽기(검색 페이지). - notFound(): 404 페이지 강제 트리거(상품 없으면). ★ React는 react-router-dom을 따로 깔지만 Next는 next/navigation 내장. redirect·notFound는 Next만의 서버 사이드 기능. next/image (이미지 최적화) — <img 대신 <Image ★ 자동 최적화: WebP 변환, 크기별 리사이징, lazy loading(뷰포트 들어올 때 로드), 레이아웃 시프트 방지(width/height 필수). 일반 <img 보다 성능↑. 실제로 place-order/history 등에서 사용. next/link (클라이언트 네비게이션) — <a 대신 <Link ★ 페이지 전체 리로드 없이 클라이언트 사이드 전환(prefetch까지). 29개 파일에서 사용. 일반 <a 는 전체 새로고침. next/font (폰트 최적화) ★ 폰트를 빌드 타임에 self-host → 외부 요청 없이 로드, 레이아웃 시프트 방지. layout.tsx에서. revalidatePath (캐시 무효화) — Next 고유 ★ 서버 액션으로 데이터 바꾼 뒤 호출 → 해당 페이지가 최신 데이터로 다시 렌더. 실제로 주문/환불/유저 수정 후 사용(refund→/history, order→/order/[id]). React엔 없는 서버 캐시 개념. 메타데이터 API — Next 고유 - export const metadata / generateMetadata로 페이지별 <head ·SEO를 서버에서. (문서34 7번) 14. Zod (스키마 검증 라이브러리) ★ 질문: zod 간략 설명 정의: TypeScript용 스키마 선언·검증 라이브러리. \"데이터가 이 형태여야 한다\"를 코드로 선언하고, 런타임에 검증+타입 추론. 왜 쓰나: - 런타임 검증: TypeScript 타입은 컴파일 때만 존재→런타임엔 사라짐. zod는 실제 들어온 데이터를 런타임에 검사(외부 입력은 못 믿으니). - 타입 자동 추론: z.infer<typeof schema 로 스키마에서 TS 타입 생성 → 검증과 타입이 한 소스(SSOT). - 에러 메시지 내장: 각 필드에 한글 메시지. ★ 이 프로젝트에서 zod가 양쪽에서: - 클라이언트 폼: react-hook-form + zodResolver(updateUserSchema)로 입력 즉시 검증(profile-form, update-user-form). - 서버 액션: schema.parse(data)로 서버에서 재검증(cart/order/product/review/user.actions). 위반 시 throw. - ★ \"클라에서 검증하고 서버에서 또 검증\" — 클라 검증은 UX(빠른 피드백), 서버 검증은 보안(클라 우회 가능하니). 같은 zod 스키마를 양쪽에서 재사용. 연결: 앞서 NestJS의 DTO+ValidationPipe와 같은 역할(문서28). Nest는 class-validator, Next/TS 생태계는 zod. \"경계에서 입력 검증\"이라는 원칙은 동일. 확장 요약 (12~14) - 서버 액션/서버 함수에서 fetch로 외부 API 직접 호출→api 폴더 불필요. 시크릿 키는 서버 전용 환경변수로 노출 방지. 내부 흐름=서버 액션, 외부→우리=Route Handler. - Next 고유: useRouter/redirect/notFound(next/navigation), <Image (최적화), <Link (클라 네비), next/font, revalidatePath(캐시 무효화), 메타데이터 API. - zod: 런타임 스키마 검증+타입 추론. 클라(zodResolver)+서버(parse) 양쪽 재사용. \"경계 검증\" 원칙(NestJS DTO와 같은 역할). --- 15. 서버 액션 심화 — 호출 위치·본질·Route Handler와의 차이 ★ 질문에서 자주 헷갈리는 3가지 정리. 호출 위치 — 클라/서버 양쪽 다 (오해 주의) - ★ 실행 위치와 호출 위치는 별개다. 실행은 항상 서버(고정), 호출은 클라이언트 컴포넌트·서버 컴포넌트 둘 다 가능. - 오히려 클라이언트 컴포넌트('use client')에서 호출이 흔하다: 폼 제출·버튼 클릭 같은 상호작용(onClick/onSubmit)은 클라에서만 가능→그 안에서 서버 액션 호출. 'use client'; const res = await createOrder(data); router.push(res.redirectTo); // 클라에서 서버 액션 호출 - 서버 컴포넌트에선 주로 <form action={createOrder} 로 연결(JS 없이 동작, 프로그레시브 인핸스먼트). - ★ \"서버에서 실행\"이 \"서버 컴포넌트에서 호출\"이란 뜻이 아니다. 클라에서 불러도 몸통은 서버에서 돎. - 구분: 조회(읽기)=서버 컴포넌트가 렌더하며 직접(서버 액션 아님) / 변경(쓰기)=서버 액션, 주로 클라 상호작용에서 호출. 본질 — 결국 HTTP 요청 - 겉보기엔 함수 호출이지만 내부적으로 Next가 자동 생성한 엔드포인트로 POST 요청을 보낸다. 네트워크 탭에 실제 POST가 찍힘. - 즉 주소가 외부로 노출 안 될 뿐, 본질은 Route Handler(api 폴더 REST 라우터)와 같은 클라이언트-서버 HTTP 통신. URL을 우리가 직접 명명하지 않고 액션 ID로 자동 생성될 뿐. Route Handler와 실제로 다른 점 (동작은 같아도) - 보일러플레이트: 서버 액션=함수 만들고 import해 호출(자동). Route Handler=route.ts 작성+URL 정의+fetch+JSON 직렬화/파싱 수동. - 타입: 서버 액션=함수 직접 import라 인자·반환 타입 자동 연결(타입 안전). Route Handler=네트워크 건너며 타입 끊김→수동으로 맞춤. - 폼 통합: 서버 액션=useFormStatus/useActionState로 pending 자동, <form action 직접 연결. - URL 노출: 서버 액션=명시적 URL 없음→우리 앱 내부만 호출. Route Handler=공개 URL→외부(웹훅·서드파티)도 호출 가능. 표 요약: Server Action Route Handler 본질 HTTP 요청(같음) HTTP 요청(같음) URL 자동·숨김 명시적·공개 호출 주체 내부만 외부도 가능 개발 import, 보일러플레이트 없음 엔드포인트 수동 타입 자동 연결 수동 적합 내부 폼·CRUD 웹훅·공개 API ★ 선택 기준: 내부 변경=Server Action(편의·타입), 외부가 호출=Route Handler(공개 URL·제어). 이 프로젝트가 토스 confirm=클라가 URL로 부르니 Route Handler, 환불·PayPal=내부 흐름이니 서버 액션으로 가른 이유. 면접 한 문장: \"서버 액션도 내부적으론 자동 생성 엔드포인트로 가는 POST라 본질은 Route Handler와 같은 HTTP 통신이다. 다만 URL이 숨겨져 내부 전용이고, 함수를 직접 import하니 보일러플레이트 없이 타입이 자동 연결된다. 그래서 내부 폼·CRUD는 서버 액션, 웹훅처럼 외부가 부르는 건 Route Handler로 구분한다.\" --- 16. 폴더 아키텍처 — inbound/outbound 레이어 구분 ★ \"외부 API 호출 코드를 어디 두나\"에 대한 정리. app/api와 \"외부 호출 코드\"는 다른 것. 폴더별 역할 (실제 구조) - app/ — 라우팅 + 조립. 라우트 그룹으로 영역 분리: (root)=쇼핑, (auth)=로그인/회원가입, admin=관리자, user=마이페이지, unauthorized=권한없음. 컴포넌트/카드류는 대부분 components/에, app/은 조립·라우팅 역할. - components/ — UI 조각 (admin, payment, shared/product, ui). - lib/actions/ — 서버 액션 (Prisma CRUD + 오케스트레이션). - app/api/ — 콜백/웹훅 (inbound HTTP 엔드포인트). - email/ — React Email 구매 영수증 템플릿(purchase-receipt.tsx). - hooks/ — use-toast, use-phone 등 클라 훅. - 결제 3중화 — Toss(lib/api/toss + app/api/payments) + Stripe(webhook) + PayPal(lib/paypal.ts) 공존. - 그 밑: auth·prisma(neon)·schema·session cart 구조. Zod→types 파생. 한 줄: app=라우팅+조립, components=UI 조각, lib/actions=서버 액션, app/api=콜백/웹훅. ★ 핵심 구분 — inbound vs outbound 질문: \"외부 API 호출 코드는 app/api에 넣나? actions엔 내부 CRUD만?\" 답: app/api와 \"외부 API 호출 코드\"는 서로 다른 것. 외부 호출을 app/api에 넣는 건 방향이 반대. - app/api/ (Route Handler) = inbound: 남이 우리 서버를 호출(웹훅·콜백·업로드). \"URL로 노출되는 HTTP 엔드포인트\"를 두는 곳. - 외부 API 호출 코드 = outbound: 우리가 남(Toss/PayPal)을 호출(fetch 클라이언트·SDK 래퍼). lib/에 둠 (app/api 아님). ★ Toss 호출하는 confirm-payment.ts를 app/api에 넣으면 필요도 없는 URL이 생기고 아무도 그 URL로 접근 안 하는 이상한 상태가 됨. 3층 레이어 (깔끔한 정리) - lib/integrations/ (=현재 lib/api/) = Toss·PayPal·SMS·uploadthing 외부 서비스 클라이언트. 순수 \"외부와 통신\"만. 재사용 단위. - lib/actions/ = 그 클라이언트들 + Prisma를 조합해 하나의 업무 완성. DB CRUD만 모으는 게 아님. ★ \"actions엔 CRUD만\"은 너무 엄격 현실의 액션은 CRUD + 외부호출을 엮는 오케스트레이터인 경우가 많음. 예) 결제 확정: \"CRUD만 action\"으로 쪼개면 오히려 로직이 흩어짐. 규칙은 이렇게: - 외부 호출 \"방법\"(엔드포인트 URL·헤더·인증·응답 파싱) → lib/integrations/에 격리. - 업무 \"흐름\"(언제 외부를 부르고 그 결과로 DB를 어떻게 바꾸나) → lib/actions/. - 외부가 우리를 부르는 진입점(웹훅/콜백) → app/api/, 그 안에서도 실제 로직은 action/integration 호출하고 route는 얇게. 이 프로젝트에 적용하면 (리팩터링 방향) - lib/api/toss/, paypal.ts, send-sms.ts, uploadthing.ts → lib/integrations/{toss,paypal,sms,uploadthing}/로 모아 \"외부 통신\"을 폴더명으로 드러내기. - encrypt.ts, auth-guard.ts, utils.ts, constants/ → lib/ 유틸/공용 그대로 (외부 API 아니라 내부 유틸이라 섞이는 게 정상). - app/api/payments/ , webhooks/stripe → 얇은 route로 유지, 실제 로직은 action/integration 위임. 정리: 외부 호출 코드는 app/api가 아니라 lib에 격리, app/api는 inbound 전용, actions는 CRUD 전용이 아니라 오케스트레이션. 면접 한 문장 \"app/api는 남이 우리를 부르는 inbound 엔드포인트(웹훅·콜백)를 두는 곳이고, 우리가 외부(Toss·PayPal)를 부르는 outbound 코드는 lib/integrations에 격리합니다. 서버 액션은 그 외부 클라이언트와 Prisma를 조합해 하나의 업무를 완성하는 오케스트레이션 계층이라 'CRUD만'이 아니라 CRUD+외부호출을 엮습니다. inbound=app/api, outbound=lib, 흐름=actions로 방향과 역할을 나눕니다.\""}, {"title": "병원결제", "kind": "직렬화", "url": "doc_49_jceye_serialization.html", "text": "[문서49] 병원결제 — Next 서버↔클라이언트 데이터 통신(직렬화) Server Component/Server Action이 데이터를 클라이언트로 넘기는 규칙 정리. 라이브러리 일반 동작(Next 직렬화) + 프로젝트 특유 처리(convertToPlainObject·formatError) 결합. ★ 집중 환기용 원자료. --- 1. 한 줄 지도 Next.js에서 데이터가 서버→클라이언트로 넘어가는 길목은 딱 2개(입력 검증·직렬화)이고, 각 경계에 단일 변환 지점을 두는 게 \"막힘 없는 흐름\"의 핵심. - 입력(쓰기) 경계: 폼 문자열 → Zod로 재검증 → Prisma가 DB 타입으로 강제변환. - 직렬화(읽기) 경계: DB의 클래스 인스턴스(Decimal 등) → plain object → 클라이언트로 전달. 2. \"stringify 해서 넘겨주나?\" — 반은 맞다 (검증됨) 개발자가 직접 JSON.stringify 를 부르지 않는다. Next.js가 자동으로 직렬화한다. - Server Component → Client Component (props): Next가 내부적으로 React Flight 포맷으로 자동 직렬화. 우리가 stringify 안 함. 단, 넘기는 값이 직렬화 가능한 plain object 여야 하고 아니면 에러. - Server Action 반환값: 이것도 Next가 자동 직렬화. 역시 plain object여야 함. - 즉 \"프로토콜\"은 자동이고, 개발자 책임은 \"넘기는 값을 plain하게 만드는 것\" 하나로 좁혀진다. 3. 왜 막히나 — Decimal은 클래스라서 Next가 Server→Client로 넘길 수 있는 건 plain object뿐. Prisma의 Decimal 은 클래스 인스턴스라 그대로 넘기면 only plain objects can be passed to Client Components 에러로 막힌다. - 이 막힘을 뚫는 게 $extends (직렬화 경계). Decimal을 string/number로 바꿔 plain하게 만든다 → 이게 db/prisma.ts 의 존재 이유. - 함께 쓰는 이중 안전장치: convertToPlainObject . 주의: JSON.parse(JSON.stringify()) 는 만능이 아니다. Date를 문자열로 바꾸고, undefined를 삭제한다. 그래서 이건 \"프로토콜\"이 아니라 보조 방어선일 뿐. ★ 어긋남의 씨앗: 같은 프로젝트에서 getLatestProducts 는 convertToPlainObject를 쓰는데 getProductBySlug / getProductById 는 손으로 subcategories·discountPrice를 변환. 같은 일을 서로 다른 방식으로 → 변환 창구를 하나로 통일해야 한다. 4. 에러 직렬화 — Error 객체는 그대로 못 넘긴다 (검증됨) Error · ZodError · PrismaClientKnownRequestError 는 전부 클래스 → 클라이언트로 곱게 안 넘어감. 그래서 사람이 읽을 문자열로 눌러서 반환한다. ★ 핵심 패턴: Server Action은 예외를 밖으로 던지지 않고 { success, message } 형태로 \"정상 반환\"한다. 클라이언트는 toast로 message를 띄우면 됨. - 서버 로그엔 원본 에러를 남기고, 클라이언트엔 요약만(민감정보 노출 주의). - throw 는 route handler( app/api )에서 HTTP 상태코드와 함께 쓸 때만. UI가 부르는 Server Action은 던지지 말고 반환. 5. \"금액을 문자로 직렬화\" — 쉬운 설명 컴퓨터의 number (부동소수점)는 돈 계산에서 미세하게 틀린다. - 가격이 12000.50원인데 계산하다 12000.4999...가 되면 영수증 금액이 어긋남. - 그래서 DB(Postgres)는 돈을 Decimal(정확한 10진수)로 저장. 하지만 JS엔 Decimal 타입이 없어서, 클라이언트로 넘기는 순간 부정확한 number로 바뀔 위험. - 해법: \"12000.50\" 처럼 문자열로 넘긴다. 문자열은 숫자 오차가 절대 안 생김. 계산이 필요할 때만 정확한 라이브러리(Prisma.Decimal)나 정수(원 단위)로 한다. - 비유: 정밀한 측정값을 \"대충 반올림되는 저울(number)\"에 다시 얹지 않고, 종이에 적힌 숫자 그대로(string) 전달. 저울에 올리는 순간(=number 변환) 틀어지니까. ★ 그래서 \"price는 string인데 discountPrice만 number라 위험\"하다. 할인가만 오차 나는 저울에 올려둔 셈 → 둘 다 string으로 통일해야 한다. 6. 모범적인 응답 방식 (원칙) \"경계를 넘는 것은 항상 plain object, 결과는 항상 같은 모양(shape).\" - ① 성공/실패를 예외가 아니라 반환값으로. 고정된 결과 타입을 못박기. - ② 직렬화 변환은 한 곳에서. 액션마다 convertToPlainObject/손변환/$extends가 뒤섞이지 않게, 읽기 경로는 $extends 하나로 통일 → getProductById 의 손 Number(discountPrice) 가 사라짐. - ③ 에러는 formatError로 문자열화(이미 하고 있음). 서버 로그엔 원본, 클라이언트엔 요약. - ④ throw는 route handler에서만, HTTP 상태코드와 함께. 7. 읽기 타입은 \"저장형+직렬화\"에서 파생 z.infer<insertSchema & { DB 필드 } 로 손으로 덧붙이는 방식은 동작하지만, rating·subcategories처럼 입력엔 없고 조회엔 있는 필드가 손 관리라 어긋나기 쉽다. 더 견고한 방식은 Prisma 생성 타입에서 Decimal만 치환: → 스키마에 필드를 추가하면 타입이 자동으로 따라오고, 손으로 & {} 관리하다 빠뜨리는 일이 없어진다. 8. 관심사별 진실 공급원(SSOT) 분리 핵심은 \"하나가 전부를 생성\"이 아니라, 관심사별로 진실 공급원을 나누되 경계에서 변환을 한 곳에 모으는 것. 관심사 진실 공급원 용도 --- --- --- 저장 형태 Prisma schema DB 구조·마이그레이션 입력 검증 Zod (insert/update Schema) 폼·Server Action 검증 읽기 형태(직렬화) $extends 변환 규칙 클라이언트로 넘길 plain 타입 3가지 규칙: ① 돈은 한 표현(string)으로 통일, 계산은 Decimal/정수로. ② 변환은 무조건 $extends 한 곳에서만(액션·컴포넌트에 .toString() / Number() 를 흩뿌리지 말 것, 새 Decimal 필드는 반드시 여기 규칙 추가). ③ 읽기 타입은 Zod가 아니라 Prisma 생성 타입에서 파생. 핵심 요약 (한 문단) Next.js는 Server Component→Client Component props와 Server Action 반환값을 React Flight로 자동 직렬화하므로 개발자는 stringify를 직접 부르지 않는다. 대신 넘기는 값이 plain object여야 하는데, Prisma Decimal·Error 같은 클래스 인스턴스는 막히므로 읽기 경로는 $extends로 Decimal을 string/number로 눌러 plain화하고(보조로 convertToPlainObject), 에러는 formatError로 문자열화해 {success, message} 로 정상 반환한다. 돈은 부동소수 오차를 피하려 string으로 직렬화하고 계산 시에만 Decimal/정수로 다룬다. 모범 형태는 고정된 ActionResult 타입 + 단일 변환 창구(입력=Zod, 직렬화=$extends) + 읽기 타입을 Prisma 생성 타입에서 파생."}, {"title": "프로젝트: 건설 감리 시스템", "kind": "SQL 실전 범위", "url": "doc_35_allscape_sqlmastery.html", "text": "[문서35] 프로젝트: 건설 감리 시스템 — SQL 실전 범위 정부 건설 감리·결재 백엔드(Flask + 생 SQL). ORM 없이 직접 SQL 작성. 규모: SQL 파일만 12,000줄+, SELECT 1,340개, 모듈 20+개. ★ \"얼마나 복잡한 쿼리를 다뤄봤나\"를 실제 코드 예시로. 핵심: 복잡한 걸 자랑이 아니라 \"다뤄봤고 정리할 줄 안다\"로. --- 핵심 한 줄 \"ORM 없이 생 SQL로 건설 감리 시스템 백엔드를 구현. 다중 LEFT OUTER JOIN, 스칼라/IN/상관 서브쿼리, UNION ALL, GROUP BY 집계, GROUP_CONCAT, COALESCE, 권한(RBAC)에 따라 서브쿼리가 바뀌는 동적 쿼리까지 실무에서 작성·디버깅했다. 파라미터 바인딩(%s)으로 인젝션을 막았다.\" 1. 아키텍처 — 3층 분리 (생 SQL 방식) 각 모듈이 3파일로: - api .py: Flask-RESTX 라우팅(엔드포인트). - serv .py: 비즈니스 로직 + 권한별 쿼리 조립 + 로깅. - sql .py: SQL 문자열 상수 + 쿼리 반환 메서드. - dbManage.py: 커넥션 관리 + execute(query, params) + commit/rollback. ★ ORM 없이도 \"SQL(sql)·로직(serv)·라우팅(api)\"을 계층 분리. 생 SQL이라도 관심사 분리는 지킴. 2. 다뤄본 쿼리 범위 (실측 카운트) - LEFT OUTER JOIN 71개, LEFT JOIN 6개 - IN (SELECT ...) 서브쿼리 43개 - COUNT 25개, MAX 13, SUM 3, MIN 1, COALESCE 2 - GROUP BY 7개, DISTINCT 40개 - LIMIT(페이지네이션) 48개 - 총 SELECT 1,340개 ★ 면접에서: \"단순 CRUD가 아니라 다중 조인·서브쿼리·집계·UNION을 실무에서 다뤘다\"를 숫자로. 3. 대표 쿼리 A — 결재 문서 목록 (다중 조인+서브쿼리+UNION ALL) 여러 종류 문서(시공완료 요청, 감리 검사 보고 등)를 한 목록으로 합침: 여기서 다룬 기법: - 다중 LEFT OUTER JOIN(문서-결재정보-작성자) - 스칼라 서브쿼리(코드→이름 변환, 작성자 이름 조회) - GROUP_CONCAT(여러 수신자 ID를 한 컬럼에) - I
